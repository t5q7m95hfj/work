<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Mission Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg0:#111418;--bg1:#1c2128;--bg2:#161b22;--bg3:#1c2128;
  --border:#2d333b;--border2:#444c56;
  --txt0:#f0ece4;--txt1:#d8d3ca;--txt2:#adb5bd;--txt3:#768390;--txt4:#545d68;
  --accent:#58a6ff;--green:#3fb950;--amber:#e3b341;--red:#f85149;--purple:#bc8cff;
  --tap:48px;
}
.light{
  --bg0:#f0ebe0;--bg1:#ffffff;--bg2:#e8e2d6;--bg3:#ddd8cc;
  --border:#ccc5b8;--border2:#b8b0a2;
  --txt0:#0d0c08;--txt1:#211e18;--txt2:#3e3a32;--txt3:#65604f;--txt4:#8a8070;
  --accent:#0969da;--green:#1a7f37;--amber:#9a6700;--red:#cf222e;--purple:#7c3aed;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg0);color:var(--txt1);-webkit-font-smoothing:antialiased;}

/* HEADER */
.hdr{position:sticky;top:0;z-index:50;background:var(--bg3);border-bottom:1px solid var(--border);padding:11px 15px 10px;}
.hdr-inner{display:flex;justify-content:space-between;align-items:center;}
.hdr-eyebrow{font-size:9px;letter-spacing:2.5px;color:var(--txt4);text-transform:uppercase;font-weight:700;margin-bottom:2px;}
.hdr-date{font-size:22px;font-weight:700;color:var(--txt0);letter-spacing:-0.5px;line-height:1.1;}
.hdr-sub{font-size:11px;color:var(--txt3);margin-top:3px;}
.hdr-right{display:flex;align-items:center;gap:10px;}
.hdr-wx{display:flex;flex-direction:column;align-items:center;gap:0;}
.wx-icon{font-size:22px;line-height:1;}
.wx-temp{font-size:12px;font-weight:600;color:var(--txt1);font-family:'DM Mono',monospace;margin-top:1px;}
.wx-rain{font-size:9px;color:var(--accent);min-height:12px;}
.hdr-btns{display:flex;flex-direction:column;gap:5px;}
.icon-btn{width:30px;height:30px;border-radius:6px;border:1px solid var(--border2);background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--txt2);}
.icon-btn:active{opacity:.6;}

/* NAV */
.nav{position:sticky;top:68px;z-index:40;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;}
.nav-btn{flex:1;height:46px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--txt4);font-size:9px;font-weight:700;letter-spacing:.5px;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;font-family:'DM Sans',sans-serif;}
.nav-btn.on{color:var(--txt0);border-bottom-color:var(--accent);}
.nav-icon{font-size:14px;}
.content{padding:12px 13px 90px;}

/* LABELS */
.slabel{font-size:9px;color:var(--txt3);font-weight:700;letter-spacing:1.8px;text-transform:uppercase;margin:4px 0 8px;}
.slabel.mt{margin-top:18px;}

/* CARDS */
.mcard{background:var(--bg1);border-radius:10px;padding:12px 14px;margin-bottom:7px;border-left:3px solid;cursor:pointer;transition:transform .1s;user-select:none;}
.mcard:active{transform:scale(0.982);}
.mcard.dim{opacity:.35;}
.mc-top{display:flex;justify-content:space-between;align-items:flex-start;}
.mc-left{flex:1;min-width:0;}
.mc-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px;}
.mc-tag{font-size:12px;font-weight:700;}
.mc-time{font-size:12px;color:var(--txt2);font-family:'DM Mono',monospace;}
.mc-date-s{font-size:10px;color:var(--txt4);}
.mc-type{font-size:13px;color:var(--txt0);font-weight:600;}
.mc-pills{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;}
.mpill{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;}
.mp-pax{background:rgba(88,166,255,.12);color:var(--accent);}
.mp-loc{background:rgba(63,185,80,.1);color:var(--green);}
.mp-ok{background:rgba(63,185,80,.1);color:var(--green);}
.mc-right{text-align:right;flex-shrink:0;margin-left:8px;}
.mc-ref{font-family:'DM Mono',monospace;font-size:9px;color:var(--txt4);margin-bottom:3px;}
.bdg{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600;}
.bdg-plan{background:rgba(88,166,255,.12);color:var(--accent);}
.bdg-done{background:rgba(63,185,80,.12);color:var(--green);}
.bdg-cancel{background:rgba(248,81,73,.12);color:var(--red);}

/* UPCOMING */
.ubox{background:var(--bg1);border-radius:10px;padding:12px 14px;margin-top:7px;border:1px solid var(--border);}
.ulbl{font-size:9px;color:var(--green);font-weight:700;letter-spacing:1.5px;margin-bottom:7px;text-transform:uppercase;}
.uitem{display:flex;gap:8px;align-items:baseline;margin-bottom:4px;font-size:11px;}

/* EMPTY */
.empty{text-align:center;padding:40px 0 16px;}
.empty-icon{font-size:36px;margin-bottom:8px;}
.empty-title{font-size:15px;color:var(--txt2);font-weight:500;}
.empty-sub{font-size:12px;color:var(--txt4);margin-top:3px;}

/* DETAIL */
.back-btn{background:none;border:none;color:var(--accent);font-size:13px;cursor:pointer;padding:0 0 10px;display:flex;align-items:center;gap:4px;min-height:44px;font-family:'DM Sans',sans-serif;font-weight:500;}
.dcard{background:var(--bg1);border-radius:12px;overflow:hidden;border-top:3px solid;}
.dhdr{padding:14px 15px 12px;}
.d-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px;}
.d-client{font-size:10px;font-weight:700;letter-spacing:1.5px;margin-bottom:3px;text-transform:uppercase;}
.d-title{font-size:16px;font-weight:700;color:var(--txt0);line-height:1.2;}
.shift-box{padding:10px 12px;border-radius:8px;background:rgba(88,166,255,.05);border:1px solid rgba(88,166,255,.14);margin:10px 0 12px;}
.shift-time{font-size:21px;font-weight:700;color:var(--accent);font-family:'DM Mono',monospace;}
.shift-sub{font-size:11px;color:rgba(88,166,255,.55);margin-top:2px;}
.key-pills{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0 3px;}
.kpill{font-size:11px;padding:4px 10px;border-radius:6px;font-weight:500;background:var(--bg2);color:var(--txt2);border:1px solid var(--border);}
.kpill.hi{color:var(--accent);border-color:rgba(88,166,255,.22);background:rgba(88,166,255,.06);}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:11px;}
.ifield label{font-size:9px;color:var(--txt4);display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.8px;}
.ifield span{font-size:12px;color:var(--txt1);font-weight:500;}
.ifield span.mono{font-family:'DM Mono',monospace;font-size:11px;}
.sdiv{border-top:1px solid var(--border);}
.sin{padding:11px 15px;}
.stitle{font-size:9px;font-weight:700;letter-spacing:1.8px;margin-bottom:8px;text-transform:uppercase;}
.blue{color:var(--accent);}
.green{color:var(--green);}
.amber{color:var(--amber);}
.purple{color:var(--purple);}
.muted{color:var(--txt4);}
.orow{display:flex;align-items:flex-start;gap:7px;margin-bottom:6px;}
.o-icon{font-size:13px;flex-shrink:0;line-height:1.4;}
.o-lbl{font-size:9px;color:var(--txt4);min-width:54px;padding-top:2px;text-transform:uppercase;letter-spacing:.5px;}
.o-val{font-size:12px;color:var(--txt1);flex:1;line-height:1.5;}
.o-ph{color:var(--accent);text-decoration:none;}
.o-urg{color:var(--red)!important;}
.o-sub{font-size:9px;color:var(--txt4);font-weight:700;margin:8px 0 4px;text-transform:uppercase;letter-spacing:.8px;}
.o-contact{font-size:12px;color:var(--txt1);margin-bottom:4px;}
.mise-box{background:var(--bg2);border-radius:7px;padding:9px 11px;font-size:11px;color:var(--txt2);line-height:1.75;margin-top:6px;white-space:pre-wrap;}
.etoggle{cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.ebody{padding:9px 11px;background:var(--bg2);border-radius:7px;font-size:11px;color:var(--txt2);line-height:1.65;margin:6px 0 5px;white-space:pre-wrap;}
.att{font-size:11px;color:var(--accent);padding:6px 10px;background:var(--bg2);border-radius:6px;margin-bottom:4px;display:flex;align-items:center;gap:6px;min-height:var(--tap);border:1px solid var(--border);}
.frow{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;}
.flbl{color:var(--txt3);}
.fval{color:var(--txt1);font-weight:500;}
.fnet{font-size:16px;font-weight:700;color:var(--amber);margin-top:5px;}
.log-entries{margin-bottom:10px;}
.lentry{display:flex;gap:8px;margin-bottom:7px;}
.lts{font-size:10px;color:var(--txt4);font-family:'DM Mono',monospace;min-width:34px;padding-top:2px;}
.lbubble{flex:1;background:var(--bg2);border-radius:7px;padding:6px 10px;}
.ltag{font-size:9px;color:var(--txt4);margin-bottom:2px;}
.ltext{font-size:11px;color:var(--txt2);line-height:1.5;}
.log-empty{font-size:11px;color:var(--txt4);font-style:italic;margin-bottom:10px;}
.log-types{display:flex;gap:5px;margin-bottom:7px;}
.ltbtn{flex:1;padding:7px 4px;font-size:10px;border-radius:7px;border:1px solid var(--border);background:var(--bg2);color:var(--txt3);cursor:pointer;text-align:center;min-height:var(--tap);font-family:'DM Sans',sans-serif;}
.ltbtn.on{border-color:rgba(88,166,255,.3);background:rgba(88,166,255,.06);color:var(--accent);}
.ta{width:100%;padding:9px 11px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;color:var(--txt0);font-size:12px;font-family:'DM Sans',sans-serif;resize:none;line-height:1.5;}
.ta:focus{outline:none;border-color:rgba(88,166,255,.3);}
.submit-btn{width:100%;margin-top:6px;padding:11px;background:rgba(88,166,255,.06);border:1px solid rgba(88,166,255,.2);border-radius:9px;color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;min-height:var(--tap);font-family:'DM Sans',sans-serif;}
.editrow{display:flex;gap:7px;align-items:center;margin-bottom:6px;}
.einput{flex:1;padding:9px 11px;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;color:var(--txt0);font-size:12px;font-family:'DM Sans',sans-serif;min-height:var(--tap);}
.einput:focus{outline:none;border-color:rgba(88,166,255,.3);}
.esave{padding:9px 11px;background:rgba(88,166,255,.06);border:1px solid rgba(88,166,255,.2);border-radius:8px;color:var(--accent);font-size:11px;font-weight:700;cursor:pointer;min-height:var(--tap);font-family:'DM Sans',sans-serif;}
.pmf-trigger{width:100%;padding:13px;background:rgba(63,185,80,.06);border:1px solid rgba(63,185,80,.2);border-radius:10px;color:var(--green);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;min-height:var(--tap);font-family:'DM Sans',sans-serif;}
.pmf-step-hdr{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.pmf-num{width:26px;height:26px;border-radius:50%;background:var(--green);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.pmf-step-title{font-size:14px;font-weight:700;color:var(--txt0);}
.pmf-time-row{display:flex;gap:10px;align-items:center;margin-bottom:9px;}
.pmf-time-block{flex:1;text-align:center;}
.pmf-time-lbl{font-size:9px;color:var(--txt4);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;}
.pmf-tinput{width:100%;padding:10px;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;color:var(--txt0);font-size:18px;font-weight:700;text-align:center;font-family:'DM Mono',monospace;}
.pmf-arrow{font-size:18px;color:var(--txt4);padding-top:14px;}
.pmf-dur{text-align:center;font-size:12px;color:var(--accent);font-weight:600;margin-bottom:15px;font-family:'DM Mono',monospace;}
.pbtn{width:100%;padding:13px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;}
.pbtn-next{background:var(--accent);color:#fff;}
.pbtn-confirm{background:var(--green);color:#fff;}
.pback{display:block;text-align:center;margin-top:12px;font-size:12px;color:var(--txt4);cursor:pointer;}
.rpt-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px;}
.rtbtn{padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--txt2);font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.rtbtn.on{border-color:var(--accent);background:rgba(88,166,255,.06);color:var(--accent);}
.rpt-loading{text-align:center;padding:20px;font-size:12px;color:var(--txt3);}
.spin{display:inline-block;animation:spin 1s linear infinite;}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.rpt-output{background:var(--bg2);padding:12px;border-radius:8px;font-size:12px;line-height:1.6;color:var(--txt1);margin-bottom:10px;white-space:pre-wrap;border:1px solid var(--border);}
.rpt-actions{display:flex;gap:7px;}
.rabtn{flex:1;padding:10px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}
.debrief-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
.dbtn{padding:11px 13px;border-radius:9px;border:1px solid var(--border);background:var(--bg2);color:var(--txt2);font-size:12px;text-align:left;cursor:pointer;font-family:'DM Sans',sans-serif;}
.dbtn.on{border-color:var(--green);background:rgba(63,185,80,.06);color:var(--green);}
.decomp-link{background:rgba(63,185,80,.1);color:var(--green);border:1px solid rgba(63,185,80,.2);padding:8px 15px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}

/* FINANCE GRID */
.fin-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:15px;}
.fin-card{background:var(--bg1);padding:12px;border-radius:10px;border:1px solid var(--border);}
.fin-lbl{font-size:9px;color:var(--txt4);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;}
.fin-val{font-size:16px;font-weight:700;font-family:'DM Mono',monospace;}

/* MONTH OVERVIEW */
.mo-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:15px;background:var(--bg1);padding:10px;border-radius:10px;border:1px solid var(--border);}
.mob-lbl{font-size:8px;color:var(--txt4);text-transform:uppercase;margin-bottom:2px;text-align:center;}
.mob-val{font-size:13px;font-weight:700;text-align:center;font-family:'DM Mono',monospace;}
.m-date-hdr{font-size:10px;font-weight:700;letter-spacing:1.2px;margin:15px 0 6px;display:flex;align-items:center;gap:8px;}
.m-date-pill{font-size:8px;padding:1px 5px;border-radius:3px;text-transform:uppercase;}

/* PAUSE */
.p-hero{text-align:center;padding:40px 20px;}
.p-icon{font-size:48px;margin-bottom:15px;}
.p-title{font-size:20px;font-weight:700;color:var(--txt0);margin-bottom:8px;}
.p-sub{font-size:14px;color:var(--txt3);line-height:1.5;}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-inner">
    <div>
      <div class="hdr-eyebrow">Joseph Mission Control</div>
      <div class="hdr-date" id="hdr-date">...</div>
      <div class="hdr-sub" id="hdr-sub">Chargement...</div>
    </div>
    <div class="hdr-right">
      <div class="hdr-wx" id="wx">
        <span class="wx-icon">☀️</span>
        <span class="wx-temp">--°</span>
      </div>
      <div class="hdr-btns">
        <button class="icon-btn" onclick="toggleMode()" id="mode-btn">☀️</button>
        <button class="icon-btn" onclick="loadMissions()">🔄</button>
      </div>
    </div>
  </div>
</div>
<nav class="nav">
  <button class="nav-btn on" onclick="go('today')" id="nb-today"><span class="nav-icon">☀️</span>AUJOURD'HUI</button>
  <button class="nav-btn" onclick="go('month')" id="nb-month"><span class="nav-icon">📅</span><span id="month-lbl">MOIS</span></button>
  <button class="nav-btn" onclick="go('finance')" id="nb-finance"><span class="nav-icon">💶</span>FINANCES</button>
  <button class="nav-btn" onclick="go('pause')" id="nb-pause"><span class="nav-icon">🌿</span>PAUSE</button>
</nav>
<div class="content" id="content"></div>

<script>
const GAS_URL="https://script.google.com/macros/s/AKfycbwACs6qIEu24xMe3KtSjLMbcs3A6iXqCaZEodXBuTx2au1ol5UXeUqZKM6W_NJO9qSErg/exec";
const TAX=0.212;
const DAYS=["dim","lun","mar","mer","jeu","ven","sam"];
const MOL=["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
const MOS=["jan","fév","mar","avr","mai","jun","jul","aoû","sep","oct","nov","déc"];
const META={
  "Philibert Tourisme":{tag:"PHIL",hex:"#3fb950",contact:"Mélissa Hassaïm",phone:"+33 4 78 98 56 49",email:"rhone-ops@philibert.fr",cohost:"Véronique Olivier · 06 41 60 42 88",emergency:"+33 4 78 98 56 49"},
  "Go Côte Saône":{tag:"GCS",hex:"#58a6ff",contact:"Marion",phone:"06.20.08.10.92",email:"gcs@gocotesaone.com"},
  "Feel the French Way":{tag:"FTFW",hex:"#bc8cff",contact:"Laura Brionne",email:"contact@feelthefrenchway.fr",cohost:"Caroline · caroline.meet.and.greet@gmail.com"},
  "Un Monde Bleu":{tag:"UMB",hex:"#ff7b54",contact:"Audrey Foret",phone:"+33 7 43 36 05 69",email:"OpsRiviera@umb-dmc.fr",notes:"Répondre au thread — autocariste: rhonecroisieres@galeo.mobi"}
};
const TRAVEL={"PERRACHE":45,"PART-DIEU":45,"PART DIEU":45,"LYS":52,"AEROPORT":52,"AIRPORT":52,"INTERCONTINENTAL":40,"HOTEL":40,"QUAI CLAUDE BERNARD":45,"QUAI RAMBAUD":60,"BELLECOUR":45,"VIENNE":105,"STE-COLOMBE":105,"GENEVE":180};
const RPT_LABELS={RAS:"✅ RAS",INCIDENT:"⚠️ Incident",ANNULATION:"❌ Annulation",ANOMALIE:"🔧 Anomalie",OT:"⏱️ Heures supp"};
const PRENOM={"Philibert Tourisme":"Mélissa","Go Côte Saône":"Marion","Feel the French Way":"Laura","Un Monde Bleu":"Audrey"};

// Manifest Links (Updated from Drive)
const MANIFESTS = {
  "2026-04-08-UMB-01": "https://drive.google.com/file/d/1AIrGZaN8jEMCBTZrt2rpjQw8k31YBTdz/view?usp=sharing",
  "2026-04-08-UMB-02": "https://drive.google.com/file/d/12_hffvW3L4dArUecixpxsPmhr6PHWFrQ/view?usp=sharing"
};

let missions=[],flogs={},tab="today",detail=null,pmf=null,pmfStep=0,emailOpen={};
let light=localStorage.getItem("mc_light")==="1";

window.addEventListener("load",()=>{
  if(light)document.body.classList.add("light");
  updateModeBtn();renderHeader();loadWeather();loadMissions();
});

function toggleMode(){light=!light;document.body.classList.toggle("light",light);localStorage.setItem("mc_light",light?"1":"0");updateModeBtn();}
function updateModeBtn(){document.getElementById("mode-btn").textContent=light?"🌙":"☀️";}

function renderHeader(){
  const n=new Date(),cm=p2(n.getMonth()+1);
  document.getElementById("hdr-date").textContent=DAYS[n.getDay()]+" "+n.getDate()+" "+MOL[n.getMonth()];
  const mms=missions.filter(m=>m.date&&m.date.slice(5,7)===cm);
  document.getElementById("hdr-sub").textContent=MOL[n.getMonth()]+" · "+mms.length+" missions · "+mms.filter(isDone).length+" terminées";
}

async function loadWeather(){
  try{
    const r=await fetch("https://api.open-meteo.com/v1/forecast?latitude=45.764&longitude=4.836&current=temperature_2m,weathercode,precipitation_probability&timezone=Europe/Paris&forecast_days=1");
    const d=await r.json();
    const c=d.current;
    const icons={0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",48:"🌫️",51:"🌦️",53:"🌦️",55:"🌦️",61:"🌧️",63:"🌧️",65:"🌧️",71:"🌨️",73:"🌨️",75:"🌨️",80:"🌦️",81:"🌦️",82:"🌦️",95:"⛈️"};
    document.getElementById("wx").innerHTML='<span class="wx-icon">'+(icons[c.weathercode]||"☀️")+'</span><span class="wx-temp">'+Math.round(c.temperature_2m)+'°</span>';
  }catch(e){}
}

async function loadMissions(){
  const stored=localStorage.getItem("mc_missions");
  if(stored){try{const p=JSON.parse(stored);if(p&&p.length){missions=p.map(norm);renderHeader();render();}}catch(e){}}
  
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),8000);
  try{
    const r=await fetch(GAS_URL+"?action=all",{signal:ctrl.signal});
    const d=await r.json();
    clearTimeout(tid);
    if(d.missions){
      missions=d.missions.map(norm);
      localStorage.setItem("mc_missions",JSON.stringify(missions));
      renderHeader();render();
    }
  }catch(e){
    console.error("Fetch error:",e);
  }
}

async function saveField(mid,f,v){try{await fetch(GAS_URL+"?action=update&id="+encodeURIComponent(mid)+"&field="+f+"&value="+encodeURIComponent(v));}catch(e){}}

function norm(m){
  m.mid=m["Mission ID"]||m.mid;
  m.date=normalizeDate(m["Date mission"])||m.date;
  m.client=m["Client"]||m.client;
  m.type=m["Type"]||m.type;
  m.desc=m["Description"]||m.desc;
  m.heures=m["Heures"]||m.heures;
  m.base=m["Base (HT)"]||m.base;
  m.debours=m["Débours"]||m.debours;
  m.statut=m["Statut"]||m.statut;
  m.notes=m["Notes"]||m.notes;
  m.debut=m["Début"]||m.debut;
  m.endroit=m["Endroit"]||m.endroit;
  return m;
}

function normalizeDate(val){
  if(!val)return "";
  if(val.includes("-"))return val;
  const parts=val.split("/");
  if(parts.length===3)return parts[2]+"-"+p2(parts[1])+"-"+p2(parts[0]);
  return val;
}

function p2(v){return String(v).padStart(2,"0");}
function tday(){return new Date().toISOString().split("T")[0];}
function tmrw(){const d=new Date();d.setDate(d.getDate()+1);return d.toISOString().split("T")[0];}
function isDone(m){return m.statut==="Rapport envoyé"||m.statut==="Heures confirmées"||m.statut==="Payé";}
function isCxl(m){return m.statut==="Annulé";}
function getMeta(c){return META[c]||{tag:"?",hex:"#768390",contact:"?",email:"?"};}
function ctax(b){return Math.round(b*TAX*100)/100;}
function cnet(b,d){return Math.round((b*(1-TAX)+parseFloat(d||0))*100)/100;}
function badge(m){
  if(isCxl(m))return'<span class="bdg bdg-cancel">ANNULÉ</span>';
  if(isDone(m))return'<span class="bdg bdg-done">TERMINÉ</span>';
  return'<span class="bdg bdg-plan">'+(m.statut||"PLANIFIÉ")+'</span>';
}

function go(t){
  tab=t;detail=null;pmf=null;
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("on"));
  document.getElementById("nb-"+t).classList.add("on");
  render();
  window.scrollTo(0,0);
}

function render(){
  const c=document.getElementById("content");
  if(detail) { c.innerHTML=rdDetail(detail); return; }
  if(tab==="today") c.innerHTML=rdToday();
  else if(tab==="month") c.innerHTML=rdMonth();
  else if(tab==="finance") c.innerHTML=rdFinance();
  else if(tab==="pause") c.innerHTML=rdPause();
}

function rdToday(){
  const t=tday(),tm=tmrw();
  const todayM=missions.filter(m=>m.date===t);
  const tmrwM=missions.filter(m=>m.date===tm);
  
  let h='<div class="slabel">AUJOURD\'HUI · '+fdl(t).toUpperCase()+'</div>';
  if(!todayM.length) h+='<div class="empty"><div class="empty-icon">☀️</div><div class="empty-title">Aucune mission aujourd\'hui</div><div class="empty-sub">Profites-en pour décompresser</div></div>';
  else todayM.forEach(m=>h+=rdCard(m));
  
  h+='<div class="slabel mt">DEMAIN · '+fdl(tm).toUpperCase()+'</div>';
  if(!tmrwM.length) h+='<div class="ubox"><div class="uitem" style="color:var(--txt4)">Rien de prévu pour demain.</div></div>';
  else tmrwM.forEach(m=>h+=rdCard(m));
  
  return h;
}

function rdCard(m){
  const mt=getMeta(m.client);
  const ts=(m.type||"").replace(/ASSISTANCE /gi,"").split(" - ").pop();
  return `<div class="mcard ${isDone(m)||isCxl(m)?'dim':''}" style="border-left-color:${mt.hex}" onclick="openD('${m.mid}')">
    <div class="mc-top">
      <div class="mc-left">
        <div class="mc-meta">
          <span class="mc-tag" style="color:${mt.hex}">${mt.tag}</span>
          ${m.debut?`<span class="mc-time">${m.debut}</span>`:''}
        </div>
        <div class="mc-type">${ts}</div>
        ${m.endroit?`<div style="font-size:10px;color:var(--txt4);margin-top:2px">📍 ${m.endroit}</div>`:''}
      </div>
      <div class="mc-right">${badge(m)}</div>
    </div>
  </div>`;
}

function fdl(d){
  if(!d)return "";
  const dt=new Date(d);
  return dt.toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"});
}

function openD(mid){detail=missions.find(m=>m.mid===mid);render();}
function closeD(){detail=null;render();}

function rdDetail(m){
  const mt=getMeta(m.client);
  const b=parseFloat(m.base)||0,d=parseFloat(m.debours)||0;
  const manifestUrl = MANIFESTS[m.mid];
  
  let h=`<button class="back-btn" onclick="closeD()">← Retour</button>
  <div class="dcard" style="border-top-color:${mt.hex}">
    <div class="dhdr">
      <div class="d-top">
        <div>
          <div class="d-client" style="color:${mt.hex}">${m.client.toUpperCase()}</div>
          <div class="d-title">${m.type}</div>
        </div>
        <div>${badge(m)}</div>
      </div>
      <div class="shift-box">
        <div class="shift-time">${m.debut||"--:--"}</div>
        <div class="shift-sub">${fdl(m.date).toUpperCase()} · ${m.endroit||"Lieu à confirmer"}</div>
      </div>
      <div class="key-pills">
        <div class="kpill">${m.mid}</div>
        ${m.desc?`<div class="kpill hi">${m.desc}</div>`:''}
      </div>
    </div>
    
    <div class="sdiv">
      <div class="sin">
        <div class="stitle blue">INFOS MISSION</div>
        <div class="orow"><div class="o-icon">📍</div><div class="o-lbl">LIEU</div><div class="o-val">${m.endroit||"—"}</div></div>
        <div class="orow"><div class="o-icon">⏱️</div><div class="o-lbl">DURÉE</div><div class="o-val">${m.heures?m.heures+"h prévues":"—"}</div></div>
        ${manifestUrl ? `<a href="${manifestUrl}" target="_blank" class="att" style="margin-top:10px">📄 Voir le Manifeste (Drive)</a>` : ''}
      </div>
    </div>

    <div class="sdiv">
      <div class="sin">
        <div class="stitle amber">NOTES & BRIEFING</div>
        <div class="mise-box">${m.notes||"Aucune note particulière."}</div>
      </div>
    </div>

    <div class="sdiv">
      <div class="sin">
        <div class="stitle muted">CONTACT CLIENT</div>
        <div style="font-size:12px;color:var(--txt1);line-height:2.1">
          ${mt.contact} · <a href="mailto:${mt.email}">${mt.email}</a>
          ${mt.phone?`<br/>📞 <a href="tel:${mt.phone}">${mt.phone}</a>`:''}
          ${mt.cohost?`<br/><span style="color:var(--green)">🤝 ${mt.cohost}</span>`:''}
        </div>
      </div>
    </div>
    
    ${rdPMF(m)}
  </div>`;
  return h;
}

function rdPMF(m){
  if(isDone(m))return'<div class="sdiv"><div class="sin" style="text-align:center"><div style="font-size:13px;color:var(--green);font-weight:600;margin-bottom:9px">✓ Mission clôturée</div></div></div>';
  return `<div class="sdiv">
    <div class="sin">
      <div class="stitle green">FIN DE MISSION</div>
      <button class="pmf-trigger" onclick="alert('Fonctionnalité de rapport en cours de mise à jour')">✅ Logger les heures & clôturer</button>
    </div>
  </div>`;
}

function rdMonth(){
  const now=new Date();
  const m1 = now.getMonth();
  const m2 = (m1 + 1) % 12;
  
  const mms1 = missions.filter(m=>m.date && parseInt(m.date.slice(5,7)) === (m1+1)).sort((a,b)=>a.date.localeCompare(b.date));
  const mms2 = missions.filter(m=>m.date && parseInt(m.date.slice(5,7)) === (m2+1)).sort((a,b)=>a.date.localeCompare(b.date));
  
  let h = `<div class="slabel">${MOL[m1].toUpperCase()} & ${MOL[m2].toUpperCase()} · VUE D'ENSEMBLE</div>`;
  
  const renderMonthSection = (name, ms) => {
    let section = `<div class="slabel mt">${name.toUpperCase()}</div>`;
    if(!ms.length) return section + '<div class="empty"><div class="empty-title">Pas de mission</div></div>';
    
    const gr={}; ms.forEach(m=>{(gr[m.date]=gr[m.date]||[]).push(m);});
    Object.entries(gr).sort(([a],[b])=>a.localeCompare(b)).forEach(([date,dayMs])=>{
      section += `<div class="m-date-hdr">${fdl(date).toUpperCase()}</div>`;
      dayMs.forEach(m=> section += rdCard(m));
    });
    return section;
  };
  
  h += renderMonthSection(MOL[m1], mms1);
  h += renderMonthSection(MOL[m2], mms2);
  
  return h;
}

function rdFinance(){
  const now=new Date(), cy=now.getFullYear(), cm=now.getMonth()+1;
  const mms=missions.filter(m=>m.date && parseInt(m.date.slice(5,7))===cm);
  
  const b = mms.reduce((s,m)=>s+(parseFloat(m.base)||0),0);
  const d = mms.reduce((s,m)=>s+(parseFloat(m.debours)||0),0);
  
  return `<div class="slabel">${MOL[now.getMonth()].toUpperCase()} ${cy} · FINANCES</div>
  <div class="fin-grid">
    <div class="fin-card"><div class="fin-lbl">Base HT</div><div class="fin-val" style="color:var(--accent)">${b}€</div></div>
    <div class="fin-card"><div class="fin-lbl">Taxe (21.2%)</div><div class="fin-val" style="color:var(--red)">${ctax(b)}€</div></div>
    <div class="fin-card"><div class="fin-lbl">Débours</div><div class="fin-val" style="color:var(--green)">${d}€</div></div>
    <div class="fin-card"><div class="fin-lbl">Net Est.</div><div class="fin-val" style="color:var(--amber)">${cnet(b,d)}€</div></div>
  </div>`;
}

function rdPause(){
  return `<div class="p-hero">
    <div class="p-icon">🌿</div>
    <div class="p-title">Prends un moment</div>
    <div class="p-sub">Respire, relâche la pression.<br/>Tu as bien travaillé.</div>
    <button class="decomp-link" style="margin-top:20px" onclick="window.open('https://t5q7m95hfj.github.io/decompression/','_blank')">Ouvrir l'espace décompression</button>
  </div>`;
}

function nowt(){const d=new Date();return p2(d.getHours())+":"+p2(d.getMinutes());}
</script>
