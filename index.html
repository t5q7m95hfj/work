<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Mission Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#08080f;--s1:#10101a;--s2:#181825;--s3:#202030;--s4:#28283c;
  --bdr:rgba(255,255,255,.06);--bdr2:rgba(255,255,255,.12);
  --t0:#f2efe8;--t1:#c0bcb4;--t2:#888480;--t3:#4c4844;
  --gold:#e8c97a;--blue:#5b9cf6;--grn:#52c47c;--amb:#f0a040;--red:#e85858;--pur:#a87cf4;
  --r:12px;--rsm:7px;--sans:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;
}
.light{
  --bg:#eeebe4;--s1:#fff;--s2:#e6e2da;--s3:#d8d4cc;--s4:#ccc8c0;
  --bdr:rgba(0,0,0,.07);--bdr2:rgba(0,0,0,.13);
  --t0:#1a1814;--t1:#48443e;--t2:#78746e;--t3:#aaa49e;
  --gold:#7a5800;--blue:#1a50d0;--grn:#1a7840;--amb:#a05810;--red:#b02020;--pur:#6030c0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{font-family:var(--sans);background:var(--bg);color:var(--t0);font-size:14px;line-height:1.5;transition:background .2s,color .2s;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
select,textarea,input{font-family:inherit;}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;height:100dvh;}
.hdr{flex-shrink:0;padding:11px 15px 9px;background:var(--bg);border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;}
.nav{flex-shrink:0;display:flex;justify-content:center;background:var(--bg);border-bottom:1px solid var(--bdr);}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.inner{padding:13px 14px 90px;max-width:520px;margin:0 auto;}

/* ── HEADER ── */
.brand-name{font-family:var(--sans);font-weight:800;font-size:16px;letter-spacing:.6px;text-transform:uppercase;color:var(--gold);}
.brand-sub{font-size:9px;color:var(--t3);letter-spacing:.3px;margin-top:1px;}
.hdr-r{display:flex;align-items:center;gap:9px;}
.clock{font-family:var(--mono);font-size:18px;color:var(--t0);letter-spacing:.04em;}
.hdr-wx{font-size:11px;color:var(--t2);}
.hbtn{width:33px;height:33px;border-radius:50%;background:var(--s2);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--t2);}

/* ── NAV ── */
.nb{flex:1;max-width:130px;display:flex;align-items:center;justify-content:center;gap:4px;font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--t2);padding:11px 4px;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap;}
.nb.on{color:var(--gold);border-bottom-color:var(--gold);}

/* ── SUB-NAV ── */
.snav{display:flex;gap:6px;margin-bottom:13px;}
.snb{padding:6px 15px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;background:var(--s2);border:1px solid var(--bdr);color:var(--t2);transition:all .12s;}
.snb.on{background:rgba(232,201,122,.1);border-color:var(--gold);color:var(--gold);}

/* ── LABELS ── */
.slbl{font-size:9px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:var(--t3);padding:15px 0 6px;}
.slbl:first-child{padding-top:2px;}
.dhdr{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--t2);padding:11px 0 5px;display:flex;align-items:center;gap:6px;}
.dhdr.today{color:var(--gold);}
.dhdr.tmrw{color:var(--grn);}
.dpill{font-size:8px;padding:2px 6px;border-radius:3px;font-weight:700;background:rgba(232,201,122,.12);color:var(--gold);}

/* ── SUMMARY GRID ── */
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:4px;}
.scrd{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:9px 10px 7px;}
.slb{font-size:7px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--t3);margin-bottom:3px;}
.svl{font-size:20px;font-weight:700;line-height:1;color:var(--t0);}
.svl.g{color:var(--gold);}
.svl.green{color:var(--grn);}
.svl.amb{color:var(--amb);}

/* ── MISSION CARD ── */
.mc{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);margin-bottom:6px;cursor:pointer;overflow:hidden;position:relative;transition:transform .07s;user-select:none;}
.mc:active{transform:scale(.983);}
.mc.dim{opacity:.35;}
.mcbar{position:absolute;left:0;top:0;bottom:0;width:3px;}
.mcbody{padding:10px 12px 10px 16px;}
.mctop{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.mcl{flex:1;min-width:0;}
.mcr{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.mchead{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:3px;}
.mctag{font-size:9px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;}
.mctime{font-family:var(--mono);font-size:11px;color:var(--t1);}
.mcds{font-size:9px;color:var(--t3);}
.mctitle{font-size:14px;font-weight:700;color:var(--t0);line-height:1.2;}
.mcsub{font-size:11px;color:var(--t2);margin-top:2px;}
.mcpills{display:flex;gap:3px;margin-top:6px;flex-wrap:wrap;}
.pl{font-size:9px;padding:2px 7px;border-radius:3px;font-weight:600;}
.pl-l{background:rgba(82,196,124,.1);color:var(--grn);}
.pl-p{background:rgba(91,156,246,.09);color:var(--blue);}
.pl-s{background:rgba(168,124,244,.09);color:var(--pur);}
.pl-r{background:rgba(232,201,122,.09);color:var(--gold);}

/* ── BADGES ── */
.bdg{font-size:8px;padding:3px 8px;border-radius:3px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;white-space:nowrap;}
.b0{background:rgba(136,132,128,.1);color:var(--t2);}
.b1{background:rgba(91,156,246,.1);color:var(--blue);}
.b2{background:rgba(82,196,124,.1);color:var(--grn);}
.b3{background:rgba(82,196,124,.1);color:var(--grn);}
.b4{background:rgba(232,201,122,.1);color:var(--gold);}
.b5{background:rgba(240,160,64,.1);color:var(--amb);}
.b6{background:rgba(168,124,244,.1);color:var(--pur);}
.b7{background:rgba(232,88,88,.1);color:var(--red);}
.cmp{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.cg{background:var(--grn);}
.ca{background:var(--amb);}
.cr{background:var(--red);}

/* ── UPCOMING ── */
.uplist{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;}
.uprow{display:flex;align-items:center;gap:9px;padding:7px 12px;border-bottom:1px solid var(--bdr);cursor:pointer;}
.uprow:last-child{border-bottom:none;}
.updt{font-size:10px;color:var(--t2);width:64px;flex-shrink:0;font-weight:500;}
.upds{font-size:11px;color:var(--t1);flex:1;}
.uptg{font-size:9px;font-weight:700;letter-spacing:.5px;}

/* ── DETAIL ── */
.back{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--gold);padding:8px 0 11px;cursor:pointer;min-height:44px;}
.hero{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:7px;}
.herotop{height:4px;}
.herobody{padding:13px 14px 11px;}
.herocl{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:3px;}
.herotitle{font-size:21px;font-weight:800;color:var(--t0);line-height:1.1;letter-spacing:-.2px;}
.herosub{font-size:11px;color:var(--t2);margin-top:4px;}
.heropills{display:flex;gap:5px;margin-top:9px;flex-wrap:wrap;align-items:center;}
.cmptxt{font-size:9px;color:var(--amb);display:flex;align-items:center;gap:3px;}

/* ── SECTIONS ── */
.sec{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:7px;}
.sectitle{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--t3);padding:9px 13px 7px;border-bottom:1px solid var(--bdr);}
.secbody{padding:2px 13px 8px;}

/* Info rows */
.ir{display:flex;gap:9px;padding:6px 0;border-bottom:1px solid var(--bdr);}
.ir:last-child{border-bottom:none;}
.irl{font-size:10px;color:var(--t2);width:88px;flex-shrink:0;padding-top:1px;}
.irv{font-size:12px;color:var(--t0);flex:1;word-break:break-word;font-weight:500;}
.irv a{color:var(--blue);}

/* Contact */
.cb{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bdr);}
.cb:last-child{border-bottom:none;}
.cbrole{font-size:9px;color:var(--t3);margin-bottom:1px;}
.cbname{font-size:13px;font-weight:600;color:var(--t0);}
.cbph{font-size:10px;color:var(--t2);margin-top:1px;font-family:var(--mono);}
.callbtn{background:rgba(82,196,124,.1);border:1px solid rgba(82,196,124,.2);border-radius:var(--rsm);padding:7px 12px;font-size:12px;font-weight:600;color:var(--grn);min-height:36px;display:flex;align-items:center;gap:3px;}

/* Pax */
.paxprog{height:3px;background:var(--s3);border-radius:2px;margin:7px 0;}
.paxfill{height:100%;background:var(--grn);border-radius:2px;transition:width .3s;}
.paxlist{max-height:270px;overflow-y:auto;}
.paxrow{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid var(--bdr);}
.paxrow:last-child{border-bottom:none;}
.paxbox{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--bdr2);background:var(--s2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;cursor:pointer;transition:all .1s;}
.paxbox.ck{background:var(--grn);border-color:var(--grn);color:#fff;}
.paxname{font-size:12px;color:var(--t0);flex:1;line-height:1.4;}
.paxname.ck{color:var(--t3);text-decoration:line-through;}

/* Edit */
.erow{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid var(--bdr);}
.erow:last-child{border-bottom:none;}
.elbl{font-size:10px;color:var(--t2);width:70px;flex-shrink:0;}
.einp{flex:1;background:var(--s2);border:1px solid var(--bdr2);border-radius:var(--rsm);padding:6px 9px;font-size:12px;color:var(--t0);outline:none;transition:border-color .15s;font-family:var(--mono);}
.einp:focus{border-color:var(--gold);}
.esel{flex:1;background:var(--s2);border:1px solid var(--bdr2);border-radius:var(--rsm);padding:6px 9px;font-size:12px;color:var(--t0);outline:none;-webkit-appearance:none;}
.savebtn{background:var(--gold);color:#000;border-radius:var(--rsm);padding:5px 12px;font-size:11px;font-weight:700;min-height:31px;flex-shrink:0;}
.notesta{width:100%;background:var(--s2);border:1px solid var(--bdr);border-radius:var(--rsm);padding:8px 10px;font-size:12px;color:var(--t0);resize:vertical;min-height:65px;outline:none;line-height:1.6;transition:border-color .15s;margin-top:3px;}
.notesta:focus{border-color:var(--gold);}
.saverow{display:flex;justify-content:flex-end;margin-top:4px;}

/* Collapsible — FIXED: body starts display:none */
.coll{border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-top:7px;}
.collh{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;cursor:pointer;background:var(--s2);}
.colltitle{font-size:11px;font-weight:600;color:var(--t1);}
.collsub{font-size:9px;color:var(--t3);margin-top:1px;}
.collchev{font-size:11px;color:var(--t3);transition:transform .18s;}
.collbody{display:none;padding:10px 13px;border-top:1px solid var(--bdr);}
.collbody.open{display:block;}
.collchev.open{transform:rotate(180deg);}

/* Invoice */
.invbtn{display:flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--bdr2);border-radius:var(--r);padding:10px 12px;width:100%;font-size:12px;color:var(--t0);font-weight:500;margin-top:5px;transition:background .12s;}
.invbtn:first-child{margin-top:0;}
.invbtn:active{background:var(--s3);}
.invico{font-size:16px;flex-shrink:0;}
.invr{margin-left:auto;font-size:10px;color:var(--t3);}

/* SNCF */
.sncfrow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bdr);}
.sncfrow:last-child{border-bottom:none;}
.sncftrain{font-size:11px;font-weight:500;color:var(--t0);}
.sncft{font-family:var(--mono);font-size:11px;color:var(--t1);}
.sb{font-size:9px;padding:2px 7px;border-radius:3px;font-weight:700;}
.sok{background:rgba(82,196,124,.1);color:var(--grn);}
.slat{background:rgba(232,88,88,.1);color:var(--red);}
.smut{background:rgba(136,132,128,.1);color:var(--t2);}

/* Month */
.mogrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:11px;}
.mocard{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--rsm);padding:8px 10px;}
.molbl{font-size:7px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--t3);margin-bottom:3px;}
.moval{font-size:18px;font-weight:700;color:var(--t0);line-height:1;}

/* Finance */
.fcrd{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:7px;}
.ftitle{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--t3);padding:9px 13px 7px;border-bottom:1px solid var(--bdr);}
.fbody{padding:3px 13px 8px;}
.frow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bdr);}
.frow:last-child{border-bottom:none;}
.flab{font-size:12px;color:var(--t1);}
.flab.b{font-weight:600;color:var(--t0);}
.fval{font-size:13px;font-weight:700;color:var(--t0);font-family:var(--mono);}
.fval.g{color:var(--grn);}
.fval.a{color:var(--amb);}
.fval.r{color:var(--red);}
.fmr{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bdr);cursor:pointer;}
.fmr:last-child{border-bottom:none;}
.fmrl{flex:1;min-width:0;}
.fmrd{font-size:11px;color:var(--t0);font-weight:500;}
.fmrm{font-size:9px;color:var(--t3);margin-top:1px;}
.fmrr{text-align:right;padding-left:8px;flex-shrink:0;}
.fmrb{font-size:12px;font-weight:700;color:var(--t0);font-family:var(--mono);}
.fmrn{font-size:9px;color:var(--t2);margin-top:1px;font-family:var(--mono);}
.owed{font-size:8px;padding:1px 5px;border-radius:2px;background:rgba(232,88,88,.1);color:var(--red);font-weight:700;margin-left:4px;}

/* Journal */
.jstats{display:flex;gap:6px;margin-bottom:9px;}
.jstat{flex:1;background:var(--s1);border:1px solid var(--bdr);border-radius:var(--rsm);padding:8px 9px;}
.jstatv{font-size:16px;font-weight:700;color:var(--t0);line-height:1;}
.jstatl{font-size:8px;color:var(--t3);margin-top:3px;letter-spacing:.4px;text-transform:uppercase;}
.jrow{padding:7px 0;border-bottom:1px solid var(--bdr);}
.jrow:last-child{border-bottom:none;}
.jdate{font-size:11px;font-weight:600;color:var(--gold);}
.jctx{font-size:9px;color:var(--t3);}
.jsc{display:flex;gap:4px;margin-top:3px;}
.jscpill{font-size:9px;background:var(--s3);border-radius:3px;padding:1px 6px;color:var(--t2);}
.jnote{font-size:10px;color:var(--t2);margin-top:4px;font-style:italic;line-height:1.5;}

/* PMF */
.pmf{padding:2px 0 4px;}
.pmfhdr{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.pmfnum{width:23px;height:23px;border-radius:50%;background:var(--gold);color:#000;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.pmftitle{font-size:14px;font-weight:700;color:var(--t0);}
.trow{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
.tb{flex:1;}
.tlbl{font-size:9px;color:var(--t3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px;}
.tinp{width:100%;background:var(--s2);border:1px solid var(--bdr2);border-radius:var(--rsm);padding:8px 9px;font-family:var(--mono);font-size:17px;color:var(--t0);text-align:center;outline:none;transition:border-color .15s;}
.tinp:focus{border-color:var(--gold);}
.tarr{font-size:19px;color:var(--t3);flex-shrink:0;}
.dur{text-align:center;font-size:12px;color:var(--t2);margin-bottom:11px;min-height:19px;}
.tplrow{display:flex;gap:5px;margin-bottom:9px;}
.tplbtn{flex:1;padding:8px 3px;border-radius:var(--rsm);font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;background:var(--s2);border:1px solid var(--bdr);color:var(--t2);transition:all .12s;}
.tplbtn.on{background:rgba(232,201,122,.1);border-color:var(--gold);color:var(--gold);}
.moodrow{display:flex;gap:5px;margin-bottom:11px;}
.moodbtn{flex:1;padding:8px 2px;border-radius:var(--rsm);font-size:17px;background:var(--s2);border:1px solid var(--bdr);transition:all .1s;}
.moodbtn.on{background:rgba(232,201,122,.08);border-color:var(--gold);}
.pbtn{width:100%;padding:12px;border-radius:var(--r);font-family:var(--sans);font-size:13px;font-weight:700;letter-spacing:.3px;background:var(--gold);color:#000;margin-bottom:8px;transition:opacity .12s;}
.pbtn:active{opacity:.8;}
.pbtn2{background:var(--s2);color:var(--t1);border:1px solid var(--bdr);}
.pback{display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--t3);padding:8px;cursor:pointer;min-height:40px;}
.rptout{background:var(--s2);border:1px solid var(--bdr);border-radius:var(--rsm);padding:10px 12px;font-size:11px;color:var(--t1);line-height:1.8;white-space:pre-wrap;margin-bottom:7px;}
.rptacts{display:flex;gap:5px;margin-bottom:7px;}
.rptact{flex:1;padding:7px 3px;border-radius:var(--rsm);font-size:10px;font-weight:600;background:var(--s2);border:1px solid var(--bdr);color:var(--t1);}
.rptedit{width:100%;background:var(--s2);border:1px solid var(--bdr);border-radius:var(--rsm);padding:8px 10px;font-family:var(--mono);font-size:11px;color:var(--t0);resize:vertical;min-height:85px;outline:none;margin-bottom:7px;line-height:1.6;}
.spin{display:inline-block;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.donewrap{text-align:center;padding:18px 0;}
.doneico{font-size:34px;margin-bottom:8px;}
.donetitle{font-size:16px;font-weight:800;color:var(--t0);margin-bottom:4px;}
.donesub{font-size:12px;color:var(--t2);margin-bottom:13px;}
.dclink{display:inline-flex;align-items:center;gap:5px;background:var(--s2);border:1px solid var(--bdr);border-radius:var(--r);padding:9px 16px;font-size:12px;color:var(--t1);font-weight:500;}

/* Decompression */
.dc{min-height:55vh;display:flex;flex-direction:column;justify-content:center;padding:8px 0;}
.dcey{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-bottom:5px;}
.dctitle{font-size:27px;font-weight:800;color:var(--t0);letter-spacing:-.3px;margin-bottom:3px;}
.dcsub{font-size:12px;color:var(--t2);margin-bottom:16px;}
.dcta{width:100%;background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:12px 14px;font-size:13px;color:var(--t0);resize:none;min-height:140px;outline:none;line-height:1.7;transition:border-color .15s;}
.dcta:focus{border-color:var(--gold);}
.dcrow{display:flex;gap:7px;margin-top:9px;}
.dcsave{flex:1;padding:12px;border-radius:var(--r);background:var(--grn);color:#fff;font-size:13px;font-weight:700;}
.dcback{padding:12px 16px;border-radius:var(--r);background:var(--s2);border:1px solid var(--bdr);font-size:12px;color:var(--t2);}

/* Cancelled */
.cxlrow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--bdr);}
.cxlrow:last-child{border-bottom:none;}
.cxlname{font-size:11px;color:var(--t3);}
.cxldt{font-size:9px;color:var(--t3);margin-top:1px;}

/* Empty + Loader */
.empty{text-align:center;padding:45px 20px;}
.emico{font-size:38px;opacity:.32;margin-bottom:9px;}
.emtitle{font-size:14px;font-weight:700;color:var(--t2);margin-bottom:3px;}
.emsub{font-size:11px;color:var(--t3);}
.loader{display:flex;align-items:center;justify-content:center;gap:8px;padding:38px 0;color:var(--t3);font-size:12px;}

/* Ref box */
.refbox{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:11px 13px;font-size:10px;color:var(--t3);line-height:2.1;font-family:var(--mono);}

/* Toast */
#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--s3);border:1px solid var(--bdr2);color:var(--t0);font-size:12px;font-weight:600;padding:8px 18px;border-radius:22px;opacity:0;transition:opacity .22s;pointer-events:none;white-space:nowrap;z-index:999;}
#toast.show{opacity:1;}
#toast.ok{background:rgba(82,196,124,.18);border-color:var(--grn);color:var(--grn);}
#toast.err{background:rgba(232,88,88,.18);border-color:var(--red);color:var(--red);}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div><div class="brand-name">Mission Control</div><div class="brand-sub" id="hsub">Chargement…</div></div>
    <div class="hdr-r">
      <span class="hdr-wx" id="hwx"></span>
      <span class="clock" id="clock">--:--</span>
      <button class="hbtn" onclick="toggleLight()" id="tbtn">☀</button>
      <button class="hbtn" onclick="hardRefresh()" title="Refresh">↻</button>
    </div>
  </div>
  <nav class="nav">
    <button class="nb on" id="nb-today"   onclick="go('today')">☀ Aujourd'hui</button>
    <button class="nb"    id="nb-month"   onclick="go('month')">📅 <span id="mlbl">Mois</span></button>
    <button class="nb"    id="nb-finance" onclick="go('finance')">💶 Admin</button>
  </nav>
  <div class="scroll"><div class="inner" id="ct"><div class="loader"><span class="spin">↻</span> Chargement…</div></div></div>
</div>
<div id="toast"></div>
<script>
// ══════════════════════════════════════════════════════════
// CONFIG — targets V2 API exactly as deployed, no GAS changes
// ══════════════════════════════════════════════════════════
const GAS  = "https://script.google.com/macros/s/AKfycbwACs6qIEu24xMe3KtSjLMbcs3A6iXqCaZEodXBuTx2au1ol5UXeUqZKM6W_NJO9qSErg/exec";
const SNCF = "https://fragrant-hall-c33b.t5q7m95hfj.workers.dev/";
const TAX  = 0.212;

const DAYS = ["dim","lun","mar","mer","jeu","ven","sam"];
const MOL  = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
const MOS  = ["jan","fév","mar","avr","mai","jun","jul","aoû","sep","oct","nov","déc"];
const ME   = ["😫","😔","😐","🙂","😊"];
const EE   = ["🪫","😴","⚡","💪","🔥"];

const META = {
  "Philibert Tourisme":  {tag:"PHIL", hex:"#52c47c"},
  "Go Côte Saône":       {tag:"GCS",  hex:"#5b9cf6"},
  "Feel the French Way": {tag:"FTFW", hex:"#a87cf4"},
  "Un Monde Bleu":       {tag:"UMB",  hex:"#f0a040"},
};

// ══════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════
let missions=[], journal=[];
let tab="today", sv="today", detail=null, pmf=null, pmfStep=0;
let light=localStorage.getItem("mc_light")==="1";
let paxState={};

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
window.addEventListener("load",()=>{
  if(light) document.body.classList.add("light");
  updateTbtn(); tick(); setInterval(tick,30000);
  document.getElementById("mlbl").textContent = MOL[new Date().getMonth()];
  loadData(); loadWx();
});
function tick(){const d=new Date();document.getElementById("clock").textContent=p2(d.getHours())+":"+p2(d.getMinutes());}
function toggleLight(){light=!light;document.body.classList.toggle("light",light);localStorage.setItem("mc_light",light?"1":"0");updateTbtn();}
function updateTbtn(){document.getElementById("tbtn").textContent=light?"🌙":"☀";}

// ══════════════════════════════════════════════════════════
// DATA — works with V2 API response exactly
// V2 _getAll uses getDisplayValues so all fields are strings
// Financial fields come as display strings like "234,50"
// ══════════════════════════════════════════════════════════
async function loadData(force){
  if(!force){
    const c=localStorage.getItem("mc_v3");
    if(c){try{const d=JSON.parse(c);missions=d.m.map(norm);journal=d.j||[];render();}catch(e){}}
  }
  try{
    const r=await fetch(GAS+"?action=all",{signal:AbortSignal.timeout(28000)});
    const d=await r.json();
    if(d&&d.missions){
      missions=d.missions.map(norm);
      // V2 API may or may not have journal — handle both
      journal=d.journal||extractJournalFromLS();
      localStorage.setItem("mc_v3",JSON.stringify({m:d.missions,j:journal}));
      const tm=missions.filter(m=>m.date===tday()&&!isCxl(m));
      document.getElementById("hsub").textContent=tm.length
        ?tm.length+" mission"+(tm.length>1?"s":"")+" aujourd'hui"
        :"Aucune mission aujourd'hui";
      render();
    }
  }catch(e){if(!missions.length) render();}
}
async function hardRefresh(){
  localStorage.removeItem("mc_v3"); missions=[]; journal=[];
  document.getElementById("ct").innerHTML='<div class="loader"><span class="spin">↻</span> Actualisation…</div>';
  await loadData(true);
}

// Fallback: read journal from localStorage if API doesn't return it
function extractJournalFromLS(){
  try{
    const raw=localStorage.getItem("mc_journal");
    if(!raw)return[];
    const arr=JSON.parse(raw);
    return arr.map(e=>({
      date:e.date||"",missionId:e.mid||"",client:e.client||"",
      context:e.context||"Après mission",kind:e.type||"Note",
      mood:parseInt(e.mood)||0,energy:parseInt(e.energy)||0,
      text:e.note||"",include:e.flag==="🟢"
    }));
  }catch(e){return[];}
}

// ══════════════════════════════════════════════════════════
// NORMALISE — V2 API field names exactly
// V2 _OUTPUT_MAP: "Date" → "Date mission", "Base HT" → "Base (HT)"
// All values are display strings from getDisplayValues
// ══════════════════════════════════════════════════════════
function parseNum(v){
  if(v===null||v===undefined||v==="")return 0;
  // Handle display strings: "234,50" "1 234" "€234"
  const n=parseFloat(String(v).replace(/\s/g,"").replace(",",".").replace(/[^0-9.\-]/g,""));
  return isNaN(n)?0:n;
}
function parseTime(v){
  // V2 getDisplayValues returns time as "08:30" string — clean and simple
  if(!v||v==="")return"";
  const s=String(v).trim();
  if(/^\d{1,2}:\d{2}$/.test(s))return s;
  // Defensive: handle any edge cases
  const m=s.match(/(\d{1,2})[h:](\d{2})/i);
  if(m)return p2(parseInt(m[1]))+":"+p2(parseInt(m[2]));
  return s.length<=5?s:"";
}

function norm(m){
  if(m._n)return m;
  const o={...m};o._n=1;
  o.mid    = o["Mission ID"]||"";
  // V2 maps "Date" → "Date mission"
  o.date   = (o["Date mission"]||o["Date"]||"").toString().slice(0,10);
  o.client = o["Client"]||"";
  o.type   = o["Type"]||"";
  o.sens   = o["Sens"]||"";
  o.desc   = o["Description"]||"";
  o.heures = o["Heures"]||"";
  // V2 maps "Début" → "Début" (direct)
  o.debut  = parseTime(o["Début"]||o["Debut"]||"");
  o.endroit= o["Endroit"]||"";
  o.statut = o["Statut"]||"";
  o.notes  = o["Notes"]||"";
  o.docs   = o["Docs"]||"";
  o.rapport= o["Rapport"]||o["Rapport ✓"]||"";
  o.facture= o["Facture#"]||o["Facture #"]||"";
  o.ndb    = o["NDB#"]||o["NDB #"]||"";
  // V2 maps "Base HT" → "Base (HT)" in _OUTPUT_MAP
  o.base   = parseNum(o["Base (HT)"]||o["Base HT"]||0);
  o.hs     = parseNum(o["HS"]||0);
  o.supp   = parseNum(o["Supp."]||o["Supp"]||0);
  o.debours= parseNum(o["Débours"]||0);
  o.montant= parseNum(o["Montant reçu"]||0);
  // Compute financials client-side from raw base values (V2 doesn't return formula results as numbers)
  const st = o.base + o.hs + o.supp;
  o.sousTotal = st > 0 ? st : 0;
  o.totalNet  = st > 0 ? Math.round((st*(1-TAX)+o.debours)*100)/100 : 0;
  // ops from Mission_Details
  o.ops       = o.ops||{};
  o.paxRaw    = o.ops["Passenger Raw"]||"";
  o.paxCount  = o.ops["Pax Count"]||"";
  o.shipName  = o.ops["Ship Name"]||"";
  o.extRef    = o.ops["External Ref"]||"";
  o.meetPt    = o.ops["Meeting Point"]||"";
  o.dock      = o.ops["Dock / Terminal"]||"";
  o.transRef  = o.ops["Transport Ref"]||"";
  o.opsSum    = o.ops["Ops Summary"]||"";
  return o;
}

const isDone=m=>{const s=(m.statut||"").toLowerCase();return s==="terminé"||s.includes("envoy")||s==="payé"||s.includes("générée");};
const isCxl =m=>(m.statut||"").toLowerCase().includes("annul");
function getMeta(c){
  if(!c)return{tag:"?",hex:"#666"};
  for(const[k,v]of Object.entries(META))
    if(c.toLowerCase().includes(k.split(" ")[0].toLowerCase()))return v;
  return{tag:c.slice(0,4).toUpperCase(),hex:"#888"};
}

// ══════════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════════
function p2(n){return String(n).padStart(2,"0");}
function tday(){return new Date().toISOString().slice(0,10);}
function tmrw(){const d=new Date();d.setDate(d.getDate()+1);return d.toISOString().slice(0,10);}
function fds(iso){if(!iso)return"";const d=new Date(iso+"T12:00:00");return DAYS[d.getDay()]+" "+d.getDate()+" "+MOS[d.getMonth()];}
function fdl(iso){if(!iso)return"";const d=new Date(iso+"T12:00:00");return DAYS[d.getDay()]+" "+d.getDate()+" "+MOL[d.getMonth()];}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function nowt(){const d=new Date();return p2(d.getHours())+":"+p2(d.getMinutes());}
function durS(s,e){
  if(!s||!e)return"";
  const[sh,sm]=s.split(":").map(Number),[eh,em]=e.split(":").map(Number);
  let d=(eh*60+em)-(sh*60+sm);if(d<=0)return"";
  d=Math.round(d/15)*15;
  return Math.floor(d/60)+"h"+(d%60?p2(d%60):"");
}
function fmtE(n){return n>0?n.toFixed(2).replace(".",",")+" €":"—";}

// ══════════════════════════════════════════════════════════
// BADGE + CMP
// ══════════════════════════════════════════════════════════
function badge(m){
  const s=(m.statut||"").toLowerCase();
  if(isCxl(m))              return`<span class="bdg b7">Annulé</span>`;
  if(s==="payé")            return`<span class="bdg b6">Payé</span>`;
  if(s.includes("envoyée"))return`<span class="bdg b5">Fac. envoyée</span>`;
  if(s.includes("générée"))return`<span class="bdg b4">Fac. générée</span>`;
  if(s==="terminé")        return`<span class="bdg b3">✓ Terminé</span>`;
  if(s==="confirmé")       return`<span class="bdg b2">Confirmé</span>`;
  if(s==="planifié")       return`<span class="bdg b1">Planifié</span>`;
  return`<span class="bdg b0">${esc(m.statut||"Brouillon")}</span>`;
}
function cmpDot(m){
  const c=m.cmp;if(!c||typeof c!=="object")return"";
  const s=c.score||0,cl=s>=100?"cg":s>=70?"ca":"cr";
  return`<div class="cmp ${cl}" title="${c.missing?.slice(0,3).join(", ")||"Complet"}"></div>`;
}

// ══════════════════════════════════════════════════════════
// MISSION CARD
// ══════════════════════════════════════════════════════════
function mcard(m,compact){
  const mt=getMeta(m.client),done=isDone(m),cxl=isCxl(m);
  const pills=[];
  if(!compact){
    const loc=m.endroit?m.endroit.split(/[,→]/)[0].trim():"";
    if(m.shipName)  pills.push(`<span class="pl pl-s">🚢 ${esc(m.shipName)}</span>`);
    else if(loc)    pills.push(`<span class="pl pl-l">${esc(loc)}</span>`);
    if(m.paxCount)  pills.push(`<span class="pl pl-p">👥 ${esc(m.paxCount)}</span>`);
    if(m.extRef&&m.extRef.length<12) pills.push(`<span class="pl pl-r">${esc(m.extRef)}</span>`);
  }
  return`<div class="mc${done||cxl?" dim":""}" onclick="openD('${m.mid}')">
  <div class="mcbar" style="background:${mt.hex}"></div>
  <div class="mcbody">
    <div class="mctop">
      <div class="mcl">
        <div class="mchead">
          <span class="mctag" style="color:${mt.hex}">${mt.tag}</span>
          ${m.debut?`<span class="mctime">${esc(m.debut)}</span>`:""}
          ${!compact?`<span class="mcds">${fds(m.date)}</span>`:""}
        </div>
        <div class="mctitle">${esc(m.type||"—")}${m.sens&&m.sens!=="—"?" · "+esc(m.sens):""}</div>
        ${m.endroit&&!m.shipName?`<div class="mcsub">${esc(m.endroit.split(/[,→]/)[0].trim())}</div>`:""}
        ${pills.length?`<div class="mcpills">${pills.join("")}</div>`:""}
      </div>
      <div class="mcr">${cmpDot(m)}${badge(m)}</div>
    </div>
  </div>
</div>`;
}

// ══════════════════════════════════════════════════════════
// NAV + RENDER
// ══════════════════════════════════════════════════════════
function go(t){
  tab=t;if(t==="today")sv="today";detail=null;pmf=null;pmfStep=0;
  ["today","month","finance"].forEach(id=>document.getElementById("nb-"+id).classList.toggle("on",id===t));
  render();
}
function render(){
  const el=document.getElementById("ct");if(!el)return;
  if(detail&&(tab==="today"||tab==="month")){el.innerHTML=rdDetail(detail);return;}
  if(tab==="today")    el.innerHTML=rdToday();
  else if(tab==="month")    el.innerHTML=rdMonth();
  else if(tab==="finance")  el.innerHTML=rdFinance();
}
function openD(mid){detail=missions.find(m=>m.mid===mid)||null;pmf=null;pmfStep=0;render();window.scrollTo(0,0);}
function closeD(){detail=null;render();}

// ══════════════════════════════════════════════════════════
// TODAY
// ══════════════════════════════════════════════════════════
function rdToday(){
  let h=`<div class="snav">
    <button class="snb${sv==="today"?" on":""}" onclick="sv='today';render()">Aujourd'hui</button>
    <button class="snb${sv==="week"?" on":""}" onclick="sv='week';render()">7 jours</button>
  </div>`;
  if(sv==="week")return h+rdWeek();
  const t=tday(),tm=tmrw();
  const t1=missions.filter(m=>m.date===t&&!isCxl(m)).sort((a,b)=>(a.debut||"z").localeCompare(b.debut||"z"));
  const t2=missions.filter(m=>m.date===tm&&!isCxl(m)).sort((a,b)=>(a.debut||"z").localeCompare(b.debut||"z"));
  const up=missions.filter(m=>m.date>tm&&!isCxl(m)).sort((a,b)=>a.date.localeCompare(b.date));
  const all=missions.filter(m=>m.date===t);
  if(all.length){
    const done=all.filter(isDone).length;
    const bs=all.reduce((s,m)=>s+m.sousTotal,0),ns=all.reduce((s,m)=>s+m.totalNet,0);
    h+=`<div class="sgrid">
      <div class="scrd"><div class="slb">Missions</div><div class="svl">${all.length}</div></div>
      <div class="scrd"><div class="slb">Faites</div><div class="svl green">${done}</div></div>
      <div class="scrd"><div class="slb">Sous-total</div><div class="svl g">${bs?bs.toFixed(0)+"€":"—"}</div></div>
      <div class="scrd"><div class="slb">Net</div><div class="svl amb">${ns?ns.toFixed(0)+"€":"—"}</div></div>
    </div>`;
  }
  if(t1.length) h+=`<div class="slbl">Aujourd'hui</div>`+t1.map(m=>mcard(m,false)).join("");
  else h+=`<div class="empty"><div class="emico">☀️</div><div class="emtitle">Pas de mission aujourd'hui</div>${t2.length?`<div class="emsub">${t2.length} demain</div>`:""}</div>`;
  if(t2.length) h+=`<div class="slbl">Demain · ${fds(tm).toUpperCase()}</div>`+t2.map(m=>mcard(m,true)).join("");
  if(up.length){
    h+=`<div class="slbl">À venir</div><div class="uplist">`;
    up.slice(0,7).forEach(m=>{const mt=getMeta(m.client);h+=`<div class="uprow" onclick="openD('${m.mid}')"><div class="updt">${fds(m.date)}</div><div class="upds">${esc(m.type||"—")}${m.sens&&m.sens!=="—"?" · "+esc(m.sens):""}</div><span class="uptg" style="color:${mt.hex}">${mt.tag}</span></div>`;});
    h+="</div>";
  }
  return h;
}
function rdWeek(){
  const now=new Date();let h="",any=false;
  for(let d=0;d<7;d++){
    const dt=new Date(now.getTime()+d*86400000),ds=dt.toISOString().slice(0,10);
    const dm=missions.filter(m=>m.date===ds&&!isCxl(m)).sort((a,b)=>(a.debut||"z").localeCompare(b.debut||"z"));
    if(!dm.length)continue;
    const isT=ds===tday(),isTm=ds===tmrw();
    h+=`<div class="dhdr${isT?" today":isTm?" tmrw":""}">
      ${fdl(ds).toUpperCase()}${isT?'<span class="dpill">Aujourd\'hui</span>':""}
    </div>`+dm.map(m=>mcard(m,false)).join("");
    any=true;
  }
  return any?h:`<div class="empty"><div class="emico">📅</div><div class="emtitle">Semaine libre</div></div>`;
}

// ══════════════════════════════════════════════════════════
// MONTH
// ══════════════════════════════════════════════════════════
function rdMonth(){
  const now=new Date(),cm=p2(now.getMonth()+1),t=tday(),tm=tmrw();
  const mms=missions.filter(m=>m.date&&m.date.slice(5,7)===cm).sort((a,b)=>a.date.localeCompare(b.date));
  const active=mms.filter(m=>!isCxl(m)),done=active.filter(isDone);
  const tST=active.reduce((s,m)=>s+m.sousTotal,0),tN=active.reduce((s,m)=>s+m.totalNet,0);
  let h=`<div class="slbl">${MOL[now.getMonth()].toUpperCase()}</div>
  <div class="mogrid">
    <div class="mocard"><div class="molbl">Total</div><div class="moval">${active.length}</div></div>
    <div class="mocard"><div class="molbl">Faites</div><div class="moval" style="color:var(--grn)">${done.length}</div></div>
    <div class="mocard"><div class="molbl">Sous-total</div><div class="moval" style="color:var(--gold)">${tST?tST.toFixed(0)+"€":"—"}</div></div>
    <div class="mocard"><div class="molbl">Net</div><div class="moval" style="color:var(--amb)">${tN?tN.toFixed(0)+"€":"—"}</div></div>
  </div>`;
  const gr={};active.forEach(m=>{(gr[m.date]=gr[m.date]||[]).push(m);});
  Object.entries(gr).sort(([a],[b])=>a.localeCompare(b)).forEach(([date,ms])=>{
    const isT=date===t,isTm=date===tm;
    h+=`<div class="dhdr${isT?" today":isTm?" tmrw":""}">
      ${fdl(date).toUpperCase()}${isT?'<span class="dpill">Aujourd\'hui</span>':""}
    </div>`+ms.map(m=>mcard(m,false)).join("");
  });
  const cxls=mms.filter(isCxl);
  if(cxls.length){
    h+=mkColl("cxl-mo","Annulées ("+cxls.length+")","Référence fiabilité clients",
      `<div style="padding:0 13px">${cxls.map(m=>`<div class="cxlrow"><div><div class="cxlname">${getMeta(m.client).tag} · ${esc(m.type||"—")}</div><div class="cxldt">${fds(m.date)}${m.notes?" · "+esc(m.notes.slice(0,35)):""}</div></div><span class="bdg b7">Annulé</span></div>`).join("")}</div>`
    );
  }
  if(!active.length) h+=`<div class="empty"><div class="emico">📅</div><div class="emtitle">Aucune mission ce mois</div></div>`;
  h+=rdJournal();
  h+=`<div class="slbl">Références</div><div class="refbox">SIRET · 92815905200010<br>IBAN · FR76 2823 3000 0177 6267 3414 414<br>BIC · REVOFRP2 (Revolut)</div>`;
  return h;
}

// ══════════════════════════════════════════════════════════
// FINANCE
// ══════════════════════════════════════════════════════════
function rdFinance(){
  const now=new Date(),cm=p2(now.getMonth()+1);
  const mms=missions.filter(m=>m.date&&m.date.slice(5,7)===cm&&!isCxl(m)).sort((a,b)=>a.date.localeCompare(b.date));
  const tBase=mms.reduce((s,m)=>s+m.base,0);
  const tST  =mms.reduce((s,m)=>s+m.sousTotal,0);
  const tDeb =mms.reduce((s,m)=>s+m.debours,0);
  const tN   =mms.reduce((s,m)=>s+m.totalNet,0);
  const tRec =mms.reduce((s,m)=>s+m.montant,0);
  const tOwed=Math.max(0,tN-tRec);
  let h=`<div class="slbl">${MOL[now.getMonth()].toUpperCase()} — Finances</div>
  <div class="fcrd">
    <div class="ftitle">Récapitulatif</div>
    <div class="fbody">
      <div class="frow"><span class="flab">Missions</span><span class="fval">${mms.length}</span></div>
      <div class="frow"><span class="flab">Base HT</span><span class="fval">${fmtE(tBase)}</span></div>
      ${tDeb?`<div class="frow"><span class="flab" style="padding-left:10px;font-size:10px">dont débours</span><span class="fval" style="font-size:11px;color:var(--t2)">${fmtE(tDeb)}</span></div>`:""}
      <div class="frow"><span class="flab">Charges (21,2%)</span><span class="fval r">− ${fmtE(tBase*TAX)}</span></div>
      <div class="frow"><span class="flab b">Net estimé</span><span class="fval g">${fmtE(tN)}</span></div>
      <div class="frow"><span class="flab">Reçu</span><span class="fval ${tRec>=tN?"g":"a"}">${fmtE(tRec)}</span></div>
      ${tOwed>0.01?`<div class="frow"><span class="flab">À recevoir</span><span class="fval a">${fmtE(tOwed)}</span></div>`:""}
    </div>
  </div>`;
  if(mms.length){
    h+=`<div class="fcrd"><div class="ftitle">Détail</div><div class="fbody">`;
    mms.forEach(m=>{
      const owed=m.totalNet>0.01&&m.montant<0.01&&isDone(m);
      h+=`<div class="fmr" onclick="openD('${m.mid}')">
        <div class="fmrl">
          <div class="fmrd">${getMeta(m.client).tag} · ${esc(m.type||"—")}${m.extRef?" · "+esc(m.extRef):""}</div>
          <div class="fmrm">${fds(m.date)} · ${badge(m)}${owed?'<span class="owed">En attente</span>':""}</div>
        </div>
        <div class="fmrr">
          <div class="fmrb">${m.sousTotal?m.sousTotal.toFixed(0)+"€":"—"}</div>
          ${m.totalNet?`<div class="fmrn">net ${m.totalNet.toFixed(0)}€</div>`:""}
        </div>
      </div>`;
    });
    h+="</div></div>";
  }
  return h;
}

// ══════════════════════════════════════════════════════════
// JOURNAL — reads from API or localStorage fallback
// ══════════════════════════════════════════════════════════
function rdJournal(){
  const cy=String(new Date().getFullYear());
  const yl=journal.filter(e=>e.date&&e.date.startsWith(cy));
  if(!yl.length)return`<div class="slbl" style="margin-top:6px">Bien-être</div><div style="font-size:11px;color:var(--t3);padding:4px 0">Aucune entrée — clôture des missions pour alimenter le journal.</div>`;
  const wm=yl.filter(e=>e.mood>0),we=yl.filter(e=>e.energy>0);
  const am=wm.length?wm.reduce((s,e)=>s+e.mood,0)/wm.length:0;
  const ae=we.length?we.reduce((s,e)=>s+e.energy,0)/we.length:0;
  let h=`<div class="slbl" style="margin-top:6px">Bien-être · ${cy}</div>
  <div class="jstats">
    <div class="jstat"><div class="jstatv">${yl.length}</div><div class="jstatl">Entrées</div></div>
    <div class="jstat"><div class="jstatv">${am?ME[Math.round(am)-1]+" "+am.toFixed(1):"—"}</div><div class="jstatl">Humeur</div></div>
    <div class="jstat"><div class="jstatv">${ae?EE[Math.round(ae)-1]+" "+ae.toFixed(1):"—"}</div><div class="jstatl">Énergie</div></div>
  </div>`;
  const rec=[...yl].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);
  h+=mkColl("j-log","Journal privé",yl.length+" entrées",
    rec.map(e=>`<div class="jrow">
      <div class="jdate">${fds(e.date)}</div>
      <div class="jctx">${esc(e.context||"—")} · ${esc(e.client||"")}</div>
      <div class="jsc">
        ${e.mood>0?`<span class="jscpill">${ME[e.mood-1]} ${e.mood}</span>`:""}
        ${e.energy>0?`<span class="jscpill">${EE[e.energy-1]} ${e.energy}</span>`:""}
      </div>
      ${e.text?`<div class="jnote">${esc(e.text.slice(0,90))}${e.text.length>90?"…":""}</div>`:""}
    </div>`).join(""));
  return h;
}

        <div class="paxbox${on?" ck":""}" onclick="tPax('${m.mid}',${i},${!on})">${on?"✓":""}</div>
        <div class="paxname${on?" ck":""}">${esc(p)}</div>
      </div>`;}).join("")}</div>`;

  // Ops summary
  if(m.opsSum) h+=sec("Résumé opérationnel",()=>`<div style="font-size:12px;color:var(--t1);line-height:1.7">${esc(m.opsSum)}</div>`);

  // Edit

    <div class="erow">
      <div class="elbl">Statut</div>

      <textarea class="notesta" id="ef-n-${m.mid}" rows="3">${esc(m.notes||"")}</textarea>
      <div class="saverow"><button class="savebtn" onclick="saveF('${m.mid}','notes',document.getElementById('ef-n-${m.mid}').value)">Enregistrer</button></div>
    </div>`;

  // Invoice
  h+=rdInvoice(m);

  // Docs
  if(m.docs||m.ops["Source PDF"]) h+=sec("Documents",()=>{
    let s="";
    if(m.docs) s+=`<a href="${esc(m.docs)}" target="_blank" class="invbtn" onclick="event.stopPropagation()"><span class="invico">📁</span><span style="flex:1">Dossier Drive</span><span class="invr">↗</span></a>`;
    if(m.ops["Source PDF"]) s+=`<a href="${esc(m.ops["Source PDF"])}" target="_blank" class="invbtn" onclick="event.stopPropagation()"><span class="invico">📄</span><span style="flex:1">Manifeste PDF</span><span class="invr">↗</span></a>`;
    return s;
  });

  // Collapsibles
  if(m.ops["Raw Notes"]||m.ops["Source Email Msg"]){
    let cx="<div style='margin-bottom:7px'>";
    if(m.ops["Raw Notes"]) cx+=mkColl("n-"+m.mid,"Notes opérationnelles","",`<div style="font-size:11px;color:var(--t2);white-space:pre-wrap;line-height:1.6">${esc(m.ops["Raw Notes"])}</div>`);
    if(m.ops["Source Email Msg"]) cx+=mkColl("e-"+m.mid,"Email source",m.ops["Source Email"]||"",`<div style="font-size:10px;color:var(--t3);white-space:pre-wrap;line-height:1.6;font-family:var(--mono)">${esc(m.ops["Source Email Msg"].slice(0,1200))}</div>`);
    cx+="</div>";h+=cx;
  }

  // PMF
  h+=rdPMF(m);
  return h;
}

function sec(title,bodyFn){const b=bodyFn();if(!b)return"";return`<div class="sec"><div class="sectitle">${title}</div><div class="secbody">${b}</div></div>`;}
function ir(l,v){return`<div class="ir"><div class="irl">${l}</div><div class="irv">${v}</div></div>`;}

// PAX
// ══════════════════════════════════════════════════════════
function tPax(mid,idx,on){
  if(!paxState[mid])paxState[mid]={};paxState[mid][idx]=on;
  const box=document.querySelector(`[onclick="tPax('${mid}',${idx},${!on})"]`);
  const nm=box?.nextElementSibling;
  if(box){box.classList.toggle("ck",on);box.textContent=on?"✓":"";box.setAttribute("onclick",`tPax('${mid}',${idx},${!on})`);}
  if(nm)nm.classList.toggle("ck",on);
  const st=paxState[mid];
  const m=missions.find(x=>x.mid===mid);
  const total=m?m.paxRaw.split("\n").filter(s=>s.trim()).length:0;
  const done=Object.values(st).filter(Boolean).length;
  const pp=document.getElementById("pp-"+mid);
  if(pp)pp.style.width=(total?Math.round(done/total*100):0)+"%";
}

// ══════════════════════════════════════════════════════════
// EDIT + SAVE
// ══════════════════════════════════════════════════════════
async function saveF(mid,field,value){
  try{
    const r=await fetch(GAS+"?action=update&id="+encodeURIComponent(mid)+"&field="+encodeURIComponent(field)+"&value="+encodeURIComponent(value),{signal:AbortSignal.timeout(12000)});
    const d=await r.json();
    if(d&&d.ok===false){toast("❌ "+(d.msg||"Erreur"),"err");return;}
    const m=missions.find(x=>x.mid===mid);
    if(m){
      if(field==="statut")m.statut=value;
      else if(field==="notes")m.notes=value;
      else if(field==="heures")m.heures=value;
      else if(field==="base"){m.base=parseFloat(value)||0;m.sousTotal=m.base+m.hs+m.supp;m.totalNet=m.sousTotal>0?Math.round((m.sousTotal*(1-TAX)+m.debours)*100)/100:0;}
      else if(field==="debut")m.debut=value;
    }
    if(detail?.mid===mid)detail=m;
    toast("✓ Mis à jour","ok");
  }catch(e){toast("❌ "+e.message.slice(0,40),"err");}
}

  if(s==="terminé"&&!m.facture) inner+=`<button class="invbtn" onclick="genFacture('${m.mid}')"><span class="invico">🧾</span><span style="flex:1;font-weight:500">Générer la facture</span><span class="invr">PDF → Drive</span></button>`;
  if(s.includes("générée")) inner+=`<button class="invbtn" style="border-color:rgba(240,160,64,.3);color:var(--amb)" onclick="saveF('${m.mid}','statut','Fac. envoyée')"><span class="invico">📤</span><span style="flex:1;font-weight:500">Marquer comme envoyée</span></button>`;

async function genFacture(mid){
  toast("⏳ Génération…","");

    const r=await fetch(GAS+"?action=genFacture&id="+encodeURIComponent(mid));

}
async function genDebours(mid){

    const r=await fetch(GAS+"?action=genDebours&id="+encodeURIComponent(mid));
    const d=await r.json();

// ══════════════════════════════════════════════════════════
// SNCF
// ══════════════════════════════════════════════════════════
function rdSNCF(m){
  return mkColl("sncf-"+m.mid,"🚉 Trains en direct","SNCF live · Cloudflare Worker",
    `<div style="font-size:11px;color:var(--t3);margin-bottom:7px">Réf: ${esc(m.transRef)} <span style="color:var(--blue);cursor:pointer" onclick="fetchSNCF('${m.mid}','${esc(m.transRef)}')">Actualiser</span></div>
     <div id="sncf-d-${m.mid}" style="font-size:11px;color:var(--t2)">Appuie sur Actualiser.</div>`);
}
async function fetchSNCF(mid,ref){
  const el=document.getElementById("sncf-d-"+mid);if(!el)return;el.textContent="Chargement…";
  try{
    const r=await fetch(SNCF,{signal:AbortSignal.timeout(12000)});
    const d=await r.json();
    const arr=d.arrivals||[];
    const match=arr.filter(a=>{const info=a.display_informations||{};const hs=String(info.headsign||"").trim();const ts=String(info.trip_short_name||"").trim();return hs===ref||ts===ref||hs.endsWith(ref)||ts.endsWith(ref);});
    if(!match.length){el.textContent="Train "+ref+" pas encore annoncé ("+arr.length+" trains chargés).";return;}
    el.innerHTML=match.map(a=>{
      const sdt=a.stop_date_time||{};const base=sdt.base_arrival_date_time||"";const real=sdt.arrival_date_time||base;
      const bm=base?parseInt(base.slice(9,11))*60+parseInt(base.slice(11,13)):0;
      const rm=real?parseInt(real.slice(9,11))*60+parseInt(real.slice(11,13)):bm;
      const diff=rm-bm;const info=a.display_informations||{};const tn=info.headsign||info.trip_short_name||ref;
      const ts=base?p2(Math.floor(bm/60))+":"+p2(bm%60):"—";
      const cls=diff<=1?"sok":"slat";const st=diff<=1?"À l'heure":"+"+diff+" min";
      return`<div class="sncfrow"><div class="sncftrain">${esc(tn)}</div><div class="sncft">${ts}</div><span class="sb ${cls}">${st}</span></div>`;
    }).join("");
  }catch(e){el.textContent="Erreur: "+e.message;}
}

// ══════════════════════════════════════════════════════════
// PMF
// ══════════════════════════════════════════════════════════
function rdPMF(m){
  if(isDone(m))return`<div class="sec"><div class="secbody" style="text-align:center;padding:10px 0">
    <div style="font-size:12px;color:var(--grn);font-weight:600;margin-bottom:9px">✓ Mission clôturée</div>
    <button class="dclink" onclick="goPause()">🌿 Décompresser</button>
  </div></div>`;
  if(!pmf||pmf.mid!==m.mid)return`<div class="sec"><div class="secbody" style="padding:7px 0">
    <button class="pbtn" onclick="sPMF('${m.mid}')">✅ Clôturer la mission</button>
  </div></div>`;
  return`<div class="sec"><div class="secbody"><div class="pmf">${pmfHTML(m)}</div></div></div>`;
}
function sPMF(mid){
  const m=missions.find(x=>x.mid===mid)||{};
  let end=nowt();
  if(m.debut&&m.heures){const ph=parseFloat(m.heures);if(ph>0){const[h,mn]=m.debut.split(":").map(Number);const em=h*60+mn+Math.round(ph*60);if(Math.floor(em/60)<24)end=p2(Math.floor(em/60))+":"+p2(em%60);}}
  pmf={mid,start:m.debut||"",end,tpl:"RAS",rpt:"",rptLoading:false,dMood:0,dEnergy:0,dNote:""};
  pmfStep=1;render();
}
function pmfHTML(m){return pmfStep===1?pmfH1(m):pmfStep===2?pmfH2(m):pmfStep===3?pmfH3(m):pmfStep===4?pmfH4():"";}
function pmfH1(m){
  const du=pmf.start&&pmf.end?durS(pmf.start,pmf.end):"";
  return`<div class="pmfhdr"><div class="pmfnum">1</div><div class="pmftitle">Heures réelles</div></div>
  <div class="trow">
    <div class="tb"><div class="tlbl">Début</div><input class="tinp" type="time" id="ps" value="${pmf.start||""}" onchange="pmf.start=this.value;uDur()"/></div>
    <div class="tarr">→</div>
    <div class="tb"><div class="tlbl">Fin</div><input class="tinp" type="time" id="pe" value="${pmf.end||""}" onchange="pmf.end=this.value;uDur()"/></div>
  </div>
  <div class="dur" id="pd">${du?"⏱ "+du:""}</div>
  <button class="pbtn" onclick="pmfGo(2)">Suivant → Rapport</button>
  <span class="pback" onclick="pmf=null;pmfStep=0;render()">Annuler</span>`;
}
function pmfH2(m){
  const acts=pmf.rpt?`<div class="rptacts">
    <button class="rptact" onclick="genRpt('${m.mid}')">↻ Régénérer</button>
    <button class="rptact" style="color:var(--grn)" onclick="schedRpt('${m.mid}')">📅 Planifier 9h</button>
  </div><textarea class="rptedit" id="rpt-ed-${m.mid}">${esc(pmf.rpt)}</textarea>
  <button class="pbtn" onclick="pmfGo(3)">Continuer →</button>`
  :`<button class="pbtn" onclick="genRpt('${m.mid}')">✨ Générer le rapport</button>`;
  return`<div class="pmfhdr"><div class="pmfnum">2</div><div class="pmftitle">Rapport</div></div>
  <div class="tplrow">
    <button class="tplbtn${pmf.tpl==="RAS"?" on":""}" onclick="pmf.tpl='RAS';pmf.rpt='';render()">📝 RAS</button>
    <button class="tplbtn${pmf.tpl==="INCIDENT"?" on":""}" onclick="pmf.tpl='INCIDENT';pmf.rpt='';render()">⚠️ Incident</button>
    <button class="tplbtn${pmf.tpl==="ANNULATION"?" on":""}" onclick="pmf.tpl='ANNULATION';pmf.rpt='';render()">🚫 Annulation</button>
  </div>
  ${pmf.rptLoading?'<div style="text-align:center;padding:14px;color:var(--t2)"><span class="spin">↻</span> Rédaction…</div>':pmf.rpt?`<div class="rptout">${esc(pmf.rpt)}</div>`+acts:acts}
  <span class="pback" onclick="pmfStep=1;render()">← Retour</span>`;
}
function pmfH3(m){
  const mv=[1,2,3,4,5];
  return`<div class="pmfhdr"><div class="pmfnum">3</div><div class="pmftitle">État de fin</div></div>
  <div style="font-size:9px;color:var(--t3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px">Humeur</div>
  <div class="moodrow">${mv.map(v=>`<button class="moodbtn${pmf.dMood===v?" on":""}" onclick="pmf.dMood=${v};render()">${ME[v-1]}</button>`).join("")}</div>
  <div style="font-size:9px;color:var(--t3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px">Énergie</div>
  <div class="moodrow">${mv.map(v=>`<button class="moodbtn${pmf.dEnergy===v?" on":""}" onclick="pmf.dEnergy=${v};render()">${EE[v-1]}</button>`).join("")}</div>
  <textarea class="notesta" id="pmf-db" rows="3" placeholder="Note privée…">${esc(pmf.dNote||"")}</textarea>
  <button class="pbtn" style="margin-top:8px" onclick="pmfFin('${m.mid}')">Clôturer</button>
  <span class="pback" onclick="pmfStep=2;render()">← Retour</span>`;
}
function pmfH4(){
  return`<div class="donewrap">
    <div class="doneico">✅</div>
    <div class="donetitle">Mission clôturée</div>
    <div class="donesub">Heures et journal enregistrés.</div>
    <button class="dclink" onclick="goPause()">🌿 Décompresser</button>
    <div><span class="pback" onclick="closeD()">← Retour</span></div>
  </div>`;
}
function pmfGo(step){
  if(step===2){const s=document.getElementById("ps"),e=document.getElementById("pe");if(s)pmf.start=s.value;if(e)pmf.end=e.value;}
  pmfStep=step;render();
}
function uDur(){
  const s=document.getElementById("ps"),e=document.getElementById("pe"),d=document.getElementById("pd");
  if(s&&e&&d){const du=durS(s.value,e.value);d.textContent=du?"⏱ "+du:"";}
}
async function genRpt(mid){
  const m=missions.find(x=>x.mid===mid);if(!m)return;
  pmf.rptLoading=true;render();
  if(pmf.tpl==="RAS"){
    pmf.rpt="Bonjour,\n\nVoici le récap du service "+(m.desc||m.mid)+". Rien à signaler, tout s'est bien déroulé.\n\nMerci et bonne journée,\nJoseph";
    pmf.rptLoading=false;render();return;
  }
  try{
    const r=await fetch(GAS+"?action=genRapport&id="+encodeURIComponent(mid)+"&template="+encodeURIComponent(pmf.tpl)+"&start="+encodeURIComponent(pmf.start)+"&end="+encodeURIComponent(pmf.end),{signal:AbortSignal.timeout(35000)});
    const d=await r.json();pmf.rpt=d?.text||"Erreur génération.";
  }catch(e){pmf.rpt="Erreur: "+e.message;}
  pmf.rptLoading=false;render();
}
async function schedRpt(mid){
  const ed=document.getElementById("rpt-ed-"+mid);const rpt=ed?ed.value:pmf.rpt;
  try{
    const r=await fetch(GAS+"?action=scheduleRapport&id="+encodeURIComponent(mid)+"&rapport="+encodeURIComponent(rpt)+"&template="+encodeURIComponent(pmf.tpl),{signal:AbortSignal.timeout(25000)});
    const d=await r.json();
    if(d?.ok)toast("📅 Rapport planifié 9h","ok");else toast("❌ "+(d?.msg||"Erreur"),"err");
  }catch(e){toast("❌ "+e.message.slice(0,40),"err");}
}
async function pmfFin(mid){
  const db=document.getElementById("pmf-db");if(db)pmf.dNote=db.value;
  const s=pmf.start,e=pmf.end;
  const he=s&&e?(()=>{const[sh,sm]=s.split(":").map(Number),[eh,em]=e.split(":").map(Number);const d=(eh*60+em)-(sh*60+sm);return d>0?(d/60).toFixed(2):""})():"";
  if(he)await callAPI("update","id="+encodeURIComponent(mid)+"&field=heures&value="+encodeURIComponent(he));
  await callAPI("update","id="+encodeURIComponent(mid)+"&field=statut&value=Termin%C3%A9");
  const m=missions.find(x=>x.mid===mid)||{};
  const flag=pmf.dMood<=2||pmf.dEnergy<=2?"🔴":pmf.dMood<=3||pmf.dEnergy<=3?"🟡":"🟢";
  try{
    await fetch(GAS+"?action=saveJournal"
      +"&date="+encodeURIComponent(m.date||tday())
      +"&mid="+encodeURIComponent(mid)
      +"&mood="+pmf.dMood+"&energy="+pmf.dEnergy
      +"&client="+encodeURIComponent(m.client||"")
      +"&context=Apr%C3%A8s%20mission&kind=Note"
      +"&note="+encodeURIComponent((pmf.dNote||"").slice(0,500))
      +"&flag="+encodeURIComponent(flag),
      {signal:AbortSignal.timeout(8000)});
  }catch(e){}
  const i=missions.findIndex(x=>x.mid===mid);
  if(i>-1){missions[i].heures=he;missions[i].statut="Terminé";}
  if(detail?.mid===mid){detail.heures=he;detail.statut="Terminé";}
  toast("✅ Clôturée","ok");pmfStep=4;render();
}
async function callAPI(action,qs){
  try{
    const r=await fetch(GAS+"?action="+action+"&"+qs,{signal:AbortSignal.timeout(12000)});
    const d=await r.json();return d?.ok!==false;
  }catch(e){return false;}
}

// ══════════════════════════════════════════════════════════
// DECOMPRESSION
// ══════════════════════════════════════════════════════════
function goPause(){
  document.getElementById("ct").innerHTML=`<div class="dc">
    <div class="dcey">Décompression</div>
    <div class="dctitle">Pause rapide</div>
    <div class="dcsub">Un espace simple pour relâcher ce qui reste.</div>
    <textarea class="dcta" id="dc-t" rows="6" placeholder="Écrire ici pour toi seulement…"></textarea>
    <div class="dcrow">
      <button class="dcsave" onclick="saveDC()">Enregistrer</button>
      <button class="dcback" onclick="render()">Retour</button>
    </div>
  </div>`;
}
async function saveDC(){
  const ta=document.getElementById("dc-t");const txt=ta?.value.trim();
  if(txt){
    try{
      await fetch(GAS+"?action=saveJournal"
        +"&date="+encodeURIComponent(tday())
        +"&mid="+encodeURIComponent(detail?.mid||"")
        +"&context=D%C3%A9compression&kind=Note&mood=0&energy=0"
        +"&client="+encodeURIComponent(detail?.client||"")
        +"&note="+encodeURIComponent(txt.slice(0,500))+"&flag=%F0%9F%9F%A1",
        {signal:AbortSignal.timeout(8000)});
    }catch(e){}
  }
  toast("✅ Enregistrée","ok");render();
}

// ══════════════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════════════
let _tt=null;
function toast(msg,type){
  const el=document.getElementById("toast");
  el.textContent=msg;el.className="show"+(type?" "+type:"");
  if(_tt)clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove("show"),3200);
}

// ══════════════════════════════════════════════════════════
// WEATHER
// ══════════════════════════════════════════════════════════
async function loadWx(){
  try{
    const r=await fetch("https://api.open-meteo.com/v1/forecast?latitude=45.695&longitude=4.944&current_weather=true&forecast_days=1",{signal:AbortSignal.timeout(6000)});
    const d=await r.json();const cw=d.current_weather;if(!cw)return;
    const code=cw.weathercode;const ico=code<=1?"☀️":code<=3?"⛅️":code<=50?"🌦":code<=70?"🌧":"❄️";
    document.getElementById("hwx").textContent=ico+" "+Math.round(cw.temperature)+"°";
  }catch(e){}
}
</script>
