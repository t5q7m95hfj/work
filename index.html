<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Mission Control</title>
<style>
:root{
  --bg:#0a0a0f;--s1:#111118;--s2:#18181f;--s3:#1e1e28;--s4:#242430;
  --bdr:rgba(255,255,255,.06);--bdr2:rgba(255,255,255,.12);--bdr3:rgba(255,255,255,.18);
  --t0:#f4f2ee;--t1:#c8c4bc;--t2:#84807a;--t3:#44403c;
  --gold:#f5c842;--goldd:rgba(245,200,66,.1);--golddd:rgba(245,200,66,.05);
  --blue:#5ba3f5;--blued:rgba(91,163,245,.1);
  --grn:#48cc78;--grnd:rgba(72,204,120,.1);
  --amb:#f09030;--ambd:rgba(240,144,48,.1);
  --red:#e05050;--redd:rgba(224,80,80,.1);
  --pur:#a870f0;--purd:rgba(168,112,240,.1);
  --teal:#30c8cc;--teald:rgba(48,200,204,.1);
  --r:10px;--rsm:7px;
  --f:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Helvetica,Arial,sans-serif;
  --fm:'SF Mono',SFMono-Regular,'Courier New',monospace;
}
.light{
  --bg:#f2f0eb;--s1:#fff;--s2:#ebe8e2;--s3:#e0ddd8;--s4:#d4d0ca;
  --bdr:rgba(0,0,0,.06);--bdr2:rgba(0,0,0,.11);--bdr3:rgba(0,0,0,.16);
  --t0:#14120e;--t1:#3c3830;--t2:#706c64;--t3:#aaa49c;
  --gold:#8a6500;--goldd:rgba(138,101,0,.08);--golddd:rgba(138,101,0,.04);
  --blue:#1448c0;--blued:rgba(20,72,192,.07);
  --grn:#106830;--grnd:rgba(16,104,48,.07);
  --amb:#8a4000;--ambd:rgba(138,64,0,.07);
  --red:#a02020;--redd:rgba(160,32,32,.07);
  --pur:#5010a8;--purd:rgba(80,16,168,.07);
  --teal:#087880;--teald:rgba(8,120,128,.07);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{font-family:var(--f);background:var(--bg);color:var(--t0);font-size:15px;line-height:1.5;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
select,textarea,input{font-family:inherit;}
a{color:inherit;text-decoration:none;}
strong{font-weight:600;}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;height:100dvh;}
.hdr{flex-shrink:0;padding:12px 16px 10px;background:var(--bg);border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;}
.nav{flex-shrink:0;display:flex;background:var(--s1);border-bottom:1px solid var(--bdr2);}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.inner{padding:14px 15px 100px;max-width:560px;margin:0 auto;}

/* ── HEADER ── */
.brand{display:flex;flex-direction:column;}
.brand-name{font-weight:700;font-size:15px;letter-spacing:.2px;color:var(--t0);}
.brand-sub{font-size:12px;color:var(--t2);margin-top:0px;}
.hdr-r{display:flex;align-items:center;gap:8px;}
.clock{font-size:17px;color:var(--t0);font-weight:600;letter-spacing:.01em;}
.hdr-wx{font-size:13px;color:var(--t2);}
.hbtn{width:32px;height:32px;border-radius:8px;background:var(--s2);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--t1);}

/* ── NAV ── */
.nb{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;font-size:11px;font-weight:600;letter-spacing:.3px;color:var(--t2);padding:11px 4px;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap;}
.nb.on{color:var(--gold);border-bottom-color:var(--gold);}
.nb-dot{width:5px;height:5px;border-radius:50%;background:var(--red);margin-left:1px;flex-shrink:0;}

/* ── SECTION LABELS ── */
.slbl{font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--t2);padding:18px 0 8px;}
.slbl:first-child{padding-top:2px;}
.dhdr{font-size:12px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--t2);padding:13px 0 6px;display:flex;align-items:center;gap:7px;}
.dhdr.today{color:var(--gold);}
.dhdr.tmrw{color:var(--grn);}
.dpill{font-size:9px;padding:2px 7px;border-radius:3px;font-weight:700;background:var(--goldd);color:var(--gold);letter-spacing:.3px;}

/* ══════════════════════════════════════════
   SITUATION BOARD — the intelligence layer
══════════════════════════════════════════ */
.sit-board{margin-bottom:14px;}
/* Alert strip */
.alerts{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.alert{display:flex;align-items:center;gap:10px;background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:10px 13px;cursor:pointer;transition:background .1s;}
.alert:active{background:var(--s2);}
.alert.warn{border-left:3px solid var(--amb);}
.alert.danger{border-left:3px solid var(--red);}
.alert.info{border-left:3px solid var(--blue);}
.alert.ok{border-left:3px solid var(--grn);}
.alert-ico{font-size:16px;flex-shrink:0;}
.alert-body{flex:1;min-width:0;}
.alert-title{font-size:13px;font-weight:600;color:var(--t0);}
.alert-sub{font-size:11px;color:var(--t2);margin-top:1px;}
.alert-arr{font-size:13px;color:var(--t3);}

/* Pulse cards */
.pulse-row{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:7px;}
.pulse-card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:12px 14px;position:relative;overflow:hidden;}
.pulse-label{font-size:11px;color:var(--t2);font-weight:500;letter-spacing:.2px;margin-bottom:6px;}
.pulse-val{font-size:26px;font-weight:700;line-height:1;color:var(--t0);}
.pulse-val.gold{color:var(--gold);}
.pulse-val.grn{color:var(--grn);}
.pulse-val.amb{color:var(--amb);}
.pulse-val.red{color:var(--red);}
.pulse-sub{font-size:11px;color:var(--t2);margin-top:4px;}
.pulse-bar-wrap{height:3px;background:var(--s3);border-radius:2px;margin-top:8px;}
.pulse-bar{height:100%;border-radius:2px;transition:width .4s;}

/* Monthly progress */
.month-prog{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:13px 15px;margin-bottom:7px;}
.mp-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px;}
.mp-title{font-size:12px;font-weight:600;color:var(--t2);letter-spacing:.3px;text-transform:uppercase;}
.mp-total{font-family:var(--fm);font-size:22px;font-weight:700;color:var(--gold);line-height:1;}
.mp-sub{font-size:11px;color:var(--t2);text-align:right;margin-top:2px;}
.mp-track{height:5px;background:var(--s3);border-radius:3px;margin-bottom:10px;}
.mp-fill{height:100%;border-radius:3px;background:var(--gold);transition:width .5s;}
.mp-clients{display:flex;flex-direction:column;gap:4px;}
.mp-client{display:flex;align-items:center;gap:8px;}
.mp-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.mp-cname{font-size:12px;color:var(--t1);flex:1;}
.mp-cval{font-family:var(--fm);font-size:12px;color:var(--t0);font-weight:600;}

/* Day timeline */
.timeline{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:12px 14px;margin-bottom:7px;overflow:hidden;}
.tl-title{font-size:11px;font-weight:600;color:var(--t2);letter-spacing:.4px;text-transform:uppercase;margin-bottom:10px;}
.tl-track{position:relative;height:44px;}
.tl-hours{display:flex;position:absolute;top:0;left:0;right:0;}
.tl-hr{flex:1;border-left:1px solid var(--bdr);height:44px;position:relative;}
.tl-hrlbl{font-size:9px;color:var(--t3);position:absolute;top:0;left:2px;}
.tl-mission{position:absolute;top:18px;height:22px;border-radius:4px;display:flex;align-items:center;padding:0 6px;font-size:10px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;z-index:2;}
.tl-now{position:absolute;top:0;bottom:0;width:1.5px;background:var(--red);z-index:3;}
.tl-now::before{content:'';position:absolute;top:-3px;left:-3px;width:7px;height:7px;border-radius:50%;background:var(--red);}

/* ══════════════════════════════════════════
   MISSION CARD — upgraded
══════════════════════════════════════════ */
.mc{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);margin-bottom:7px;overflow:hidden;position:relative;user-select:none;}
.mc:active .mcbody{background:var(--s2);}
.mc.dim .mcbody{opacity:.45;}
.mc.echg{border-style:dashed;opacity:.65;}
.mcbar{position:absolute;left:0;top:0;bottom:0;width:3px;}
.mcbody{padding:11px 13px 11px 18px;cursor:pointer;transition:background .07s;}
.mctop{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.mcl{flex:1;min-width:0;}
.mcr{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:5px;}
.mchead{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:2px;}
.mctag{font-size:10px;font-weight:700;letter-spacing:.6px;}
.mctime{font-family:var(--fm);font-size:14px;color:var(--t0);font-weight:600;}
.mcds{font-size:11px;color:var(--t3);}
.mctitle{font-size:16px;font-weight:600;color:var(--t0);line-height:1.25;}
.mcsub{font-size:13px;color:var(--t1);margin-top:2px;}
.mcpills{display:flex;gap:4px;margin-top:7px;flex-wrap:wrap;}
.pl{font-size:10px;padding:3px 8px;border-radius:4px;font-weight:500;}
.pl-l{background:var(--grnd);color:var(--grn);}
.pl-p{background:var(--blued);color:var(--blue);}
.pl-s{background:var(--purd);color:var(--pur);}
.pl-r{background:var(--goldd);color:var(--gold);}
/* Quick action bar */
.mc-actions{display:flex;border-top:1px solid var(--bdr);}
.mca{flex:1;padding:9px 4px;font-size:11px;font-weight:600;color:var(--t2);text-align:center;border-right:1px solid var(--bdr);transition:background .1s,color .1s;}
.mca:last-child{border-right:none;}
.mca:active{background:var(--s2);color:var(--t0);}
.mca.primary{color:var(--gold);}
.mca.green{color:var(--grn);}
.mca.danger{color:var(--red);}

/* ── BADGES ── */
.bdg{font-size:9px;padding:3px 8px;border-radius:4px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;white-space:nowrap;}
.b0{background:rgba(132,128,122,.12);color:var(--t2);}
.b1{background:var(--blued);color:var(--blue);}
.b2{background:var(--grnd);color:var(--grn);}
.b3{background:var(--grnd);color:var(--grn);}
.b4{background:var(--goldd);color:var(--gold);}
.b5{background:var(--ambd);color:var(--amb);}
.b6{background:var(--purd);color:var(--pur);}
.b7{background:var(--redd);color:var(--red);}
.b8{background:var(--teald);color:var(--teal);}
.cmp{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.cg{background:var(--grn);}.ca{background:var(--amb);}.cr{background:var(--red);}

/* ── UPCOMING ── */
.uplist{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;}
.uprow{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bdr);cursor:pointer;}
.uprow:last-child{border-bottom:none;}
.uprow:active{background:var(--s2);}
.updt{font-size:11px;color:var(--t2);width:66px;flex-shrink:0;font-weight:500;}
.upds{font-size:14px;color:var(--t0);flex:1;font-weight:500;}
.uptg{font-size:10px;font-weight:700;letter-spacing:.4px;}
.upearns{font-family:var(--fm);font-size:12px;color:var(--t2);}

/* ── DETAIL ── */
.back{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--gold);padding:8px 0 12px;cursor:pointer;min-height:44px;letter-spacing:.2px;}
.hero{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:8px;}
.herotop{height:4px;}
.herobody{padding:14px 15px 12px;}
.herocl{font-size:11px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;margin-bottom:3px;}
.herotitle{font-size:22px;font-weight:700;color:var(--t0);line-height:1.1;letter-spacing:-.2px;}
.herosub{font-size:13px;color:var(--t1);margin-top:5px;}
.heropills{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;align-items:center;}

/* ── SECTIONS ── */
.sec{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:8px;}
.sectitle{font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--t2);padding:9px 14px 7px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;}
.secbody{padding:2px 14px 10px;}
.ir{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--bdr);}
.ir:last-child{border-bottom:none;}
.irl{font-size:11px;color:var(--t2);width:82px;flex-shrink:0;padding-top:2px;font-weight:500;}
.irv{font-size:14px;color:var(--t0);flex:1;word-break:break-word;font-weight:400;}
.irv a{color:var(--blue);}
.irv.copy{cursor:pointer;}
.irv.copy:active{color:var(--gold);}

/* Contact */
.cb{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--bdr);}
.cb:last-child{border-bottom:none;}
.cbrole{font-size:10px;color:var(--t3);margin-bottom:2px;text-transform:uppercase;letter-spacing:.4px;font-weight:600;}
.cbname{font-size:15px;font-weight:600;color:var(--t0);}
.cbph{font-size:12px;color:var(--t2);margin-top:2px;font-family:var(--fm);}
.callbtn{background:var(--grnd);border:1px solid rgba(72,204,120,.2);border-radius:var(--rsm);padding:9px 13px;font-size:13px;font-weight:600;color:var(--grn);min-height:40px;display:flex;align-items:center;gap:4px;}

/* Pax */
.paxprog{height:3px;background:var(--s3);border-radius:2px;margin:8px 0 6px;}
.paxfill{height:100%;background:var(--grn);border-radius:2px;transition:width .3s;}
.paxcount{font-size:11px;color:var(--t2);margin-bottom:7px;}
.paxlist{max-height:270px;overflow-y:auto;}
.paxrow{display:flex;align-items:flex-start;gap:9px;padding:6px 0;border-bottom:1px solid var(--bdr);}
.paxrow:last-child{border-bottom:none;}
.paxbox{width:20px;height:20px;border-radius:4px;border:1.5px solid var(--bdr2);background:var(--s2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;cursor:pointer;transition:all .1s;}
.paxbox.ck{background:var(--grn);border-color:var(--grn);color:#fff;}
.paxname{font-size:13px;color:var(--t0);flex:1;line-height:1.4;}
.paxname.ck{color:var(--t3);text-decoration:line-through;}

/* Edit */
.erow{display:flex;align-items:center;gap:7px;padding:7px 0;border-bottom:1px solid var(--bdr);}
.erow:last-child{border-bottom:none;}
.elbl{font-size:11px;color:var(--t2);width:70px;flex-shrink:0;font-weight:500;}
.einp{flex:1;background:var(--s2);border:1px solid var(--bdr2);border-radius:var(--rsm);padding:8px 10px;font-size:14px;color:var(--t0);outline:none;transition:border-color .15s;font-family:var(--fm);}
.einp:focus{border-color:var(--gold);}
.esel{flex:1;background:var(--s2);border:1px solid var(--bdr2);border-radius:var(--rsm);padding:8px 10px;font-size:14px;color:var(--t0);outline:none;-webkit-appearance:none;}
.savebtn{background:var(--gold);color:#000;border-radius:var(--rsm);padding:7px 12px;font-size:12px;font-weight:700;min-height:36px;flex-shrink:0;}
.notesta{width:100%;background:var(--s2);border:1px solid var(--bdr);border-radius:var(--rsm);padding:9px 11px;font-size:14px;color:var(--t0);resize:vertical;min-height:70px;outline:none;line-height:1.6;transition:border-color .15s;margin-top:4px;}
.notesta:focus{border-color:var(--gold);}
.saverow{display:flex;justify-content:flex-end;margin-top:5px;}

/* Collapsible */
.coll{border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-top:8px;}
.collh{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;background:var(--s2);}
.colltitle{font-size:13px;font-weight:600;color:var(--t1);}
.collsub{font-size:10px;color:var(--t3);margin-top:1px;}
.collchev{font-size:11px;color:var(--t3);transition:transform .18s;}
.collbody{display:none;padding:11px 14px;border-top:1px solid var(--bdr);}
.collbody.open{display:block;}
.collchev.open{transform:rotate(180deg);}

/* Invoice */
.invbtn{display:flex;align-items:center;gap:9px;background:var(--s2);border:1px solid var(--bdr2);border-radius:var(--r);padding:11px 13px;width:100%;font-size:14px;color:var(--t0);font-weight:500;margin-top:6px;transition:background .12s;}
.invbtn:first-child{margin-top:0;}
.invbtn:active{background:var(--s3);}
.invico{font-size:17px;flex-shrink:0;}
.invr{margin-left:auto;font-size:11px;color:var(--t3);}

/* SNCF */
.sncfrow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bdr);}
.sncfrow:last-child{border-bottom:none;}
.sncftrain{font-size:13px;font-weight:500;color:var(--t0);}
.sncft{font-family:var(--fm);font-size:12px;color:var(--t1);}
.sb{font-size:10px;padding:3px 8px;border-radius:4px;font-weight:700;}
.sok{background:var(--grnd);color:var(--grn);}
.slat{background:var(--redd);color:var(--red);}

/* ── ADMIN + FINANCE ── */
.fin-sum{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:7px;}
.fin-top{padding:14px 15px 12px;border-bottom:1px solid var(--bdr);}
.fin-top-row{display:flex;justify-content:space-between;align-items:flex-end;}
.fin-label{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;}
.fin-net{font-family:var(--fm);font-size:30px;font-weight:700;color:var(--grn);line-height:1;}
.fin-net-sub{font-size:12px;color:var(--t2);margin-top:3px;}
.fin-month-pct{font-family:var(--fm);font-size:13px;color:var(--t2);text-align:right;}
.fin-rows{padding:2px 15px 8px;}
.frow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bdr);}
.frow:last-child{border-bottom:none;}
.flab{font-size:14px;color:var(--t1);}
.flab.b{font-weight:600;color:var(--t0);}
.fval{font-family:var(--fm);font-size:14px;font-weight:600;color:var(--t0);}
.fval.g{color:var(--grn);}
.fval.a{color:var(--amb);}
.fval.r{color:var(--red);}
.fval.dim{color:var(--t2);font-size:12px;}

/* Client breakdown */
.client-bars{padding:2px 15px 12px;}
.cbar-row{display:flex;align-items:center;gap:9px;padding:5px 0;}
.cbar-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.cbar-name{font-size:12px;color:var(--t1);width:38px;flex-shrink:0;}
.cbar-track{flex:1;height:4px;background:var(--s3);border-radius:2px;}
.cbar-fill{height:100%;border-radius:2px;}
.cbar-val{font-family:var(--fm);font-size:11px;color:var(--t0);font-weight:600;text-align:right;min-width:52px;}

/* Mission finance list */
.fcrd{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:7px;}
.ftitle{font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--t2);padding:9px 14px 7px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center;}
.fbody{padding:3px 14px 8px;}
.fmr{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--bdr);cursor:pointer;}
.fmr:last-child{border-bottom:none;}
.fmr:active{background:var(--s2);margin:0 -14px;padding-left:14px;padding-right:14px;}
.fmrl{flex:1;min-width:0;}
.fmrd{font-size:14px;color:var(--t0);font-weight:500;}
.fmrm{font-size:11px;color:var(--t3);margin-top:2px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.fmrr{text-align:right;flex-shrink:0;}
.fmrb{font-family:var(--fm);font-size:14px;font-weight:600;color:var(--t0);}
.fmrn{font-family:var(--fm);font-size:11px;color:var(--t2);margin-top:1px;}
.owed-tag{font-size:9px;padding:2px 6px;border-radius:3px;background:var(--ambd);color:var(--amb);font-weight:700;}

/* Admin cards */
.admin-links{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:7px;}
.admin-row{display:flex;align-items:center;gap:11px;padding:12px 14px;border-bottom:1px solid var(--bdr);cursor:pointer;transition:background .1s;}
.admin-row:last-child{border-bottom:none;}
.admin-row:active{background:var(--s2);}
.admin-ico{font-size:18px;width:28px;text-align:center;flex-shrink:0;}
.admin-info{flex:1;}
.admin-label{font-size:14px;font-weight:500;color:var(--t0);}
.admin-sub{font-size:11px;color:var(--t2);margin-top:1px;}
.admin-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:4px;}
.admin-arr{font-size:13px;color:var(--t3);}

/* Ref cards */
.ref-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:7px;}
.ref-card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:11px 13px;cursor:pointer;}
.ref-card:active{background:var(--s2);}
.ref-label{font-size:10px;font-weight:600;color:var(--t2);letter-spacing:.4px;text-transform:uppercase;margin-bottom:4px;}
.ref-val{font-family:var(--fm);font-size:13px;color:var(--t0);word-break:break-all;line-height:1.4;}
.ref-hint{font-size:10px;color:var(--t3);margin-top:3px;}

/* PMF */
.pmf{padding:2px 0 4px;}
.pmfhdr{display:flex;align-items:center;gap:9px;margin-bottom:13px;}
.pmfnum{width:24px;height:24px;border-radius:50%;background:var(--gold);color:#000;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.pmftitle{font-size:16px;font-weight:600;color:var(--t0);}
.trow{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.tb{flex:1;}
.tlbl{font-size:10px;color:var(--t3);letter-spacing:.4px;text-transform:uppercase;margin-bottom:4px;}
.tinp{width:100%;background:var(--s2);border:1px solid var(--bdr2);border-radius:var(--rsm);padding:9px;font-family:var(--fm);font-size:20px;color:var(--t0);text-align:center;outline:none;transition:border-color .15s;}
.tinp:focus{border-color:var(--gold);}
.tarr{font-size:19px;color:var(--t3);flex-shrink:0;}
.dur{text-align:center;font-size:13px;color:var(--t2);margin-bottom:12px;min-height:20px;}
.tplrow{display:flex;gap:6px;margin-bottom:10px;}
.tplbtn{flex:1;padding:9px 3px;border-radius:var(--rsm);font-size:11px;font-weight:600;letter-spacing:.2px;background:var(--s2);border:1px solid var(--bdr);color:var(--t2);transition:all .12s;}
.tplbtn.on{background:var(--goldd);border-color:var(--gold);color:var(--gold);}
.moodrow{display:flex;gap:5px;margin-bottom:12px;}
.moodbtn{flex:1;padding:9px 2px;border-radius:var(--rsm);font-size:18px;background:var(--s2);border:1px solid var(--bdr);transition:all .1s;}
.moodbtn.on{background:var(--goldd);border-color:var(--gold);}
.pbtn{width:100%;padding:13px;border-radius:var(--r);font-family:var(--f);font-size:14px;font-weight:700;background:var(--gold);color:#000;margin-bottom:9px;transition:opacity .12s;}
.pbtn:active{opacity:.8;}
.pback{display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--t3);padding:9px;cursor:pointer;min-height:40px;}
.rptout{background:var(--s2);border:1px solid var(--bdr);border-radius:var(--rsm);padding:11px 13px;font-size:12px;color:var(--t1);line-height:1.8;white-space:pre-wrap;margin-bottom:8px;}
.rptacts{display:flex;gap:6px;margin-bottom:8px;}
.rptact{flex:1;padding:8px 3px;border-radius:var(--rsm);font-size:11px;font-weight:600;background:var(--s2);border:1px solid var(--bdr);color:var(--t1);}
.rptedit{width:100%;background:var(--s2);border:1px solid var(--bdr);border-radius:var(--rsm);padding:9px 11px;font-family:var(--fm);font-size:12px;color:var(--t0);resize:vertical;min-height:90px;outline:none;margin-bottom:8px;line-height:1.6;}
.spin{display:inline-block;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.donewrap{text-align:center;padding:20px 0;}
.doneico{font-size:36px;margin-bottom:9px;}
.donetitle{font-size:17px;font-weight:700;color:var(--t0);margin-bottom:4px;}
.donesub{font-size:13px;color:var(--t2);margin-bottom:14px;}
.dclink{display:inline-flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--bdr);border-radius:var(--r);padding:10px 18px;font-size:13px;color:var(--t1);font-weight:500;}

/* Decompression */
.dc{min-height:55vh;display:flex;flex-direction:column;justify-content:center;padding:8px 0;}
.dcey{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--t3);margin-bottom:5px;}
.dctitle{font-size:26px;font-weight:700;color:var(--t0);letter-spacing:-.3px;margin-bottom:3px;}
.dcsub{font-size:13px;color:var(--t2);margin-bottom:17px;}
.dcta{width:100%;background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:13px 15px;font-size:14px;color:var(--t0);resize:none;min-height:150px;outline:none;line-height:1.7;transition:border-color .15s;}
.dcta:focus{border-color:var(--gold);}
.dcrow{display:flex;gap:8px;margin-top:10px;}
.dcsave{flex:1;padding:13px;border-radius:var(--r);background:var(--grn);color:#fff;font-size:14px;font-weight:700;}
.dcback{padding:13px 18px;border-radius:var(--r);background:var(--s2);border:1px solid var(--bdr);font-size:13px;color:var(--t2);}

/* Annulées/Échangées */
.cxlrow,.echgrow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bdr);}
.cxlrow:last-child,.echgrow:last-child{border-bottom:none;}
.cxlname{font-size:13px;color:var(--t3);font-weight:500;}
.echgname{font-size:13px;color:var(--teal);font-weight:500;}
.cxldt,.echgdt{font-size:11px;color:var(--t3);margin-top:2px;}

/* Empty + Loader */
.empty{text-align:center;padding:50px 20px;}
.emico{font-size:38px;opacity:.3;margin-bottom:9px;}
.emtitle{font-size:15px;font-weight:600;color:var(--t2);margin-bottom:3px;}
.emsub{font-size:12px;color:var(--t3);}
.loader{display:flex;align-items:center;justify-content:center;gap:9px;padding:40px 0;color:var(--t3);font-size:13px;}

/* Journal */
.jstats{display:flex;gap:7px;margin-bottom:9px;}
.jstat{flex:1;background:var(--s1);border:1px solid var(--bdr);border-radius:var(--rsm);padding:9px 10px;}
.jstatv{font-size:18px;font-weight:700;color:var(--t0);line-height:1;}
.jstatl{font-size:9px;color:var(--t3);margin-top:3px;letter-spacing:.4px;text-transform:uppercase;}
.jrow{padding:8px 0;border-bottom:1px solid var(--bdr);}
.jrow:last-child{border-bottom:none;}
.jdate{font-size:12px;font-weight:600;color:var(--gold);}
.jctx{font-size:10px;color:var(--t3);}
.jsc{display:flex;gap:4px;margin-top:4px;}
.jscpill{font-size:10px;background:var(--s3);border-radius:3px;padding:2px 7px;color:var(--t2);}
.jnote{font-size:11px;color:var(--t2);margin-top:5px;font-style:italic;line-height:1.5;}

/* Toast */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--s3);border:1px solid var(--bdr2);color:var(--t0);font-size:13px;font-weight:600;padding:9px 20px;border-radius:24px;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;z-index:999;}
#toast.show{opacity:1;}
#toast.ok{background:rgba(72,204,120,.18);border-color:var(--grn);color:var(--grn);}
#toast.err{background:rgba(224,80,80,.18);border-color:var(--red);color:var(--red);}

/* ── FLIGHT CARDS ── */
.fc{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);margin-bottom:8px;overflow:hidden;}
.fc-hdr{display:flex;align-items:center;gap:10px;padding:11px 13px;cursor:pointer;background:var(--s2);}
.fc-hdr:active{background:var(--s3);}
.fc-flight{font-family:var(--fm);font-size:15px;font-weight:700;color:var(--t0);}
.fc-time{font-family:var(--fm);font-size:13px;color:var(--gold);}
.fc-origin{font-size:11px;color:var(--t3);background:var(--s3);border-radius:3px;padding:2px 6px;font-weight:600;}
.fc-pcount{font-size:11px;color:var(--t2);margin-left:auto;}
.fc-gone{background:rgba(72,204,120,.06);border-color:rgba(72,204,120,.2);}
.fc-gone .fc-flight{color:var(--grn);}
.fc-body{padding:10px 13px;border-top:1px solid var(--bdr);}
.fc-driver{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--bdr);margin-bottom:6px;}
.fc-driver-info{flex:1;min-width:0;}
.fc-driver-role{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;font-weight:600;}
.fc-driver-name{font-size:14px;font-weight:600;color:var(--t0);}
.fc-driver-ph{font-size:12px;color:var(--t2);font-family:var(--fm);}
.fc-driver-edit{font-size:11px;color:var(--blue);padding:4px 8px;background:var(--blued);border-radius:4px;cursor:pointer;}
.fc-departed{display:flex;align-items:center;gap:6px;padding:8px 0 4px;}
.fc-dep-btn{flex:1;padding:9px;border-radius:var(--rsm);font-size:12px;font-weight:700;background:var(--s2);border:1px solid var(--bdr);color:var(--t2);transition:all .15s;}
.fc-dep-btn.done{background:rgba(72,204,120,.12);border-color:var(--grn);color:var(--grn);}
.fc-pax{margin-top:2px;}
.fc-prow{display:flex;align-items:flex-start;gap:9px;padding:6px 0;border-bottom:1px solid var(--bdr);}
.fc-prow:last-child{border-bottom:none;}
.fc-pbox{width:22px;height:22px;border-radius:5px;border:1.5px solid var(--bdr2);background:var(--s2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;cursor:pointer;transition:all .1s;margin-top:1px;}
.fc-pbox.ck{background:var(--grn);border-color:var(--grn);color:#fff;}
.fc-pname{font-size:13px;color:var(--t0);flex:1;line-height:1.4;}
.fc-pname.ck{color:var(--t3);text-decoration:line-through;}
.fc-pcabin{font-size:10px;color:var(--t3);margin-top:1px;}
.fc-dedit{background:var(--s2);border:1px solid var(--bdr2);border-radius:var(--rsm);padding:10px 12px;margin:8px 0;}
.fc-dedit input{width:100%;background:var(--s3);border:1px solid var(--bdr2);border-radius:5px;padding:7px 9px;font-size:13px;color:var(--t0);outline:none;margin-bottom:6px;font-family:inherit;}
.fc-dedit input:focus{border-color:var(--gold);}
.fc-dedit-row{display:flex;gap:6px;}
.fc-dedit-save{flex:1;padding:8px;border-radius:5px;background:var(--gold);color:#000;font-size:12px;font-weight:700;}
.fc-dedit-cancel{padding:8px 12px;border-radius:5px;background:var(--s3);border:1px solid var(--bdr);font-size:12px;color:var(--t2);}
.tr-prog{height:3px;background:var(--s3);border-radius:2px;margin:0 0 10px;}
.tr-fill{height:100%;background:var(--grn);border-radius:2px;transition:width .3s;}
.tr-summary{font-size:11px;color:var(--t2);margin-bottom:10px;}
.inc-notes{width:100%;background:var(--s2);border:1px solid var(--bdr2);border-radius:var(--rsm);padding:9px 11px;font-size:13px;color:var(--t0);resize:vertical;min-height:80px;outline:none;line-height:1.6;transition:border-color .15s;margin:8px 0 4px;font-family:inherit;}
.inc-notes:focus{border-color:var(--amb);}
.inc-hint{font-size:11px;color:var(--t3);margin-bottom:4px;}

</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="brand">
      <div class="brand-name">Mission Control</div>
      <div class="brand-sub" id="hsub">Chargement…</div>
    </div>
    <div class="hdr-r">
      <span class="hdr-wx" id="hwx"></span>
      <span class="clock" id="clock">--:--</span>
      <button class="hbtn" onclick="toggleLight()" id="tbtn">☀</button>
      <button class="hbtn" onclick="hardRefresh()">↻</button>
    </div>
  </div>
  <nav class="nav">
    <button class="nb on" id="nb-today"   onclick="go('today')">☀ Aujourd'hui</button>
    <button class="nb"    id="nb-month"   onclick="go('month')">📅 <span id="mlbl">Mois</span></button>
    <button class="nb"    id="nb-admin"   onclick="go('admin')">⚙ Admin<span class="nb-dot" id="admin-dot" style="display:none"></span></button>
  </nav>
  <div class="scroll"><div class="inner" id="ct"><div class="loader"><span class="spin">↻</span> Chargement…</div></div></div>
</div>
<div id="toast"></div>
<script>
// ══ CONFIG ══
const GAS  = "https://script.google.com/macros/s/AKfycbwACs6qIEu24xMe3KtSjLMbcs3A6iXqCaZEodXBuTx2au1ol5UXeUqZKM6W_NJO9qSErg/exec";
const SNCF = "https://fragrant-hall-c33b.t5q7m95hfj.workers.dev/";

const DAYS = ["dim","lun","mar","mer","jeu","ven","sam"];
const MOL  = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
const MOS  = ["jan","fév","mar","avr","mai","jun","jul","aoû","sep","oct","nov","déc"];
const ME   = ["😫","😔","😐","🙂","😊"];
const EE   = ["🪫","😴","⚡","💪","🔥"];

const META = {
  "Philibert Tourisme":  {tag:"PHIL", hex:"#48cc78", short:"Phil"},
  "Go Côte Saône":       {tag:"GCS",  hex:"#5ba3f5", short:"GCS"},
  "Feel the French Way": {tag:"FTFW", hex:"#a870f0", short:"FTFW"},
  "Un Monde Bleu":       {tag:"UMB",  hex:"#f09030", short:"UMB"},
};

// ══ STATE ══
let missions=[], journal=[];
let tab="today", sv="today", detail=null, pmf=null, pmfStep=0;
let light=localStorage.getItem("mc_light")==="1";
let paxState={};
let trState={};
function loadTrState(){try{const r=localStorage.getItem("mc_tr");if(r)trState=JSON.parse(r);}catch(e){}}
function saveTrState(){try{localStorage.setItem("mc_tr",JSON.stringify(trState));}catch(e){}}
function getTrFlight(mid,fid){if(!trState[mid])trState[mid]={flights:{}};if(!trState[mid].flights[fid])trState[mid].flights[fid]={departed:false,driver:"",phone:"",pax:{}};return trState[mid].flights[fid];}

// ══ INIT ══
window.addEventListener("load",()=>{
  if(light)document.body.classList.add("light");
  updateTbtn(); tick(); setInterval(tick,30000);
  document.getElementById("mlbl").textContent = MOL[new Date().getMonth()];
  loadTrState(); loadPaxState(); loadData(); loadWx();
});
function tick(){const d=new Date();document.getElementById("clock").textContent=p2(d.getHours())+":"+p2(d.getMinutes());}
function toggleLight(){light=!light;document.body.classList.toggle("light",light);localStorage.setItem("mc_light",light?"1":"0");updateTbtn();}
function updateTbtn(){document.getElementById("tbtn").textContent=light?"🌙":"☀";}

// ══ DATA ══
async function loadData(force){
  if(!force){
    const c=localStorage.getItem("mc_v5");
    if(c){try{const d=JSON.parse(c);missions=d.m.map(norm);journal=d.j||[];afterLoad();}catch(e){}}
  }
  try{
    const r=await fetch(GAS+"?action=all",{signal:AbortSignal.timeout(28000)});
    const d=await r.json();
    if(d&&d.missions){
      missions=d.missions.map(norm);
      journal=d.journal||extractJournalFromLS();
      localStorage.setItem("mc_v5",JSON.stringify({m:d.missions,j:journal}));
      afterLoad(); render();
    }
  }catch(e){if(!missions.length)render();}
}
function afterLoad(){
  const tm=missions.filter(m=>m.date===tday()&&!isCxl(m)&&!isEchg(m));
  document.getElementById("hsub").textContent=tm.length
    ?tm.length+" mission"+(tm.length>1?"s":"")+" aujourd'hui"
    :"Aucune mission aujourd'hui";
  // Admin dot: show if action needed
  const alerts=buildAlerts();
  const dot=document.getElementById("admin-dot");
  if(dot)dot.style.display=alerts.some(a=>a.sev==="danger"||a.sev==="warn")?"inline-block":"none";
  render();
}
async function hardRefresh(){
  localStorage.removeItem("mc_v5");missions=[];journal=[];
  document.getElementById("ct").innerHTML='<div class="loader"><span class="spin">↻</span> Actualisation…</div>';
  await loadData(true);
}
function extractJournalFromLS(){
  try{
    const raw=localStorage.getItem("mc_journal");if(!raw)return[];
    const arr=JSON.parse(raw);
    return arr.map(e=>({date:e.date||"",missionId:e.mid||"",client:e.client||"",context:e.context||"Après mission",kind:e.type||"Note",mood:parseInt(e.mood)||0,energy:parseInt(e.energy)||0,text:e.note||"",include:e.flag==="🟢"}));
  }catch(e){return[];}
}

// ══ NORMALISE ══
function parseNum(v){
  if(v===null||v===undefined||v==="")return 0;
  const n=parseFloat(String(v).replace(/\s/g,"").replace(",",".").replace(/[^0-9.\-]/g,""));
  return isNaN(n)?0:n;
}
function parseTime(v){
  if(!v||v==="")return"";
  const s=String(v).trim();
  if(/^\d{1,2}:\d{2}$/.test(s))return s;
  const m=s.match(/(\d{1,2})[h:](\d{2})/i);
  if(m)return p2(parseInt(m[1]))+":"+p2(parseInt(m[2]));
  return s.length<=5?s:"";
}
function norm(m){
  if(m._n)return m;
  const o={...m};o._n=1;
  o.mid    = o["Mission ID"]||"";
  o.date   = (o["Date mission"]||o["Date"]||"").toString().slice(0,10);
  o.client = o["Client"]||"";
  o.type   = o["Type"]||"";
  o.sens   = o["Sens"]||"";
  o.desc   = o["Description"]||"";
  o.heures = o["Heures"]||"";
  o.debut  = parseTime(o["Début"]||o["Debut"]||"");
  o.endroit= o["Endroit"]||"";
  o.statut = o["Statut"]||"";
  o.notes  = o["Notes"]||"";
  o.docs   = o["Docs"]||"";
  o.rapport= o["Rapport"]||o["Rapport ✓"]||"";
  o.facture= o["Facture#"]||o["Facture #"]||"";
  o.ndb    = o["NDB#"]||o["NDB #"]||"";
  // Sheet formula values (cols Q & T via getValues)
  const stSheet = parseNum(o["Sous-total"]||o["Sous total"]||"");
  const tnSheet  = parseNum(o["Total net"]||o["Net"]||"");
  o.base    = parseNum(o["Base (HT)"]||o["Base HT"]||0);
  o.hs      = parseNum(o["HS"]||0);
  o.supp    = parseNum(o["Supp."]||o["Supp"]||0);
  o.debours = parseNum(o["Débours"]||0);
  o.sousTotal = stSheet>0 ? stSheet : (o.base+o.hs+o.supp);
  o.totalNet  = tnSheet>0 ? tnSheet : 0;
  o.montant  = parseNum(o["Montant reçu"]||0);
  // ops
  o.ops      = o.ops||{};
  o.paxRaw   = o.ops["Passenger Raw"]||"";
  o.paxCount = o.ops["Pax Count"]||"";
  o.shipName = o.ops["Ship Name"]||"";
  o.extRef   = o.ops["External Ref"]||"";
  o.meetPt   = o.ops["Meeting Point"]||"";
  o.dock     = o.ops["Dock / Terminal"]||"";
  o.transRef = o.ops["Transport Ref"]||"";
  o.opsSum   = o.ops["Ops Summary"]||"";
  return o;
}

// ══ STATUS ══
const isDone =m=>{const s=(m.statut||"").toLowerCase();return s==="terminé"||s.includes("envoy")||s==="payé"||s.includes("générée");};
const isCxl  =m=>(m.statut||"").toLowerCase().includes("annul");
const isEchg =m=>{const s=(m.statut||"").toLowerCase();return s.includes("échangé")||s.includes("echange")||s==="échangé";};

function getMeta(c){
  if(!c)return{tag:"?",hex:"#666",short:"?"};
  for(const[k,v]of Object.entries(META))
    if(c.toLowerCase().includes(k.split(" ")[0].toLowerCase()))return v;
  return{tag:c.slice(0,4).toUpperCase(),hex:"#888",short:c.slice(0,4)};
}

// ══ UTILS ══
function p2(n){return String(n).padStart(2,"0");}
function tday(){return new Date().toISOString().slice(0,10);}
function tmrw(){const d=new Date();d.setDate(d.getDate()+1);return d.toISOString().slice(0,10);}
function fds(iso){if(!iso)return"";const d=new Date(iso+"T12:00:00");return DAYS[d.getDay()]+" "+d.getDate()+" "+MOS[d.getMonth()];}
function fdl(iso){if(!iso)return"";const d=new Date(iso+"T12:00:00");return DAYS[d.getDay()]+" "+d.getDate()+" "+MOL[d.getMonth()];}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function nowt(){const d=new Date();return p2(d.getHours())+":"+p2(d.getMinutes());}
function durS(s,e){
  if(!s||!e)return"";
  const[sh,sm]=s.split(":").map(Number),[eh,em]=e.split(":").map(Number);
  let d=(eh*60+em)-(sh*60+sm);if(d<=0)return"";
  d=Math.round(d/15)*15;
  return Math.floor(d/60)+"h"+(d%60?p2(d%60):"");
}
function fmtE(n,dec=0){
  if(n===0||!n)return"—";
  return n.toFixed(dec).replace(".",",")+" €";
}
function copyText(t){
  navigator.clipboard?.writeText(t).then(()=>toast("Copié","ok")).catch(()=>{});
}

// ══ INTELLIGENCE — build alerts ══
function buildAlerts(){
  const now=new Date(),cm=p2(now.getMonth()+1),t=tday();
  const alerts=[];
  const mms=missions.filter(m=>m.date&&m.date.slice(5,7)===cm&&!isCxl(m)&&!isEchg(m));

  // Pending invoice generation
  const pendingFac=mms.filter(m=>isDone(m)&&!m.facture&&(m.statut||"").toLowerCase()==="terminé");
  if(pendingFac.length)alerts.push({
    sev:"warn",ico:"🧾",
    title:pendingFac.length+" facture"+(pendingFac.length>1?"s à générer":"à générer"),
    sub:pendingFac.map(m=>getMeta(m.client).tag+" "+fds(m.date)).join(" · "),
    action:()=>go('admin')
  });

  // Today's missions not started
  const todayActive=missions.filter(m=>m.date===t&&!isCxl(m)&&!isEchg(m)&&!isDone(m));
  if(todayActive.length){
    const next=todayActive.sort((a,b)=>(a.debut||"z").localeCompare(b.debut||"z"))[0];
    alerts.push({
      sev:"info",ico:"📍",
      title:"Prochain: "+esc(next.type||"—")+(next.debut?" à "+next.debut:""),
      sub:getMeta(next.client).tag+(next.endroit?" · "+next.endroit.split(/[,→]/)[0]:""),
      action:()=>{openD(next.mid);}
    });
  }

  // All clear
  if(!alerts.length&&mms.length){
    const tRec=mms.reduce((s,m)=>s+m.montant,0);
    const tN=mms.reduce((s,m)=>s+m.totalNet,0);
    if(tN>0&&tRec>=tN)alerts.push({sev:"ok",ico:"✅",title:"Tout en ordre",sub:"Paiements à jour pour "+MOL[now.getMonth()],action:null});
  }
  return alerts;
}

// ══ BADGE ══
function badge(m){
  const s=(m.statut||"").toLowerCase();
  if(isCxl(m))              return`<span class="bdg b7">Annulé</span>`;
  if(isEchg(m))             return`<span class="bdg b8">Échangé</span>`;
  if(s==="payé")            return`<span class="bdg b6">Payé</span>`;
  if(s.includes("envoyée")) return`<span class="bdg b5">Fac. envoyée</span>`;
  if(s.includes("générée")) return`<span class="bdg b4">Fac. générée</span>`;
  if(s==="terminé")         return`<span class="bdg b3">✓ Terminé</span>`;
  if(s==="confirmé")        return`<span class="bdg b2">Confirmé</span>`;
  if(s==="planifié")        return`<span class="bdg b1">Planifié</span>`;
  return`<span class="bdg b0">${esc(m.statut||"Brouillon")}</span>`;
}
function cmpDot(m){
  const c=m.cmp;if(!c||typeof c!=="object")return"";
  const s=c.score||0,cl=s>=100?"cg":s>=70?"ca":"cr";
  return`<div class="cmp ${cl}" title="${c.missing?.slice(0,3).join(", ")||"Complet"}"></div>`;
}

// ══ MISSION CARD ══
function quickActions(m){
  const s=(m.statut||"").toLowerCase();
  const acts=[];
  // Context-aware quick actions
  if(s==="confirmé"||s==="planifié"){
    acts.push({l:"Clôturer",cls:"primary",fn:`openD('${m.mid}');sPMF('${m.mid}')`});
  }
  if(s==="terminé"&&!m.facture){
    acts.push({l:"🧾 Facturer",cls:"green",fn:`openD('${m.mid}');genFacture('${m.mid}')`});
  }
  if(s.includes("générée")){
    acts.push({l:"📤 Marquer envoyée",cls:"primary",fn:`saveF('${m.mid}','statut','Fac. envoyée')`});
  }
  if(acts.length===0)return"";
  return`<div class="mc-actions">${acts.map(a=>`<button class="mca ${a.cls}" onclick="event.stopPropagation();${a.fn}">${a.l}</button>`).join("")}<button class="mca" onclick="openD('${m.mid}')">Détails →</button></div>`;
}

function mcard(m,compact){
  const mt=getMeta(m.client),done=isDone(m),cxl=isCxl(m),echg=isEchg(m);
  const pills=[];
  if(!compact){
    const loc=m.endroit?m.endroit.split(/[,→]/)[0].trim():"";
    if(m.shipName)  pills.push(`<span class="pl pl-s">🚢 ${esc(m.shipName)}</span>`);
    else if(loc)    pills.push(`<span class="pl pl-l">${esc(loc)}</span>`);
    if(m.paxCount)  pills.push(`<span class="pl pl-p">👥 ${esc(m.paxCount)}</span>`);
    if(m.extRef&&m.extRef.length<14) pills.push(`<span class="pl pl-r">${esc(m.extRef)}</span>`);
  }
  const qa=(!done&&!cxl&&!echg&&!compact)?quickActions(m):"";
  const dimClass=done||cxl?" dim":echg?" echg":"";
  return`<div class="mc${dimClass}">
  <div class="mcbar" style="background:${mt.hex}"></div>
  <div class="mcbody" onclick="openD('${m.mid}')">
    <div class="mctop">
      <div class="mcl">
        <div class="mchead">
          <span class="mctag" style="color:${mt.hex}">${mt.tag}</span>
          ${m.debut?`<span class="mctime">${esc(m.debut)}</span>`:""}
          ${!compact?`<span class="mcds">${fds(m.date)}</span>`:""}
        </div>
        <div class="mctitle">${esc(m.type||"—")}${m.sens&&m.sens!=="—"?" · "+esc(m.sens):""}</div>
        ${m.endroit&&!m.shipName?`<div class="mcsub">${esc(m.endroit.split(/[,→]/)[0].trim())}</div>`:""}
        ${pills.length?`<div class="mcpills">${pills.join("")}</div>`:""}
      </div>
      <div class="mcr">${cmpDot(m)}${badge(m)}</div>
    </div>
  </div>
  ${qa}
</div>`;
}

// ══ NAV ══
function go(t){
  tab=t;if(t==="today")sv="today";detail=null;pmf=null;pmfStep=0;
  ["today","month","admin"].forEach(id=>document.getElementById("nb-"+id)?.classList.toggle("on",id===t));
  render();
}
function render(){
  const el=document.getElementById("ct");if(!el)return;
  if(detail&&(tab==="today"||tab==="month")){el.innerHTML=rdDetail(detail);return;}
  if(tab==="today")   el.innerHTML=rdToday();
  else if(tab==="month")   el.innerHTML=rdMonth();
  else if(tab==="admin")   el.innerHTML=rdAdmin();
}
function openD(mid){detail=missions.find(m=>m.mid===mid)||null;pmf=null;pmfStep=0;render();window.scrollTo(0,0);}
function closeD(){detail=null;render();}

// ══ TODAY ══
function rdSitBoard(){
  const now=new Date(),cm=p2(now.getMonth()+1),t=tday();
  const alerts=buildAlerts();
  const mms=missions.filter(m=>m.date&&m.date.slice(5,7)===cm&&!isCxl(m)&&!isEchg(m));
  const doneCount=mms.filter(isDone).length;
  const daysInMonth=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  let h="";

  // Alerts
  if(alerts.length){
    // Store actions in a map, trigger by index
    window._alertActions=alerts.map(a=>a.action||null);
    h+='<div class="alerts">'+alerts.map((a,i)=>{
      const onclick=a.action?'onclick="_alertActions['+i+']&&_alertActions['+i+']()"':'';
      const sub=a.sub?'<div class="alert-sub">'+esc(a.sub)+'</div>':"";
      const arr=a.action?'<div class="alert-arr">›</div>':"";
      return'<div class="alert '+a.sev+'" '+onclick+'>'
        +'<div class="alert-ico">'+a.ico+'</div>'
        +'<div class="alert-body"><div class="alert-title">'+a.title+'</div>'+sub+'</div>'
        +arr+'</div>';
    }).join("")+'</div>';
  }

  // Single compact missions card
  const donePct=mms.length?Math.round(doneCount/mms.length*100):0;
  h+='<div class="pulse-card" style="margin-bottom:7px">'
    +'<div class="pulse-label">'+MOL[now.getMonth()]+' · '+now.getFullYear()+'</div>'
    +'<div class="pulse-val">'+doneCount+'<span style="font-size:15px;color:var(--t2);font-weight:400">/'+mms.length+'</span></div>'
    +'<div class="pulse-sub">terminée'+(doneCount>1?"s":"")+(mms.length?" · j"+now.getDate()+"/"+daysInMonth:"")+'</div>'
    +(mms.length?'<div class="pulse-bar-wrap"><div class="pulse-bar" style="width:'+donePct+'%;background:var(--grn)"></div></div>':"")
    +'</div>';

  // Day timeline
  const todayMs=missions.filter(m=>m.date===t&&!isCxl(m)&&m.debut).sort((a,b)=>a.debut.localeCompare(b.debut));
  if(todayMs.length){
    const minH=6,maxH=22,span=maxH-minH;
    const nowH=now.getHours()+now.getMinutes()/60;
    const nowPct=Math.max(0,Math.min(100,(nowH-minH)/span*100));
    let bars="";
    todayMs.forEach(m=>{
      const[mh,mm]=m.debut.split(":").map(Number);
      const dur=parseFloat(m.heures)||1.5;
      const start=(mh+mm/60-minH)/span*100;
      const width=dur/span*100;
      const mt=getMeta(m.client);
      bars+=`<div class="tl-mission" style="left:${start.toFixed(1)}%;width:${width.toFixed(1)}%;background:${mt.hex}" onclick="openD('${m.mid}')">${mt.tag}${m.type?" "+m.type:""}</div>`;
    });
    let hrLabels="";
    for(let h=minH;h<=maxH;h+=2){
      hrLabels+=`<div class="tl-hr"><div class="tl-hrlbl">${h}h</div></div>`;
    }
    h+=`<div class="timeline">
      <div class="tl-title">Journée</div>
      <div class="tl-track">
        <div class="tl-hours">${hrLabels}</div>
        ${bars}
        <div class="tl-now" style="left:${nowPct.toFixed(1)}%"></div>
      </div>
    </div>`;
  }

  return h;
}

function rdToday(){
  let h=`<div class="snav" style="display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap;">
    <button class="snb${sv==="today"?" on":""}" style="padding:7px 15px;border-radius:20px;font-size:11px;font-weight:600;background:var(--s2);border:1px solid var(--bdr);color:var(${sv==="today"?"--gold":"--t2"});${sv==="today"?"border-color:var(--gold);background:rgba(245,200,66,.07)":""}" onclick="sv='today';render()">Aujourd'hui</button>
    <button class="snb${sv==="week"?" on":""}" style="padding:7px 15px;border-radius:20px;font-size:11px;font-weight:600;background:var(--s2);border:1px solid var(--bdr);color:var(${sv==="week"?"--gold":"--t2"});${sv==="week"?"border-color:var(--gold);background:rgba(245,200,66,.07)":""}" onclick="sv='week';render()">7 jours</button>
  </div>`;
  h+=rdSitBoard();
  if(sv==="week")return h+rdWeek();
  const t=tday(),tm=tmrw();
  const t1=missions.filter(m=>m.date===t&&!isCxl(m)&&!isEchg(m)).sort((a,b)=>(a.debut||"z").localeCompare(b.debut||"z"));
  const t2=missions.filter(m=>m.date===tm&&!isCxl(m)&&!isEchg(m)).sort((a,b)=>(a.debut||"z").localeCompare(b.debut||"z"));
  const up=missions.filter(m=>m.date>tm&&!isCxl(m)&&!isEchg(m)).sort((a,b)=>a.date.localeCompare(b.date));
  if(t1.length) h+=`<div class="slbl">Aujourd'hui</div>`+t1.map(m=>mcard(m,false)).join("");
  else h+='<div class="empty"><div class="emico">☀️</div><div class="emtitle">Aucune mission aujourd\'hui, '+fdl(tday())+'</div>'+(t2.length?'<div class="emsub">'+t2.length+' demain</div>':"")+'</div>';
  if(t2.length) h+=`<div class="slbl">Demain · ${fds(tm).toUpperCase()}</div>`+t2.map(m=>mcard(m,true)).join("");
  if(up.length){
    h+=`<div class="slbl">À venir</div><div class="uplist">`;
    up.slice(0,8).forEach(m=>{
      const mt=getMeta(m.client);
      h+=`<div class="uprow" onclick="openD('${m.mid}')">
        <div class="updt">${fds(m.date)}</div>
        <div class="upds">${esc(m.type||"—")}${m.sens&&m.sens!=="—"?" · "+esc(m.sens):""}</div>
        <span class="uptg" style="color:${mt.hex}">${mt.tag}</span>
        ${m.sousTotal>0?`<span class="upearns">${m.sousTotal.toFixed(0)}€</span>`:""}
      </div>`;
    });
    h+="</div>";
  }
  return h;
}

function rdWeek(){
  const now=new Date();let h="",any=false;
  for(let d=0;d<7;d++){
    const dt=new Date(now.getTime()+d*86400000),ds=dt.toISOString().slice(0,10);
    const dm=missions.filter(m=>m.date===ds&&!isCxl(m)&&!isEchg(m)).sort((a,b)=>(a.debut||"z").localeCompare(b.debut||"z"));
    if(!dm.length)continue;
    const isT=ds===tday(),isTm=ds===tmrw();
    const dayTotal=dm.reduce((s,m)=>s+m.sousTotal,0);
    h+=`<div class="dhdr${isT?" today":isTm?" tmrw":""}">
      ${fdl(ds).toUpperCase()}${isT?'<span class="dpill">Aujourd\'hui</span>':""}
      ${dayTotal?`<span style="margin-left:auto;font-family:var(--fm);font-size:11px;color:var(--t2)">${dayTotal.toFixed(0)}€</span>`:""}
    </div>`+dm.map(m=>mcard(m,false)).join("");
    any=true;
  }
  return any?h:`<div class="empty"><div class="emico">📅</div><div class="emtitle">Semaine libre</div></div>`;
}

// ══ MONTH ══
function rdMonth(){
  const now=new Date(),cm=p2(now.getMonth()+1),t=tday(),tm=tmrw();
  const mms=missions.filter(m=>m.date&&m.date.slice(5,7)===cm).sort((a,b)=>a.date.localeCompare(b.date));
  const active=mms.filter(m=>!isCxl(m)&&!isEchg(m)),done=active.filter(isDone);
  const gr={};active.forEach(m=>{(gr[m.date]=gr[m.date]||[]).push(m);});
  let h=`<div class="slbl">${MOL[now.getMonth()].toUpperCase()} · ${active.length} missions</div>`;
  Object.entries(gr).sort(([a],[b])=>a.localeCompare(b)).forEach(([date,ms])=>{
    const isT=date===t,isTm=date===tm;
    const dayEarns=ms.reduce((s,m)=>s+m.sousTotal,0);
    h+=`<div class="dhdr${isT?" today":isTm?" tmrw":""}">
      ${fdl(date).toUpperCase()}${isT?'<span class="dpill">Aujourd\'hui</span>':""}
      ${dayEarns?`<span style="margin-left:auto;font-family:var(--fm);font-size:11px;color:var(--t2)">${dayEarns.toFixed(0)}€</span>`:""}
    </div>`+ms.map(m=>mcard(m,false)).join("");
  });
  const echgs=mms.filter(isEchg);
  if(echgs.length) h+=mkColl("echg-mo","Échangées ("+echgs.length+")","Non maintenues · non annulées",`<div style="padding:0">${echgs.map(m=>`<div class="echgrow"><div><div class="echgname">${getMeta(m.client).tag} · ${esc(m.type||"—")}</div><div class="echgdt">${fds(m.date)}</div></div><span class="bdg b8">Échangé</span></div>`).join("")}</div>`);
  const cxls=mms.filter(isCxl);
  if(cxls.length) h+=mkColl("cxl-mo","Annulées ("+cxls.length+")","Référence fiabilité",`<div style="padding:0">${cxls.map(m=>`<div class="cxlrow"><div><div class="cxlname">${getMeta(m.client).tag} · ${esc(m.type||"—")}</div><div class="cxldt">${fds(m.date)}${m.notes?" · "+esc(m.notes.slice(0,35)):""}</div></div><span class="bdg b7">Annulé</span></div>`).join("")}</div>`);
  if(!active.length) h+=`<div class="empty"><div class="emico">📅</div><div class="emtitle">Aucune mission ce mois</div></div>`;
  h+=rdJournal();
  return h;
}

// ══ JOURNAL ══
function rdJournal(){
  const cy=String(new Date().getFullYear());
  const yl=journal.filter(e=>e.date&&e.date.startsWith(cy));
  if(!yl.length)return`<div class="slbl" style="margin-top:4px">Bien-être</div><div style="font-size:13px;color:var(--t3);padding:4px 0">Aucune entrée — clôture des missions pour alimenter le journal.</div>`;
  const wm=yl.filter(e=>e.mood>0),we=yl.filter(e=>e.energy>0);
  const am=wm.length?wm.reduce((s,e)=>s+e.mood,0)/wm.length:0;
  const ae=we.length?we.reduce((s,e)=>s+e.energy,0)/we.length:0;
  let h=`<div class="slbl" style="margin-top:4px">Bien-être · ${cy}</div>
  <div class="jstats">
    <div class="jstat"><div class="jstatv">${yl.length}</div><div class="jstatl">Entrées</div></div>
    <div class="jstat"><div class="jstatv">${am?ME[Math.round(am)-1]+" "+am.toFixed(1):"—"}</div><div class="jstatl">Humeur moy.</div></div>
    <div class="jstat"><div class="jstatv">${ae?EE[Math.round(ae)-1]+" "+ae.toFixed(1):"—"}</div><div class="jstatl">Énergie moy.</div></div>
  </div>`;
  const rec=[...yl].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);
  h+=mkColl("j-log","Journal privé",yl.length+" entrées",
    rec.map(e=>`<div class="jrow">
      <div class="jdate">${fds(e.date)}</div>
      <div class="jctx">${esc(e.context||"—")} · ${esc(e.client||"")}</div>
      <div class="jsc">
        ${e.mood>0?`<span class="jscpill">${ME[e.mood-1]} ${e.mood}</span>`:""}
        ${e.energy>0?`<span class="jscpill">${EE[e.energy-1]} ${e.energy}</span>`:""}
      </div>
      ${e.text?`<div class="jnote">${esc(e.text.slice(0,90))}${e.text.length>90?"…":""}</div>`:""}
    </div>`).join(""));
  return h;
}

  } else if(m.paxRaw||m.paxCount){

      const pl=m.paxRaw.split("\n").map(function(s){return s.trim();}).filter(Boolean);

        +'<div class="paxprog"><div class="paxfill" id="pp-'+m.mid+'" style="width:'+pct+'%"></div></div>'
        +'<div class="paxlist" style="max-height:420px">'+pl.map(function(p,i){const on=!!st[i];return'<div class="paxrow"><div class="paxbox'+(on?' ck':'')+'" onclick="tPax(\''+m.mid+'\','+i+','+(on?'false':'true')+')">'+(on?'✓':'')+'</div><div class="paxname'+(on?' ck':'')+'">'+esc(p)+'</div></div>';}).join('')+'</div>';

    }).join("");
    h+=mkCollSec('cont-'+m.mid,"Contacts",contactBody,true);
  }

  // 4. DOCUMENTS (closed)
  if(m.docs||m.ops["Source PDF"]){
    let ds="";
    if(m.docs) ds+='<a href="'+esc(m.docs)+'" target="_blank" class="invbtn" onclick="event.stopPropagation()"><span class="invico">📁</span><span style="flex:1">Dossier Drive</span><span class="invr">↗</span></a>';

    h+=mkCollSec("doc-"+m.mid,"Documents",ds,false);
  }

  // 5. MODIFIER (closed)
  {
    const opts=["Brouillon","Planifié","Confirmé","Terminé","Fac. générée","Fac. envoyée","Payé","Échangé","Annulé"];
    const eid=m.mid;
    const modBody=''
      +'<div class="erow"><div class="elbl">Statut</div>'
      +'<select class="esel" onchange="saveF(\''+eid+'\',\'statut\',this.value)">'
      +opts.map(function(o){return'<option'+(m.statut===o?' selected':'')+'>'+o+'</option>';}).join("")
      +'</select></div>'
      +'<div class="erow"><div class="elbl">Départ</div>'
      +'<input class="einp" type="time" id="ef-d-'+eid+'" value="'+esc(m.debut||"")+'"/>'
      +'<button class="savebtn" onclick="saveF(\''+eid+'\',\'debut\',document.getElementById(\'ef-d-'+eid+'\').value)">✓</button></div>'
      +'<div class="erow"><div class="elbl">Heures</div>'
      +'<input class="einp" type="number" step="0.5" id="ef-h-'+eid+'" value="'+esc(String(m.heures||""))+'"/>'

      +'<div class="erow"><div class="elbl">Base HT</div>'
      +'<input class="einp" type="number" step="1" id="ef-b-'+eid+'" value="'+esc(String(m.base||""))+'"/>'
      +'<button class="savebtn" onclick="saveF(\''+eid+'\',\'base\',document.getElementById(\'ef-b-'+eid+'\').value)">✓</button></div>'
      +'<div style="padding:7px 0"><div class="elbl" style="margin-bottom:4px">Notes</div>'
      +'<textarea class="notesta" id="ef-n-'+eid+'" rows="3">'+esc(m.notes||"")+'</textarea>'
      +'<div class="saverow"><button class="savebtn" onclick="saveF(\''+eid+'\',\'notes\',document.getElementById(\'ef-n-'+eid+'\').value)">Enregistrer</button></div></div>';
    h+=mkCollSec("mod-"+m.mid,"Modifier",modBody,false);
  }

  // 6. FACTURATION (closed)
  if(m.sousTotal>0||m.totalNet>0){
    let fs="";
    if(m.base)      fs+=ir("Base HT",fmtE(m.base));
    if(m.hs)        fs+=ir("Heures sup.",fmtE(m.hs));
    if(m.supp)      fs+=ir("Supp.",fmtE(m.supp));
    if(m.sousTotal) fs+=ir("Sous-total","<strong>"+fmtE(m.sousTotal)+"</strong>");
    if(m.debours)   fs+=ir("Débours",fmtE(m.debours));

    if(m.montant>0) fs+=ir("Reçu",'<span style="color:var(--grn)">'+fmtE(m.montant)+"</span>");
    if(m.facture)   fs+=ir("Facture",esc(m.facture));
    const st2=(m.statut||"").toLowerCase();
    if(st2==="terminé"&&!m.facture) fs+='<div style="padding:8px 0"><button class="invbtn" onclick="event.stopPropagation();genFacture(\''+m.mid+'\')">' + '<span class="invico">🧾</span><span style="flex:1;font-weight:500">Générer la facture</span><span class="invr">PDF → Drive</span></button></div>';
    if(st2.includes("générée")) fs+='<div style="padding:4px 0"><button class="invbtn" style="border-color:rgba(240,144,48,.3);color:var(--amb)" onclick="event.stopPropagation();saveF(\''+m.mid+'\',\'statut\',\'Fac. envoyée\')">' + '<span class="invico">📤</span><span style="flex:1;font-weight:500">Marquer comme envoyée</span></button></div>';
    if(m.debours>0.01&&!m.ndb) fs+='<div style="padding:4px 0"><button class="invbtn" onclick="event.stopPropagation();genDebours(\''+m.mid+'\')">' + '<span class="invico">📄</span><span style="flex:1;font-weight:500">Note de débours</span><span class="invr">'+fmtE(m.debours)+'</span></button></div>';
    h+=mkCollSec("fac-"+m.mid,"Facturation",fs,false);
  }

  // 7. CLÔTURER (closed)
  h+=mkCollSec("clt-"+m.mid,"Clôturer la mission",rdPMFinline(m),false);

  return h;
}

function sec(title,bodyFn,extra=""){const b=bodyFn();if(!b)return"";return`<div class="sec"><div class="sectitle">${title}${extra}</div><div class="secbody">${b}</div></div>`;}
function ir(l,v,canCopy=false){
  const copyAttr=canCopy?` class="irv copy" onclick="copyText('${v.replace(/'/g,"\\'")}')"`:" class=\"irv\"";
  return`<div class="ir"><div class="irl">${l}</div><div${copyAttr}>${v}</div></div>`;
}


// ══ TRANSFERS ══
function parseTr(m){
  const raw=m.ops["Transfers"]||m.ops["transfers"]||"";
  if(raw&&raw.trim().startsWith("[")){try{return JSON.parse(raw);}catch(e){}}
  if(!m.transRef)return[];
  return m.transRef.split("\n").filter(s=>s.trim()).map((line,i)=>{
    const parts=line.split(/\s*-\s*/);
    const flight=parts[0]||("FL"+i);
    const time=parts[1]||"";
    const paxN=parseInt(parts[2])||0;
    const driverRaw=parts.slice(3).join(" ").trim();
    const phMatch=driverRaw.match(/([\d\s\.+]{7,})/);
    const phone=phMatch?phMatch[0].trim():"";
    const driver=driverRaw.replace(phone,"").trim();
    return{id:"fl"+i,flight,time,origin:"",pax:paxN,vehicle:"",driver,phone,passengers:[]};
  });
}
function normPhone(p){
  if(!p)return"";
  let s=String(p).replace(/[^\d+]/g,"");
  if(s.startsWith("00"))s="+"+s.slice(2);
  if(s.startsWith("06")||s.startsWith("07"))s="+33"+s.slice(1);
  if(s.startsWith("33")&&!s.startsWith("+"))s="+"+s;
  const m=s.match(/^\+33(\d)(\d{2})(\d{2})(\d{2})(\d{2})$/);
  if(m)return"+33 "+m[1]+" "+m[2]+" "+m[3]+" "+m[4]+" "+m[5];
  return p;
}
function rdTransfers(m){
  const flights=parseTr(m);
  if(!flights.length)return"";
  const mst=trState[m.mid]||{flights:{}};
  const totalPax=flights.reduce((s,f)=>s+(f.passengers?f.passengers.length:f.pax||0),0);
  const checkedPax=flights.reduce((s,f)=>{const fst=mst.flights&&mst.flights[f.id]||{};return s+Object.values(fst.pax||{}).filter(Boolean).length;},0);
  const departedCount=flights.filter(f=>(mst.flights&&mst.flights[f.id]||{}).departed).length;
  const pct=totalPax?Math.round(checkedPax/totalPax*100):0;
  let h='<div class="tr-prog"><div class="tr-fill" id="trp-'+m.mid+'" style="width:'+pct+'%"></div></div>';
  h+='<div class="tr-summary" id="trs-'+m.mid+'">'+checkedPax+'/'+totalPax+' pax · '+departedCount+'/'+flights.length+' véhicules partis</div>';
  flights.forEach(f=>{
    const fid=f.id||("fl"+f.flight);
    const fst=getTrFlight(m.mid,fid);
    const driver=fst.driver||f.driver||"";
    const phone=fst.phone||f.phone||"";
    const gone=fst.departed;
    const paxList=f.passengers||[];
    const paxChecked=Object.values(fst.pax||{}).filter(Boolean).length;
    const paxTotal=paxList.length||f.pax||0;
    const editing=fst._editing||false;
    h+='<div class="fc'+(gone?" fc-gone":"")+'" id="fc-'+m.mid+'-'+fid+'">';
    h+='<div class="fc-hdr" onclick="tFC(\''+m.mid+'\',\''+fid+'\')">';
    h+='<div class="fc-flight">'+esc(f.flight)+'</div>';
    if(f.time)h+='<div class="fc-time">'+esc(f.time)+'</div>';
    if(f.origin)h+='<div class="fc-origin">'+esc(f.origin)+'</div>';
    h+='<div class="fc-pcount">'+paxChecked+'/'+paxTotal+' pax'+(gone?' ✓':'')+'</div>';
    h+='<div style="font-size:11px;color:var(--t3);margin-left:6px" id="fchev-'+m.mid+'-'+fid+'">'+(gone?'▾':'▴')+'</div>';
    h+='</div>';
    const bodyOpen=!gone;
    h+='<div id="fcb-'+m.mid+'-'+fid+'" style="display:'+(bodyOpen?'block':'none')+'">';
    h+='<div class="fc-body">';
    if(editing){
      h+='<div class="fc-dedit">'
        +'<div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">Modifier chauffeur</div>'
        +'<input id="fcdn-'+m.mid+'-'+fid+'" placeholder="Nom" value="'+esc(driver)+'"/>'
        +'<input id="fcdp-'+m.mid+'-'+fid+'" placeholder="Téléphone" value="'+esc(phone)+'" type="tel"/>'
        +'<div class="fc-dedit-row">'
        +'<button class="fc-dedit-save" onclick="saveFCDriver(\''+m.mid+'\',\''+fid+'\')">✓ Enregistrer</button>'
        +'<button class="fc-dedit-cancel" onclick="cancelFCDriver(\''+m.mid+'\',\''+fid+'\')">Annuler</button>'
        +'</div></div>';
    } else {
      h+='<div class="fc-driver">';
      h+='<div class="fc-driver-info">';
      h+='<div class="fc-driver-role">Chauffeur</div>';
      h+='<div class="fc-driver-name">'+(driver?esc(driver):'<span style="color:var(--t3)">Non assigné</span>')+'</div>';
      if(phone)h+='<div class="fc-driver-ph">'+esc(normPhone(phone))+'</div>';
      h+='</div>';
      const rawPh=phone.replace(/\s/g,"");
      if(phone)h+='<a href="tel:'+esc(rawPh)+'" class="callbtn" onclick="event.stopPropagation()" style="margin-right:4px">📞</a>';
      h+='<button class="fc-driver-edit" onclick="event.stopPropagation();editFCDriver(\''+m.mid+'\',\''+fid+'\')">✏️</button>';
      h+='</div>';
    }
    h+='<div class="fc-departed">'
      +'<button class="fc-dep-btn'+(gone?' done':'')+'" onclick="toggleDep(\''+m.mid+'\',\''+fid+'\')">'
      +(gone?'✅ Véhicule parti':'🚗 Marquer comme parti')
      +'</button></div>';
    if(paxList.length){
      h+='<div class="fc-pax" id="fcpax-'+m.mid+'-'+fid+'">';
      paxList.forEach(function(p,i){
        const on=!!(fst.pax||{})[i];
        const name=typeof p==="object"?(p.name||""):String(p);
        const cabin=typeof p==="object"?p.cabin||"":"";
        h+='<div class="fc-prow">'
          +'<div class="fc-pbox'+(on?' ck':'')+'" onclick="tFCPax(\''+m.mid+'\',\''+fid+'\','+i+','+(on?'false':'true')+')">'+(on?'✓':'')+'</div>'
          +'<div style="flex:1"><div class="fc-pname'+(on?' ck':'')+'">'+esc(name)+'</div>'
          +(cabin?'<div class="fc-pcabin">Cabine '+esc(cabin)+'</div>':"")
          +'</div></div>';
      });
      h+='</div>';
    } else if(f.pax>0){
      h+='<div style="font-size:12px;color:var(--t3);padding:6px 0">'+f.pax+' pax — liste non disponible</div>';
    }
    h+='</div></div></div>';
  });
  return h;
}
function tFC(mid,fid){
  const b=document.getElementById('fcb-'+mid+'-'+fid);
  const chev=document.getElementById('fchev-'+mid+'-'+fid);
  if(!b)return;
  const open=b.style.display==="none";
  b.style.display=open?"block":"none";
  if(chev)chev.textContent=open?'▴':'▾';
}
function tFCPax(mid,fid,idx,on){
  const fst=getTrFlight(mid,fid);
  if(!fst.pax)fst.pax={};
  fst.pax[idx]=on;
  saveTrState();
  const box=document.querySelector('[onclick="tFCPax(\''+mid+'\',\''+fid+'\','+idx+','+(on?'false':'true')+')"]');
  const nm=box&&box.parentElement&&box.parentElement.querySelector('.fc-pname');
  if(box){box.classList.toggle('ck',on);box.textContent=on?'✓':'';box.setAttribute('onclick','tFCPax(\''+mid+'\',\''+fid+'\','+idx+','+(on?'false':'true')+')');}
  if(nm)nm.classList.toggle('ck',on);
  updateTrProgress(mid);
}
function toggleDep(mid,fid){
  const fst=getTrFlight(mid,fid);
  fst.departed=!fst.departed;
  saveTrState();
  if(detail&&detail.mid===mid)render();
}
function editFCDriver(mid,fid){getTrFlight(mid,fid)._editing=true;if(detail&&detail.mid===mid)render();}
function cancelFCDriver(mid,fid){getTrFlight(mid,fid)._editing=false;if(detail&&detail.mid===mid)render();}
async function saveFCDriver(mid,fid){
  const n=document.getElementById('fcdn-'+mid+'-'+fid);
  const p=document.getElementById('fcdp-'+mid+'-'+fid);
  const fst=getTrFlight(mid,fid);
  fst.driver=n?n.value:"";fst.phone=p?p.value:"";fst._editing=false;
  saveTrState();
  try{
    const m=missions.find(x=>x.mid===mid);
    if(m){
      const flights=parseTr(m);
      const fl=flights.find(f=>f.id===fid);
      if(fl){fl.driver=fst.driver;fl.phone=fst.phone;}
      await callAPI("update","id="+encodeURIComponent(mid)+"&field=transfers&value="+encodeURIComponent(JSON.stringify(flights)));
    }
  }catch(e){}
  toast("✓ Chauffeur mis à jour","ok");
  if(detail&&detail.mid===mid)render();
}
function updateTrProgress(mid){
  const m=missions.find(x=>x.mid===mid);if(!m)return;
  const flights=parseTr(m);
  const mst=trState[mid]||{flights:{}};
  const totalPax=flights.reduce((s,f)=>s+(f.passengers?f.passengers.length:f.pax||0),0);
  const checkedPax=flights.reduce((s,f)=>{const fst=mst.flights&&mst.flights[f.id]||{};return s+Object.values(fst.pax||{}).filter(Boolean).length;},0);
  const departedCount=flights.filter(f=>(mst.flights&&mst.flights[f.id]||{}).departed).length;
  const pct=totalPax?Math.round(checkedPax/totalPax*100):0;
  const pp=document.getElementById("trp-"+mid);if(pp)pp.style.width=pct+"%";
  const ps=document.getElementById("trs-"+mid);if(ps)ps.textContent=checkedPax+"/"+totalPax+" pax · "+departedCount+"/"+flights.length+" véhicules partis";
}

// ══ PAX ══
function loadPaxState(){try{const r=localStorage.getItem("mc_pax");if(r)paxState=JSON.parse(r);}catch(e){}}
function savePaxState(){try{localStorage.setItem("mc_pax",JSON.stringify(paxState));}catch(e){}}
function tPax(mid,idx,on){
  if(!paxState[mid])paxState[mid]={};paxState[mid][idx]=on;
  savePaxState();
  const box=document.querySelector(`[onclick="tPax('${mid}',${idx},${!on})"]`);
  const nm=box?.nextElementSibling;
  if(box){box.classList.toggle("ck",on);box.textContent=on?"✓":"";box.setAttribute("onclick",`tPax('${mid}',${idx},${!on})`)}
  if(nm)nm.classList.toggle("ck",on);
  const st=paxState[mid];
  const m=missions.find(x=>x.mid===mid);
  const total=m?m.paxRaw.split("\n").filter(s=>s.trim()).length:0;
  const done=Object.values(st).filter(Boolean).length;
  const pp=document.getElementById("pp-"+mid);if(pp)pp.style.width=(total?Math.round(done/total*100):0)+"%";
  const pc=document.querySelector(`#pp-${mid}`)?.parentElement?.previousElementSibling;
  if(pc&&pc.classList.contains("paxcount"))pc.textContent=done+"/"+total+" embarqués";
}

// ══ EDIT ══
async function saveF(mid,field,value){
  try{
    const r=await fetch(GAS+"?action=update&id="+encodeURIComponent(mid)+"&field="+encodeURIComponent(field)+"&value="+encodeURIComponent(value),{signal:AbortSignal.timeout(12000)});
    const d=await r.json();
    if(d&&d.ok===false){toast("❌ "+(d.msg||"Erreur"),"err");return;}
    const m=missions.find(x=>x.mid===mid);
    if(m){
      if(field==="statut")m.statut=value;
      else if(field==="notes")m.notes=value;
      else if(field==="heures")m.heures=value;
      else if(field==="base")m.base=parseFloat(value)||0;
      else if(field==="debut")m.debut=value;
    }
    if(detail?.mid===mid)detail=m;
    toast("✓ Mis à jour","ok"); afterLoad();
  }catch(e){toast("❌ "+e.message.slice(0,40),"err");}
}

// ══ SNCF ══
function rdSNCF(m){
  return mkColl("sncf-"+m.mid,"🚉 Trains en direct","SNCF live",
    `<div style="font-size:12px;color:var(--t3);margin-bottom:8px">Réf: ${esc(m.transRef)} <span style="color:var(--blue);cursor:pointer" onclick="fetchSNCF('${m.mid}','${esc(m.transRef)}')">Actualiser ↻</span></div>
     <div id="sncf-d-${m.mid}" style="font-size:12px;color:var(--t2)">Appuie sur Actualiser.</div>`);
}
async function fetchSNCF(mid,ref){
  const el=document.getElementById("sncf-d-"+mid);if(!el)return;el.textContent="Chargement…";
  try{
    const r=await fetch(SNCF,{signal:AbortSignal.timeout(12000)});
    const d=await r.json();
    const arr=d.arrivals||[];
    const match=arr.filter(a=>{const info=a.display_informations||{};const hs=String(info.headsign||"").trim();const ts=String(info.trip_short_name||"").trim();return hs===ref||ts===ref||hs.endsWith(ref)||ts.endsWith(ref);});
    if(!match.length){el.textContent="Train "+ref+" pas encore annoncé ("+arr.length+" trains chargés).";return;}
    el.innerHTML=match.map(a=>{
      const sdt=a.stop_date_time||{};const base=sdt.base_arrival_date_time||"";const real=sdt.arrival_date_time||base;
      const bm=base?parseInt(base.slice(9,11))*60+parseInt(base.slice(11,13)):0;
      const rm=real?parseInt(real.slice(9,11))*60+parseInt(real.slice(11,13)):bm;
      const diff=rm-bm;const info=a.display_informations||{};const tn=info.headsign||info.trip_short_name||ref;
      const ts=base?p2(Math.floor(bm/60))+":"+p2(bm%60):"—";
      const cls=diff<=1?"sok":"slat";const st=diff<=1?"À l'heure":"+"+diff+" min";
      return`<div class="sncfrow"><div class="sncftrain">${esc(tn)}</div><div class="sncft">${ts}</div><span class="sb ${cls}">${st}</span></div>`;
    }).join("");
  }catch(e){el.textContent="Erreur: "+e.message;}
}

// ══ PMF ══
function rdPMF(m){return rdPMFinline(m);}
function rdPMFinline(m){
  if(isDone(m))return'<div style="text-align:center;padding:12px 0">'
    +'<div style="font-size:14px;color:var(--grn);font-weight:600;margin-bottom:10px">✓ Mission clôturée</div>'
    +'<button class="dclink" onclick="goPause()">🌿 Décompresser</button>'
    +'</div>';
  if(!pmf||pmf.mid!==m.mid){
    const _mid=m.mid;
    return'<div style="padding:8px 0"><button class="pbtn" onclick="sPMF(this.dataset.mid)" data-mid="'+_mid+'">✅ Clôturer la mission</button></div>';
  }
  return'<div class="pmf">'+pmfHTML(m)+'</div>';
}
function sPMF(mid){
  const m=missions.find(x=>x.mid===mid)||{};
  let end=nowt();
  if(m.debut&&m.heures){const ph=parseFloat(m.heures);if(ph>0){const[h,mn]=m.debut.split(":").map(Number);const em=h*60+mn+Math.round(ph*60);if(Math.floor(em/60)<24)end=p2(Math.floor(em/60))+":"+p2(em%60);}}
  pmf={mid,start:m.debut||"",end,tpl:"RAS",rpt:"",rptLoading:false,dMood:0,dEnergy:0,dNote:"",incCtx:""};
  pmfStep=1;render();
}
function pmfHTML(m){return pmfStep===1?pmfH1(m):pmfStep===2?pmfH2(m):pmfStep===3?pmfH3(m):pmfStep===4?pmfH4():"";}
function pmfH1(m){
  const du=pmf.start&&pmf.end?durS(pmf.start,pmf.end):"";
  return`<div class="pmfhdr"><div class="pmfnum">1</div><div class="pmftitle">Heures réelles</div></div>
  <div class="trow">
    <div class="tb"><div class="tlbl">Début</div><input class="tinp" type="time" id="ps" value="${pmf.start||""}" onchange="pmf.start=this.value;uDur()"/></div>
    <div class="tarr">→</div>
    <div class="tb"><div class="tlbl">Fin</div><input class="tinp" type="time" id="pe" value="${pmf.end||""}" onchange="pmf.end=this.value;uDur()"/></div>
  </div>
  <div class="dur" id="pd">${du?"⏱ "+du:""}</div>
  <button class="pbtn" onclick="pmfGo(2)">Suivant → Rapport</button>
  <span class="pback" onclick="pmf=null;pmfStep=0;render()">Annuler</span>`;
}
function pmfH2(m){
  const acts=pmf.rpt?`<div class="rptacts">
    <button class="rptact" onclick="genRpt('${m.mid}')">↻ Régénérer</button>
    <button class="rptact" style="color:var(--grn)" onclick="schedRpt('${m.mid}')">📅 Planifier 9h → Gmail</button>
  </div><textarea class="rptedit" id="rpt-ed-${m.mid}">${esc(pmf.rpt)}</textarea>
  <button class="pbtn" onclick="pmfGo(3)">Continuer →</button>`
  :`<button class="pbtn" onclick="genRpt('${m.mid}')">✨ Générer le rapport</button>`;
  return`<div class="pmfhdr"><div class="pmfnum">2</div><div class="pmftitle">Rapport</div></div>
  <div class="tplrow">
    <button class="tplbtn${pmf.tpl==="RAS"?" on":""}" onclick="pmf.tpl='RAS';pmf.rpt='';render()">📝 RAS</button>
    <button class="tplbtn${pmf.tpl==="INCIDENT"?" on":""}" onclick="pmf.tpl='INCIDENT';pmf.rpt='';render()">⚠️ Incident</button>
  </div>
  ${pmf.tpl==="INCIDENT"&&!pmf.rpt?`<div class="inc-hint">Décris ce qui s'est passé :</div><textarea class="inc-notes" id="inc-ctx-${m.mid}" placeholder="Ex: Vol annulé, pax redirigé…">${esc(pmf.incCtx||"")}</textarea>`:""}
  ${pmf.rptLoading?'<div style="text-align:center;padding:16px;color:var(--t2)"><span class="spin">↻</span> Rédaction…</div>':pmf.rpt?`<div class="rptout">${esc(pmf.rpt)}</div>`+acts:acts}
  <div style="display:flex;gap:8px;margin-top:4px">
    <span class="pback" style="flex:1" onclick="pmfStep=1;render()">← Retour</span>
    <span class="pback" style="flex:1;color:var(--t3)" onclick="pmf.rpt='IGNORE';pmfGo(3)">Ignorer le rapport</span>
  </div>`;
}
function pmfH3(m){
  const mv=[1,2,3,4,5];
  return`<div class="pmfhdr"><div class="pmfnum">3</div><div class="pmftitle">État de fin</div></div>
  <div style="font-size:10px;color:var(--t3);letter-spacing:.4px;text-transform:uppercase;margin-bottom:5px">Humeur</div>
  <div class="moodrow">${mv.map(v=>`<button class="moodbtn${pmf.dMood===v?" on":""}" onclick="pmf.dMood=${v};render()">${ME[v-1]}</button>`).join("")}</div>
  <div style="font-size:10px;color:var(--t3);letter-spacing:.4px;text-transform:uppercase;margin-bottom:5px">Énergie</div>
  <div class="moodrow">${mv.map(v=>`<button class="moodbtn${pmf.dEnergy===v?" on":""}" onclick="pmf.dEnergy=${v};render()">${EE[v-1]}</button>`).join("")}</div>
  <textarea class="notesta" id="pmf-db" rows="3" placeholder="Note privée…">${esc(pmf.dNote||"")}</textarea>
  <button class="pbtn" style="margin-top:9px" onclick="pmfFin('${m.mid}')">Clôturer</button>
  <span class="pback" onclick="pmfStep=2;render()">← Retour</span>`;
}
function pmfH4(){
  return`<div class="donewrap">
    <div class="doneico">✅</div>
    <div class="donetitle">Mission clôturée</div>
    <div class="donesub">Heures et journal enregistrés.</div>
    <button class="dclink" onclick="goPause()">🌿 Décompresser</button>
    <div><span class="pback" onclick="closeD()">← Retour</span></div>
  </div>`;
}
function pmfGo(step){
  if(step===2){const s=document.getElementById("ps"),e=document.getElementById("pe");if(s)pmf.start=s.value;if(e)pmf.end=e.value;}
  if(step===3&&pmf.rpt==="IGNORE"){pmfStep=3;render();return;}
  pmfStep=step;render();
}
function uDur(){
  const s=document.getElementById("ps"),e=document.getElementById("pe"),d=document.getElementById("pd");
  if(s&&e&&d){const du=durS(s.value,e.value);d.textContent=du?"⏱ "+du:"";}
}
async function genRpt(mid){
  const m=missions.find(x=>x.mid===mid);if(!m)return;
  pmf.rptLoading=true;render();
  if(pmf.tpl==="RAS"){
    const desc=m.desc||m.type||m.mid;
    const loc=m.endroit?m.endroit.split(/[,→]/)[0].trim():"";
    pmf.rpt=`Bonjour,\n\nVoici le récap du service${desc?" "+desc:""}${loc?" — "+loc:""}.\n\nRien à signaler, tout s'est bien déroulé.\n\nMerci et bonne journée,\nJoseph`;
    pmf.rptLoading=false;render();return;
  }
  if(pmf.tpl==="INCIDENT"){
    const ctxEl=document.getElementById("inc-ctx-"+mid);
    if(ctxEl)pmf.incCtx=ctxEl.value;
    try{
      const ctx=[
        m.type&&("Type: "+m.type),
        m.endroit&&("Lieu: "+m.endroit),
        m.debut&&("Départ: "+m.debut),
        pmf.start&&pmf.end&&("Heures réelles: "+pmf.start+"–"+pmf.end),
        m.client&&("Client: "+m.client),
        m.paxCount&&("Passagers: "+m.paxCount),
        pmf.incCtx&&("Contexte: "+pmf.incCtx),
      ].filter(Boolean).join("\n");
      const r=await fetch(GAS+"?action=genRapport&id="+encodeURIComponent(mid)
        +"&template=INCIDENT&start="+encodeURIComponent(pmf.start||"")
        +"&end="+encodeURIComponent(pmf.end||"")
        +"&context="+encodeURIComponent(ctx),{signal:AbortSignal.timeout(40000)});
      const d=await r.json();
      pmf.rpt=d&&d.text?d.text:"Erreur génération.";
    }catch(e){pmf.rpt="Erreur: "+e.message;}
    pmf.rptLoading=false;render();return;
  }
  // Fallback to GAS for other templates
  try{
    const r=await fetch(GAS+"?action=genRapport&id="+encodeURIComponent(mid)+"&template="+encodeURIComponent(pmf.tpl)+"&start="+encodeURIComponent(pmf.start)+"&end="+encodeURIComponent(pmf.end),{signal:AbortSignal.timeout(35000)});
    const d=await r.json();pmf.rpt=d?.text||"Erreur génération.";
  }catch(e){pmf.rpt="Erreur: "+e.message;}
  pmf.rptLoading=false;render();
}
async function schedRpt(mid){
  const ed=document.getElementById("rpt-ed-"+mid);const rpt=ed?ed.value:pmf.rpt;
  if(rpt==="IGNORE"||!rpt){toast("Rapport ignoré","");pmfGo(3);return;}
  toast("⏳ Envoi vers Gmail planifié…","");
  try{
    const r=await fetch(GAS+"?action=scheduleRapport&id="+encodeURIComponent(mid)+"&rapport="+encodeURIComponent(rpt)+"&template="+encodeURIComponent(pmf.tpl),{signal:AbortSignal.timeout(25000)});
    const d=await r.json();
    if(d?.ok)toast("📅 Brouillon planifié pour 9h — visible dans Gmail Scheduled","ok");
    else toast("❌ "+(d?.msg||"Erreur"),"err");
  }catch(e){toast("❌ "+e.message.slice(0,40),"err");}
}
async function pmfFin(mid){
  const db=document.getElementById("pmf-db");if(db)pmf.dNote=db.value;
  const s=pmf.start,e=pmf.end;
  const he=s&&e?(()=>{const[sh,sm]=s.split(":").map(Number),[eh,em]=e.split(":").map(Number);const d=(eh*60+em)-(sh*60+sm);return d>0?(d/60).toFixed(2):""})():"";
  if(he)await callAPI("update","id="+encodeURIComponent(mid)+"&field=heures&value="+encodeURIComponent(he));
  await callAPI("update","id="+encodeURIComponent(mid)+"&field=statut&value=Termin%C3%A9");
  const m=missions.find(x=>x.mid===mid)||{};
  const flag=pmf.dMood<=2||pmf.dEnergy<=2?"🔴":pmf.dMood<=3||pmf.dEnergy<=3?"🟡":"🟢";
  try{
    await fetch(GAS+"?action=saveJournal"
      +"&date="+encodeURIComponent(m.date||tday())
      +"&mid="+encodeURIComponent(mid)
      +"&mood="+pmf.dMood+"&energy="+pmf.dEnergy
      +"&client="+encodeURIComponent(m.client||"")
      +"&context=Apr%C3%A8s%20mission&kind=Note"
      +"&note="+encodeURIComponent((pmf.dNote||"").slice(0,500))
      +"&flag="+encodeURIComponent(flag),
      {signal:AbortSignal.timeout(8000)});
  }catch(e){}
  const i=missions.findIndex(x=>x.mid===mid);
  if(i>-1){missions[i].heures=he;missions[i].statut="Terminé";}
  if(detail?.mid===mid){detail.heures=he;detail.statut="Terminé";}
  toast("✅ Clôturée","ok");pmfStep=4;render();
}
async function callAPI(action,qs){
  try{
    const r=await fetch(GAS+"?action="+action+"&"+qs,{signal:AbortSignal.timeout(12000)});
    const d=await r.json();return d?.ok!==false;
  }catch(e){return false;}
}

}

  const ta=document.getElementById("dc-t");const txt=ta?.value.trim();

    try{
      await fetch(GAS+"?action=saveJournal"
        +"&date="+encodeURIComponent(tday())

// ══ TOAST ══
let _tt=null;
function toast(msg,type){
  const el=document.getElementById("toast");
  el.textContent=msg;el.className="show"+(type?" "+type:"");
  if(_tt)clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove("show"),3200);
}

// ══ WEATHER ══
async function loadWx(){
  try{
    const r=await fetch("https://api.open-meteo.com/v1/forecast?latitude=45.695&longitude=4.944&current_weather=true&forecast_days=1",{signal:AbortSignal.timeout(6000)});
    const d=await r.json();const cw=d.current_weather;if(!cw)return;

  }catch(e){}
}
