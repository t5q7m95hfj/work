<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Mission Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg0:#080c14;--bg1:#0f1520;--bg2:#0a1018;--bg3:#0c1220;
  --border:#151d2a;--border2:#1e2a38;
  --txt0:#eae7e0;--txt1:#ddd8ce;--txt2:#8a8480;--txt3:#5a6a7a;--txt4:#3a4858;
  --accent:#4fc3f7;--green:#81c784;--amber:#ffb74d;--red:#ef9a9a;--purple:#ce93d8;
  --phil:#43a047;--gcs:#42a5f5;--ftfw:#ab47bc;--umb:#ff7043;
  --tap:48px;
}
.light {
  --bg0:#f5f0e8;--bg1:#ffffff;--bg2:#ede8dc;--bg3:#e8e2d4;
  --border:#ccc6b8;--border2:#b8b0a0;
  --txt0:#141008;--txt1:#1e1a10;--txt2:#4a4438;--txt3:#6a6058;--txt4:#8a8070;
  --accent:#0066aa;--green:#1a6b1e;--amber:#8a4a00;--red:#b02020;--purple:#5a1880;
  --phil:#2e7d32;--gcs:#0d6eaf;--ftfw:#7b1fa2;--umb:#d84315;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg0);color:var(--txt1);-webkit-font-smoothing:antialiased;}

/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:50;background:var(–bg3);border-bottom:1px solid var(–border);padding:13px 16px 11px;}
.hdr-inner{display:flex;justify-content:space-between;align-items:flex-start;}
.hdr-eyebrow{font-size:10px;letter-spacing:2.5px;color:var(–txt4);text-transform:uppercase;margin-bottom:3px;font-weight:600;}
.hdr-date{font-size:22px;font-weight:700;color:var(–txt0);line-height:1.1;letter-spacing:-0.3px;}
.hdr-month{font-size:12px;color:var(–txt3);margin-top:4px;}
.hdr-right{display:flex;align-items:flex-start;gap:8px;}
.hdr-weather{text-align:right;margin-right:4px;}
.hdr-temp{font-size:17px;font-weight:600;color:var(–txt2);}
.hdr-rain{font-size:10px;color:var(–accent);margin-top:1px;}
.icon-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(–border2);background:var(–bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}

/* ── NAV ── */
.nav{position:sticky;top:70px;z-index:40;background:var(–bg3);border-bottom:1px solid var(–border);display:flex;}
.nav-btn{flex:1;height:50px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(–txt4);font-size:9px;font-weight:700;letter-spacing:.6px;border-bottom:2px solid transparent;transition:all .15s;font-family:‘DM Sans’,sans-serif;}
.nav-btn.on{color:var(–txt0);border-bottom-color:var(–accent);}
.nav-icon{font-size:15px;}

.content{padding:14px 14px 100px;}

/* ── LABELS ── */
.slabel{font-size:10px;color:var(–txt4);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin:4px 0 8px;}
.slabel.mt{margin-top:20px;}

/* ── MISSION CARDS ── */
.mcard{background:var(–bg1);border-radius:12px;padding:13px 14px;margin-bottom:8px;border-left:3px solid;cursor:pointer;transition:transform .1s;user-select:none;}
.mcard:active{transform:scale(0.985);}
.mcard.dim{opacity:.42;}
.mc-top{display:flex;justify-content:space-between;align-items:flex-start;}
.mc-left{flex:1;}
.mc-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:3px;}
.mc-tag{font-size:13px;font-weight:700;}
.mc-time{font-size:13px;color:var(–txt3);}
.mc-date-s{font-size:11px;color:var(–txt4);}
.mc-type{font-size:13px;color:var(–txt2);}
.mc-pills{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
.mpill{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;}
.mp-pax{background:rgba(79,195,247,.1);color:var(–accent);}
.mp-loc{background:rgba(129,199,132,.1);color:var(–green);}
.mp-ops{background:rgba(206,147,216,.1);color:var(–purple);}
.mp-ok{background:rgba(129,199,132,.12);color:var(–green);}
.mc-right{text-align:right;flex-shrink:0;margin-left:8px;}
.mc-ref{font-family:‘DM Mono’,monospace;font-size:10px;color:var(–txt4);margin-bottom:2px;}

/* ── BADGE ── */
.bdg{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600;}
.bdg-plan{background:rgba(79,195,247,.1);color:var(–accent);}
.bdg-done{background:rgba(129,199,132,.1);color:var(–green);}
.bdg-cancel{background:rgba(239,154,154,.1);color:var(–red);}

/* ── UPCOMING BOX ── */
.ubox{background:var(–bg2);border-radius:10px;padding:12px 14px;margin-top:8px;border:1px solid var(–border);}
.ulbl{font-size:10px;color:var(–green);font-weight:700;letter-spacing:1px;margin-bottom:7px;text-transform:uppercase;}
.uitem{display:flex;gap:8px;align-items:baseline;margin-bottom:3px;font-size:12px;}

/* ── EMPTY ── */
.empty{text-align:center;padding:44px 0 20px;}
.empty-icon{font-size:42px;margin-bottom:8px;}
.empty-title{font-size:16px;color:var(–txt2);}
.empty-sub{font-size:13px;color:var(–txt4);margin-top:3px;}

/* ── DETAIL ── */
.back-btn{background:none;border:none;color:var(–accent);font-size:13px;cursor:pointer;padding:0 0 10px;display:flex;align-items:center;gap:4px;min-height:var(–tap);}
.dcard{background:var(–bg1);border-radius:14px;overflow:hidden;border-top:3px solid;}
.dhdr{padding:16px 16px 12px;}
.d-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.d-client{font-size:10px;font-weight:700;letter-spacing:1.5px;margin-bottom:3px;}
.d-title{font-size:17px;font-weight:700;color:var(–txt0);line-height:1.2;}
.shift-box{padding:10px 13px;border-radius:10px;background:rgba(79,195,247,.06);border:1px solid rgba(79,195,247,.16);margin:10px 0 14px;}
.shift-time{font-size:20px;font-weight:700;color:var(–accent);}
.shift-sub{font-size:12px;color:rgba(79,195,247,.55);margin-top:2px;}
.key-pills{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px;}
.kpill{font-size:12px;padding:5px 11px;border-radius:7px;font-weight:500;background:var(–bg2);color:var(–txt2);border:1px solid var(–border);}
.kpill.hi{color:var(–accent);border-color:rgba(79,195,247,.2);background:rgba(79,195,247,.06);}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.ifield label{font-size:10px;color:var(–txt4);display:block;margin-bottom:2px;}
.ifield span{font-size:13px;color:var(–txt2);font-weight:600;}
.ifield span.mono{font-family:‘DM Mono’,monospace;font-size:11px;}
.sdiv{border-top:1px solid var(–border);}
.sin{padding:12px 16px;}
.stitle{font-size:10px;font-weight:700;letter-spacing:1.5px;margin-bottom:9px;}
.blue{color:var(–accent);}
.green{color:var(–green);}
.amber{color:var(–amber);}
.purple{color:var(–purple);}
.muted{color:var(–txt4);}

/* ── OPS ── */
.orow{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;}
.o-icon{font-size:14px;flex-shrink:0;line-height:1.35;}
.o-lbl{font-size:10px;color:var(–txt4);min-width:56px;padding-top:1px;}
.o-val{font-size:12px;color:var(–txt2);flex:1;line-height:1.5;}
.o-ph{color:var(–accent);text-decoration:none;}
.o-urg{color:var(–red)!important;}
.o-sub{font-size:10px;color:var(–txt4);font-weight:600;margin:8px 0 4px;text-transform:uppercase;letter-spacing:.8px;}
.o-contact{font-size:12px;color:var(–txt2);margin-bottom:3px;}

/* ── EMAIL ── */
.etoggle{cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.ebody{padding:9px 11px;background:var(–bg2);border-radius:8px;font-size:12px;color:var(–txt3);line-height:1.6;margin:7px 0 6px;white-space:pre-wrap;}
.att{font-size:12px;color:var(–accent);padding:6px 10px;background:var(–bg2);border-radius:7px;margin-bottom:4px;display:flex;align-items:center;gap:6px;min-height:var(–tap);cursor:pointer;}

/* ── FINANCES in detail ── */
.frow{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;}
.flbl{color:var(–txt3);}
.fval{color:var(–txt2);}
.fnet{font-size:17px;font-weight:700;color:var(–amber);margin-top:4px;}

/* ── LOG ── */
.log-entries{margin-bottom:12px;}
.lentry{display:flex;gap:9px;margin-bottom:8px;}
.lts{font-size:10px;color:var(–txt4);font-family:‘DM Mono’,monospace;min-width:36px;padding-top:3px;}
.lbubble{flex:1;background:var(–bg2);border-radius:8px;padding:7px 10px;}
.ltag{font-size:9px;color:var(–txt4);margin-bottom:3px;}
.ltext{font-size:12px;color:var(–txt2);line-height:1.5;}
.log-empty{font-size:12px;color:var(–txt4);font-style:italic;margin-bottom:12px;}
.log-types{display:flex;gap:6px;margin-bottom:8px;}
.ltbtn{flex:1;padding:8px 4px;font-size:11px;border-radius:8px;border:1px solid var(–border);background:var(–bg2);color:var(–txt3);cursor:pointer;text-align:center;min-height:var(–tap);font-family:‘DM Sans’,sans-serif;}
.ltbtn.on{border-color:rgba(79,195,247,.35);background:rgba(79,195,247,.07);color:var(–accent);}
.ta{width:100%;padding:10px 12px;background:var(–bg2);border:1px solid var(–border);border-radius:10px;color:var(–txt1);font-size:13px;font-family:‘DM Sans’,inherit;resize:none;line-height:1.5;}
.ta:focus{outline:none;border-color:rgba(79,195,247,.35);}
.submit-btn{width:100%;margin-top:7px;padding:12px;background:rgba(79,195,247,.07);border:1px solid rgba(79,195,247,.22);border-radius:10px;color:var(–accent);font-size:13px;font-weight:600;cursor:pointer;min-height:var(–tap);font-family:‘DM Sans’,sans-serif;}

/* ── EDIT ── */
.editrow{display:flex;gap:8px;align-items:center;margin-bottom:7px;}
.einput{flex:1;padding:10px 12px;background:var(–bg2);border:1px solid var(–border2);border-radius:9px;color:var(–txt1);font-size:13px;font-family:‘DM Sans’,inherit;min-height:var(–tap);}
.einput:focus{outline:none;border-color:rgba(79,195,247,.35);}
.esave{padding:10px 12px;background:rgba(79,195,247,.07);border:1px solid rgba(79,195,247,.22);border-radius:9px;color:var(–accent);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;min-height:var(–tap);font-family:‘DM Sans’,sans-serif;}

/* ── PMF ── */
.pmf-trigger{width:100%;padding:15px;background:rgba(129,199,132,.07);border:1px solid rgba(129,199,132,.22);border-radius:12px;color:var(–green);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;min-height:var(–tap);font-family:‘DM Sans’,sans-serif;}
.pmf-trigger:active{transform:scale(.98);}
.pmf-step-hdr{display:flex;align-items:center;gap:9px;margin-bottom:14px;}
.pmf-num{width:27px;height:27px;border-radius:50%;background:var(–green);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.pmf-step-title{font-size:15px;font-weight:700;color:var(–txt0);}
.pmf-time-row{display:flex;gap:12px;align-items:center;margin-bottom:10px;}
.pmf-time-block{flex:1;text-align:center;}
.pmf-time-lbl{font-size:10px;color:var(–txt4);margin-bottom:5px;}
.pmf-tinput{width:100%;padding:12px;background:var(–bg2);border:1px solid var(–border);border-radius:10px;color:var(–txt1);font-size:16px;text-align:center;font-family:‘DM Mono’,monospace;min-height:var(–tap);}
.pmf-tinput:focus{outline:none;border-color:rgba(129,199,132,.45);}
.pmf-arrow{font-size:22px;color:var(–txt4);flex-shrink:0;}
.pmf-dur{font-size:14px;color:var(–green);text-align:center;margin-bottom:14px;font-weight:600;min-height:20px;}
.pbtn{width:100%;padding:13px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;min-height:var(–tap);transition:all .15s;font-family:‘DM Sans’,sans-serif;}
.pbtn-next{background:rgba(79,195,247,.07);border:1px solid rgba(79,195,247,.22);color:var(–accent);}
.pbtn-confirm{background:rgba(129,199,132,.08);border:1px solid rgba(129,199,132,.28);color:var(–green);}
.pback{font-size:12px;color:var(–txt4);cursor:pointer;text-align:center;margin-top:12px;display:flex;align-items:center;justify-content:center;min-height:var(–tap);}
.rpt-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px;}
.rtbtn{padding:11px;background:var(–bg2);border:1px solid var(–border);border-radius:10px;color:var(–txt2);font-size:12px;font-weight:600;cursor:pointer;text-align:center;min-height:var(–tap);font-family:‘DM Sans’,sans-serif;}
.rtbtn.on{border-color:rgba(206,147,216,.4);background:rgba(206,147,216,.07);color:var(–purple);}
.rpt-output{background:var(–bg2);border-radius:10px;padding:13px;font-size:12px;color:var(–txt2);line-height:1.8;margin-bottom:12px;white-space:pre-wrap;max-height:280px;overflow-y:auto;}
.rpt-loading{text-align:center;padding:24px;color:var(–txt4);font-size:13px;}
.rpt-actions{display:flex;gap:8px;}
.rabtn{flex:1;padding:12px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;min-height:var(–tap);font-family:‘DM Sans’,sans-serif;}
.debrief-list{display:flex;flex-direction:column;gap:7px;margin-bottom:12px;}
.dbtn{padding:13px 12px;background:var(–bg2);border:1px solid var(–border);border-radius:10px;color:var(–txt2);font-size:13px;cursor:pointer;text-align:left;min-height:var(–tap);font-family:‘DM Sans’,sans-serif;}
.dbtn.on{border-color:rgba(206,147,216,.4);background:rgba(206,147,216,.07);color:var(–purple);}
.decomp-a{display:flex;align-items:center;justify-content:center;gap:7px;padding:13px;background:rgba(129,199,132,.06);border:1px solid rgba(129,199,132,.2);border-radius:11px;color:var(–green);font-size:13px;text-decoration:none;min-height:var(–tap);}

/* ── MONTH ── */
.m-date-hdr{font-size:12px;font-weight:700;letter-spacing:.8px;margin-bottom:5px;margin-top:16px;}

/* ── FINANCE ── */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.scard{background:var(–bg1);border-radius:10px;padding:11px 13px;text-align:center;}
.scard-lbl{font-size:10px;color:var(–txt4);margin-bottom:3px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;}
.scard-val{font-size:18px;font-weight:700;}

.month-section{background:var(–bg1);border-radius:12px;margin-bottom:8px;overflow:hidden;border:1px solid var(–border);}
.month-hdr{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;}
.month-hdr-left{display:flex;flex-direction:column;gap:2px;}
.month-hdr-name{font-size:13px;font-weight:700;color:var(–txt1);}
.month-hdr-summary{font-size:11px;color:var(–txt3);}
.month-hdr-right{display:flex;align-items:center;gap:10px;}
.month-hdr-net{font-size:15px;font-weight:700;color:var(–amber);}
.month-chevron{font-size:11px;color:var(–txt4);transition:transform .2s;}
.month-chevron.open{transform:rotate(180deg);}
.month-body{padding:0 14px 12px;display:none;}
.month-body.open{display:block;}
.mf-mission{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-top:1px solid var(–border);font-size:12px;}
.mf-mission:first-child{border-top:none;}
.mf-left{display:flex;flex-direction:column;gap:2px;}
.mf-ref{font-family:‘DM Mono’,monospace;font-size:10px;color:var(–txt4);}
.mf-type{font-size:12px;color:var(–txt2);}
.mf-date{font-size:10px;color:var(–txt4);}
.mf-right{text-align:right;flex-shrink:0;}
.mf-base{font-size:13px;font-weight:600;color:var(–txt2);}
.mf-deb{font-size:10px;color:var(–txt4);}
.mf-status{font-size:10px;padding:2px 6px;border-radius:3px;margin-top:2px;}

.client-section{background:var(–bg1);border-radius:12px;margin-bottom:8px;overflow:hidden;border:1px solid var(–border);}
.client-hdr{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;border-left:3px solid;}
.client-hdr-left{display:flex;flex-direction:column;gap:2px;}
.client-tag{font-size:11px;font-weight:700;letter-spacing:.8px;}
.client-count{font-size:11px;color:var(–txt4);}
.client-hdr-right{display:flex;align-items:center;gap:10px;}
.client-total{font-size:15px;font-weight:700;}
.client-chevron{font-size:11px;color:var(–txt4);transition:transform .2s;}
.client-chevron.open{transform:rotate(180deg);}
.client-missions{padding:0 14px 12px;display:none;}
.client-missions.open{display:block;}

.ref-box{background:var(–bg1);border-radius:10px;padding:13px 14px;font-size:12px;color:var(–txt3);line-height:2;border:1px solid var(–border);}

/* ── PAUSE / DECOMPRESSION ── */
#decomp-wrap{width:100%;min-height:calc(100vh - 160px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 16px 80px;position:relative;}
.dc-screen{display:none;flex-direction:column;align-items:center;justify-content:center;width:100%;max-width:420px;text-align:center;}
.dc-screen.active{display:flex;}
.dc-lbl{font-family:‘DM Mono’,monospace;font-size:11px;letter-spacing:.2em;color:var(–txt4);margin-bottom:12px;text-transform:uppercase;}
.dc-h1{font-family:‘Cormorant Garamond’,serif;font-size:clamp(30px,8vw,46px);font-weight:300;font-style:italic;color:var(–txt0);line-height:1.2;margin-bottom:14px;}
.dc-h2{font-family:‘Cormorant Garamond’,serif;font-size:clamp(20px,5vw,28px);font-weight:300;font-style:italic;color:var(–txt0);line-height:1.25;margin-bottom:8px;}
.dc-sub{font-size:13px;color:var(–txt3);font-style:italic;margin-bottom:32px;line-height:1.6;}
.dc-time{font-family:‘DM Mono’,monospace;font-size:11px;letter-spacing:.2em;color:var(–txt4);margin-bottom:40px;}
.dc-btn-g{font-family:‘DM Mono’,monospace;font-size:11px;letter-spacing:.15em;color:var(–green);background:none;border:1px solid rgba(129,199,132,.3);padding:13px 32px;cursor:pointer;text-transform:uppercase;border-radius:6px;}
.dc-btn-m{font-family:‘DM Mono’,monospace;font-size:11px;letter-spacing:.15em;color:var(–bg0);background:var(–green);border:none;padding:13px 32px;cursor:pointer;text-transform:uppercase;border-radius:6px;}
.dc-btn-s{font-family:‘DM Mono’,monospace;font-size:11px;letter-spacing:.15em;color:var(–txt4);background:none;border:1px solid var(–border);padding:13px 24px;cursor:pointer;text-transform:uppercase;border-radius:6px;}
.dc-lnk{font-family:‘DM Mono’,monospace;font-size:10px;letter-spacing:.15em;color:var(–txt4);background:none;border:none;cursor:pointer;text-transform:uppercase;}
.dc-row{display:flex;gap:14px;margin-top:22px;flex-wrap:wrap;justify-content:center;}
.bwrap{position:relative;width:180px;height:180px;margin-bottom:40px;}
.br{position:absolute;inset:0;border-radius:50%;border:1px solid rgba(79,195,247,.15);}
.br.inner{inset:26px;border-color:rgba(79,195,247,.35);background:radial-gradient(circle,rgba(79,195,247,.04) 0%,transparent 70%);}
.br.pulse{inset:0;border:none;background:radial-gradient(circle,rgba(79,195,247,.03) 0%,transparent 60%);}
.btxt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-style:italic;color:var(–accent);letter-spacing:.05em;font-family:‘Cormorant Garamond’,serif;}
@keyframes bi{0%{transform:scale(1);opacity:.3}100%{transform:scale(1.35);opacity:.9}}
@keyframes bh{0%,100%{transform:scale(1.35);opacity:.9}}
@keyframes bo{0%{transform:scale(1.35);opacity:.9}100%{transform:scale(1);opacity:.3}}
.dc-bin .br.inner,.dc-bin .br.pulse{animation:bi 4s ease-in-out forwards;}
.dc-bhold .br.inner,.dc-bhold .br.pulse{animation:bh 4s ease-in-out forwards;}
.dc-bout .br.inner,.dc-bout .br.pulse{animation:bo 4s ease-in-out forwards;}
.bctr{font-family:‘DM Mono’,monospace;font-size:11px;color:var(–txt4);letter-spacing:.15em;margin-bottom:32px;}
#dc-dump{width:100%;max-width:440px;min-height:120px;background:var(–bg1);border:1px solid var(–border);color:var(–txt1);font-family:‘Cormorant Garamond’,serif;font-size:17px;line-height:1.7;font-style:italic;padding:16px;resize:none;outline:none;border-radius:8px;caret-color:var(–accent);}
#dc-dump:focus{border-color:rgba(129,199,132,.4);}
#dc-dump::placeholder{color:var(–txt4);}
.dc-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;justify-content:center;}
.dc-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .2s,border-color .2s;flex-shrink:0;}
.dc-swatch:hover{transform:scale(1.15);}
.dc-swatch.on{border-color:var(–txt0);transform:scale(1.1);}
.bsize{display:flex;align-items:center;gap:6px;font-family:‘DM Mono’,monospace;font-size:10px;color:var(–txt4);letter-spacing:.1em;}
#bslider{-webkit-appearance:none;width:70px;height:2px;background:var(–border);outline:none;border-radius:2px;cursor:pointer;}
#bslider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(–green);cursor:pointer;}
#dc-canvas{border-radius:4px;cursor:crosshair;touch-action:none;display:block;}
.dact{display:flex;gap:10px;margin-top:12px;align-items:center;}
.dc-btn-cl{font-family:‘DM Mono’,monospace;font-size:10px;letter-spacing:.15em;color:var(–txt4);background:none;border:1px solid var(–border);padding:8px 16px;cursor:pointer;text-transform:uppercase;border-radius:4px;}
#rzone{width:min(280px,80vw);height:min(280px,80vw);border-radius:50%;background:radial-gradient(circle,rgba(129,199,132,.04) 0%,transparent 70%);border:1px solid rgba(129,199,132,.12);position:relative;cursor:pointer;overflow:hidden;flex-shrink:0;}
.rel{position:absolute;border-radius:50%;border:1px solid rgba(129,199,132,.5);transform:translate(-50%,-50%) scale(0);animation:ro 2.5s ease-out forwards;pointer-events:none;}
@keyframes ro{0%{transform:translate(-50%,-50%) scale(0);opacity:.8}100%{transform:translate(-50%,-50%) scale(4);opacity:0}}
.rdot{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;border-radius:50%;background:var(–green);opacity:.3;}
#dc-tctr{font-family:‘DM Mono’,monospace;font-size:11px;letter-spacing:.15em;color:var(–txt4);margin-top:18px;}
#dc-dbtn{margin-top:16px;opacity:0;transition:opacity .5s;}
.dc-ibox{font-family:‘DM Mono’,monospace;font-size:12px;letter-spacing:.08em;color:var(–amber);text-align:center;margin-bottom:36px;max-width:280px;line-height:1.9;padding:16px 22px;border:1px solid rgba(255,183,77,.2);border-radius:6px;}

.spin{display:inline-block;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
a{color:var(–accent);text-decoration:none;}
</style>

</head>
<body>

<div class="hdr">
  <div class="hdr-inner">
    <div>
      <div class="hdr-eyebrow">Mission Control</div>
      <div class="hdr-date" id="hdr-date">—</div>
      <div class="hdr-month" id="hdr-month">—</div>
    </div>
    <div class="hdr-right">
      <div class="hdr-weather">
        <div class="hdr-temp" id="wx-temp">—</div>
        <div class="hdr-rain" id="wx-rain"></div>
      </div>
      <button class="icon-btn" onclick="toggleMode()" id="mode-btn" title="Mode">☀️</button>
      <button class="icon-btn" onclick="refreshData()" id="refresh-btn" title="Actualiser" style="color:var(--accent)">↻</button>
    </div>
  </div>
</div>

<nav class="nav">
  <button class="nav-btn on" onclick="go('today')" id="nb-today"><span class="nav-icon">☀️</span>AUJOURD'HUI</button>
  <button class="nav-btn" onclick="go('month')" id="nb-month"><span class="nav-icon">📅</span><span id="month-lbl">MOIS</span></button>
  <button class="nav-btn" onclick="go('finance')" id="nb-finance"><span class="nav-icon">💶</span>FINANCES</button>
  <button class="nav-btn" onclick="go('pause')" id="nb-pause"><span class="nav-icon">🌿</span>PAUSE</button>
</nav>

<div class="content" id="content"></div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────
const GAS_URL = "https://script.google.com/macros/s/AKfycbwACs6qIEu24xMe3KtSjLMbcs3A6iXqCaZEodXBuTx2au1ol5UXeUqZKM6W_NJO9qSErg/exec";
// ─────────────────────────────────────────────────────────────

const DAYS=["dim","lun","mar","mer","jeu","ven","sam"];
const MO_LONG=["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
const MO_SH=["jan","fév","mar","avr","mai","jun","jul","aoû","sep","oct","nov","déc"];

const META={
  "Philibert Tourisme":{tag:"PHIL",hex:"#43a047",contact:"Mélissa Hassaïm",phone:"+33 4 78 98 56 49",email:"rhone-ops@philibert.fr",cohost:"Véronique Olivier · 06 41 60 42 88",emergency:"+33 4 78 98 56 49"},
  "Go Côte Saône":{tag:"GCS",hex:"#42a5f5",contact:"Marion",phone:"06.20.08.10.92",email:"gcs@gocotesaone.com"},
  "Feel the French Way":{tag:"FTFW",hex:"#ab47bc",contact:"Laura Brionne",email:"contact@feelthefrenchway.fr",cohost:"Caroline · caroline.meet.and.greet@gmail.com"},
  "Un Monde Bleu":{tag:"UMB",hex:"#ff7043",contact:"Audrey Foret",phone:"+33 7 43 36 05 69",email:"OpsRiviera@umb-dmc.fr",notes:"Répondre au thread — autocariste: rhonecroisieres@galeo.mobi"},
};
const TRAVEL={"PERRACHE":45,"PART-DIEU":45,"PART DIEU":45,"LYS":52,"AEROPORT":52,"AIRPORT":52,"INTERCONTINENTAL":40,"HOTEL":40,"QUAI CLAUDE BERNARD":45,"QUAI RAMBAUD":60,"BELLECOUR":45,"VIENNE":105,"STE-COLOMBE":105,"GENEVE":180};
const RPT_LABELS={RAS:"✅ RAS",INCIDENT:"⚠️ Incident",ANNULATION:"❌ Annulation",ANOMALIE:"🔧 Anomalie",OT:"⏱ Heures supp"};
const CLIENT_PRENOM={"Philibert Tourisme":"Mélissa","Go Côte Saône":"Marion","Feel the French Way":"Laura","Un Monde Bleu":"Audrey"};

// ─── STATE ────────────────────────────────────────────────────
let missions=[], fieldLogs={}, tab="today", detail=null;
let pmf=null, pmfStep=0;
let emailOpen={};
let light=localStorage.getItem("mc_light")==="1";

// ─── BOOT ─────────────────────────────────────────────────────
window.addEventListener("load",()=>{
  if(light)document.body.classList.add("light");
  updateModeBtn();
  renderHeader();
  loadWeather();
  loadMissions();
  initDecomp();
});

function toggleMode(){light=!light;document.body.classList.toggle("light",light);localStorage.setItem("mc_light",light?"1":"0");updateModeBtn();}
function updateModeBtn(){document.getElementById("mode-btn").textContent=light?"🌙":"☀️";}

function renderHeader(){
  const n=new Date();
  document.getElementById("hdr-date").textContent=`${DAYS[n.getDay()]} ${n.getDate()} ${MO_LONG[n.getMonth()]}`;
  const cm=String(n.getMonth()+1).padStart(2,"0");
  const mms=missions.filter(m=>m.date&&m.date.slice(5,7)===cm);
  const done=mms.filter(isDone).length;
  document.getElementById("hdr-month").textContent=`${MO_LONG[n.getMonth()]} · ${mms.length} missions · ${done} terminées`;
  document.getElementById("month-lbl").textContent=MO_SH[n.getMonth()].toUpperCase();
}

async function loadWeather(){
  try{
    const r=await fetch("https://api.open-meteo.com/v1/forecast?latitude=45.75&longitude=4.85&current=temperature_2m,weathercode,precipitation_probability&timezone=Europe/Paris");
    const d=await r.json();const c=d.current;
    const codes=[0,1,2,3,45,48,51,53,55,61,63,65,71,73,75,77,80,81,82,85,86,95,96,99];
    const icons=["☀️","🌤","⛅","🌥","🌫","🌫","🌦","🌦","🌧","🌧","🌧","🌧","❄️","❄️","❄️","🌨","🌦","🌦","⛈","❄️","❄️","⛈","⛈","⛈"];
    const idx=codes.indexOf(c.weathercode);
    const icon=idx>=0?icons[idx]:"⛅";
    document.getElementById("wx-temp").textContent=`${icon} ${Math.round(c.temperature_2m)}°C`;
    if(c.precipitation_probability>15)document.getElementById("wx-rain").textContent=`🌧 ${c.precipitation_probability}%`;
  }catch(e){document.getElementById("wx-temp").textContent="";}
}

async function loadMissions(){
  const stored=localStorage.getItem("mc_missions");
  if(stored){try{missions=JSON.parse(stored).map(norm);}catch(e){}}
  try{
    const r=await fetch(GAS_URL+"?action=all");
    const d=await r.json();
    if(d.missions&&d.missions.length){missions=d.missions.map(norm);localStorage.setItem("mc_missions",JSON.stringify(d.missions));}
  }catch(e){}
  if(!missions.length)missions=DEMO.map(norm);
  renderHeader();render();
}

async function refreshData(){
  const b=document.getElementById("refresh-btn");
  b.style.opacity=".4";b.textContent="⟳";
  missions=[];localStorage.removeItem("mc_missions");
  await loadMissions();
  b.style.opacity="1";b.textContent="↻";
}

async function saveField(mid,field,val){
  try{await fetch(`${GAS_URL}?action=update&id=${encodeURIComponent(mid)}&field=${field}&value=${encodeURIComponent(val)}`);return true;}catch(e){return false;}
}

function norm(m){
  const o={};
  for(const[k,v]of Object.entries(m))o[k]=v;
  o.mid=m["Mission ID"]||m.mid||"";
  o.date=m["Date mission"]||m.date||"";
  o.client=m["Client"]||m.client||"";
  o.type=m["Type"]||m.type||"";
  o.desc=m["Description"]||m.desc||"";
  o.heures=m["Heures"]||m.heures||"";
  o.base=m["Base (HT)"]||m["Base"]||m.base||"";
  o.debours=m["Débours"]||m["Debours"]||m.debours||"";
  // Time fields: handle both "HH:MM:SS" and "HH:MM" formats from sheet
  let rawDebut=m["Début"]||m["Debut"]||m.debut||"";
  if(rawDebut&&rawDebut.length>5)rawDebut=rawDebut.slice(0,5);
  o.debut=rawDebut;
  o.endroit=m["Endroit"]||m.endroit||"";
  o.statut=m["Statut"]||m.statut||"";
  o.notes=m["Notes"]||m.notes||"";
  o.voyage=m["Voyage (min)"]||m["Voyage"]||m.voyage||"";
  o.facture=m["Facture#"]||m.facture||"";
  o.ndb=m["NDB#"]||m.ndb||"";
  o.dateEnvoi=m["Date envoi"]||m.dateEnvoi||"";
  return o;
}

// ─── UTILS ────────────────────────────────────────────────────
const todayISO=()=>new Date().toISOString().slice(0,10);
const tomorrowISO=()=>{const d=new Date();d.setDate(d.getDate()+1);return d.toISOString().slice(0,10);};
const nowTime=()=>{const n=new Date();return`${pad(n.getHours())}:${pad(n.getMinutes())}`;};
const pad=n=>String(n).padStart(2,"0");
const isDone=m=>{const s=(m.statut||"").toLowerCase();return s.includes("envoyé")||s.includes("terminé")||s.includes("confirmé");};
const isCancelled=m=>(m.statut||"").toLowerCase().includes("annul");
const isInvoiced=m=>!!(m.facture);

function getMeta(client){
  if(!client)return{tag:"?",hex:"#666"};
  for(const[k,v]of Object.entries(META))if(client.toLowerCase().includes(k.split(" ")[0].toLowerCase()))return v;
  return{tag:"?",hex:"#666"};
}
function travelMin(e){
  if(!e)return null;
  const up=e.toUpperCase();
  for(const[k,v]of Object.entries(TRAVEL))if(up.includes(k))return v;
  return 45;
}
function depTime(shift,trvl){
  if(!shift||!trvl)return null;
  const parts=shift.split(":");
  const h=parseInt(parts[0]),m=parseInt(parts[1]);
  if(isNaN(h)||isNaN(m))return null;
  const d=h*60+m-trvl-15;
  if(d<0)return null;
  return`${pad(Math.floor(d/60))}:${pad(d%60)}`;
}
function durStr(s,e){
  if(!s||!e)return"";
  const[sh,sm]=s.split(":").map(Number);
  const[eh,em]=e.split(":").map(Number);
  const diff=(eh*60+em)-(sh*60+sm);
  if(diff<=0)return"";
  const hh=Math.floor(diff/60),mm=diff%60;
  return mm>0?`${hh}h${pad(mm)}`:`${hh}h`;
}
function durToDecimal(s,e){
  if(!s||!e)return"";
  const[sh,sm]=s.split(":").map(Number);
  const[eh,em]=e.split(":").map(Number);
  const diff=(eh*60+em)-(sh*60+sm);
  if(diff<=0)return"";
  return(diff/60).toFixed(1);
}
function fdShort(iso){if(!iso)return"";const d=new Date(iso+"T12:00:00");return`${DAYS[d.getDay()]} ${d.getDate()} ${MO_SH[d.getMonth()]}`;}
function fdLong(iso){if(!iso)return"";const d=new Date(iso+"T12:00:00");return`${DAYS[d.getDay()]} ${d.getDate()} ${MO_LONG[d.getMonth()]}`;}
function badge(m){
  if(isCancelled(m))return`<span class="bdg bdg-cancel">Annulé</span>`;
  if(isDone(m))return`<span class="bdg bdg-done">✓ Terminé</span>`;
  return`<span class="bdg bdg-plan">${m.statut||"Planifié"}</span>`;
}
const net=(b,d)=>Math.round((parseFloat(b)||0)*.74+(parseFloat(d)||0));

// ─── NAV ──────────────────────────────────────────────────────
function go(t){
  if(t!=="today"&&t!=="month")detail=null;
  tab=t;
  ["today","month","finance","pause"].forEach(id=>document.getElementById(`nb-${id}`).classList.toggle("on",id===t));
  render();
  if(t==="pause")renderDecompScreen();
}

function render(){
  const el=document.getElementById("content");
  if(!el)return;
  if(tab==="pause"){el.innerHTML="";renderDecomp();return;}
  if(detail&&(tab==="today"||tab==="month")){el.innerHTML=renderDetail(detail);return;}
  switch(tab){
    case"today":  el.innerHTML=renderToday();break;
    case"month":  el.innerHTML=renderMonth();break;
    case"finance":el.innerHTML=renderFinance();break;
  }
}

// ══════════════════════════════════════════════════════════════
// TODAY
// ══════════════════════════════════════════════════════════════
function renderToday(){
  const t=todayISO(),tm=tomorrowISO();
  const todayMs=missions.filter(m=>m.date===t).sort((a,b)=>(a.debut||"z").localeCompare(b.debut||"z"));
  const tmMs=missions.filter(m=>m.date===tm).sort((a,b)=>(a.debut||"z").localeCompare(b.debut||"z"));
  const upcoming=missions.filter(m=>m.date>tm&&!isCancelled(m)).sort((a,b)=>a.date.localeCompare(b.date));
  let h="";

  if(todayMs.length){
    h+=`<div class="slabel">AUJOURD'HUI</div>`;
    h+=todayMs.map(m=>mcard(m,false)).join("");
  } else {
    h+=`<div class="empty"><div class="empty-icon">☀️</div><div class="empty-title">Pas de mission aujourd'hui</div>${tmMs.length?`<div class="empty-sub">${tmMs.length} mission${tmMs.length>1?"s":""} demain</div>`:""}</div>`;
  }

  if(tmMs.length){
    h+=`<div class="slabel${todayMs.length?" mt":""}">DEMAIN · ${fdShort(tm).toUpperCase()}</div>`;
    h+=tmMs.map(m=>mcard(m,true)).join("");
  }

  if(!todayMs.length&&!tmMs.length&&upcoming.length){
    h+=`<div class="slabel">PROCHAINE MISSION</div>${mcard(upcoming[0],true)}`;
    upcoming.slice(1,4).length&&(h+=aVenir(upcoming.slice(1,4)));
  } else if(upcoming.length){
    h+=aVenir(upcoming.slice(0,4));
  }
  return h;
}

function aVenir(ms){
  return`<div class="ubox"><div class="ulbl">À VENIR</div>${ms.map(m=>{
    const mt=getMeta(m.client);
    const typeS=(m.type||"").replace(/ASSISTANCE /gi,"").split(" - ").pop();
    return`<div class="uitem">
      <span style="color:${mt.hex};font-weight:700;font-size:11px;min-width:38px">${mt.tag}</span>
      <span style="color:var(--txt3);min-width:80px">${fdShort(m.date)}</span>
      <span style="color:var(--txt4)">${typeS}${m.debut?` · ${m.debut}`:""}</span>
    </div>`;
  }).join("")}</div>`;
}

function mcard(m,compact){
  const mt=getMeta(m.client);
  const done=isDone(m);
  const typeS=(m.type||"").replace(/ASSISTANCE /gi,"").split(" - ").pop();
  const hasOps=!!(m.ops);
  const hasEmail=!!(m.email);

  // Key pills for top
  const pills=[];
  const pax=m.ops?.pax||m.pax;
  if(pax)pills.push(`<span class="mpill mp-pax">👥 ${pax} pax</span>`);
  if(m.endroit&&!compact)pills.push(`<span class="mpill mp-loc">📍 ${m.endroit.split(",")[0]}</span>`);
  if(hasOps&&!compact)pills.push(`<span class="mpill mp-ops">📋 ops</span>`);
  if(done&&!compact)pills.push(`<span class="mpill mp-ok">✓ clôturé</span>`);

  return`<div class="mcard${done||isCancelled(m)?" dim":""}" style="border-left-color:${mt.hex}" onclick="openD('${m.mid}')">
    <div class="mc-top">
      <div class="mc-left">
        <div class="mc-meta">
          <span class="mc-tag" style="color:${mt.hex}">${mt.tag}</span>
          ${m.debut?`<span class="mc-time">${m.debut}</span>`:""}
          ${!compact?`<span class="mc-date-s">${fdShort(m.date)}</span>`:""}
        </div>
        <div class="mc-type">${typeS}</div>
        ${pills.length?`<div class="mc-pills">${pills.join("")}</div>`:""}
      </div>
      <div class="mc-right">
        ${m.desc?`<div class="mc-ref">${m.desc}</div>`:""}
        ${badge(m)}
      </div>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════════════════════
// DETAIL
// ══════════════════════════════════════════════════════════════
function openD(mid){
  detail=missions.find(m=>m.mid===mid)||null;
  pmf=null;pmfStep=0;
  render();
  window.scrollTo(0,0);
}
function closeD(){detail=null;render();}

function renderDetail(m){
  const mt=getMeta(m.client);
  const base=parseFloat(m.base)||0,deb=parseFloat(m.debours)||0;
  const trvl=m.voyage?parseInt(m.voyage):travelMin(m.endroit);
  const dep=m.debut&&trvl?depTime(m.debut,trvl):null;
  const eOpen=emailOpen[m.mid];
  const mLogs=fieldLogs[m.mid]||[];

  let h=`<button class="back-btn" onclick="closeD()">← Retour</button>
  <div class="dcard" style="border-top-color:${mt.hex}">

  <div class="dhdr">
    <div class="d-top">
      <div>
        <div class="d-client" style="color:${mt.hex}">${mt.tag} · ${m.client}</div>
        <div class="d-title">${(m.type||"").replace("ASSISTANCE ","")}</div>
      </div>
      ${badge(m)}
    </div>`;

  // Shift box + departure calc
  if(m.debut){
    h+=`<div class="shift-box">
      <div class="shift-time">⏰ ${m.debut}</div>
      ${dep?`<div class="shift-sub">Départ maison ~ ${dep} · trajet ~${trvl} min depuis Saint-Priest</div>`:""}
    </div>`;
  }

  // Key info pills (pax, coaches, location)
  const keyPills=[];
  const pax=m.ops?.pax||m.pax;
  const coaches=m.ops?.coaches;
  if(pax)keyPills.push(`<span class="kpill hi">👥 ${pax} pax</span>`);
  if(coaches)keyPills.push(`<span class="kpill hi">🚌 ${coaches} car${coaches>1?"s":""}</span>`);
  if(m.endroit)keyPills.push(`<span class="kpill">📍 ${m.endroit}</span>`);
  if(m.heures)keyPills.push(`<span class="kpill">⏱ ${m.heures}h prévues</span>`);
  if(keyPills.length)h+=`<div class="key-pills">${keyPills.join("")}</div>`;

  h+=`<div class="igrid" style="margin-top:12px">
      <div class="ifield"><label>Date</label><span>${fdLong(m.date)}</span></div>
      <div class="ifield"><label>Réf</label><span class="mono">${m.desc||"—"}</span></div>
      <div class="ifield"><label>Statut</label><span>${m.statut||"Planifié"}</span></div>
      <div class="ifield"><label>Trajet</label><span>${trvl?"~"+trvl+" min":"—"}</span></div>
    </div>
    ${m.notes?`<div style="margin-top:10px;font-size:12px;color:var(--txt3);line-height:1.5;background:var(--bg2);padding:8px 10px;border-radius:8px">📝 ${m.notes}</div>`:""}
  </div>`;

  // OPS
  if(m.ops){
    const o=m.ops;
    h+=`<div class="sdiv"><div class="sin"><div class="stitle blue">OPÉRATIONS</div>
      ${o.trainInfo?`<div class="orow"><span class="o-icon">🚄</span><span class="o-lbl">Train</span><span class="o-val">TGV ${o.trainInfo.tgv} · Arr. ${o.trainInfo.arrivalTime}${o.trainInfo.etaShip?` → Bateau ${o.trainInfo.etaShip}`:""}</span></div>`:""}
      ${o.shipContact?`<div class="orow"><span class="o-icon">⚓</span><span class="o-lbl">${o.shipContact.role||"PD Ship"}</span><span class="o-val">${o.shipContact.name} · <a class="o-ph" href="tel:${o.shipContact.phone}">${o.shipContact.phone}</a></span></div>`:""}
      ${o.cohost?`<div class="orow"><span class="o-icon">🤝</span><span class="o-lbl">Co-host</span><span class="o-val">${o.cohost.name} · <a class="o-ph" href="tel:${o.cohost.phone}">${o.cohost.phone}</a></span></div>`:""}

function toggleEmail(mid){emailOpen[mid]=!emailOpen[mid];render();}

async function doEdit(mid,field,pfx){
const el=document.getElementById(`${pfx}-${mid}`);
if(!el)return;
const val=el.value.trim();
await saveField(mid,field,val);
const idx=missions.findIndex(m=>m.mid===mid);
if(idx>-1)missions[idx][field]=val;
el.style.borderColor=“rgba(129,199,132,.5)”;
setTimeout(()=>{if(el)el.style.borderColor=””;},1400);

}

function addLog(mid){
const ta=document.getElementById(`lta-${mid}`);
const sel=document.querySelector(`#lt-${mid} .on`);
if(!ta||!ta.value.trim())return;
if(!fieldLogs[mid])fieldLogs[mid]=[];
fieldLogs[mid].push({time:nowTime(),type:sel?.dataset?.t||“note”,text:ta.value.trim()});
ta.value=””;render();
}
function selLT(mid,btn){
document.querySelectorAll(`#lt-${mid} .ltbtn`).forEach(b=>b.classList.remove(“on”));
btn.classList.add(“on”);
}

function renderPMF(m){
if(isDone(m))return`<div class="sdiv"><div class="sin" style="text-align:center">
<div style="font-size:14px;color:var(--green);font-weight:600;margin-bottom:12px">✓ Mission clôturée</div>
<button class="decomp-a" onclick="go('pause')">🌿 Décompresser</button>

  </div></div>`;

if(!pmf||pmf.mid!==m.mid)return`<div class="sdiv"><div class="sin">
<div class="stitle green">FIN DE MISSION</div>
<button class="pmf-trigger" onclick="startPMF('${m.mid}')">✅ Logger les heures & clôturer</button>

  </div></div>`;

return`<div class="sdiv"><div class="sin"><div class="stitle green">FIN DE MISSION</div>${pmfStepHTML(m)}</div></div>`;
}

function startPMF(mid){pmf={mid,start:””,end:nowTime(),notes:””,tpl:“RAS”,rpt:””,rptLoading:false,debriefState:””,debriefNote:””};pmfStep=1;render();}

function pmfStepHTML(m){
if(pmfStep===1)return pmfHours(m);
if(pmfStep===2)return pmfRapport(m);
if(pmfStep===3)return pmfNotes(m);
if(pmfStep===4)return pmfDebrief(m);
if(pmfStep===5)return pmfDone();
return””;
}

function pmfHours(m){
const dur=pmf.start&&pmf.end?durStr(pmf.start,pmf.end):””;
return`<div class="pmf-step-hdr"><div class="pmf-num">1</div><div class="pmf-step-title">Heures réelles</div></div>

  <div class="pmf-time-row">
    <div class="pmf-time-block"><div class="pmf-time-lbl">DÉBUT</div>
      <input class="pmf-tinput" type="time" id="ps" value="${pmf.start||m.debut||""}" onchange="pmf.start=this.value;updDur()"/></div>
    <div class="pmf-arrow">→</div>
    <div class="pmf-time-block"><div class="pmf-time-lbl">FIN</div>
      <input class="pmf-tinput" type="time" id="pe" value="${pmf.end||""}" onchange="pmf.end=this.value;updDur()"/></div>
  </div>
  <div class="pmf-dur" id="pd">${dur?"⏱ Durée : "+dur:""}</div>
  <button class="pbtn pbtn-next" onclick="pmfGo(2,'${m.mid}')">Suivant → Rapport</button>
  <span class="pback" onclick="pmf=null;pmfStep=0;render()">Annuler</span>`;
}
function updDur(){
  const s=document.getElementById("ps"),e=document.getElementById("pe"),d=document.getElementById("pd");
  if(s&&e&&d){const dur=durStr(s.value,e.value);d.textContent=dur?"⏱ Durée : "+dur:"";}
}

function pmfRapport(m){

  <div class="rpt-grid">${tpls.map(([k,v])=>`<button class="rtbtn${pmf.tpl===k?" on":""}" onclick="selRpt('${k}')">${v}</button>`).join("")}</div>
  ${pmf.rptLoading?`<div class="rpt-loading"><span class="spin">↻</span> Rédaction…</div>`:
    pmf.rpt?`<div class="rpt-output">${pmf.rpt}</div><div class="rpt-actions">

      <button class="rabtn" style="background:rgba(129,199,132,.07);border:1px solid rgba(129,199,132,.22);color:var(--green)" onclick="pmfGo(3,'${m.mid}')">Valider →</button>

  }

function pmfGo(step,mid){

function selRpt(k){pmf.tpl=k;pmf.rpt=””;render();}

async function genRpt(mid){
const m=missions.find(x=>x.mid===mid);
if(!m)return;
pmf.rptLoading=true;render();
const prenom=CLIENT_PRENOM[m.client]||””;
const dur=durStr(pmf.start,pmf.end);
const notes=pmf.notes||“RAS”;
const planned=m.heures?`${m.heures}h`:“TBD”;
const P={
RAS:`Tu es Joseph Markman, accompagnateur touristique freelance à Lyon. Rédige un rapport d'activité professionnel en français. Ton: professionnel, factuel, chaleureux. 4-5 phrases max. Date: ${m.date} | Client: ${m.client} | Type: ${m.type} | Ref: ${m.desc||""} | Début: ${pmf.start||m.debut||""} | Fin: ${pmf.end||""} | Durée: ${dur} | Notes: RAS Format: Bonjour ${prenom},\n\n[2-3 phrases: confirmation prestation, déroulement sans incident, satisfaction]\n\nMerci et bonne journée.\nCordialement,\nJoseph Markman\nAccompagnateur Tourisme — Lyon\nTél : +33 6 51 09 35 57\nRetourne UNIQUEMENT le texte de l'email.`,
INCIDENT:`Tu es Joseph Markman, accompagnateur touristique freelance à Lyon. Rédige un rapport d'incident professionnel en français. Ton: factuel, précis, calme. Date: ${m.date} | Client: ${m.client} | Type: ${m.type} | Début: ${pmf.start||""} | Fin: ${pmf.end||""} | Notes: ${notes} Format: Bonjour ${prenom},\n\nJe vous contacte suite à ma prestation du ${m.date}.\n\n[Description factuelle: qui, quoi, quand, mesures prises]\n\nCordialement,\nJoseph Markman\nTél : +33 6 51 09 35 57\nRetourne UNIQUEMENT le texte de l'email.`,
ANNULATION:`Tu es Joseph Markman. Rédige un constat d'annulation professionnel en français. Date: ${m.date} | Client: ${m.client} | Présence: ${pmf.start||""} | Notes: ${notes} Format: Bonjour ${prenom},\n\n[Constat: heure arrivée, attente, absence pax]\n\nCordialement,\nJoseph Markman\nTél : +33 6 51 09 35 57`,
ANOMALIE:`Tu es Joseph Markman. Rédige un rapport d'anomalie opérationnelle en français. Date: ${m.date} | Client: ${m.client} | Notes: ${notes} Format: Bonjour ${prenom},\n\n[Description, démarches, résolution]\n\nCordialement,\nJoseph Markman\nTél : +33 6 51 09 35 57`,
OT:`Tu es Joseph Markman. Rédige un rapport signalant des heures supplémentaires. Date: ${m.date} | Client: ${m.client} | Prévu: ${planned} | Réel: ${dur} | Début: ${pmf.start||""} | Fin: ${pmf.end||""} | Notes: ${notes} Format: Bonjour ${prenom},\n\n[Heures prévues vs réelles, justification]\n\nCordialement,\nJoseph Markman\nTél : +33 6 51 09 35 57`,
};
try{
const r=await fetch(“https://api.anthropic.com/v1/messages”,{
method:“POST”,headers:{“Content-Type”:“application/json”},
body:JSON.stringify({model:“claude-sonnet-4-20250514”,max_tokens:1000,messages:[{role:“user”,content:P[pmf.tpl]||P.RAS}]})
});
const d=await r.json();
pmf.rpt=d.content?.[0]?.text||“Erreur lors de la génération.”;
}catch(e){pmf.rpt=“Erreur: “+e.message;}
pmf.rptLoading=false;render();
}

async function pmfFinish(mid){
const ta=document.getElementById(“pmf-db”);if(ta)pmf.debriefNote=ta.value;
const m=missions.find(x=>x.mid===mid);
const heures=durToDecimal(pmf.start,pmf.end)||m?.heures||””;
const noteCombined=[pmf.notes,pmf.debriefNote?`[État: ${pmf.debriefState} — ${pmf.debriefNote}]`:pmf.debriefState?`[État: ${pmf.debriefState}]`:””].filter(Boolean).join(” | “);
await saveField(mid,“heures”,heures);
await saveField(mid,“statut”,“Rapport envoyé”);
if(noteCombined)await saveField(mid,“notes”,noteCombined);
if(pmf.notes){if(!fieldLogs[mid])fieldLogs[mid]=[];fieldLogs[mid].push({time:nowTime(),type:“note”,text:pmf.notes});}
const idx=missions.findIndex(m2=>m2.mid===mid);
if(idx>-1){missions[idx].heures=heures;missions[idx].statut=“Rapport envoyé”;if(noteCombined)missions[idx].notes=noteCombined;}
if(detail&&detail.mid===mid){detail.heures=heures;detail.statut=“Rapport envoyé”;if(noteCombined)detail.notes=noteCombined;}
pmfStep=5;render();
}

// MONTH

function renderMonth(){
const cm=String(new Date().getMonth()+1).padStart(2,“0”);
const t=todayISO(),tm=tomorrowISO();
const mms=missions.filter(m=>m.date&&m.date.slice(5,7)===cm).sort((a,b)=>a.date.localeCompare(b.date));
const grouped={};
mms.forEach(m=>{(grouped[m.date]=grouped[m.date]||[]).push(m);});

let h=`<div class="slabel">${MO_LONG[new Date().getMonth()].toUpperCase()} · ${mms.length} MISSIONS</div>`;

Object.entries(grouped).sort(([a],[b])=>a.localeCompare(b)).forEach(([date,ms])=>{
const isT=date===t,isTm=date===tm;
const isPast=date<t;
h+=`<div class="m-date-hdr" style="color:${isT?"var(--accent)":isTm?"var(--green)":isPast?"var(--txt4)":"var(--txt3)"}">${fdLong(date).toUpperCase()}${isT?" · AUJOURD'HUI":""}${isTm?" · DEMAIN":""}</div>`;
ms.forEach(m=>{
const mt=getMeta(m.client);
const typeS=(m.type||””).replace(/ASSISTANCE /gi,””).split(” - “).pop();
const done=isDone(m),cancelled=isCancelled(m);
const base=parseFloat(m.base)||0;
const deb=parseFloat(m.debours)||0;
h+=`<div class="mcard${done||cancelled?" dim":""}" style="border-left-color:${mt.hex};margin-bottom:6px" onclick="openD('${m.mid}')"> <div class="mc-top"> <div class="mc-left"> <div class="mc-meta"> <span class="mc-tag" style="color:${mt.hex}">${mt.tag}</span> ${m.debut?`<span class="mc-time">${m.debut}</span>`:""} </div> <div class="mc-type">${typeS}</div> ${m.desc?`<div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--txt4);margin-top:2px">${m.desc}</div>`:""} ${m.endroit?`<div style="font-size:11px;color:var(--txt4);margin-top:2px">📍 ${m.endroit}</div>`:""} </div> <div class="mc-right"> ${badge(m)} ${base>0?`<div style="font-size:12px;color:var(--txt2);margin-top:4px;font-weight:600">${base}€</div>`:""} ${deb>0?`<div style="font-size:10px;color:var(--txt4)">+${deb}€ déb</div>`:""} </div> </div> </div>`;
});
});

if(!mms.length){
h+=`<div class="empty"><div class="empty-icon">📅</div><div class="empty-title">Pas de mission ce mois</div></div>`;
}
return h;
}

function renderFinance(){
const now=new Date();
const curMonth=now.getMonth();
const curYear=now.getFullYear();

// Year totals
const allYear=missions.filter(m=>m.date&&m.date.startsWith(String(curYear)));
const yB=allYear.reduce((s,m)=>s+(parseFloat(m.base)||0),0);
const yD=allYear.reduce((s,m)=>s+(parseFloat(m.debours)||0),0);
const yDone=allYear.filter(isDone).length;

// Current month
const cm=String(curMonth+1).padStart(2,“0”);
const mms=missions.filter(m=>m.date&&m.date.slice(5,7)===cm);
const mB=mms.reduce((s,m)=>s+(parseFloat(m.base)||0),0);
const mD=mms.reduce((s,m)=>s+(parseFloat(m.debours)||0),0);
const mDone=mms.filter(isDone).length;

let h=`<div class="slabel">${MO_LONG[curMonth].toUpperCase()} · APERÇU</div>

  <div class="sgrid">
    <div class="scard"><div class="scard-lbl">Base HT</div><div class="scard-val" style="color:var(--accent)">${mB?mB.toLocaleString("fr-FR")+"€":"TBD"}</div></div>
    <div class="scard"><div class="scard-lbl">Débours</div><div class="scard-val" style="color:var(--green)">${mD?mD.toLocaleString("fr-FR")+"€":"—"}</div></div>
    <div class="scard"><div class="scard-lbl">Net imposable</div><div class="scard-val" style="color:var(--amber)">${mB||mD?net(mB,mD).toLocaleString("fr-FR")+"€":"TBD"}</div></div>
    <div class="scard"><div class="scard-lbl">Terminées</div><div class="scard-val" style="color:var(--purple)">${mDone}/${mms.length}</div></div>
  </div>

function dcGo(s){

function dcTickClock(){

// Breathe
const DC_PH=[{l:“breathe in…”,c:“dc-bin”},{l:“hold…”,c:“dc-bhold”},{l:“breathe out…”,c:“dc-bout”},{l:“hold…”,c:“dc-bhold”}];
function dcStartBreath(){dcBreathOn=true;dcBreathPhase=0;dcBreathCycle=0;dcRunBreath();}
function dcStopBreath(){dcBreathOn=false;if(dcBreathTimer)clearTimeout(dcBreathTimer);}
function dcRunBreath(){
if(!dcBreathOn)return;
const w=document.getElementById(“dc-bwrap”),t=document.getElementById(“dc-btxt”),r=document.getElementById(“dc-bctr”);
if(!w)return;
const ph=DC_PH[dcBreathPhase];
w.className=“bwrap “+ph.c;
if(t)t.textContent=ph.l;
if(r)r.textContent=`round ${dcBreathCycle+1} of 4`;
void w.offsetWidth;
const np=(dcBreathPhase+1)%4;
const nc=np===0?dcBreathCycle+1:dcBreathCycle;
if(nc>=4){dcBreathOn=false;setTimeout(()=>dcGo(“s3”),600);return;}
dcBreathTimer=setTimeout(()=>{dcBreathPhase=np;dcBreathCycle=nc;dcRunBreath();},4000);
}

dcGo(“s4”);
}

// Draw
function dcInitDraw(){
const c=document.getElementById(“dc-canvas”);
if(!c)return;
const mw=Math.min(window.innerWidth-48,420),mh=Math.min(window.innerHeight-340,240);
c.width=mw;c.height=mh;c.style.width=mw+“px”;c.style.height=mh+“px”;
dcDrawCtx=c.getContext(“2d”);
dcDrawCtx.fillStyle=”#0f1520”;dcDrawCtx.fillRect(0,0,mw,mh);
dcDrawCtx.strokeStyle=“rgba(255,255,255,0.02)”;dcDrawCtx.lineWidth=1;
for(let x=0;x<mw;x+=40){dcDrawCtx.beginPath();dcDrawCtx.moveTo(x,0);dcDrawCtx.lineTo(x,mh);dcDrawCtx.stroke();}
for(let y=0;y<mh;y+=40){dcDrawCtx.beginPath();dcDrawCtx.moveTo(0,y);dcDrawCtx.lineTo(mw,y);dcDrawCtx.stroke();}
c.onmousedown=e=>{dcDrawing=true;dcLX=e.offsetX;dcLY=e.offsetY;dcDot(dcLX,dcLY);};
c.onmousemove=e=>{if(!dcDrawing)return;dcLine(e.offsetX,e.offsetY);};
c.onmouseup=c.onmouseleave=()=>{dcDrawing=false;};
c.addEventListener(“touchstart”,e=>{e.preventDefault();const t=e.touches[0],r=c.getBoundingClientRect();dcDrawing=true;dcLX=t.clientX-r.left;dcLY=t.clientY-r.top;dcDot(dcLX,dcLY);},{passive:false});
c.addEventListener(“touchmove”,e=>{e.preventDefault();const t=e.touches[0],r=c.getBoundingClientRect();dcLine(t.clientX-r.left,t.clientY-r.top);},{passive:false});
c.addEventListener(“touchend”,()=>{dcDrawing=false;},{passive:false});
}
function dcDot(x,y){dcDrawCtx.globalAlpha=.85;dcDrawCtx.fillStyle=dcColor;dcDrawCtx.beginPath();dcDrawCtx.arc(x,y,dcBrushSize/2,0,Math.PI*2);dcDrawCtx.fill();dcDrawCtx.globalAlpha=1;}
function dcLine(x,y){dcDrawCtx.globalAlpha=.75;dcDrawCtx.strokeStyle=dcColor;dcDrawCtx.lineWidth=dcBrushSize;dcDrawCtx.lineCap=“round”;dcDrawCtx.lineJoin=“round”;dcDrawCtx.beginPath();dcDrawCtx.moveTo(dcLX,dcLY);dcDrawCtx.lineTo(x,y);dcDrawCtx.stroke();dcDrawCtx.globalAlpha=1;dcLX=x;dcLY=y;}
function dcSetClr(el){document.querySelectorAll(”.dc-swatch”).forEach(s=>s.classList.remove(“on”));el.classList.add(“on”);dcColor=el.dataset.c;}
function dcClearDraw(){const c=document.getElementById(“dc-canvas”);if(!c||!dcDrawCtx)return;dcDrawCtx.fillStyle=”#0f1520”;dcDrawCtx.fillRect(0,0,c.width,c.height);}

// Ripple
function dcSpawnR(e){dcRip(e.offsetX,e.offsetY);}
function dcTouchR(e){e.preventDefault();const t=e.touches[0],r=document.getElementById(“rzone”).getBoundingClientRect();dcRip(t.clientX-r.left,t.clientY-r.top);}
function dcRip(x,y){
dcTapCount++;
const z=document.getElementById(“rzone”);if(!z)return;
const sz=Math.max(z.offsetWidth,z.offsetHeight)*.6;
const el=document.createElement(“div”);el.className=“rel”;
el.style.cssText=`left:${x}px;top:${y}px;width:${sz}px;height:${sz}px`;
z.appendChild(el);el.addEventListener(“animationend”,()=>el.remove());
const msgs=[”···”,”···”,“keep going…”,“good…”,“yes…”,“almost…”,“there…”];
const ctr=document.getElementById(“dc-tctr”);
if(ctr)ctr.textContent=dcTapCount<msgs.length?msgs[dcTapCount]:dcTapCount+” things released”;
if(dcTapCount===3&&ctr)ctr.style.color=“var(–green)”;
if(dcTapCount>=5){const db=document.getElementById(“dc-dbtn”);if(db)db.style.opacity=“1”;}
}
