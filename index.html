<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Mission Control V2 — Calm Ops</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg0:#111418;--bg1:#1c2128;--bg2:#161b22;--bg3:#1c2128;
  --border:#2d333b;--border2:#444c56;
  --txt0:#f0ece4;--txt1:#d8d3ca;--txt2:#adb5bd;--txt3:#768390;--txt4:#545d68;
  --accent:#58a6ff;--green:#3fb950;--amber:#e3b341;--red:#f85149;--purple:#bc8cff;
  --tap:48px;
}
.light{
  --bg0:#f0ebe0;--bg1:#ffffff;--bg2:#e8e2d6;--bg3:#ddd8cc;
  --border:#ccc5b8;--border2:#b8b0a2;
  --txt0:#0d0c08;--txt1:#211e18;--txt2:#3e3a32;--txt3:#65604f;--txt4:#8a8070;
  --accent:#0969da;--green:#1a7f37;--amber:#9a6700;--red:#cf222e;--purple:#7c3aed;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg0);color:var(--txt1);-webkit-font-smoothing:antialiased;}
.hdr{position:sticky;top:0;z-index:50;background:var(--bg3);border-bottom:1px solid var(--border);padding:11px 15px 10px;}
.hdr-inner{display:flex;justify-content:space-between;align-items:center;}
.hdr-eyebrow{font-size:9px;letter-spacing:2.5px;color:var(--txt4);text-transform:uppercase;font-weight:700;margin-bottom:2px;}
.hdr-date{font-size:22px;font-weight:700;color:var(--txt0);letter-spacing:-0.5px;line-height:1.1;}
.hdr-sub{font-size:11px;color:var(--txt3);margin-top:3px;}
.hdr-right{display:flex;align-items:center;gap:10px;}
.hdr-wx{display:flex;flex-direction:column;align-items:center;}
.wx-icon{font-size:22px;line-height:1;}
.wx-temp{font-size:12px;font-weight:600;color:var(--txt1);font-family:'DM Mono',monospace;margin-top:1px;}
.wx-rain{font-size:9px;color:var(--accent);min-height:12px;}
.hdr-btns{display:flex;flex-direction:column;gap:5px;}
.icon-btn{width:30px;height:30px;border-radius:6px;border:1px solid var(--border2);background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--txt2);}
.icon-btn:active{opacity:.6;}
.nav{position:sticky;top:68px;z-index:40;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;}
.nav-btn{flex:1;height:46px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--txt4);font-size:9px;font-weight:700;letter-spacing:.5px;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;font-family:'DM Sans',sans-serif;}
.nav-btn.on{color:var(--txt0);border-bottom-color:var(--accent);}
.nav-icon{font-size:14px;}
.content{padding:12px 13px 90px;}
.slabel{font-size:9px;color:var(--txt3);font-weight:700;letter-spacing:1.8px;text-transform:uppercase;margin:4px 0 8px;}
.slabel.mt{margin-top:18px;}
.sub-nav{display:flex;gap:4px;margin-bottom:10px;}
.sub-btn{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);color:var(--txt3);font-size:10px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.sub-btn.on{border-color:rgba(88,166,255,.3);background:rgba(88,166,255,.06);color:var(--accent);}
.mcard{background:var(--bg1);border-radius:10px;padding:12px 14px;margin-bottom:7px;border-left:3px solid;cursor:pointer;transition:transform .1s;user-select:none;}
.mcard:active{transform:scale(0.982);}
.mcard.dim{opacity:.35;}
.mc-top{display:flex;justify-content:space-between;align-items:flex-start;}
.mc-left{flex:1;min-width:0;}
.mc-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px;}
.mc-tag{font-size:12px;font-weight:700;}
.mc-time{font-size:12px;color:var(--txt2);font-family:'DM Mono',monospace;}
.mc-date-s{font-size:10px;color:var(--txt4);}
.mc-type{font-size:13px;color:var(--txt0);font-weight:600;}
.mc-sens{font-size:11px;color:var(--txt3);font-weight:500;}
.mc-pills{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;}
.mpill{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;}
.mp-loc{background:rgba(63,185,80,.1);color:var(--green);}
.mp-note{background:rgba(188,140,255,.1);color:var(--purple);}
.mc-right{text-align:right;flex-shrink:0;margin-left:8px;}
.mc-ref{font-family:'DM Mono',monospace;font-size:9px;color:var(--txt4);margin-bottom:3px;}
.bdg{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600;}
.bdg-plan{background:rgba(88,166,255,.12);color:var(--accent);}
.bdg-conf{background:rgba(63,185,80,.12);color:var(--green);}
.bdg-done{background:rgba(63,185,80,.12);color:var(--green);}
.bdg-fac{background:rgba(227,179,65,.12);color:var(--amber);}
.bdg-pay{background:rgba(188,140,255,.12);color:var(--purple);}
.bdg-cancel{background:rgba(248,81,73,.12);color:var(--red);}
.back-btn{background:none;border:none;color:var(--accent);font-size:13px;cursor:pointer;padding:0 0 10px;display:flex;align-items:center;gap:4px;min-height:44px;font-family:'DM Sans',sans-serif;font-weight:500;}
.dcard{background:var(--bg1);border-radius:12px;overflow:hidden;border-top:3px solid;}
.dhdr{padding:14px 15px 12px;}
.d-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px;}
.d-client{font-size:10px;font-weight:700;letter-spacing:1.5px;margin-bottom:3px;text-transform:uppercase;}
.d-title{font-size:16px;font-weight:700;color:var(--txt0);line-height:1.2;}
.d-sens{font-size:13px;color:var(--txt3);font-weight:500;margin-top:2px;}
.shift-box{padding:10px 12px;border-radius:8px;background:rgba(88,166,255,.05);border:1px solid rgba(88,166,255,.14);margin:10px 0 12px;}
.shift-time{font-size:21px;font-weight:700;color:var(--accent);font-family:'DM Mono',monospace;}
.shift-sub{font-size:11px;color:rgba(88,166,255,.55);margin-top:2px;}
.key-pills{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0 3px;}
.kpill{font-size:11px;padding:4px 10px;border-radius:6px;font-weight:500;background:var(--bg2);color:var(--txt2);border:1px solid var(--border);}
.kpill.hi{color:var(--accent);border-color:rgba(88,166,255,.22);background:rgba(88,166,255,.06);}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:11px;}
.ifield label{font-size:9px;color:var(--txt4);display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.8px;}
.ifield span{font-size:12px;color:var(--txt1);font-weight:500;}
.ifield span.mono{font-family:'DM Mono',monospace;font-size:11px;}
.sdiv{border-top:1px solid var(--border);}
.sin{padding:11px 15px;}
.stitle{font-size:9px;font-weight:700;letter-spacing:1.8px;margin-bottom:8px;text-transform:uppercase;}
.blue{color:var(--accent);} .green{color:var(--green);} .amber{color:var(--amber);} .purple{color:var(--purple);} .muted{color:var(--txt4);}
.orow{display:flex;align-items:flex-start;gap:7px;margin-bottom:6px;}
.o-icon{font-size:13px;flex-shrink:0;line-height:1.4;}
.o-lbl{font-size:9px;color:var(--txt4);min-width:62px;padding-top:2px;text-transform:uppercase;letter-spacing:.5px;}
.o-val{font-size:12px;color:var(--txt1);flex:1;line-height:1.5;}
.fin-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px;}
.fin-card{background:var(--bg1);border-radius:9px;padding:11px 13px;border:1px solid var(--border);}
.fin-lbl{font-size:9px;color:var(--txt4);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;font-weight:700;}
.fin-val{font-size:18px;font-weight:700;}
.frow{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;}
.flbl{color:var(--txt3);} .fval{color:var(--txt1);font-weight:500;}
.fnet{font-size:16px;font-weight:700;color:var(--amber);margin-top:5px;}
.coll{background:var(--bg1);border-radius:10px;margin-bottom:6px;overflow:hidden;border:1px solid var(--border);}
.coll-hdr{padding:11px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;}
.coll-title{font-size:12px;font-weight:700;color:var(--txt0);}
.coll-sub{font-size:10px;color:var(--txt3);margin-top:1px;}
.coll-right{display:flex;align-items:center;gap:8px;}
.coll-net{font-size:14px;font-weight:700;color:var(--amber);}
.chev{font-size:10px;color:var(--txt4);transition:transform .2s;}
.chev.open{transform:rotate(180deg);}
.coll-body{padding:0 14px 10px;display:none;border-top:1px solid var(--border);}
.coll-body.open{display:block;}
.mo-bar{background:var(--bg1);border-radius:10px;padding:11px 14px;margin-bottom:10px;border:1px solid var(--border);display:grid;grid-template-columns:repeat(4,1fr);gap:4px;text-align:center;}
.mob-lbl{font-size:9px;color:var(--txt4);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px;font-weight:600;}
.mob-val{font-size:16px;font-weight:700;}
.log-entries{margin-bottom:10px;}
.lentry{display:flex;gap:8px;margin-bottom:7px;}
.lts{font-size:10px;color:var(--txt4);font-family:'DM Mono',monospace;min-width:42px;padding-top:2px;}
.lbubble{flex:1;background:var(--bg2);border-radius:7px;padding:6px 10px;}
.ltag{font-size:9px;color:var(--txt4);margin-bottom:2px;}
.ltext{font-size:11px;color:var(--txt2);line-height:1.5;white-space:pre-wrap;}
.log-empty{font-size:11px;color:var(--txt4);font-style:italic;margin-bottom:10px;}
.ta,.sel{width:100%;padding:9px 11px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;color:var(--txt0);font-size:12px;font-family:'DM Sans',sans-serif;line-height:1.5;}
.ta{resize:none;}
.ta:focus,.sel:focus{outline:none;border-color:rgba(88,166,255,.3);}
.submit-btn{width:100%;margin-top:6px;padding:11px;background:rgba(88,166,255,.06);border:1px solid rgba(88,166,255,.2);border-radius:9px;color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;min-height:var(--tap);font-family:'DM Sans',sans-serif;}
.meta-row{display:flex;gap:7px;margin-bottom:6px;}
.meta-row .sel{flex:1;}
.chkrow{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--txt2);margin-top:6px;}
.pmf-trigger{width:100%;padding:13px;background:rgba(63,185,80,.06);border:1px solid rgba(63,185,80,.2);border-radius:10px;color:var(--green);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;min-height:var(--tap);font-family:'DM Sans',sans-serif;}
.pmf-step-hdr{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.pmf-num{width:26px;height:26px;border-radius:50%;background:var(--green);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.pmf-step-title{font-size:14px;font-weight:700;color:var(--txt0);}
.pmf-time-row{display:flex;gap:10px;align-items:center;margin-bottom:9px;}
.pmf-time-block{flex:1;text-align:center;}
.pmf-time-lbl{font-size:9px;color:var(--txt4);margin-bottom:4px;text-transform:uppercase;letter-spacing:.8px;}
.pmf-tinput{width:100%;padding:11px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;color:var(--txt0);font-size:16px;text-align:center;font-family:'DM Mono',monospace;min-height:var(--tap);}
.pmf-tinput:focus{outline:none;border-color:rgba(63,185,80,.4);}
.pmf-dur{font-size:13px;color:var(--green);text-align:center;margin-bottom:12px;font-weight:600;min-height:18px;}
.pbtn{width:100%;padding:12px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;min-height:var(--tap);font-family:'DM Sans',sans-serif;}
.pbtn-next{background:rgba(88,166,255,.06);border:1px solid rgba(88,166,255,.2);color:var(--accent);}
.pbtn-confirm{background:rgba(63,185,80,.07);border:1px solid rgba(63,185,80,.25);color:var(--green);}
.pback{font-size:11px;color:var(--txt4);cursor:pointer;text-align:center;margin-top:10px;display:flex;align-items:center;justify-content:center;min-height:var(--tap);}
.rpt-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.rtbtn{padding:10px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;color:var(--txt2);font-size:11px;font-weight:600;cursor:pointer;text-align:center;min-height:var(--tap);font-family:'DM Sans',sans-serif;}
.rtbtn.on{border-color:rgba(188,140,255,.35);background:rgba(188,140,255,.07);color:var(--purple);}
.rpt-output{background:var(--bg2);border-radius:9px;padding:12px;font-size:11px;color:var(--txt2);line-height:1.8;margin-bottom:10px;white-space:pre-wrap;max-height:260px;overflow-y:auto;}
.rpt-loading{text-align:center;padding:22px;color:var(--txt4);font-size:12px;}
.rpt-actions{display:flex;gap:7px;}
.rabtn{flex:1;padding:11px;border-radius:9px;font-size:11px;font-weight:600;cursor:pointer;min-height:var(--tap);font-family:'DM Sans',sans-serif;border:1px solid var(--border);}
.decomp-link{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px;border:1px solid rgba(63,185,80,.18);border-radius:10px;color:var(--green);font-size:12px;font-weight:500;min-height:var(--tap);cursor:pointer;background:rgba(63,185,80,.04);font-family:'DM Sans',sans-serif;}
.mood-stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px;}
.mood-stat{background:var(--bg2);border-radius:8px;padding:9px 10px;text-align:center;border:1px solid var(--border);}
.mood-stat-val{font-size:16px;font-weight:700;color:var(--txt0);}
.mood-stat-lbl{font-size:9px;color:var(--txt4);margin-top:2px;text-transform:uppercase;letter-spacing:.6px;}
.mood-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:11px;}
.mood-row:last-child{border-bottom:none;}
.mood-date{font-size:10px;color:var(--txt4);font-family:'DM Mono',monospace;min-width:66px;}
.mood-mid{font-size:10px;color:var(--txt3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mood-state{font-size:11px;font-weight:600;min-width:54px;text-align:right;}
.ref-box{background:var(--bg1);border-radius:9px;padding:13px 14px;font-size:12px;color:var(--txt2);line-height:2.1;border:1px solid var(--border);font-family:'DM Mono',monospace;}
.empty{text-align:center;padding:40px 0 16px;}
.empty-icon{font-size:36px;margin-bottom:8px;}
.empty-title{font-size:15px;color:var(--txt2);font-weight:500;}
.empty-sub{font-size:12px;color:var(--txt4);margin-top:3px;}
.ubox{background:var(--bg1);border-radius:10px;padding:12px 14px;margin-top:7px;border:1px solid var(--border);}
.ulbl{font-size:9px;color:var(--green);font-weight:700;letter-spacing:1.5px;margin-bottom:7px;text-transform:uppercase;}
.uitem{display:flex;gap:8px;align-items:baseline;margin-bottom:4px;font-size:11px;}
.wx-alert{display:flex;align-items:flex-start;gap:8px;padding:9px 11px;background:rgba(227,179,65,.07);border:1px solid rgba(227,179,65,.2);border-radius:8px;font-size:11px;color:var(--amber);line-height:1.5;margin-bottom:8px;}
.wx-alert-icon{font-size:16px;flex-shrink:0;}
.doc-btn{display:flex;align-items:center;gap:7px;padding:10px 13px;background:rgba(88,166,255,.05);border:1px solid rgba(88,166,255,.18);border-radius:8px;color:var(--accent);font-size:12px;font-weight:500;text-decoration:none;min-height:var(--tap);margin-top:8px;transition:background .15s;}
.doc-btn:active{background:rgba(88,166,255,.12);}
.mc-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg1);border:1px solid var(--border2);color:var(--txt1);font-size:12px;font-weight:500;padding:10px 18px;border-radius:10px;z-index:9999;opacity:0;transition:transform .25s,opacity .25s;max-width:88vw;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.25);}
.mc-toast-show{opacity:1;transform:translateX(-50%) translateY(0);}
.mc-toast-green{border-color:rgba(63,185,80,.35);color:var(--green);}
.mc-toast-red{border-color:rgba(248,81,73,.35);color:var(--red);}
.mc-toast-blue{border-color:rgba(88,166,255,.35);color:var(--accent);}
.m-date-hdr{font-size:10px;font-weight:700;letter-spacing:.8px;margin:14px 0 5px;text-transform:uppercase;display:flex;align-items:center;gap:6px;}
.m-date-pill{font-size:9px;padding:1px 6px;border-radius:3px;font-weight:600;}
.fmr{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:11px;}
.fmr:last-child{border-bottom:none;}
.spin{display:inline-block;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
a{color:var(--accent);text-decoration:none;}
.pause-wrap{display:flex;flex-direction:column;align-items:center;padding:10px 0 24px;}
.psc{display:none;flex-direction:column;align-items:center;width:100%;max-width:380px;padding:0 4px;}
.psc.active{display:flex;}
.p-eyebrow{font-size:9px;letter-spacing:2px;color:var(--txt4);text-transform:uppercase;font-weight:700;margin-bottom:16px;text-align:center;}
.p-h1{font-size:26px;font-weight:300;color:var(--txt0);line-height:1.2;margin-bottom:10px;text-align:center;letter-spacing:-0.3px;}
.p-sub{font-size:13px;color:var(--txt3);margin-bottom:26px;text-align:center;line-height:1.6;font-weight:400;}
.p-clock{font-family:'DM Mono',monospace;font-size:13px;color:var(--txt4);margin-bottom:32px;letter-spacing:.15em;}
.p-btn-g{padding:12px 28px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:rgba(63,185,80,.07);border:1px solid rgba(63,185,80,.22);color:var(--green);font-family:'DM Sans',sans-serif;min-height:var(--tap);}
.p-btn-s{padding:11px 22px;border-radius:8px;font-size:12px;cursor:pointer;background:none;border:1px solid var(--border);color:var(--txt3);font-family:'DM Sans',sans-serif;min-height:var(--tap);}
.p-btn-ghost{background:none;border:none;font-size:11px;color:var(--txt4);cursor:pointer;font-family:'DM Mono',monospace;letter-spacing:.12em;text-transform:uppercase;min-height:var(--tap);padding:8px;}
/* PAX CHECKLIST */
.pax-coll{margin:0 0 10px;border-radius:8px;overflow:hidden;border:1px solid rgba(63,185,80,.2);background:rgba(63,185,80,.03);}
.pax-coll-hdr{padding:10px 12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;}
.pax-coll-title{font-size:11px;font-weight:700;color:var(--green);letter-spacing:.8px;text-transform:uppercase;}
.pax-coll-sub{font-size:10px;color:var(--txt3);margin-top:1px;}
.pax-prog-wrap{width:44px;height:3px;background:var(--border);border-radius:2px;margin-right:6px;}
.pax-prog{height:3px;background:var(--green);border-radius:2px;transition:width .3s;}
.pax-coll-body{padding:0 12px 8px;display:none;border-top:1px solid rgba(63,185,80,.15);}
.pax-coll-body.open{display:block;}
.pax-list{padding:2px 0;}
.pax-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer;min-height:44px;}
.pax-item:last-child{border-bottom:none;}
.pax-box{width:18px;height:18px;flex-shrink:0;accent-color:var(--green);cursor:pointer;}
.pax-name{font-size:12px;color:var(--txt1);flex:1;line-height:1.4;}
.pax-done-msg{text-align:center;font-size:11px;color:var(--green);padding:8px 0;font-weight:600;}
/* CONTACT BLOCKS */
.contact-block{margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.contact-block:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.contact-role{font-size:9px;color:var(--txt4);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px;font-weight:600;}
.contact-info{font-size:12px;color:var(--txt1);line-height:1.9;}
</style>
</head>
<body>

  <div class="hdr-inner">

<script>
const GAS_URL="https://script.google.com/macros/s/AKfycbwACs6qIEu24xMe3KtSjLMbcs3A6iXqCaZEodXBuTx2au1ol5UXeUqZKM6W_NJO9qSErg/exec";
const TAX=0.212;
const NET_MULT=1-TAX;
const DAYS=["dim","lun","mar","mer","jeu","ven","sam"];
const MOL=["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
const MOS=["jan","fév","mar","avr","mai","jun","jul","aoû","sep","oct","nov","déc"];
const META={
  "Philibert Tourisme":{tag:"PHIL",hex:"#3fb950"},
  "Go Côte Saône":{tag:"GCS",hex:"#58a6ff"},
  "Feel the French Way":{tag:"FTFW",hex:"#bc8cff"},
  "Un Monde Bleu":{tag:"UMB",hex:"#ff7b54"}
};
const TRAVEL={"PERRACHE":45,"PART-DIEU":45,"LYS":52,"AEROPORT":52,"QUAI CLAUDE BERNARD":45,"QUAI RAMBAUD":60,"BELLECOUR":45,"VIENNE":105,"GENEVE":180,"CHALON":120};
const MOOD_LABELS=["","😫","😐","🙂","😊","🤩"];
const ENERGY_LABELS=["","①","②","③","④","⑤"];
const FLAG_LABELS={"—":"—","🟢":"🟢","🟡":"🟡","🔴":"🔴"};

let missions=[],tab="today",subView="today",detail=null,pmf=null,pmfStep=0;
let wxData=null,light=localStorage.getItem("mc_light")==="1";
let mlogs=JSON.parse(localStorage.getItem("mc_mission_logs")||"{}");
let pScr="s1";

window.addEventListener("load",()=>{
  if(light) document.body.classList.add("light");
  updateModeBtn();
  renderHeader();
  loadWeather();
  loadMissions();
});
function toggleMode(){light=!light;document.body.classList.toggle("light",light);localStorage.setItem("mc_light",light?"1":"0");updateModeBtn();}
function updateModeBtn(){document.getElementById("mode-btn").textContent=light?"🌙":"☀️";}
const p2=n=>String(n).padStart(2,"0");
const tday=()=>new Date().toISOString().slice(0,10);
const tmrw=()=>{const d=new Date();d.setDate(d.getDate()+1);return d.toISOString().slice(0,10);};
const nowt=()=>{const n=new Date();return p2(n.getHours())+":"+p2(n.getMinutes());};

function renderHeader(){
  const n=new Date(),cm=p2(n.getMonth()+1);
  document.getElementById("hdr-date").textContent=DAYS[n.getDay()]+" "+n.getDate()+" "+MOL[n.getMonth()];
  const mms=missions.filter(m=>m.date&&m.date.slice(5,7)===cm);
  document.getElementById("hdr-sub").textContent=MOL[n.getMonth()]+" · "+mms.length+" missions · "+mms.filter(isDone).length+" terminées";
  document.getElementById("month-lbl").textContent=MOS[n.getMonth()].toUpperCase();
}
async function loadWeather(){
  try{
    const r=await fetch("https://api.open-meteo.com/v1/forecast?latitude=45.764&longitude=4.836&current=temperature_2m,weathercode,precipitation_probability&hourly=precipitation_probability,weathercode,temperature_2m&timezone=Europe/Paris&forecast_days=3");
    const d=await r.json();wxData=d;
    const c=d.current,wc=c.weathercode||0;
    const ic=wc===0?"☀️":wc<=2?"⛅":wc===3?"☁️":wc<=48?"🌫":wc<=55?"🌦":wc<=67?"🌧":wc<=77?"❄️":wc<=82?"🌦":"⛈️";
    document.getElementById("wx-icon").textContent=ic;
    document.getElementById("wx-temp").textContent=Math.round(c.temperature_2m)+"°C";
    document.getElementById("wx-rain").textContent=c.precipitation_probability>20?c.precipitation_probability+"%":"";
  }catch(e){document.getElementById("wx-icon").textContent="";document.getElementById("wx-temp").textContent="Lyon";}
}
function getWxAlert(date,startH,endH){
  if(!wxData||!wxData.hourly) return null;
  const times=wxData.hourly.time||[],probs=wxData.hourly.precipitation_probability||[],temps=wxData.hourly.temperature_2m||[];
  let maxRain=0,minTemp=99;
  times.forEach((t,i)=>{
    if(!t.startsWith(date)) return;
    const hr=parseInt(t.slice(11,13));
    if(hr<startH||hr>endH) return;
    if(probs[i]>maxRain) maxRain=probs[i];
    if(temps[i]<minTemp) minTemp=temps[i];
  });
  const parts=[];
  if(maxRain>=50) parts.push("Pluie probable "+maxRain+"%");
  else if(maxRain>=30) parts.push("Risque pluie "+maxRain+"%");
  if(minTemp<8) parts.push("~"+Math.round(minTemp)+"°C");
  return parts.length?parts.join(" · "):null;
}
async function loadMissions(){
  const stored=localStorage.getItem("mc_missions");
  if(stored){try{missions=JSON.parse(stored).map(norm);}catch(e){}}
  try{
    const r=await fetch(GAS_URL+"?action=all",{signal:AbortSignal.timeout(20000)});
    const d=await r.json();
    if(d&&d.missions&&d.missions.length){
      missions=d.missions.map(norm);
      localStorage.setItem("mc_missions",JSON.stringify(missions));
    }
  }catch(e){}
  renderHeader();render();
}
async function refreshData(){
  document.getElementById("refresh-btn").style.opacity=".4";
  missions=[];localStorage.removeItem("mc_missions");
  await loadMissions();
  document.getElementById("refresh-btn").style.opacity="1";
}
function norm(m){
  const o={...m};if(o._n)return o;o._n=1;
  o.mid=o["Mission ID"]||"";
  o.date=o["Date mission"]||o["Date"]||"";
  o.client=o["Client"]||"";
  o.type=o["Type"]||"";
  o.sens=o["Sens"]||"";
  o.desc=o["Description"]||"";
  o.heures=o["Heures"]||"";
  o.base=o["Base (HT)"]||o["Base HT"]||"";
  o.debours=o["Débours"]||o["Debours"]||"";
  let rb=o["Début"]||o["Debut"]||"";if(rb&&rb.length>5)rb=rb.slice(0,5);o.debut=rb;
  o.endroit=o["Endroit"]||"";
  o.statut=o["Statut"]||"";
  o.notes=o["Notes"]||"";
  o.voyage=o["Voyage (min)"]||o["Voyage"]||"";
  o.facture=o["Facture#"]||o["Facture #"]||"";
  o.rapport=o["Rapport"]||o["Rapport ✓"]||"";
  o.docs=o["Docs"]||"";
  o.importKey=o["Import key"]||o["Import Key"]||"";
  o.ops=o.ops||{};
  // Extract Mission_Details structured fields for direct use
  o.paxChecklist=o.ops["Passenger Checklist"]||"";
  o.paxCount=o.ops["Pax Count"]||"";
  o.paxRaw=o.ops["Passenger Raw"]||"";
  o.shipName=o.ops["Ship Name"]||"";
  o.meetingPoint=o.ops["Meeting Point"]||"";
  o.dock=o.ops["Dock / Terminal"]||"";
  o.transportRef=o.ops["Transport Ref"]||"";
  o.opsSum=o.ops["Ops Summary"]||"";
  return o;
}
const isDone=m=>{const s=(m.statut||"").toLowerCase();return s==="terminé"||s.includes("envoy")||s==="payé";};
const isCxl=m=>(m.statut||"").toLowerCase().includes("annul");
function getMeta(c){if(!c)return{tag:"?",hex:"#666"};for(const[k,v]of Object.entries(META)) if((c||"").toLowerCase().includes(k.split(" ")[0].toLowerCase())) return v; return{tag:"?",hex:"#666"};}
function trvl(e){if(!e)return 45;const u=e.toUpperCase();for(const[k,v]of Object.entries(TRAVEL)) if(u.includes(k)) return v;return 45;}
function depT(sh,tr){if(!sh||!tr)return null;const[h,m]=sh.split(":").map(Number);const d=h*60+m-tr-15;if(d<0)return null;return p2(Math.floor(d/60))+":"+p2(d%60);}
function durS(s,e){if(!s||!e)return"";const[sh,sm]=s.split(":").map(Number),[eh,em]=e.split(":").map(Number);let d=(eh*60+em)-(sh*60+sm);if(d<=0)return"";d=Math.round(d/15)*15;return Math.floor(d/60)+"h"+(d%60>0?p2(d%60):"");}
function durD(s,e){if(!s||!e)return"";const[sh,sm]=s.split(":").map(Number),[eh,em]=e.split(":").map(Number);let d=(eh*60+em)-(sh*60+sm);if(d<=0)return"";return(d/60).toFixed(2).replace(/\.?0+$/,"");}
function fds(iso){if(!iso)return"";const d=new Date(iso+"T12:00:00");return DAYS[d.getDay()]+" "+d.getDate()+" "+MOS[d.getMonth()];}
function fdl(iso){if(!iso)return"";const d=new Date(iso+"T12:00:00");return DAYS[d.getDay()]+" "+d.getDate()+" "+MOL[d.getMonth()];}
const cnet=(b,d)=>Math.round((parseFloat(b)||0)*NET_MULT+(parseFloat(d)||0));
const ctax=b=>Math.round((parseFloat(b)||0)*TAX);
function badge(m){
  const s=(m.statut||"").toLowerCase();
  if(isCxl(m))return'<span class="bdg bdg-cancel">Annulé</span>';
  if(s==="payé")return'<span class="bdg bdg-pay">Payé</span>';
  if(s.includes("envoy"))return'<span class="bdg bdg-fac">Rapport/Fac.</span>';
  if(s==="terminé")return'<span class="bdg bdg-done">✓ Terminé</span>';
  if(s==="confirmé")return'<span class="bdg bdg-conf">Confirmé</span>';
  return'<span class="bdg bdg-plan">'+(m.statut||"Planifié")+'</span>';
}
async function saveField(mid,f,v){
  try{
    const r=await fetch(GAS_URL+"?action=update&id="+encodeURIComponent(mid)+"&field="+encodeURIComponent(f)+"&value="+encodeURIComponent(v));
    const d=await r.json();
    return d&&d.ok!==false;
  }catch(e){toast('❌ '+e.message.slice(0,50),'red');return false;}
}
function getLogs(mid){return mlogs[mid]||[];}
function saveLogs(){localStorage.setItem("mc_mission_logs",JSON.stringify(mlogs));}
function addLog(mid){
  const ta=document.getElementById("lta-"+mid);
  const kind=document.getElementById("lkind-"+mid);
  const ctx=document.getElementById("lctx-"+mid);
  const rpt=document.getElementById("lrpt-"+mid);
  if(!ta||!ta.value.trim()) return;
  if(!mlogs[mid]) mlogs[mid]=[];
  mlogs[mid].push({
    time: nowt(),
    kind: kind?kind.value:"Note",
    context: ctx?ctx.value:"Après mission",
    report: !!(rpt&&rpt.checked),
    text: ta.value.trim()
  });
  saveLogs();
  ta.value=""; if(rpt) rpt.checked=false;
  render();
}
function reportNotesFor(mid){
  return getLogs(mid).filter(e=>e.report).map(e=>"- "+e.text).join("\n");
}
function getPaxChecks(){
  try{return JSON.parse(localStorage.getItem("mc_pax_checks")||"{}");}catch(e){return {};}
}
function savePaxChecks(obj){
  localStorage.setItem("mc_pax_checks",JSON.stringify(obj));
}
function togglePax(mid,idx,on){
  const data=getPaxChecks();
  if(!data[mid]) data[mid]={};
  data[mid][idx]=!!on;
  savePaxChecks(data);
  const state=data[mid]||{};
  const m=missions.find(x=>x.mid===mid)||{};
  const ops=m.ops||{};
  const clRaw=ops['Passenger Checklist']||'';
  const paxRaw=ops['Passenger Raw']||'';
  const names=clRaw?clRaw.split('\n').map(s=>s.trim()).filter(Boolean):parseFromRaw(paxRaw);
  const total=names.length;
  const checked=Object.values(state).filter(Boolean).length;
  const pct=total?Math.round(checked/total*100):0;
  const progEl=document.getElementById('paxprog-'+mid);
  if(progEl) progEl.style.width=pct+'%';
  const doneEl=document.getElementById('pax-done-'+mid);
  if(doneEl) doneEl.style.display=(checked===total&&total>0)?'block':'none';
}
function parseFromRaw(raw){
  if(!raw) return [];
  const TITLE=/\b(MR|MRS|MS|MISS|DR|Mr|Mrs|Ms|Miss|Dr)\.?\s+/;
  const SPLIT=/(?=\b(?:MR|MRS|MS|MISS|DR|Mr|Mrs|Ms|Miss|Dr)\.?\s+)/;
  const lines=raw.replace(/\r/g,'').split('\n');
  const out=[];
  lines.forEach(line=>{
    const s=line.trim();
    if(!s) return;
    if(/^[A-Z]{2}\d{3,}/.test(s)||/^\d[\d,\s]*$/.test(s)||/^\d+\s*PAX$/i.test(s)) return;
    if(!TITLE.test(s)) return;
    s.split(SPLIT).map(p=>p.trim()).filter(p=>TITLE.test(p)).forEach(p=>{
      const clean=p.replace(/\s{2,}/g,' ').replace(/\s+\d{2,3}$/,'').trim();
      if(clean) out.push(clean);
    });
  });
  return [...new Set(out)];
}
function passengerChecklistHTML(m){
  const ops=m.ops||{};
  // Prefer structured Passenger Checklist; fall back to parsing Passenger Raw
  const clRaw=ops['Passenger Checklist']||'';
  const paxRaw=ops['Passenger Raw']||'';
  const paxCount=ops['Pax Count']||'';
  const names=clRaw?clRaw.split('\n').map(s=>s.trim()).filter(Boolean):parseFromRaw(paxRaw);
  if(!names.length&&!paxCount) return '';
  const checks=getPaxChecks();
  const state=checks[m.mid]||{};
  const checked=names.length?Object.values(state).filter(Boolean).length:0;
  const pct=names.length?Math.round(checked/names.length*100):0;
  const id='pax-'+m.mid;
  // Use tColl (already defined) for collapse toggle — avoids quoting issues
  let html='<div class="pax-coll"><div class="pax-coll-hdr" onclick="tColl(\''+id+'\')">';
  html+='<div><div class="pax-coll-title">👥 Passagers</div>';
  html+='<div class="pax-coll-sub">'+(paxCount?paxCount+' pax':names.length+' pax');
  if(names.length) html+=' · '+checked+'/'+names.length+' cochés';
  html+='</div></div>';
  html+='<div style="display:flex;align-items:center;gap:6px">';
  html+='<div class="pax-prog-wrap"><div class="pax-prog" id="paxprog-'+m.mid+'" style="width:'+pct+'%"></div></div>';
  html+='<div class="chev" id="chev-'+id+'">▼</div></div></div>';
  html+='<div class="pax-coll-body" id="'+id+'">';
  if(names.length){
    html+='<div class="pax-list">'+names.map((name,i)=>{
      const esc=name.replace(/'/g,'&#39;');
      return '<label class="pax-item"><input class="pax-box" type="checkbox" '+(state[i]?'checked ':'')
        +'onchange="togglePax(\''+m.mid+'\','+i+',this.checked)"/>'
        +'<span class="pax-name">'+esc+'</span></label>';
    }).join('')+'</div>';
    html+='<div id="pax-done-'+m.mid+'" class="pax-done-msg" style="display:'
      +(checked===names.length&&names.length>0?'block':'none')+'">✅ Tous cochés</div>';
  } else {
    html+='<div style="font-size:11px;color:var(--txt3);padding:8px 0">Liste de passagers non disponible — '+paxCount+' pax</div>';
  }
  html+='</div></div>';
  return html;
}

function contactHTML(m){
  const ops=m.ops||{};
  const blocks=[];
  function cb(role,name,phone,email){
    if(!name&&!phone&&!email) return;
    let s='<div class="contact-block"><div class="contact-role">'+role+'</div><div class="contact-info">';
    if(name) s+=name;
    if(phone) s+=' · <a href="tel:'+phone+'">'+phone+'</a>';
    if(email) s+=' · <a href="mailto:'+email+'">'+email+'</a>';
    s+='</div></div>';
    blocks.push(s);
  }
  cb("Contact client",
    ops["Contact Client"]||ops["Contact Name"]||ops["Sender Name"]||"",
    ops["Client Phone"]||ops["Contact Phone"]||"",
    ops["Contact Email"]||ops["Sender Email"]||"");
  cb("Cruise Manager",ops["Cruise Manager"]||"",ops["Cruise Phone"]||"","");
  cb("Chauffeur",ops["Chauffeur"]||"",ops["Tél Chauffeur"]||"","");
  const colRole=ops["Colleague Role"]?"Collègue · "+ops["Colleague Role"]:"Collègue";
  cb(colRole,ops["Colleague"]||"",ops["Colleague Phone"]||"","");
  if(ops["Emergency Contact"]) blocks.push('<div class="contact-block"><div class="contact-role">Urgence</div><div class="contact-info">'+ops["Emergency Contact"]+'</div></div>');
  if(!blocks.length) return '<div style="font-size:12px;color:var(--txt4)">Contact non parsé.</div>';
  return blocks.join("");
}
function opsBlock(m){
  const ops=m.ops||{};
  // Fields shown elsewhere — exclude from this block
  const SKIP=new Set(["Passenger Checklist","Passenger Raw","Pax Count",
    "Contact Client","Client Phone","Cruise Manager","Cruise Phone",
    "Chauffeur","Tél Chauffeur","Colleague","Colleague Phone","Colleague Role",
    "Emergency Contact","Contact Name","Sender Name","Contact Phone",
    "Contact Email","Sender Email",
    "Source PDF","Source Email","Source Email Message","Raw Notes","Last Updated"]);
  const ICONS={
    "Ops Summary":"📌","Ship Name":"🚢","Dock / Terminal":"⚓",
    "Transport Ref":"📋","Meeting Point":"📍","Vehicle Info":"🚌",
    "Colleague":"👤","Emergency Contact":"🆘"};
  const pairs=Object.entries(ops).filter(([k,v])=>v&&String(v).trim()&&!SKIP.has(k));
  let out='';
  if(!pairs.length){
    out='<div style="font-size:11px;color:var(--txt4)">Aucune donnée opérationnelle disponible.</div>';
  } else {
    out=pairs.map(([k,v])=>'<div class="orow"><div class="o-icon">'+(ICONS[k]||"•")
      +'</div><div class="o-lbl">'+k+'</div><div class="o-val">'+String(v)+'</div></div>').join("");
  }
  // Source PDF — always show if present
  if(ops["Source PDF"]){
    out+='<a href="'+ops["Source PDF"]+'" target="_blank" class="doc-btn" style="margin-top:10px">'
      +'<span style="font-size:14px">📄</span><span style="flex:1">Manifeste PDF</span>'
      +'<span style="font-size:10px;color:var(--txt4)">↗</span></a>';
  }
  // Source Email Message — collapsible
  if(ops["Source Email Message"]){
    const emId="emsrc-"+m.mid;
    out+='<div class="coll" style="margin-top:10px">'
      +'<div class="coll-hdr" style="padding:8px 10px" onclick="tColl(\''+emId+'\')">'
      +'<div><div class="coll-title" style="font-size:11px">📧 Email source</div>'
      +(ops["Source Email"]?'<div class="coll-sub">'+ops["Source Email"]+'</div>':'')
      +'</div><div class="coll-right"><div class="chev" id="chev-'+emId+'">▼</div></div></div>'
      +'<div class="coll-body" id="'+emId+'">'
      +'<div style="font-size:10px;color:var(--txt3);white-space:pre-wrap;line-height:1.6;padding-top:4px">'
      +ops["Source Email Message"].replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div>'
      +'</div></div>';
  }
  // Raw Notes
  if(ops["Raw Notes"]){
    out+='<div style="margin-top:8px;background:var(--bg2);padding:8px 10px;border-radius:7px;font-size:10px;color:var(--txt3);line-height:1.5">📝 '+ops["Raw Notes"]+'</div>';
  }
  // Last Updated
  if(ops["Last Updated"]){
    out+='<div style="font-size:9px;color:var(--txt4);margin-top:8px;text-align:right">Mis à jour: '+ops["Last Updated"]+'</div>';
  }
  return out;
}

function go(t){tab=t;if(t==="today")subView="today";detail=null;["today","month","finance"].forEach(id=>document.getElementById("nb-"+id).classList.toggle("on",id===t));render();}
function render(){
  const el=document.getElementById("content"); if(!el) return;
  if(detail&&(tab==="today"||tab==="month")){el.innerHTML=rdDetail(detail);return;}
  if(tab==="today") el.innerHTML=rdToday();
  else if(tab==="month") el.innerHTML=rdMonth();
  else if(tab==="finance") el.innerHTML=rdFinance();
}
function rdToday(){
  let h='<div class="sub-nav"><button class="sub-btn'+(subView==="today"?" on":"")+'" onclick="subView=\'today\';render()">Aujourd\'hui</button><button class="sub-btn'+(subView==="week"?" on":"")+'" onclick="subView=\'week\';render()">7 jours</button></div>';
  if(subView==="week") return h+rdWeek();
  const t=tday(),tm=tmrw();
  const t1=missions.filter(m=>m.date===t).sort((a,b)=>(a.debut||"z").localeCompare(b.debut||"z"));
  const t2=missions.filter(m=>m.date===tm).sort((a,b)=>(a.debut||"z").localeCompare(b.debut||"z"));
  const up=missions.filter(m=>m.date>tm&&!isCxl(m)).sort((a,b)=>a.date.localeCompare(b.date));
  if(t1.length) h+='<div class="slabel">AUJOURD\'HUI</div>'+t1.map(m=>mcard(m,false)).join("");
  else h+='<div class="empty"><div class="empty-icon">☀️</div><div class="empty-title">Pas de mission aujourd\'hui</div>'+(t2.length?'<div class="empty-sub">'+t2.length+' demain</div>':"")+'</div>';
  if(t2.length) h+='<div class="slabel'+(t1.length?" mt":"")+'">DEMAIN · '+fds(tm).toUpperCase()+'</div>'+t2.map(m=>mcard(m,true)).join("");
  if(up.length) h+=avenir(up.slice(0,5));
  return h;
}
function rdWeek(){
  const now=new Date();let h="",total=0;
  for(let d=0;d<7;d++){
    const dt=new Date(now.getTime()+d*86400000), ds=dt.toISOString().slice(0,10);
    const dm=missions.filter(m=>m.date===ds).sort((a,b)=>(a.debut||"z").localeCompare(b.debut||"z"));
    if(!dm.length) continue;
    const isT=ds===tday(),isTm=ds===tmrw();

  });
  h+=rdJournal();
  h+='<div class="slabel mt">RÉFÉRENCES</div><div class="ref-box">SIRET · 92815905200010<br/>IBAN · FR76 2823 3000 0177 6267 3414 414<br/>BIC · REVOFRP2 (Revolut)</div>';
  return h;
}
function rdJournal(){
  const log=JSON.parse(localStorage.getItem('mc_journal')||'[]');
  if(!log.length) return '<div class="slabel mt">BIEN-ÊTRE</div><div style="font-size:11px;color:var(--txt4);padding:10px 0">Aucune entrée privée enregistrée pour le moment.</div>';
  const cy=new Date().getFullYear(), yearLog=log.filter(e=>e.date&&e.date.startsWith(String(cy)));
  const avgMood=yearLog.filter(e=>e.mood>0).reduce((s,e,_,a)=>s+e.mood/a.length,0)||0;
  const avgEnergy=yearLog.filter(e=>e.energy>0).reduce((s,e,_,a)=>s+e.energy/a.length,0)||0;
  let h='<div class="slabel mt">BIEN-ÊTRE · '+cy+'</div><div class="mood-stat-row"><div class="mood-stat"><div class="mood-stat-val">'+yearLog.length+'</div><div class="mood-stat-lbl">Entrées</div></div><div class="mood-stat"><div class="mood-stat-val">'+(avgMood?MOOD_LABELS[Math.round(avgMood)]+' '+avgMood.toFixed(1):'—')+'</div><div class="mood-stat-lbl">Humeur</div></div><div class="mood-stat"><div class="mood-stat-val">'+(avgEnergy?ENERGY_LABELS[Math.round(avgEnergy)]+' '+avgEnergy.toFixed(1):'—')+'</div><div class="mood-stat-lbl">Énergie</div></div></div>';
  const recent=[...yearLog].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);
  h+='<div class="coll"><div class="coll-hdr" onclick="tColl(\'journal-log\')"><div><div class="coll-title">Journal privé</div><div class="coll-sub">'+yearLog.length+' entrées</div></div><div class="coll-right"><div class="chev" id="chev-journal-log">▼</div></div></div><div class="coll-body" id="journal-log">'+recent.map(e=>'<div class="mood-row"><span class="mood-date">'+fds(e.date)+'</span><span class="mood-mid">'+(e.context||"Après mission")+' · '+(e.client||"")+'</span><span class="mood-state">'+(MOOD_LABELS[e.mood||0]||"—")+' '+(ENERGY_LABELS[e.energy||0]||"")+'</span></div>'+(e.note?'<div style="font-size:10px;color:var(--txt4);padding:0 0 5px;font-style:italic">'+e.note+'</div>':"")+'</div>').join("");
  return h;
}
function tColl(id){const b=document.getElementById(id),c=document.getElementById("chev-"+id);if(!b)return;b.classList.toggle("open");if(c)c.classList.toggle("open");}
function goPause(){
  const el=document.getElementById("content");
  el.innerHTML='<div class="pause-wrap"><div class="psc active"><div class="p-eyebrow">Décompression</div><div class="p-h1">Pause rapide</div><div class="p-sub">Un espace simple pour relâcher ce qui reste.</div><textarea id="p-decomp" class="ta" rows="6" placeholder="Écrire ici pour toi seulement…"></textarea><div style="display:flex;gap:8px;margin-top:10px;width:100%"><button class="p-btn-g" style="flex:1" onclick="saveDecomp()">Enregistrer</button><button class="p-btn-s" style="flex:1" onclick="render()">Retour</button></div></div></div>';
}
function saveDecomp(){
  const ta=document.getElementById("p-decomp");
  const txt=ta&&ta.value.trim();
  if(txt){
    const log=JSON.parse(localStorage.getItem('mc_journal')||'[]');
    log.push({date:tday(),mid:detail?detail.mid:"",client:detail?detail.client:"",type:detail?detail.type:"",mood:0,energy:0,context:"Décompression",note:txt,flag:"🟡"});
    localStorage.setItem('mc_journal',JSON.stringify(log));
  }
  toast('✅ Décompression enregistrée','green');
  render();
}
let _tt=null;
function toast(msg,type){
  let el=document.getElementById('mc-toast');
  if(!el){el=document.createElement('div');el.id='mc-toast';document.body.appendChild(el);}
  el.textContent=msg;el.className='mc-toast mc-toast-'+(type||'green')+' mc-toast-show';
  if(_tt)clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('mc-toast-show'),3800);
}
</script>
</body>
</html>
