<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080c14">
<title>Mission Control</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;transition:background .3s,color .3s}
body.dark{background:#080c14;color:#ddd8ce}
body.light{background:#f0ede6;color:#1a1814}
a{text-decoration:none}
button{font-family:inherit;cursor:pointer}
input,textarea{font-family:inherit}
#root{max-width:480px;margin:0 auto;min-height:100vh}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:22px;height:22px;border:2px solid transparent;border-top:2px solid #4fc3f7;border-radius:50%;animation:spin .7s linear infinite}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .25s ease forwards}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
.pulse{animation:pulse 2s ease infinite}
</style>
</head>
<body class="dark">
<div id="root"><div class="loading"><div class="spinner"></div><span style="font-size:11px;opacity:.4;letter-spacing:1px">CHARGEMENT</span></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.10/babel.min.js"></script>

<script type="text/babel">
// ─────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────
const GAS_URL = "https://script.google.com/macros/s/AKfycbwACs6qIEu24xMe3KtSjLMbcs3A6iXqCaZEodXBuTx2au1ol5UXeUqZKM6W_NJO9qSErg/exec";

// ─────────────────────────────────────────────
// THEMES
// ─────────────────────────────────────────────
const DARK = {
  bg:"#080c14", card:"#0e1420", card2:"#111928", border:"#151d2c",
  text:"#ddd8ce", textMuted:"#6a7a8a", textFaint:"#3a4858", textBright:"#eae7e0",
  accent:"#4fc3f7", green:"#81c784", orange:"#ffb74d", red:"#ef9a9a", purple:"#ce93d8", yellow:"#fff176",
  cardHover:"#131e2e", timeBox:"rgba(79,195,247,0.07)", timeBorder:"rgba(79,195,247,0.18)",
  inputBg:"#080c14", tag:"rgba(79,195,247,0.12)",
};
const LIGHT = {
  bg:"#f0ede6", card:"#faf8f4", card2:"#f4f1eb", border:"#ddd8cf",
  text:"#1a1814", textMuted:"#4a4540", textFaint:"#8a8278", textBright:"#0a0806",
  accent:"#1565c0", green:"#2e7d32", orange:"#bf360c", red:"#b71c1c", purple:"#4a148c", yellow:"#f57f17",
  cardHover:"#f5f2ec", timeBox:"rgba(21,101,192,0.05)", timeBorder:"rgba(21,101,192,0.18)",
  inputBg:"#faf8f4", tag:"rgba(21,101,192,0.1)",
};

// ─────────────────────────────────────────────
// CLIENT METADATA
// ─────────────────────────────────────────────
const CMETA = {
  "Philibert Tourisme": {
    tag:"PHIL", color:"#43a047",
    contact:"Mélissa Hassaïm", email:"rhone-ops@philibert.fr",
    cohost:"Véronique Olivier · 06 41 60 42 88",
    emergency:"+33 4 78 98 56 49",
    rates:"2H=73€ · 4H=146€ · 5H=172.50€ · 10H=295€\nBellecour: 36.50€/h\nFrais: gare 21.50€ · airport 47€ · Vienne 10.80€×2",
  },
  "Go Côte Saône": {
    tag:"GCS", color:"#42a5f5",
    contact:"Marion", phone:"06.20.08.10.92", email:"gcs@gocotesaone.com",
    rates:"Forfait 450€ + 20€ repas débours\nCode facture: VK09-SUP02",
  },
  "Feel the French Way": {
    tag:"FTFW", color:"#ab47bc",
    contact:"Caroline", email:"contact@feelthefrenchway.fr",
    cohost:"caroline.meet.and.greet@gmail.com",
    rates:"Gare: 2H=100€ · 5H=220€\nAéroport: 2H=100€ · 5H=195€ · 10H=340€\nFrais: gare 25€ · airport 50€ (1/jour max)",
  },
  "Un Monde Bleu": {
    tag:"UMB", color:"#ff7043",
    contact:"Audrey Foret", phone:"+33 7 43 36 05 69", email:"OpsRiviera@umb-dmc.fr",
    notes:"⚠️ Toujours répondre au thread · autocariste: rhonecroisieres@galeo.mobi",
    rates:"Gare: 2H=92€→8H=282€\nAéroport: 2H=108€→8H=293€\nTransport: 31€ forfait · 18€ one-way (airport, 1/jour)",
  },
};

const TRANSPORT = [
  {d:"Perrache",t:45},{d:"Part-Dieu",t:45},{d:"LYS Aéroport",t:52},
  {d:"Quai Claude Bernard",t:45},{d:"Vienne",t:105},{d:"Genève",t:180},
  {d:"Montpellier",t:180},{d:"Bâle",t:150},{d:"Chalon",t:90},
];

// ─────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────
const DF = ["dim","lun","mar","mer","jeu","ven","sam"];
const MF = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
const MS = ["jan","fév","mar","avr","mai","jun","jul","aoû","sep","oct","nov","déc"];

function fd(d) {
  if (!d) return "";
  const s = String(d).trim();
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
  const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return `${m[3]}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`;
  return s;
}
function nice(iso) { if (!iso) return ""; const d = new Date(iso+"T12:00:00"); return `${DF[d.getDay()]} ${d.getDate()} ${MS[d.getMonth()]}`; }
function niceLong(iso) { if (!iso) return ""; const d = new Date(iso+"T12:00:00"); return `${DF[d.getDay()]} ${d.getDate()} ${MF[d.getMonth()]}`; }
function today() { return new Date().toISOString().slice(0,10); }
function tmrw() { const d = new Date(); d.setDate(d.getDate()+1); return d.toISOString().slice(0,10); }
function cMonth() { return String(new Date().getMonth()+1).padStart(2,"0"); }
function nowHHMM() { const d = new Date(); return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`; }

function gm(c) {
  if (!c) return {tag:"?",color:"#666"};
  for (const [k,v] of Object.entries(CMETA)) {
    if (c.toLowerCase().includes(k.split(" ")[0].toLowerCase())) return v;
  }
  return {tag:"?",color:"#666"};
}
function trv(e) {
  if (!e) return null;
  const u = e.toUpperCase();
  for (const t of TRANSPORT) if (u.includes(t.d.toUpperCase())) return t.t;
  if (u.includes("AIRPORT")||u.includes("LYS")) return 52;
  return 45;
}
function depTime(debut, travel) {
  if (!debut||!travel) return null;
  const p = debut.split(":");
  if (p.length < 2) return null;
  const m = parseInt(p[0])*60 + parseInt(p[1]) - travel - 15;
  if (m < 0) return null;
  return `${String(Math.floor(m/60)).padStart(2,"0")}:${String(m%60).padStart(2,"0")}`;
}

// ─────────────────────────────────────────────
// FIELD ACCESSORS
// ─────────────────────────────────────────────
function F(m,k) { return m[k]||m[k.replace("é","e")]||m[k.replace("è","e")]||m[k.replace("û","u")]||""; }
function mDate(m)   { return fd(F(m,"Date mission")); }
function mDebut(m)  { return F(m,"Début")||F(m,"Debut")||""; }
function mClient(m) { return F(m,"Client"); }
function mType(m)   { return F(m,"Type"); }
function mDesc(m)   { return F(m,"Description"); }
function mHeures(m) { return F(m,"Heures"); }
function mBase(m)   { return F(m,"Base (HT)")||F(m,"Base")|| ""; }
function mDeb(m)    { return F(m,"Débours")||F(m,"Debours")||""; }
function mStatut(m) { return F(m,"Statut"); }
function mNotes(m)  { return F(m,"Notes"); }
function mEndroit(m){ return F(m,"Endroit"); }
function mMid(m)    { return F(m,"Mission ID"); }
function mVoyage(m) { return F(m,"Voyage(min)")||F(m,"Voyage"); }
function isDone(m)  { const s=(mStatut(m)).toLowerCase(); return s.includes("envoyé")||s.includes("terminé")||s.includes("confirme")||s.includes("heures"); }
function typeShort(m){ return mType(m).replace("ASSISTANCE ","").split(" - ").pop().split(" - ")[0]; }

// ─────────────────────────────────────────────
// LOCAL STORAGE — OPS OVERLAY
// ─────────────────────────────────────────────
function opsKey(mid)    { return `ops_${mid}`; }
function logKey(mid)    { return `log_${mid}`; }
function getOps(mid)    { try { return JSON.parse(localStorage.getItem(opsKey(mid))||"{}"); } catch(e) { return {}; } }
function setOps(mid,d)  { localStorage.setItem(opsKey(mid), JSON.stringify(d)); }
function getLog(mid)    { try { return JSON.parse(localStorage.getItem(logKey(mid))||"null"); } catch(e) { return null; } }
function setLog(mid,d)  { localStorage.setItem(logKey(mid), JSON.stringify(d)); }

// ─────────────────────────────────────────────
// API CALLS
// ─────────────────────────────────────────────
async function fetchMissions(month) {
  try {
    const r = await fetch(`${GAS_URL}?action=missions&month=${encodeURIComponent(month||"current")}`);
    const d = await r.json();
    return d.missions || [];
  } catch(e) { console.error(e); return null; }
}
async function fetchWeather() {
  try {
    const r = await fetch("https://api.open-meteo.com/v1/forecast?latitude=45.764&longitude=4.836&current=temperature_2m,weather_code&daily=precipitation_probability_max&timezone=Europe/Paris&forecast_days=1");
    const d = await r.json();
    const code = d.current?.weather_code || 0;
    const temp = Math.round(d.current?.temperature_2m || 0);
    const rain = d.daily?.precipitation_probability_max?.[0] || 0;
    const icons = {0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",51:"🌦️",53:"🌧️",61:"🌧️",63:"🌧️",71:"🌨️",80:"🌦️",95:"⛈️"};
    return { temp, icon: icons[code]||"🌤️", rain };
  } catch(e) { return { temp:"?", icon:"🌤️", rain:0 }; }
}
async function updateField(id, field, value) {
  try {
    const r = await fetch(`${GAS_URL}?action=update&id=${encodeURIComponent(id)}&field=${encodeURIComponent(field)}&value=${encodeURIComponent(value)}`);
    return await r.json();
  } catch(e) { return { error: e.message }; }
}

// ─────────────────────────────────────────────
// APP ROOT
// ─────────────────────────────────────────────
function App() {
  const [theme, setTheme]       = React.useState(() => localStorage.getItem("mc_theme")||"dark");
  const [tab, setTab]           = React.useState("today");
  const [detail, setDetail]     = React.useState(null);
  const [missions, setMissions] = React.useState([]);
  const [loading, setLoading]   = React.useState(true);
  const [weather, setWeather]   = React.useState({temp:"·",icon:"🌤️",rain:0});
  const [postMission, setPostMission] = React.useState(null);
  const [refreshKey, setRefreshKey]   = React.useState(0);

  const T = theme === "dark" ? DARK : LIGHT;

  React.useEffect(() => {
    document.body.className = theme;
    document.querySelector('meta[name="theme-color"]').content = theme === "dark" ? "#080c14" : "#f0ede6";
    localStorage.setItem("mc_theme", theme);
  }, [theme]);

  const load = React.useCallback(async () => {
    setLoading(true);
    const [m, w] = await Promise.all([fetchMissions("current"), fetchWeather()]);
    if (m !== null) setMissions(m);
    if (w) setWeather(w);
    setLoading(false);
  }, []);

  React.useEffect(() => { load(); }, [load]);

  const t0 = today(), t1 = tmrw(), cm = cMonth();
  const mnLabel = MF[parseInt(cm)-1] || "?";

  const todayM   = React.useMemo(() => missions.filter(m => mDate(m) === t0).sort((a,b) => (mDebut(a)||"z").localeCompare(mDebut(b)||"z")), [missions, t0]);
  const tmrwM    = React.useMemo(() => missions.filter(m => mDate(m) === t1).sort((a,b) => (mDebut(a)||"z").localeCompare(mDebut(b)||"z")), [missions, t1]);
  const upcoming = React.useMemo(() => missions.filter(m => mDate(m) > t0).sort((a,b) => mDate(a).localeCompare(mDate(b))), [missions, t0]);

  const done    = missions.filter(isDone).length;
  const totalHT = missions.reduce((s,m) => s+(parseFloat(mBase(m))||0), 0);
  const totalDeb = missions.reduce((s,m) => s+(parseFloat(mDeb(m))||0), 0);

  const byDate = React.useMemo(() => {
    const g = {};
    missions.forEach(m => { const d = mDate(m); if (d) (g[d]=g[d]||[]).push(m); });
    return g;
  }, [missions]);

  if (loading) return (
    <div className="loading">
      <div className="spinner"></div>
      <span style={{fontSize:10,color:T.textFaint,letterSpacing:2}}>CHARGEMENT</span>
    </div>
  );

  // POST-MISSION FLOW
  if (postMission) return (
    <PostMissionFlow
      m={postMission} T={T}
      onDone={async (data) => {
        if (data.heures) await updateField(mMid(postMission), "heures", data.heures);
        if (data.notes)  await updateField(mMid(postMission), "notes", data.notes);
        if (data.statut) await updateField(mMid(postMission), "statut", data.statut);
        setLog(mMid(postMission), data);
        setPostMission(null);
        setRefreshKey(k => k+1);
        load();
      }}
      onCancel={() => setPostMission(null)}
    />
  );

  return (
    <div key={refreshKey} style={{maxWidth:480, margin:"0 auto", minHeight:"100vh", background:T.bg}}>

      {/* ── HEADER ── */}
      <Header T={T} theme={theme} onToggleTheme={() => setTheme(theme==="dark"?"light":"dark")}
        weather={weather} missions={missions} done={done} mnLabel={mnLabel} onRefresh={load} />

      {/* ── NAV ── */}
      <Nav tab={tab} setTab={(t) => { setTab(t); setDetail(null); }} T={T} cm={cm} />

      <div style={{padding:"14px 15px 60px", minHeight:"65vh"}}>

        {/* TODAY TAB */}
        {tab === "today" && !detail && (
          <TodayTab T={T} todayM={todayM} tmrwM={tmrwM} upcoming={upcoming} t0={t0} t1={t1}
            onDetail={setDetail} />
        )}

        {/* DETAIL VIEW */}
        {detail && (
          <DetailView m={detail} T={T} theme={theme}
            onBack={() => setDetail(null)}
            onPostMission={() => { setPostMission(detail); setDetail(null); }}
          />
        )}

        {/* MONTH TAB */}
        {tab === "month" && !detail && (
          <MonthTab T={T} byDate={byDate} t0={t0} t1={t1} mnLabel={mnLabel}
            missions={missions} onDetail={setDetail} />
        )}

        {/* FINANCE TAB */}
        {tab === "finance" && (
          <FinanceTab T={T} missions={missions} done={done} totalHT={totalHT} totalDeb={totalDeb} mnLabel={mnLabel} />
        )}

        {/* BREATHE TAB */}
        {tab === "breathe" && <BreatheTab T={T} />}

      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// HEADER
// ─────────────────────────────────────────────
function Header({T, theme, onToggleTheme, weather, missions, done, mnLabel, onRefresh}) {
  const now = new Date();
  const dateStr = now.toLocaleDateString("fr-FR", {weekday:"long",day:"numeric",month:"long"});

  return (
    <div style={{
      padding:"14px 16px 10px",
      background: theme==="dark" ? "linear-gradient(180deg,#0d1420 0%,#080c14 100%)" : "linear-gradient(180deg,#faf8f4 0%,#f0ede6 100%)",
      borderBottom:`1px solid ${T.border}`,
    }}>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start"}}>
        <div>
          <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:2}}>
            <span style={{fontSize:8, letterSpacing:3, color:T.textFaint, textTransform:"uppercase", fontFamily:"'DM Mono',monospace"}}>Mission Control</span>
            <button onClick={onToggleTheme} style={{background:"none",border:"none",fontSize:11,padding:"1px 4px",color:T.textFaint,borderRadius:4}}>
              {theme==="dark"?"☀️":"🌙"}
            </button>
          </div>
          <div style={{fontSize:17, fontWeight:700, color:T.textBright, lineHeight:1.2}}>{dateStr}</div>
          <div style={{fontSize:10, color:T.textFaint, marginTop:3, fontFamily:"'DM Mono',monospace"}}>
            {mnLabel} · {missions.length} missions · {done} terminées
          </div>
        </div>
        <div style={{textAlign:"right", display:"flex", flexDirection:"column", alignItems:"flex-end", gap:2}}>
          <div style={{fontSize:22, lineHeight:1}}>{weather.icon}</div>
          <div style={{fontSize:14, fontWeight:600, color:T.textMuted}}>{weather.temp}°C</div>
          {weather.rain > 15 && <div style={{fontSize:9, color:T.accent}}>🌧 {weather.rain}%</div>}
          <button onClick={onRefresh} style={{background:"none",border:"none",color:T.textFaint,fontSize:10,padding:2,marginTop:2}}>↻</button>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// NAV
// ─────────────────────────────────────────────
function Nav({tab, setTab, T, cm}) {
  const items = [
    {id:"today", icon:"☀️", label:"Aujourd'hui"},
    {id:"month", icon:"📅", label:MS[parseInt(cm)-1]},
    {id:"finance", icon:"💶", label:"Finances"},
    {id:"breathe", icon:"🌿", label:"Pause"},
  ];
  return (
    <div style={{display:"flex", borderBottom:`1px solid ${T.border}`, background:T.bg, position:"sticky", top:0, zIndex:20}}>
      {items.map(n => (
        <button key={n.id} onClick={() => setTab(n.id)} style={{
          flex:1, padding:"8px 0 6px", background:"none", border:"none",
          color: tab===n.id ? T.textBright : T.textFaint,
          fontSize:8, fontWeight: tab===n.id ? 700 : 400,
          borderBottom: tab===n.id ? `2px solid ${T.accent}` : "2px solid transparent",
          letterSpacing:.8, textTransform:"uppercase",
          transition:"color .15s",
        }}>
          <div style={{fontSize:15, marginBottom:2}}>{n.icon}</div>
          {n.label}
        </button>
      ))}
    </div>
  );
}

// ─────────────────────────────────────────────
// TODAY TAB
// ─────────────────────────────────────────────
function TodayTab({T, todayM, tmrwM, upcoming, t0, t1, onDetail}) {
  const hasToday = todayM.length > 0;
  const hasTmrw  = tmrwM.length > 0;

  return (
    <div className="fade-up">
      {!hasToday && !hasTmrw && upcoming.length === 0 && (
        <div style={{textAlign:"center", padding:"40px 0"}}>
          <div style={{fontSize:40, marginBottom:8}}>☀️</div>
          <div style={{fontSize:14, color:T.textMuted}}>Pas de missions</div>
        </div>
      )}
      {hasToday && <>{SectionLabel("AUJOURD'HUI", T)}{todayM.map(m => <MissionCard key={mMid(m)} m={m} T={T} onTap={() => onDetail(m)} />)}</>}
      {hasTmrw  && <>{SectionLabel("DEMAIN · "+nice(t1), T)}{tmrwM.map(m => <MissionCard key={mMid(m)} m={m} T={T} compact onTap={() => onDetail(m)} />)}</>}
      {!hasToday && !hasTmrw && upcoming.length > 0 && (
        <>{SectionLabel("PROCHAINE · "+nice(mDate(upcoming[0])), T)}
          <MissionCard m={upcoming[0]} T={T} onTap={() => onDetail(upcoming[0])} /></>
      )}
      {upcoming.slice(0, 4).length > 0 && hasToday && (
        <>{SectionLabel("À VENIR", T)}
          {upcoming.slice(0,3).map(m => <MissionCard key={mMid(m)} m={m} T={T} compact onTap={() => onDetail(m)} />)}</>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────
// MISSION CARD
// ─────────────────────────────────────────────
function MissionCard({m, compact, onTap, T}) {
  const meta = gm(mClient(m));
  const done = isDone(m);
  const debut = mDebut(m) || "TBD";
  const tShort = typeShort(m);
  const log = getLog(mMid(m));

  return (
    <div onClick={onTap} style={{
      background:T.card, borderRadius:compact?10:12, padding:compact?"8px 12px":"12px 14px",
      marginBottom:6, borderLeft:`3px solid ${meta.color}`,
      cursor:"pointer", opacity: done ? .55 : 1,
      transition:"transform .1s, background .15s",
    }}
      onPointerDown={e=>e.currentTarget.style.transform="scale(0.985)"}
      onPointerUp={e=>e.currentTarget.style.transform=""}
      onPointerLeave={e=>e.currentTarget.style.transform=""}
    >
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start"}}>
        <div style={{flex:1, minWidth:0}}>
          <div style={{display:"flex", alignItems:"center", gap:5, flexWrap:"wrap"}}>
            <span style={{
              fontSize:9, fontWeight:700, color:meta.color, letterSpacing:.8,
              background:meta.color+"18", padding:"2px 6px", borderRadius:4,
              fontFamily:"'DM Mono',monospace",
            }}>{meta.tag}</span>
            <span style={{fontSize:compact?12:13, fontWeight:600, color:T.textBright}}>{debut}</span>
            {!compact && <span style={{fontSize:10, color:T.textFaint}}>{nice(mDate(m))}</span>}
            {done && <span style={{fontSize:8, color:T.green}}>✓</span>}
            {log && !done && <span style={{fontSize:8, color:T.orange, fontFamily:"'DM Mono',monospace"}}>LOG</span>}
          </div>
          <div style={{fontSize:compact?10:11, color:T.textMuted, marginTop:2, fontWeight:500}}>{tShort}</div>
        </div>
        <div style={{textAlign:"right", fontSize:9, color:T.textFaint, fontFamily:"'DM Mono',monospace", marginLeft:8}}>
          {mDesc(m) && <div>{mDesc(m)}</div>}

}

// ─────────────────────────────────────────────
// BREATHE TAB
// ─────────────────────────────────────────────
function BreatheTab({T}) {
  const [active, setActive]     = React.useState(false);
  const [phase, setPhase]       = React.useState(0);
  const [cycle, setCycle]       = React.useState(0);
  const [noteText, setNoteText] = React.useState("");
  const [noteSaved, setNoteSaved] = React.useState(false);

  const phases = ["Inspire","Retiens","Expire","Retiens"];
  const durations = [4000, 4000, 4000, 4000];

  React.useEffect(() => {
    if (!active) { setPhase(0); return; }
    const t = setTimeout(() => {
      const next = (phase+1)%4;
      if (next === 0) setCycle(c => c+1);
      setPhase(next);
    }, durations[phase]);
    return () => clearTimeout(t);
  }, [active, phase]);

  const size = active ? (phase===0||phase===1 ? 130 : 50) : 50;

  const saveNote = () => {
    if (!noteText.trim()) return;
    const notes = JSON.parse(localStorage.getItem("decompress_notes")||"[]");
    notes.push({ ts: new Date().toISOString(), text: noteText });
    localStorage.setItem("decompress_notes", JSON.stringify(notes));
    setNoteText("");
    setNoteSaved(true);
    setTimeout(() => setNoteSaved(false), 2000);
  };

  return (
    <div className="fade-up" style={{textAlign:"center", paddingTop:10}}>
      {SectionLabel("RESPIRATION · BOX 4-4-4-4", T)}

      <div style={{
        width:size, height:size, borderRadius:"50%",
        margin:"30px auto 20px",
        background: active
          ? `radial-gradient(circle, ${T.accent}25, ${T.accent}05)`
          : T.card,
        border:`1.5px solid ${active ? T.accent+"55" : T.border}`,
        transition:"all 4s cubic-bezier(.4,0,.2,1)",
        display:"flex", alignItems:"center", justifyContent:"center",
        boxShadow: active ? `0 0 40px ${T.accent}15` : "none",
      }}>
        {active && <span style={{fontSize:10, color:T.accent, fontWeight:600, letterSpacing:.5}}>{phases[phase]}</span>}
      </div>

      {active && <div style={{fontSize:10, color:T.textFaint, marginBottom:16}}>Cycle {cycle+1} · {phases[phase]}</div>}

      <button onClick={() => setActive(!active)} style={{
        padding:"10px 30px", borderRadius:20, fontSize:12, fontWeight:600,
        background: active ? T.red+"18" : T.accent+"18",
        color: active ? T.red : T.accent,
        border:`1px solid ${active ? T.red+"33" : T.accent+"33"}`,
      }}>
        {active ? "Arrêter" : "Commencer"}
      </button>

      {!active && (
        <div style={{marginTop:8, fontSize:10, color:T.textFaint, lineHeight:1.7}}>
          Après une longue mission · 4 cycles = 1 min
        </div>
      )}

      {/* QUICK JOURNAL */}
      <div style={{marginTop:28, textAlign:"left"}}>
        {SectionLabel("DÉCHARGE RAPIDE", T)}
        <textarea
          value={noteText}
          onChange={e => setNoteText(e.target.value)}
          placeholder="Ce que tu gardes en toi depuis la mission..."
          rows={4}
          style={{
            width:"100%", padding:"10px 12px", borderRadius:10, fontSize:12,
            border:`1px solid ${T.border}`, background:T.card, color:T.textBright,
            resize:"vertical", fontFamily:"'DM Sans',sans-serif", lineHeight:1.6,
          }}
        />
        <button onClick={saveNote} style={{
          width:"100%", marginTop:8, padding:"10px", borderRadius:8, fontSize:12, fontWeight:600,
          background: noteSaved ? T.green+"18" : T.card2||T.card,
          color: noteSaved ? T.green : T.textMuted,
          border:`1px solid ${noteSaved ? T.green+"33" : T.border}`,
        }}>
          {noteSaved ? "✓ Enregistré" : "Enregistrer"}
        </button>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// POST-MISSION FLOW
// ─────────────────────────────────────────────
function PostMissionFlow({m, T, onDone, onCancel}) {
  const [step, setStep]     = React.useState(1);
  const [debutR, setDebutR] = React.useState(mDebut(m)||"");
  const [finR, setFinR]     = React.useState("");
  const [notes, setNotes]   = React.useState("");
  const [sending, setSending] = React.useState(false);

  const meta = gm(mClient(m));

  let heures = "";
  if (debutR && finR) {
    const [sh,sm] = debutR.split(":").map(Number);
    const [eh,em] = finR.split(":").map(Number);
    heures = String(((eh*60+em)-(sh*60+sm))/60);
  }

  return (
    <div style={{maxWidth:480, margin:"0 auto", minHeight:"100vh", background:T.bg, padding:20}}>
      <button onClick={onCancel} style={{background:"none",border:"none",color:T.textFaint,fontSize:11,cursor:"pointer",marginBottom:14}}>← Annuler</button>

      {/* Progress dots */}
      <div style={{display:"flex", gap:6, justifyContent:"center", marginBottom:16}}>
        {[1,2,3].map(s => (
          <div key={s} style={{width:6, height:6, borderRadius:"50%", background: s<=step ? T.accent : T.border, transition:"background .2s"}} />
        ))}
      </div>

      <div style={{background:T.card, borderRadius:14, padding:20, borderLeft:`4px solid ${meta.color}`}}>
        <div style={{fontSize:9, color:meta.color, fontWeight:700, letterSpacing:1, fontFamily:"'DM Mono',monospace"}}>{meta.tag} · {mType(m).replace("ASSISTANCE ","")}</div>
        <div style={{fontSize:14, fontWeight:700, color:T.textBright, marginTop:2, marginBottom:16}}>{niceLong(mDate(m))}</div>

        {step === 1 && (
          <div>
            <div style={{fontSize:12, fontWeight:700, color:T.textBright, marginBottom:12}}>⏱ Heures réelles</div>
            <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:12}}>
              <div>
                <div style={{fontSize:10, color:T.textFaint, marginBottom:4}}>Début</div>
                <input type="time" value={debutR} onChange={e=>setDebutR(e.target.value)}
                  style={{width:"100%",padding:10,borderRadius:8,border:`1px solid ${T.border}`,background:T.inputBg,color:T.textBright,fontSize:14}} />
              </div>
              <div>
                <div style={{fontSize:10, color:T.textFaint, marginBottom:4}}>Fin</div>
                <input type="time" value={finR} onChange={e=>setFinR(e.target.value)}
                  style={{width:"100%",padding:10,borderRadius:8,border:`1px solid ${T.border}`,background:T.inputBg,color:T.textBright,fontSize:14}} />
              </div>
            </div>
            {debutR && finR && <div style={{fontSize:12, color:T.accent, marginBottom:12}}>= {parseFloat(heures).toFixed(1)}h</div>}
            <button onClick={() => setStep(2)} style={btnStyle(T)}>Suivant →</button>
          </div>
        )}

        {step === 2 && (
          <div>
            <div style={{fontSize:12, fontWeight:700, color:T.textBright, marginBottom:12}}>📝 Notes de terrain</div>
            <textarea value={notes} onChange={e=>setNotes(e.target.value)}
              placeholder="RAS, incident, remarques client..." rows={4}
              style={{width:"100%",padding:10,borderRadius:8,border:`1px solid ${T.border}`,background:T.inputBg,color:T.textBright,fontSize:12,resize:"vertical",fontFamily:"inherit",lineHeight:1.6}} />
            <div style={{display:"flex", gap:8, marginTop:12}}>
              <button onClick={() => setStep(1)} style={btnStyle(T, true)}>← Retour</button>
              <button onClick={() => setStep(3)} style={{...btnStyle(T), flex:2}}>Suivant →</button>
            </div>
          </div>
        )}

        {step === 3 && (
          <div>
            <div style={{fontSize:12, fontWeight:700, color:T.textBright, marginBottom:12}}>✅ Confirmer</div>
            <div style={{background:T.card2||T.bg, borderRadius:8, padding:12, fontSize:11, color:T.textMuted, lineHeight:2, marginBottom:16}}>
              <div>⏱ <b style={{color:T.textBright}}>{debutR}–{finR}</b> = {parseFloat(heures).toFixed(1)}h</div>
              <div>📝 {notes||"RAS"}</div>
              <div>📊 Statut → <b style={{color:T.green}}>Heures confirmées</b></div>
            </div>
            <button disabled={sending} onClick={async () => {
              setSending(true);
              await onDone({heures, debutR, finR, notes:notes||"RAS", statut:"Heures confirmées"});
            }} style={{
              width:"100%", padding:14, borderRadius:10, fontSize:13, fontWeight:700,
              background:T.green+"20", color:T.green, border:`1px solid ${T.green}33`,
              opacity:sending?.5:1, cursor:sending?"not-allowed":"pointer",
            }}>
              {sending ? "Enregistrement..." : "✅ Confirmer et enregistrer"}
            </button>
            <button onClick={() => setStep(2)} style={{...btnStyle(T, true), width:"100%", marginTop:8}}>← Modifier</button>
          </div>
        )}
      </div>

      {step === 3 && !sending && (
        <div style={{textAlign:"center", marginTop:20}}>
          <div style={{fontSize:11, color:T.textFaint}}>Mission terminée — tu peux souffler.</div>
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────
// MICRO COMPONENTS
// ─────────────────────────────────────────────
function SectionLabel(text, T) {
  return <div style={{fontSize:9, color:T.textFaint, fontWeight:700, letterSpacing:1.8, textTransform:"uppercase", marginBottom:6, marginTop:8, fontFamily:"'DM Mono',monospace"}}>{text}</div>;
}
function StatBox({l,v,c,T}) {
  return (
    <div style={{background:T.card, borderRadius:10, padding:"10px 12px", textAlign:"center"}}>
      <div style={{fontSize:9, color:T.textFaint, marginBottom:2}}>{l}</div>
      <div style={{fontSize:17, fontWeight:700, color:c}}>{v}</div>
    </div>
  );
}
function FldBox({l,v,T,mono,small}) {
  return (
    <div>
      <div style={{fontSize:9, color:T.textFaint, marginBottom:1}}>{l}</div>
      <div style={{fontSize:small?9:11, fontWeight:600, color:T.textMuted, fontFamily:mono?"'DM Mono',monospace":"inherit", wordBreak:"break-all"}}>{v}</div>
    </div>
  );
}
function Row({l,v,T,bold,accent}) {
  return (
    <div style={{display:"flex", justifyContent:"space-between", marginBottom:3}}>
      <span style={{color:T.textFaint}}>{l}</span>
      <span style={{fontWeight:bold?700:500, color:accent||T.textMuted}}>{v}</span>
    </div>
  );
}
function btnStyle(T, ghost) {
  return {
    flex:1, padding:"10px 16px", borderRadius:8, fontSize:12, fontWeight:600,
    background: ghost ? "none" : T.accent+"18",
    color: ghost ? T.textMuted : T.accent,
    border:`1px solid ${ghost ? T.border : T.accent+"33"}`,
    cursor:"pointer",
  };
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

</body>
</html>
