<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Mission Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════════════ */
:root {
  --bg:      #080810;
  --s1:      #10101c;
  --s2:      #181826;
  --s3:      #202030;
  --s4:      #282840;
  --bdr:     rgba(255,255,255,.06);
  --bdr2:    rgba(255,255,255,.11);
  --txt0:    #f4f2ee;
  --txt1:    #c8c4bc;
  --txt2:    #8a8680;
  --txt3:    #504c48;
  --gold:    #e8c97a;
  --gold2:   #c8a840;
  --blue:    #5b9cf6;
  --green:   #52c47c;
  --amber:   #f0a040;
  --red:     #e85858;
  --purple:  #a87cf4;
  --r:       12px;
  --r-sm:    7px;
  --r-xs:    4px;
  --sans: 'Outfit', sans-serif;
  --mono: 'JetBrains Mono', monospace;

  /* Client colours */
  --c-phil: #52c47c;
  --c-gcs:  #5b9cf6;
  --c-ftfw: #a87cf4;
  --c-umb:  #f0a040;
}
.light {
  --bg:   #f0ede6;
  --s1:   #ffffff;
  --s2:   #e8e4dc;
  --s3:   #ddd8cf;
  --s4:   #d0cbc0;
  --bdr:  rgba(0,0,0,.07);
  --bdr2: rgba(0,0,0,.13);
  --txt0: #1a1814;
  --txt1: #4a4640;
  --txt2: #7a7670;
  --txt3: #b0aba4;
  --gold: #7a5800;
  --gold2:#a07000;
  --blue: #1a50d0;
  --green:#1a8040;
  --amber:#b06010;
  --red:  #b02020;
  --purple:#6030c0;
}

/* ═══════════════════════════════════════════════════
   RESET
═══════════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{font-family:var(--sans);background:var(--bg);color:var(--txt0);font-size:14px;line-height:1.5;transition:background .2s,color .2s;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
select{font-family:inherit;}
textarea{font-family:inherit;}
input{font-family:inherit;}

/* ═══════════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════════ */
.app{display:flex;flex-direction:column;height:100vh;}
.hdr{
  flex-shrink:0;
  padding:12px 16px 10px;
  background:var(--bg);
  border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;justify-content:space-between;
}
.nav{
  flex-shrink:0;
  display:flex;
  background:var(--bg);
  border-bottom:1px solid var(--bdr);
  /* CRITICAL: centered on mobile */
  justify-content:center;
}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.inner{padding:14px 15px 100px;max-width:520px;margin:0 auto;}

/* ═══════════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════════ */
.brand{display:flex;flex-direction:column;gap:1px;}
.brand-name{
  font-family:var(--sans);font-weight:800;font-size:17px;
  letter-spacing:-.2px;color:var(--gold);
  text-transform:uppercase;letter-spacing:.5px;
}
.brand-sub{font-size:10px;color:var(--txt3);letter-spacing:.3px;font-weight:400;}
.hdr-r{display:flex;align-items:center;gap:10px;}
.clock{
  font-family:var(--mono);font-size:19px;font-weight:400;
  color:var(--txt0);letter-spacing:.04em;
}
.hdr-wx{font-size:12px;color:var(--txt2);display:flex;align-items:center;gap:3px;}
.hdr-btn{
  width:34px;height:34px;border-radius:50%;
  background:var(--s2);border:1px solid var(--bdr);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;color:var(--txt2);transition:background .12s;
}
.hdr-btn:active{background:var(--s3);}

/* ═══════════════════════════════════════════════════
   NAV — centered, evenly spaced
═══════════════════════════════════════════════════ */
.nb{
  flex:1;max-width:140px;
  display:flex;align-items:center;justify-content:center;gap:5px;
  font-family:var(--sans);font-size:11px;font-weight:600;
  letter-spacing:.5px;text-transform:uppercase;
  color:var(--txt2);
  padding:11px 6px;
  border-bottom:2px solid transparent;
  transition:color .15s,border-color .15s;
  white-space:nowrap;
}
.nb.on{color:var(--gold);border-bottom-color:var(--gold);}
.nb-icon{font-size:13px;}

/* ═══════════════════════════════════════════════════
   SUB-NAV
═══════════════════════════════════════════════════ */
.sub-nav{display:flex;gap:6px;margin-bottom:14px;}
.sn-btn{
  padding:6px 16px;border-radius:20px;
  font-size:11px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;
  background:var(--s2);border:1px solid var(--bdr);color:var(--txt2);
  transition:background .12s,color .12s,border-color .12s;
}
.sn-btn.on{background:rgba(232,201,122,.12);border-color:var(--gold);color:var(--gold);}

/* ═══════════════════════════════════════════════════
   SECTION LABELS
═══════════════════════════════════════════════════ */
.slbl{
  font-size:9px;font-weight:700;letter-spacing:1.4px;
  text-transform:uppercase;color:var(--txt3);
  padding:16px 0 7px;
}
.slbl:first-child{padding-top:2px;}

/* ═══════════════════════════════════════════════════
   DATE HEADERS
═══════════════════════════════════════════════════ */
.dhdr{
  font-size:11px;font-weight:700;letter-spacing:.5px;
  text-transform:uppercase;color:var(--txt2);
  padding:12px 0 6px;
  display:flex;align-items:center;gap:7px;
}
.dhdr.today{color:var(--gold);}
.dhdr.tmrw{color:var(--green);}
.d-pill{
  font-size:8px;padding:2px 7px;border-radius:3px;font-weight:700;
  background:rgba(232,201,122,.12);color:var(--gold);
}

/* ═══════════════════════════════════════════════════
   SUMMARY CARDS
═══════════════════════════════════════════════════ */
.sum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:2px;}
.sum-card{
  background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);
  padding:10px 10px 8px;
}
.sum-lbl{font-size:7px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--txt3);margin-bottom:4px;}
.sum-val{font-family:var(--sans);font-size:20px;font-weight:700;line-height:1;color:var(--txt0);}
.sum-val.gold{color:var(--gold);}
.sum-val.green{color:var(--green);}
.sum-val.amber{color:var(--amber);}

/* ═══════════════════════════════════════════════════
   MISSION CARD — the key element
═══════════════════════════════════════════════════ */
.mc{
  background:var(--s1);
  border:1px solid var(--bdr);
  border-radius:var(--r);
  margin-bottom:7px;
  cursor:pointer;
  overflow:hidden;
  position:relative;
  transition:transform .08s,box-shadow .12s;
  user-select:none;
}
.mc:active{transform:scale(.983);}
.mc.dim{opacity:.38;}
/* Left accent bar */
.mc-bar{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:var(--r) 0 0 var(--r);}
/* Main content */
.mc-body{padding:11px 13px 11px 17px;}
.mc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.mc-left{flex:1;min-width:0;}
.mc-right{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:5px;}
/* Header row */
.mc-head{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap;}
.mc-tag{font-size:9px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;}
.mc-time{font-family:var(--mono);font-size:12px;color:var(--txt1);font-weight:400;}
.mc-ds{font-size:9px;color:var(--txt3);}
/* Main title */
.mc-title{font-size:15px;font-weight:700;color:var(--txt0);line-height:1.2;letter-spacing:-.1px;}
.mc-sub{font-size:11px;color:var(--txt2);margin-top:2px;}
/* Pills */
.mc-pills{display:flex;gap:4px;margin-top:7px;flex-wrap:wrap;}
.pill{font-size:9px;padding:2px 8px;border-radius:3px;font-weight:600;letter-spacing:.2px;}
.p-loc{background:rgba(82,196,124,.1);color:var(--green);}
.p-pax{background:rgba(91,156,246,.09);color:var(--blue);}
.p-ship{background:rgba(168,124,244,.09);color:var(--purple);}
.p-note{background:rgba(232,201,122,.09);color:var(--gold);}
/* Badge */
.bdg{font-size:8px;padding:3px 8px;border-radius:3px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;white-space:nowrap;}
.b-brouillon{background:rgba(138,134,128,.1);color:var(--txt2);}
.b-planifie{background:rgba(91,156,246,.1);color:var(--blue);}
.b-confirme{background:rgba(82,196,124,.1);color:var(--green);}
.b-termine{background:rgba(82,196,124,.1);color:var(--green);}
.b-facgen{background:rgba(232,201,122,.1);color:var(--gold);}
.b-facenv{background:rgba(240,160,64,.1);color:var(--amber);}
.b-paye{background:rgba(168,124,244,.1);color:var(--purple);}
.b-cxl{background:rgba(232,88,88,.1);color:var(--red);}
/* Completeness dot */
.cmp{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.cmp-g{background:var(--green);}
.cmp-a{background:var(--amber);}
.cmp-r{background:var(--red);}

/* ═══════════════════════════════════════════════════
   UPCOMING (compact)
═══════════════════════════════════════════════════ */
.upcoming{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;}
.up-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 13px;border-bottom:1px solid var(--bdr);
  cursor:pointer;transition:background .1s;
}
.up-row:last-child{border-bottom:none;}
.up-row:active{background:var(--s2);}
.up-date{font-size:10px;color:var(--txt2);width:65px;flex-shrink:0;font-weight:500;}
.up-desc{font-size:12px;color:var(--txt1);flex:1;}
.up-tag{font-size:9px;font-weight:700;letter-spacing:.5px;}

/* ═══════════════════════════════════════════════════
   DETAIL VIEW
═══════════════════════════════════════════════════ */
.back{
  display:flex;align-items:center;gap:6px;
  font-size:11px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;
  color:var(--gold);padding:8px 0 12px;cursor:pointer;
  min-height:44px;
}
/* Hero card */
.hero{
  background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);
  overflow:hidden;margin-bottom:8px;
}
.hero-top{height:4px;}
.hero-body{padding:14px 15px 12px;}
.hero-client{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:4px;}
.hero-title{font-size:22px;font-weight:800;color:var(--txt0);line-height:1.1;letter-spacing:-.3px;}
.hero-sub{font-size:12px;color:var(--txt2);margin-top:4px;}
.hero-pills{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap;align-items:center;}
/* Completeness detail */
.cmp-detail{font-size:9px;color:var(--amber);display:flex;align-items:center;gap:4px;}

/* Sections */
.sec{
  background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);
  overflow:hidden;margin-bottom:8px;
}
.sec-title{
  font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  color:var(--txt3);padding:10px 14px 6px;
  border-bottom:1px solid var(--bdr);
}
.sec-body{padding:2px 14px 8px;}

/* Info rows */
.ir{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--bdr);}
.ir:last-child{border-bottom:none;}
.ir-l{font-size:10px;color:var(--txt2);width:90px;flex-shrink:0;padding-top:1px;font-weight:400;}
.ir-v{font-size:12px;color:var(--txt0);flex:1;word-break:break-word;font-weight:500;}
.ir-v a{color:var(--blue);}

/* Contact blocks */
.cb{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid var(--bdr);
}
.cb:last-child{border-bottom:none;}
.cb-r{font-size:9px;color:var(--txt3);margin-bottom:2px;letter-spacing:.2px;}
.cb-n{font-size:13px;font-weight:600;color:var(--txt0);}
.cb-p{font-size:11px;color:var(--txt2);margin-top:1px;font-family:var(--mono);}
.call-btn{
  background:rgba(82,196,124,.1);border:1px solid rgba(82,196,124,.2);
  border-radius:var(--r-sm);padding:7px 13px;
  font-size:12px;font-weight:600;color:var(--green);
  min-height:36px;display:flex;align-items:center;gap:4px;
  transition:background .12s;
}
.call-btn:active{background:rgba(82,196,124,.2);}

/* ═══════════════════════════════════════════════════
   PAX CHECKLIST
═══════════════════════════════════════════════════ */
.pax-prog{height:3px;background:var(--s3);border-radius:2px;margin:8px 0;}
.pax-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s;}
.pax-list{max-height:280px;overflow-y:auto;}
.pax-row{display:flex;align-items:flex-start;gap:9px;padding:6px 0;border-bottom:1px solid var(--bdr);}
.pax-row:last-child{border-bottom:none;}
.pax-box{
  width:19px;height:19px;border-radius:4px;
  border:1.5px solid var(--bdr2);background:var(--s2);
  flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;cursor:pointer;
  transition:background .1s,border-color .1s;
}
.pax-box.ck{background:var(--green);border-color:var(--green);color:#fff;}
.pax-name{font-size:12px;color:var(--txt0);flex:1;line-height:1.4;font-weight:400;}
.pax-name.ck{color:var(--txt3);text-decoration:line-through;}

/* ═══════════════════════════════════════════════════
   EDIT CONTROLS
═══════════════════════════════════════════════════ */
.edit-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--bdr);}
.edit-row:last-child{border-bottom:none;}
.edit-l{font-size:10px;color:var(--txt2);width:72px;flex-shrink:0;font-weight:400;}
.edit-inp{
  flex:1;background:var(--s2);border:1px solid var(--bdr2);
  border-radius:var(--r-sm);padding:7px 10px;
  font-size:12px;color:var(--txt0);outline:none;
  transition:border-color .15s;font-family:var(--mono);
}
.edit-inp:focus{border-color:var(--gold);}
.edit-sel{
  flex:1;background:var(--s2);border:1px solid var(--bdr2);
  border-radius:var(--r-sm);padding:7px 10px;
  font-size:12px;color:var(--txt0);outline:none;
  -webkit-appearance:none;
}
.save-btn{
  background:var(--gold);color:#000;
  border-radius:var(--r-sm);padding:6px 13px;
  font-size:11px;font-weight:700;letter-spacing:.3px;
  min-height:33px;flex-shrink:0;
  transition:opacity .12s;
}
.save-btn:active{opacity:.8;}
.notes-ta{
  width:100%;background:var(--s2);border:1px solid var(--bdr);
  border-radius:var(--r-sm);padding:9px 11px;
  font-size:12px;color:var(--txt0);
  resize:vertical;min-height:70px;outline:none;line-height:1.6;
  transition:border-color .15s;margin-top:4px;
}
.notes-ta:focus{border-color:var(--gold);}
.save-row{display:flex;justify-content:flex-end;margin-top:5px;}

/* ═══════════════════════════════════════════════════
   COLLAPSIBLE — FIXED
═══════════════════════════════════════════════════ */
.coll{border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-top:8px;}
.coll-h{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;cursor:pointer;background:var(--s2);
  transition:background .1s;
}
.coll-h:active{background:var(--s3);}
.coll-htitle{font-size:11px;font-weight:600;color:var(--txt1);letter-spacing:.2px;}
.coll-hsub{font-size:9px;color:var(--txt3);margin-top:1px;}
.coll-chev{font-size:11px;color:var(--txt3);transition:transform .18s;flex-shrink:0;}
/* KEY FIX: body starts hidden, open class reveals */
.coll-body{display:none;padding:10px 14px;border-top:1px solid var(--bdr);}
.coll-body.open{display:block;}
.coll-chev.open{transform:rotate(180deg);}

/* ═══════════════════════════════════════════════════
   INVOICE
═══════════════════════════════════════════════════ */
.inv-btn{
  display:flex;align-items:center;gap:9px;
  background:var(--s2);border:1px solid var(--bdr2);
  border-radius:var(--r);padding:11px 13px;width:100%;
  font-size:12px;color:var(--txt0);font-weight:500;
  margin-top:6px;transition:background .12s;
}
.inv-btn:active{background:var(--s3);}
.inv-btn:first-child{margin-top:0;}
.inv-ico{font-size:17px;flex-shrink:0;}
.inv-r{margin-left:auto;font-size:10px;color:var(--txt3);}

/* ═══════════════════════════════════════════════════
   SNCF PANEL
═══════════════════════════════════════════════════ */
.sncf-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bdr);}
.sncf-row:last-child{border-bottom:none;}
.sncf-train{font-size:11px;font-weight:500;color:var(--txt0);}
.sncf-t{font-family:var(--mono);font-size:11px;color:var(--txt1);}
.sncf-b{font-size:9px;padding:2px 7px;border-radius:3px;font-weight:700;}
.s-ok{background:rgba(82,196,124,.1);color:var(--green);}
.s-late{background:rgba(232,88,88,.1);color:var(--red);}
.s-mut{background:rgba(138,134,128,.1);color:var(--txt2);}
.sncf-refresh{font-size:10px;color:var(--blue);cursor:pointer;padding:0 4px;}

/* ═══════════════════════════════════════════════════
   MONTH / FINANCE
═══════════════════════════════════════════════════ */
.mo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:12px;}
.mo-card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r-sm);padding:9px 10px;}
.mo-lbl{font-size:7px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--txt3);margin-bottom:4px;}
.mo-val{font-size:18px;font-weight:700;color:var(--txt0);line-height:1;}

/* Finance */
.fin-card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);margin-bottom:8px;overflow:hidden;}
.fin-title{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--txt3);padding:10px 14px 8px;border-bottom:1px solid var(--bdr);}
.fin-body{padding:4px 14px 8px;}
.fr{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bdr);}
.fr:last-child{border-bottom:none;}
.fr-l{font-size:12px;color:var(--txt1);font-weight:400;}
.fr-l.bold{font-weight:600;color:var(--txt0);}
.fr-v{font-size:13px;font-weight:700;color:var(--txt0);font-family:var(--mono);}
.fr-v.g{color:var(--green);}
.fr-v.a{color:var(--amber);}
.fr-v.r{color:var(--red);}
.fr-v.p{color:var(--purple);}
/* Mission finance rows */
.fmr{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bdr);cursor:pointer;}
.fmr:last-child{border-bottom:none;}
.fmr:active{background:var(--s2);}
.fmr-l{flex:1;min-width:0;}
.fmr-desc{font-size:11px;color:var(--txt0);font-weight:500;}
.fmr-meta{font-size:9px;color:var(--txt3);margin-top:1px;}
.fmr-r{text-align:right;flex-shrink:0;padding-left:8px;}
.fmr-base{font-size:12px;font-weight:700;color:var(--txt0);font-family:var(--mono);}
.fmr-net{font-size:9px;color:var(--txt2);margin-top:1px;font-family:var(--mono);}
.owed{font-size:8px;padding:1px 5px;border-radius:2px;background:rgba(232,88,88,.1);color:var(--red);font-weight:700;margin-left:5px;}

/* ═══════════════════════════════════════════════════
   CANCELLED SECTION
═══════════════════════════════════════════════════ */
.cxl-row{

═══════════════════════════════════════════════════ */

/* ═══════════════════════════════════════════════════

═══════════════════════════════════════════════════ */
.pmf{padding:2px 0 6px;}

.pmf-num{width:24px;height:24px;border-radius:50%;background:var(--gold);color:#000;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

.time-b{flex:1;}

  width:100%;background:var(--s2);border:1px solid var(--bdr2);

   REF BOX

<body>
<div class="app">
  <div class="hdr">
    <div class="brand">
      <div class="brand-name">Mission Control</div>
      <div class="brand-sub" id="hdr-sub">Chargement…</div>
    </div>
    <div class="hdr-r">
      <div class="hdr-wx" id="hdr-wx"></div>
      <div class="clock" id="clock">--:--</div>
      <button class="hdr-btn" onclick="toggleLight()" id="theme-btn">☀</button>
      <button class="hdr-btn" onclick="refresh()" title="Refresh">↻</button>
    </div>
  </div>

  <nav class="nav">
    <button class="nb on" id="nb-today"   onclick="go('today')">
      <span class="nb-icon">☀</span>Aujourd'hui
    </button>
    <button class="nb"    id="nb-month"   onclick="go('month')">
      <span class="nb-icon">📅</span><span id="m-lbl">Mois</span>
    </button>
    <button class="nb"    id="nb-finance" onclick="go('finance')">
      <span class="nb-icon">💶</span>Admin
    </button>
  </nav>

  <div class="scroll">
    <div class="inner" id="content">
      <div class="loader"><span class="spin">↻</span> Chargement…</div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════
const GAS   = "https://script.google.com/macros/s/AKfycbwACs6qIEu24xMe3KtSjLMbcs3A6iXqCaZEodXBuTx2au1ol5UXeUqZKM6W_NJO9qSErg/exec";
const SNCF  = "https://fragrant-hall-c33b.t5q7m95hfj.workers.dev/";
const TAX   = 0.212;

const DAYS  = ["dim","lun","mar","mer","jeu","ven","sam"];
const MOL   = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
const MOS   = ["jan","fév","mar","avr","mai","jun","jul","aoû","sep","oct","nov","déc"];
const ME    = ["😫","😔","😐","🙂","😊"];
const EE    = ["🪫","😴","⚡","💪","🔥"];

const META = {
  "Philibert Tourisme":  { tag:"PHIL",  hex:"#52c47c" },
  "Go Côte Saône":       { tag:"GCS",   hex:"#5b9cf6" },
  "Feel The French Way": { tag:"FTFW",  hex:"#a87cf4" },
  "Un Monde Bleu":       { tag:"UMB",   hex:"#f0a040" },
};

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let missions=[], journal=[];
let tab="today", sv="today", detail=null, pmf=null, pmfStep=0;
let light = localStorage.getItem("mc_light")==="1";
let pax = {};  // pax check state (session only)

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
window.addEventListener("load", () => {
  if (light) document.body.classList.add("light");
  updateThemeBtn();
  tick(); setInterval(tick, 20000);
  document.getElementById("m-lbl").textContent = MOL[new Date().getMonth()];
  loadData();
  loadWx();
});

function tick() {
  const d = new Date();
  document.getElementById("clock").textContent = p2(d.getHours())+":"+p2(d.getMinutes());
}
function toggleLight() {
  light=!light; document.body.classList.toggle("light",light);
  localStorage.setItem("mc_light",light?"1":"0"); updateThemeBtn();
}
function updateThemeBtn() { document.getElementById("theme-btn").textContent = light ? "🌙" : "☀"; }

// ═══════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════
async function loadData(force) {
  if (!force) {
    const c = localStorage.getItem("mc_v3_cache");
    if (c) {
      try { const d=JSON.parse(c); missions=d.m.map(norm); journal=d.j||[]; render(); } catch(e){}
    }
  }
  try {
    const r = await fetch(GAS+"?action=all",{signal:AbortSignal.timeout(25000)});
    const d = await r.json();
    if (d?.missions) {
      missions = d.missions.map(norm);
      journal  = d.journal || [];
      localStorage.setItem("mc_v3_cache", JSON.stringify({m:d.missions,j:d.journal}));
      // Update sub-header
      const tm = missions.filter(m => m.date===tday()&&!isCxl(m));
      document.getElementById("hdr-sub").textContent = tm.length
        ? tm.length+" mission"+(tm.length>1?"s":"")+" aujourd'hui"
        : "Aucune mission aujourd'hui";
      render();
    }
  } catch(e) { if(!missions.length) render(); }
}
async function refresh() {
  localStorage.removeItem("mc_v3_cache");
  missions=[]; journal=[];
  document.getElementById("content").innerHTML='<div class="loader"><span class="spin">↻</span> Actualisation…</div>';
  await loadData(true);
}

// ═══════════════════════════════════════════════════════
// NORMALISE — handles 1899-epoch time bug
// ═══════════════════════════════════════════════════════
function safeTime(v) {
  // FIXES the 1899 date display bug
  // Sheets returns time cells as Date objects with 1899-12-30 epoch
  // or as decimal fraction strings (0.354... = 08:30)
  if (!v && v!==0) return "";
  if (typeof v === "string") {
    // Already HH:MM
    if (/^\d{1,2}:\d{2}$/.test(v.trim())) return v.trim();
    // Decimal fraction
    const n = parseFloat(v);
    if (!isNaN(n) && n >= 0 && n < 1) {
      const min = Math.round(n*1440);
      return p2(Math.floor(min/60))+":"+p2(min%60);
    }
    // ISO string — extract time part
    const m = v.match(/(\d{2}):(\d{2})/);
    if (m) return m[1]+":"+m[2];
    return "";
  }
  return "";
}

function safeNum(v) {
  if (v===null||v===undefined||v==="") return 0;
  const n = parseFloat(String(v).replace(",","."));
  return isNaN(n) ? 0 : n;
}

function norm(m) {
  if (m._n) return m;
  const o = {...m}; o._n=1;
  o.mid    = o["Mission ID"] || "";
  o.date   = (o["Date mission"]||o["Date"]||"").slice(0,10);
  o.client = o["Client"] || "";
  o.type   = o["Type"] || "";
  o.sens   = o["Sens"] || "";
  o.desc   = o["Description"] || "";
  o.heures = o["Heures"] || "";
  // Time: use safeTime — handles 1899-epoch
  o.debut  = safeTime(o["Début"] || o["Debut"] || "");
  // FINANCE: use formula result values directly from API
  o.base      = safeNum(o["Base HT"]);
  o.hs        = safeNum(o["HS"]);
  o.sousTotal = safeNum(o["Sous-total"]);
  o.debours   = safeNum(o["Débours"]);
  o.totalNet  = safeNum(o["Total net"]);
  o.montant   = safeNum(o["Montant reçu"]);
  o.endroit   = o["Endroit"] || "";
  o.statut    = o["Statut"] || "";
  o.notes     = o["Notes"] || "";
  o.facture   = o["Facture#"] || "";
  o.ndb       = o["NDB#"] || "";
  o.rapport   = o["Rapport"]||o["Rapport ✓"]||"";
  o.docs      = o["Docs"] || "";
  o.ops       = o.ops || {};
  o.cmp       = o.completeness || null;
  // Ops shortcuts
  o.paxRaw   = o.ops["Passenger Raw"] || "";
  o.paxCount = o.ops["Pax Count"] || "";
  o.shipName = o.ops["Ship Name"] || "";
  o.extRef   = o.ops["External Ref"] || "";
  o.meetPt   = o.ops["Meeting Point"] || "";
  o.dock     = o.ops["Dock / Terminal"] || "";
  o.transRef = o.ops["Transport Ref"] || "";
  o.opsSum   = o.ops["Ops Summary"] || "";
  return o;
}

const isDone = m => { const s=(m.statut||"").toLowerCase(); return s==="terminé"||s.includes("envoy")||s==="payé"||s.includes("générée"); };
const isCxl  = m => (m.statut||"").toLowerCase().includes("annul");

function getMeta(c) {
  if (!c) return {tag:"?",hex:"#666"};
  for (const [k,v] of Object.entries(META))
    if (c.toLowerCase().includes(k.split(" ")[0].toLowerCase())) return v;
  return {tag:c.slice(0,4).toUpperCase(),hex:"#888"};
}

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function p2(n){return String(n).padStart(2,"0");}
function tday(){return new Date().toISOString().slice(0,10);}
function tmrw(){const d=new Date();d.setDate(d.getDate()+1);return d.toISOString().slice(0,10);}
function fds(iso){if(!iso)return"";const d=new Date(iso+"T12:00:00");return DAYS[d.getDay()]+" "+d.getDate()+" "+MOS[d.getMonth()];}
function fdl(iso){if(!iso)return"";const d=new Date(iso+"T12:00:00");return DAYS[d.getDay()]+" "+d.getDate()+" "+MOL[d.getMonth()];}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function nowt(){const d=new Date();return p2(d.getHours())+":"+p2(d.getMinutes());}
function durS(s,e){
  if(!s||!e)return"";
  const[sh,sm]=s.split(":").map(Number),[eh,em]=e.split(":").map(Number);
  let d=(eh*60+em)-(sh*60+sm);if(d<=0)return"";
  d=Math.round(d/15)*15;
  return Math.floor(d/60)+"h"+(d%60>0?p2(d%60):"");
}
function fmt€(n){return n?n.toFixed(2).replace(".",",")+"\u00A0€":"—";}

// ═══════════════════════════════════════════════════════
// BADGE + COMPLETENESS
// ═══════════════════════════════════════════════════════
function badge(m){
  const s=(m.statut||"").toLowerCase();
  if(isCxl(m))               return`<span class="bdg b-cxl">Annulé</span>`;
  if(s==="payé")             return`<span class="bdg b-paye">Payé</span>`;
  if(s.includes("envoyée")) return`<span class="bdg b-facenv">Fac. envoyée</span>`;
  if(s.includes("générée")) return`<span class="bdg b-facgen">Fac. générée</span>`;
  if(s==="terminé")         return`<span class="bdg b-termine">✓ Terminé</span>`;
  if(s==="confirmé")        return`<span class="bdg b-confirme">Confirmé</span>`;
  if(s==="planifié")        return`<span class="bdg b-planifie">Planifié</span>`;
  return`<span class="bdg b-brouillon">${esc(m.statut||"Brouillon")}</span>`;
}
function cmpDot(m){
  const c=m.cmp; if(!c||typeof c!=="object") return "";
  const s=c.score||0;
  const cl=s>=100?"cmp-g":s>=70?"cmp-a":"cmp-r";
  return`<div class="cmp ${cl}" title="${c.missing?.slice(0,3).join(", ")||"Complet"}"></div>`;
}

// ═══════════════════════════════════════════════════════
// MISSION CARD
// ═══════════════════════════════════════════════════════
function mcard(m, compact){
  const mt=getMeta(m.client), done=isDone(m), cxl=isCxl(m);
  const pills=[];
  if(!compact){
    const loc=m.endroit?m.endroit.split(/[,→]/)[0].trim():"";
    if(m.shipName)   pills.push(`<span class="pill p-ship">🚢 ${esc(m.shipName)}</span>`);
    else if(loc)     pills.push(`<span class="pill p-loc">${esc(loc)}</span>`);
    if(m.paxCount)   pills.push(`<span class="pill p-pax">👥 ${esc(m.paxCount)}</span>`);
    if(m.extRef&&m.extRef.length<12) pills.push(`<span class="pill p-note">${esc(m.extRef)}</span>`);
  }
  return`<div class="mc${done||cxl?" dim":""}" onclick="openD('${m.mid}')">
  <div class="mc-bar" style="background:${mt.hex}"></div>
  <div class="mc-body">
    <div class="mc-top">
      <div class="mc-left">
        <div class="mc-head">
          <span class="mc-tag" style="color:${mt.hex}">${mt.tag}</span>
          ${m.debut?`<span class="mc-time">${esc(m.debut)}</span>`:""}
          ${!compact?`<span class="mc-ds">${fds(m.date)}</span>`:""}
        </div>
        <div class="mc-title">${esc(m.type||"—")}${m.sens&&m.sens!=="—"?" · "+esc(m.sens):""}</div>
        ${m.endroit&&!m.shipName?`<div class="mc-sub">${esc(m.endroit.split(/[,→]/)[0].trim())}</div>`:""}
        ${pills.length?`<div class="mc-pills">${pills.join("")}</div>`:""}
      </div>
      <div class="mc-right">
        ${cmpDot(m)}
        ${badge(m)}
      </div>
    </div>
  </div>
</div>`;
}

// ═══════════════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════════════
function go(t){
  tab=t; if(t==="today")sv="today"; detail=null; pmf=null; pmfStep=0;
  ["today","month","finance"].forEach(id=>document.getElementById("nb-"+id).classList.toggle("on",id===t));
  render();
}
function render(){
  const el=document.getElementById("content"); if(!el)return;
  if(detail&&(tab==="today"||tab==="month")){el.innerHTML=rdDetail(detail);return;}
  if(tab==="today")   el.innerHTML=rdToday();
  else if(tab==="month")   el.innerHTML=rdMonth();
  else if(tab==="finance") el.innerHTML=rdFinance();
}
function openD(mid){
  detail=missions.find(m=>m.mid===mid)||null;
  pmf=null;pmfStep=0;render();window.scrollTo(0,0);
}
function closeD(){detail=null;render();}

// ═══════════════════════════════════════════════════════
// TODAY
// ═══════════════════════════════════════════════════════
function rdToday(){
  let h=`<div class="sub-nav">
    <button class="sn-btn${sv==="today"?" on":""}" onclick="sv='today';render()">Aujourd'hui</button>
    <button class="sn-btn${sv==="week"?" on":""}" onclick="sv='week';render()">7 jours</button>
  </div>`;
  if(sv==="week") return h+rdWeek();

  const t=tday(),tm=tmrw();
  const t1=missions.filter(m=>m.date===t&&!isCxl(m)).sort((a,b)=>(a.debut||"z").localeCompare(b.debut||"z"));
  const t2=missions.filter(m=>m.date===tm&&!isCxl(m)).sort((a,b)=>(a.debut||"z").localeCompare(b.debut||"z"));
  const up=missions.filter(m=>m.date>tm&&!isCxl(m)).sort((a,b)=>a.date.localeCompare(b.date));

  // Summary bar
  if(t1.length||t2.length){
    const all=missions.filter(m=>m.date===t);
    const done=all.filter(isDone).length;
    const bSum=all.reduce((s,m)=>s+m.sousTotal,0);
    const nSum=all.reduce((s,m)=>s+m.totalNet,0);
    h+=`<div class="sum-grid">
      <div class="sum-card"><div class="sum-lbl">Missions</div><div class="sum-val">${all.length||"—"}</div></div>
      <div class="sum-card"><div class="sum-lbl">Faites</div><div class="sum-val green">${done||"—"}</div></div>
      <div class="sum-card"><div class="sum-lbl">Sous-total</div><div class="sum-val gold">${bSum?bSum.toFixed(0)+"€":"—"}</div></div>
      <div class="sum-card"><div class="sum-lbl">Net</div><div class="sum-val amber">${nSum?nSum.toFixed(0)+"€":"—"}</div></div>
    </div>`;
  }

  if(t1.length){
    h+=`<div class="slbl">Aujourd'hui</div>`+t1.map(m=>mcard(m,false)).join("");
  } else {
    h+=`<div class="empty">
      <div class="empty-ico">☀️</div>
      <div class="empty-title">Pas de mission aujourd'hui</div>
      ${t2.length?`<div class="empty-sub">${t2.length} mission${t2.length>1?"s":""} demain</div>`:""}
    </div>`;
  }
  if(t2.length) h+=`<div class="slbl">Demain · ${fds(tm).toUpperCase()}</div>`+t2.map(m=>mcard(m,true)).join("");
  if(up.length){
    h+=`<div class="slbl">À venir</div><div class="upcoming">`;
    up.slice(0,7).forEach(m=>{
      const mt=getMeta(m.client);
      h+=`<div class="up-row" onclick="openD('${m.mid}')">
        <div class="up-date">${fds(m.date)}</div>
        <div class="up-desc">${esc(m.type||"—")}${m.sens&&m.sens!=="—"?" · "+esc(m.sens):""}</div>
        <span class="up-tag" style="color:${mt.hex}">${mt.tag}</span>
      </div>`;
    });
    h+="</div>";
  }
  return h;
}

function rdWeek(){
  const now=new Date(); let h="";
  let any=false;
  for(let d=0;d<7;d++){
    const dt=new Date(now.getTime()+d*86400000);
    const ds=dt.toISOString().slice(0,10);
    const dm=missions.filter(m=>m.date===ds&&!isCxl(m)).sort((a,b)=>(a.debut||"z").localeCompare(b.debut||"z"));
    if(!dm.length)continue;
    const isT=ds===tday(),isTm=ds===tmrw();
    h+=`<div class="dhdr${isT?" today":isTm?" tmrw":""}">
      ${fdl(ds).toUpperCase()}
      ${isT?'<span class="d-pill">Aujourd\'hui</span>':""}
    </div>`+dm.map(m=>mcard(m,false)).join("");
    any=true;
  }
  if(!any) h=`<div class="empty"><div class="empty-ico">📅</div><div class="empty-title">Semaine libre</div></div>`;
  return h;
}

// ═══════════════════════════════════════════════════════
// MONTH
// ═══════════════════════════════════════════════════════
function rdMonth(){
  const now=new Date(),cm=p2(now.getMonth()+1);
  const t=tday(),tm=tmrw();
  const mms=missions.filter(m=>m.date&&m.date.slice(5,7)===cm).sort((a,b)=>a.date.localeCompare(b.date));
  const active=mms.filter(m=>!isCxl(m));
  const done=active.filter(isDone);
  // V3: use formula values directly
  const tST=active.reduce((s,m)=>s+m.sousTotal,0);
  const tN =active.reduce((s,m)=>s+m.totalNet, 0);

  let h=`<div class="slbl">${MOL[now.getMonth()].toUpperCase()}</div>
  <div class="mo-grid">
    <div class="mo-card"><div class="mo-lbl">Total</div><div class="mo-val">${active.length}</div></div>
    <div class="mo-card"><div class="mo-lbl">Faites</div><div class="mo-val" style="color:var(--green)">${done.length}</div></div>
    <div class="mo-card"><div class="mo-lbl">Sous-total</div><div class="mo-val" style="color:var(--gold)">${tST?tST.toFixed(0)+"€":"—"}</div></div>
    <div class="mo-card"><div class="mo-lbl">Net</div><div class="mo-val" style="color:var(--amber)">${tN?tN.toFixed(0)+"€":"—"}</div></div>
  </div>`;

  const gr={};
  active.forEach(m=>{(gr[m.date]=gr[m.date]||[]).push(m);});
  Object.entries(gr).sort(([a],[b])=>a.localeCompare(b)).forEach(([date,ms])=>{
    const isT=date===t,isTm=date===tm;
    h+=`<div class="dhdr${isT?" today":isTm?" tmrw":""}">
      ${fdl(date).toUpperCase()}
      ${isT?'<span class="d-pill">Aujourd\'hui</span>':""}
    </div>`+ms.map(m=>mcard(m,false)).join("");
  });

  // Cancelled — collapsed at bottom
  const cxls=mms.filter(isCxl);
  if(cxls.length){
    h+=`<div class="coll" style="margin-top:14px">
      <div class="coll-h" onclick="tColl('cxl-mo')">
        <div><div class="coll-htitle">Annulées (${cxls.length})</div><div class="coll-hsub">Référence fiabilité clients</div></div>
        <div class="coll-chev" id="chev-cxl-mo">▾</div>
      </div>
      <div class="coll-body" id="cxl-mo" style="padding:0 14px;">
        ${cxls.map(m=>`<div class="cxl-row">
          <div>
            <div class="cxl-name">${getMeta(m.client).tag} · ${esc(m.type||"—")}</div>
            <div class="cxl-date">${fds(m.date)}${m.notes?" · "+esc(m.notes.slice(0,35)):""}</div>
          </div>
          <span class="bdg b-cxl">Annulé</span>
        </div>`).join("")}
      </div>
    </div>`;
  }
  if(!active.length) h+=`<div class="empty"><div class="empty-ico">📅</div><div class="empty-title">Aucune mission ce mois</div></div>`;

  h+=rdJournal();
  h+=`<div class="slbl">Références</div>
  <div class="ref-box">
    SIRET · 92815905200010<br>
    IBAN · FR76 2823 3000 0177 6267 3414 414<br>
    BIC · REVOFRP2 (Revolut)
  </div>`;
  return h;
}

// ═══════════════════════════════════════════════════════
// FINANCE — uses only API formula values
// ═══════════════════════════════════════════════════════
function rdFinance(){
  const now=new Date(),cm=p2(now.getMonth()+1);
  const mms=missions.filter(m=>m.date&&m.date.slice(5,7)===cm&&!isCxl(m)).sort((a,b)=>a.date.localeCompare(b.date));
  const done=mms.filter(isDone);

  // ALL VALUES from API — no JS recomputation
  const tST   = mms.reduce((s,m)=>s+m.sousTotal, 0);
  const tDeb  = mms.reduce((s,m)=>s+m.debours,   0);
  const tN    = mms.reduce((s,m)=>s+m.totalNet,   0);
  const tRecu = mms.reduce((s,m)=>s+m.montant,    0);
  // Charges = sous-total × TAX (since totalNet = sousTotal × 0.788 + debours, and debours is pass-through)
  const tBase = mms.reduce((s,m)=>s+m.base, 0);
  const tChg  = tBase * TAX;
  const tOwed = tN - tRecu;

  let h=`<div class="slbl">${MOL[now.getMonth()].toUpperCase()} — Finances</div>
  <div class="fin-card">
    <div class="fin-title">Récapitulatif mensuel</div>
    <div class="fin-body">
      <div class="fr"><span class="fr-l">Missions</span><span class="fr-v">${mms.length}</span></div>
      <div class="fr"><span class="fr-l">Base HT (avant charges)</span><span class="fr-v">${fmt€(tBase)}</span></div>
      ${tDeb?`<div class="fr"><span class="fr-l" style="padding-left:12px">dont débours</span><span class="fr-v" style="font-size:11px;color:var(--txt2)">${fmt€(tDeb)}</span></div>`:""}
      <div class="fr"><span class="fr-l">Charges URSSAF (21.2%)</span><span class="fr-v r">− ${fmt€(tChg)}</span></div>
      <div class="fr"><span class="fr-l bold">Net estimé</span><span class="fr-v g">${fmt€(tN)}</span></div>
      <div class="fr"><span class="fr-l">Reçu</span><span class="fr-v ${tRecu>=tN?"g":"a"}">${fmt€(tRecu)}</span></div>
      ${tOwed>0.01?`<div class="fr"><span class="fr-l">À recevoir</span><span class="fr-v a">${fmt€(tOwed)}</span></div>`:""}
    </div>
  </div>`;

  if(mms.length){
    h+=`<div class="fin-card">
      <div class="fin-title">Détail — ${mms.length} missions</div>
      <div class="fin-body">`;
    mms.forEach(m=>{
      const owed=m.totalNet>0.01&&m.montant<0.01&&isDone(m);
      h+=`<div class="fmr" onclick="openD('${m.mid}')">
        <div class="fmr-l">
          <div class="fmr-desc">${getMeta(m.client).tag} · ${esc(m.type||"—")}${m.extRef?" · "+esc(m.extRef):""}</div>
          <div class="fmr-meta">${fds(m.date)} · ${badge(m)}${owed?'<span class="owed">En attente</span>':""}</div>
        </div>
        <div class="fmr-r">
          <div class="fmr-base">${m.sousTotal?m.sousTotal.toFixed(0)+"€":"—"}</div>
          ${m.totalNet?`<div class="fmr-net">net ${m.totalNet.toFixed(0)}€</div>`:""}
        </div>
      </div>`;
    });
    h+="</div></div>";
  }
  if(!mms.length) h+=`<div class="empty"><div class="empty-ico">💶</div><div class="empty-title">Aucune mission ce mois</div></div>`;
  return h;
}

// ═══════════════════════════════════════════════════════
// JOURNAL — reads from API (no localStorage)
// ═══════════════════════════════════════════════════════
function rdJournal(){
  const cy=String(new Date().getFullYear());
  const yl=journal.filter(e=>e.date&&e.date.startsWith(cy));
  if(!yl.length) return`<div class="slbl" style="margin-top:8px">Bien-être</div><div style="font-size:11px;color:var(--txt3);padding:4px 0">Aucune entrée — clôture des missions pour alimenter le journal.</div>`;

  const wm=yl.filter(e=>e.mood>0);
  const we=yl.filter(e=>e.energy>0);
  const am=wm.length?wm.reduce((s,e)=>s+e.mood,0)/wm.length:0;
  const ae=we.length?we.reduce((s,e)=>s+e.energy,0)/we.length:0;

  let h=`<div class="slbl" style="margin-top:8px">Bien-être · ${cy}</div>
  <div class="j-stats">
    <div class="j-stat"><div class="j-stat-v">${yl.length}</div><div class="j-stat-l">Entrées</div></div>
    <div class="j-stat"><div class="j-stat-v">${am?ME[Math.round(am)-1]+" "+am.toFixed(1):"—"}</div><div class="j-stat-l">Humeur moy.</div></div>
    <div class="j-stat"><div class="j-stat-v">${ae?EE[Math.round(ae)-1]+" "+ae.toFixed(1):"—"}</div><div class="j-stat-l">Énergie moy.</div></div>
  </div>`;

  const recent=[...yl].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);
  h+=`<div class="coll">
    <div class="coll-h" onclick="tColl('j-log')">
      <div><div class="coll-htitle">Journal privé</div><div class="coll-hsub">${yl.length} entrées</div></div>
      <div class="coll-chev" id="chev-j-log">▾</div>
    </div>
    <div class="coll-body" id="j-log">`;
  recent.forEach(e=>{
    h+=`<div class="jrow">
      <div class="jrow-top">
        <div><div class="jrow-date">${fds(e.date)}</div><div class="jrow-ctx">${esc(e.context||"—")} · ${esc(e.client||"")}</div></div>
      </div>
      <div class="jrow-sc">
        ${e.mood>0?`<span class="jsc">${ME[e.mood-1]} ${e.mood}</span>`:""}
        ${e.energy>0?`<span class="jsc">${EE[e.energy-1]} ${e.energy}</span>`:""}
      </div>
      ${e.text?`<div class="jrow-note">${esc(e.text.slice(0,90))}${e.text.length>90?"…":""}</div>`:""}
    </div>`;
  });
  h+=`</div></div>`;
  return h;
}

// ═══════════════════════════════════════════════════════
// COLLAPSIBLE — BUG FIXED
// body starts display:none; open class toggles it
// chevron derives state from DOM, never stored separately
// ═══════════════════════════════════════════════════════
function tColl(id){
  const body=document.getElementById(id);
  const chev=document.getElementById("chev-"+id);
  if(!body)return;
  const open=body.classList.toggle("open");
  if(chev)chev.classList.toggle("open",open);
}

// ═══════════════════════════════════════════════════════
// DETAIL VIEW
// ═══════════════════════════════════════════════════════
function rdDetail(m){
  const mt=getMeta(m.client);
  let h=`<div class="back" onclick="closeD()">← Retour</div>
  <div class="hero">
    <div class="hero-top" style="background:${mt.hex}"></div>
    <div class="hero-body">
      <div class="hero-client" style="color:${mt.hex}">${esc(m.client||"—")}</div>
      <div class="hero-title">${esc(m.type||"—")}${m.sens&&m.sens!=="—"?" · "+esc(m.sens):""}</div>
      <div class="hero-sub">${fdl(m.date)} ${m.debut?" · "+esc(m.debut):""} ${m.endroit?" · "+esc(m.endroit.split(/[,→]/)[0]):""}</div>
      <div class="hero-pills">
        ${badge(m)}
        ${m.cmp&&typeof m.cmp==="object"?`<div class="cmp-detail">${cmpDot(m)} ${m.cmp.score}% complet${m.cmp.missing?.length?" · manque: "+m.cmp.missing.slice(0,2).map(esc).join(", "):""}</div>`:""}
      </div>
    </div>
  </div>`;

  // ── Mission info ─────────────────────────────────
  h+=sec("Mission", ()=>{
    let s="";
    if(m.extRef)    s+=ir("Réf",esc(m.extRef));
    if(m.debut)     s+=ir("Départ",esc(m.debut));
    if(m.ops["Mission Start Time"]) s+=ir("Début mission",esc(m.ops["Mission Start Time"]));
    const dur=m.ops["Mission Duration (h)"]||m.heures;
    if(dur)         s+=ir("Durée",esc(dur)+"h");
    if(m.endroit)   s+=ir("Endroit",esc(m.endroit));
    if(m.meetPt)    s+=ir("RDV",esc(m.meetPt));
    if(m.transRef)  s+=ir("Réf transport",esc(m.transRef));
    if(m.shipName)  s+=ir("Navire",esc(m.shipName));
    if(m.dock)      s+=ir("Quai / Terminal",esc(m.dock));
    if(m.ops["Vehicle Info"]) s+=ir("Véhicule",esc(m.ops["Vehicle Info"]));
    return s;
  });

  // ── Contacts ─────────────────────────────────────
  const clist=[];
  if(m.ops["Contact Client"])  clist.push({r:"Contact client", n:m.ops["Contact Client"],  p:m.ops["Client Phone"]||""});
  if(m.ops["Cruise Manager"])  clist.push({r:"Cruise Manager", n:m.ops["Cruise Manager"],  p:m.ops["Cruise Phone"]||""});
  if(m.ops["Chauffeur"])       clist.push({r:"Chauffeur",      n:m.ops["Chauffeur"],        p:m.ops["Tél Chauffeur"]||""});
  if(m.ops["Colleague"]){
    clist.push({r:"Collègue"+(m.ops["Colleague Role"]?" · "+m.ops["Colleague Role"]:""), n:m.ops["Colleague"], p:m.ops["Colleague Phone"]||""});
  }
  if(m.ops["Emergency Contact"]) clist.push({r:"Urgence",n:m.ops["Emergency Contact"],p:""});
  if(clist.length) h+=sec("Contacts",()=>clist.map(c=>`
    <div class="cb">
      <div>
        <div class="cb-r">${esc(c.r)}</div>
        <div class="cb-n">${esc(c.n)}</div>
        ${c.p?`<div class="cb-p">${esc(c.p)}</div>`:""}
      </div>
      ${c.p?`<a href="tel:${esc(c.p)}" class="call-btn" onclick="event.stopPropagation()">📞 Appeler</a>`:""}
    </div>`).join(""));

  // ── Passengers ───────────────────────────────────
  if(m.paxRaw||m.paxCount){
    h+=sec(`Passagers${m.paxCount?" ("+esc(m.paxCount)+")":""}`,()=>{
      if(!m.paxRaw) return`<div style="font-size:12px;color:var(--txt2)">${esc(m.paxCount)} pax — liste non disponible</div>`;
      const pl=m.paxRaw.split("\n").map(s=>s.trim()).filter(Boolean);
      const state=pax[m.mid]||{};
      const ck=Object.values(state).filter(Boolean).length;
      const pct=pl.length?Math.round(ck/pl.length*100):0;
      return`<div class="pax-prog"><div class="pax-fill" id="pp-${m.mid}" style="width:${pct}%"></div></div>
      <div class="pax-list">${pl.map((p,i)=>{
        const on=!!state[i];
        return`<div class="pax-row">
          <div class="pax-box${on?" ck":""}" onclick="tPax('${m.mid}',${i},${!on})">${on?"✓":""}</div>
          <div class="pax-name${on?" ck":""}">${esc(p)}</div>
        </div>`;
      }).join("")}</div>`;
    });
  }

  // ── Ops summary ───────────────────────────────────
  if(m.opsSum) h+=sec("Résumé opérationnel",()=>`<div style="font-size:12px;color:var(--txt1);line-height:1.7">${esc(m.opsSum)}</div>`);

  // ── SNCF (Gare missions only) ─────────────────────
  if((m.type||"").toLowerCase()==="gare"&&m.transRef) h+=rdSNCF(m);

  // ── Edit ─────────────────────────────────────────
  h+=sec("Modifier",()=>{
    const opts=["Brouillon","Planifié","Confirmé","Terminé","Fac. générée","Fac. envoyée","Payé","Annulé"];
    return`<div class="edit-row">
      <div class="edit-l">Statut</div>
      <select class="edit-sel" onchange="saveF('${m.mid}','statut',this.value)">
        ${opts.map(o=>`<option${m.statut===o?" selected":""}>${o}</option>`).join("")}
      </select>
    </div>
    <div class="edit-row">
      <div class="edit-l">Début</div>
      <input class="edit-inp" type="time" id="ef-debut-${m.mid}" value="${esc(m.debut||"")}"/>
      <button class="save-btn" onclick="saveF('${m.mid}','debut',document.getElementById('ef-debut-${m.mid}').value)">✓</button>
    </div>
    <div class="edit-row">
      <div class="edit-l">Heures</div>
      <input class="edit-inp" type="number" step="0.5" id="ef-h-${m.mid}" value="${esc(String(m.heures||""))}"/>
      <button class="save-btn" onclick="saveF('${m.mid}','heures',document.getElementById('ef-h-${m.mid}').value)">✓</button>
    </div>
    <div class="edit-row">
      <div class="edit-l">Base HT</div>
      <input class="edit-inp" type="number" step="1" id="ef-b-${m.mid}" value="${esc(String(m.base||""))}"/>
      <button class="save-btn" onclick="saveF('${m.mid}','base',document.getElementById('ef-b-${m.mid}').value)">✓</button>
    </div>
    <div style="padding:7px 0">
      <div class="edit-l" style="margin-bottom:4px">Notes</div>
      <textarea class="notes-ta" id="ef-n-${m.mid}" rows="3">${esc(m.notes||"")}</textarea>
      <div class="save-row"><button class="save-btn" onclick="saveF('${m.mid}','notes',document.getElementById('ef-n-${m.mid}').value)">Enregistrer</button></div>
    </div>`;
  });

  // ── Invoice ───────────────────────────────────────
  h+=rdInvoice(m);

  // ── Documents ─────────────────────────────────────
  if(m.docs||m.ops["Source PDF"]){
    h+=sec("Documents",()=>{
      let s="";
      if(m.docs) s+=`<a href="${esc(m.docs)}" target="_blank" class="inv-btn" onclick="event.stopPropagation()"><span class="inv-ico">📁</span><span style="flex:1">Dossier Drive</span><span class="inv-r">↗</span></a>`;
      if(m.ops["Source PDF"]) s+=`<a href="${esc(m.ops["Source PDF"])}" target="_blank" class="inv-btn" onclick="event.stopPropagation()"><span class="inv-ico">📄</span><span style="flex:1">Manifeste PDF</span><span class="inv-r">↗</span></a>`;
      return s;
    });
  }

  // ── Notes / Email (collapsible) ───────────────────
  if(m.ops["Raw Notes"]||m.ops["Source Email Msg"]){
    h+=`<div style="margin-bottom:8px">`;
    if(m.ops["Raw Notes"]) h+=coll("notes-"+m.mid,"Notes opérationelles",`<div style="font-size:11px;color:var(--txt2);white-space:pre-wrap;line-height:1.6">${esc(m.ops["Raw Notes"])}</div>`);
    if(m.ops["Source Email Msg"]) h+=coll("email-"+m.mid,"Email source",`<div style="font-size:10px;color:var(--txt3);white-space:pre-wrap;line-height:1.6;font-family:var(--mono)">${esc(m.ops["Source Email Msg"].slice(0,1200))}</div>`,m.ops["Source Email"]||"");
    h+="</div>";
  }

  // ── PMF ───────────────────────────────────────────
  h+=rdPMF(m);
  return h;
}

function sec(title, bodyFn){
  const body=bodyFn();
  if(!body) return "";
  return`<div class="sec"><div class="sec-title">${title}</div><div class="sec-body">${body}</div></div>`;
}
function ir(l,v){return`<div class="ir"><div class="ir-l">${l}</div><div class="ir-v">${v}</div></div>`;}
function coll(id,title,body,sub){
  return`<div class="coll">
    <div class="coll-h" onclick="tColl('${id}')">
      <div><div class="coll-htitle">${title}</div>${sub?`<div class="coll-hsub">${esc(sub)}</div>`:""}</div>
      <div class="coll-chev" id="chev-${id}">▾</div>
    </div>
    <div class="coll-body" id="${id}">${body}</div>
  </div>`;
}

// ═══════════════════════════════════════════════════════
// PAX
// ═══════════════════════════════════════════════════════
function tPax(mid,idx,on){
  if(!pax[mid])pax[mid]={};
  pax[mid][idx]=on;
  const box=document.querySelector(`[onclick="tPax('${mid}',${idx},${!on})"]`);
  const nm=box?.nextElementSibling;
  if(box){box.classList.toggle("ck",on);box.textContent=on?"✓":"";box.setAttribute("onclick",`tPax('${mid}',${idx},${!on})`);}
  if(nm) nm.classList.toggle("ck",on);
  const state=pax[mid];
  const m=missions.find(x=>x.mid===mid);
  const total=m?m.paxRaw.split("\n").filter(s=>s.trim()).length:0;
  const done=Object.values(state).filter(Boolean).length;
  const pp=document.getElementById("pp-"+mid);
  if(pp) pp.style.width=(total?Math.round(done/total*100):0)+"%";
}

// ═══════════════════════════════════════════════════════
// EDIT + SAVE
// ═══════════════════════════════════════════════════════
async function saveF(mid,field,value){
  const ok=await apiCall(`action=update&id=${encodeURIComponent(mid)}&field=${encodeURIComponent(field)}&value=${encodeURIComponent(value)}`);
  if(ok){
    const m=missions.find(x=>x.mid===mid);
    if(m){
      if(field==="statut") m.statut=value;
      else if(field==="notes") m.notes=value;
      else if(field==="heures") m.heures=value;
      else if(field==="base") m.base=parseFloat(value)||0;
      else if(field==="debut") m.debut=value;
    }
    if(detail?.mid===mid) detail=m;
    toast("✓ Mis à jour","ok");
  }
}
async function apiCall(qs){
  try{
    const r=await fetch(GAS+"?"+qs,{signal:AbortSignal.timeout(12000)});
    const d=await r.json();
    if(d?.ok===false){toast("❌ "+(d.msg||"Erreur"),"err");return false;}
    return true;
  }catch(e){toast("❌ "+e.message.slice(0,40),"err");return false;}
}

// ═══════════════════════════════════════════════════════
// INVOICE
// ═══════════════════════════════════════════════════════
function rdInvoice(m){
  const s=(m.statut||"").toLowerCase();
  let inner="";
  if(m.facture) inner+=`<div style="font-size:12px;color:var(--txt1);margin-bottom:8px;font-family:var(--mono)">📄 ${esc(m.facture)}${m.montant?` · <span style='color:var(--green)'>${fmt€(m.montant)} reçu</span>`:""}</div>`;
  if(s==="terminé"&&!m.facture) inner+=`<button class="inv-btn" onclick="genFacture('${m.mid}')"><span class="inv-ico">🧾</span><span style="flex:1;font-weight:500">Générer la facture</span><span class="inv-r">PDF → Drive</span></button>`;
  if(s.includes("générée"))      inner+=`<button class="inv-btn" style="border-color:rgba(240,160,64,.3);color:var(--amber)" onclick="saveF('${m.mid}','statut','Fac. envoyée')"><span class="inv-ico">📤</span><span style="flex:1;font-weight:500">Marquer comme envoyée</span></button>`;
  if(m.debours>0.01&&!m.ndb)    inner+=`<button class="inv-btn" style="margin-top:0" onclick="genDebours('${m.mid}')"><span class="inv-ico">📄</span><span style="flex:1;font-weight:500">Note de débours</span><span class="inv-r">${fmt€(m.debours)}</span></button>`;
  if(!inner) return "";
  return`<div class="sec"><div class="sec-title">Facturation</div><div class="sec-body" style="padding-top:8px">${inner}</div></div>`;
}

async function genFacture(mid){
  toast("⏳ Génération…","");
  try{
    const r=await fetch(GAS+"?action=genFacture&id="+encodeURIComponent(mid));
    const d=await r.json();
    if(d?.ok){
      const m=missions.find(x=>x.mid===mid);
      if(m){m.facture=d.factureNum;m.statut="Fac. générée";}
      if(detail?.mid===mid){detail.facture=d.factureNum;detail.statut="Fac. générée";}
      toast("✅ "+d.factureNum,"ok");render();
    } else toast("❌ "+(d?.msg||"Erreur"),"err");
  }catch(e){toast("❌ "+e.message.slice(0,40),"err");}
}
async function genDebours(mid){
  toast("⏳ Débours…","");
  try{
    const r=await fetch(GAS+"?action=genDebours&id="+encodeURIComponent(mid));
    const d=await r.json();
    if(d?.ok){
      const m=missions.find(x=>x.mid===mid);
      if(m)m.ndb=d.ndbNum;
      toast("✅ "+d.ndbNum,"ok");render();
    } else toast("❌ "+(d?.msg||"Erreur"),"err");
  }catch(e){toast("❌ "+e.message.slice(0,40),"err");}
}

// ═══════════════════════════════════════════════════════
// SNCF PANEL
// ═══════════════════════════════════════════════════════
function rdSNCF(m){
  return coll("sncf-"+m.mid,"🚉 Trains en direct",
    `<div style="font-size:11px;color:var(--txt3);margin-bottom:8px">Réf: ${esc(m.transRef)} <span class="sncf-refresh" onclick="fetchSNCF('${m.mid}','${esc(m.transRef)}')">Actualiser</span></div>
     <div id="sncf-d-${m.mid}" style="font-size:11px;color:var(--txt2)">Appuie sur Actualiser.</div>`,
    "SNCF live · Cloudflare Worker");
}
async function fetchSNCF(mid,ref){
  const el=document.getElementById("sncf-d-"+mid);
  if(!el)return; el.textContent="Chargement…";
  try{
    const r=await fetch(SNCF,{signal:AbortSignal.timeout(12000)});
    const d=await r.json();
    const arr=d.arrivals||[];
    const match=arr.filter(a=>{
      const info=a.display_informations||{};
      const hs=String(info.headsign||"").trim();
      const ts=String(info.trip_short_name||"").trim();
      return hs===ref||ts===ref||hs.endsWith(ref)||ts.endsWith(ref);
    });
    if(!match.length){el.textContent="Train "+ref+" pas encore annoncé ("+arr.length+" trains chargés).";return;}
    el.innerHTML=match.map(a=>{
      const sdt=a.stop_date_time||{};
      const base=sdt.base_arrival_date_time||"";
      const real=sdt.arrival_date_time||base;
      const bm=base?parseInt(base.slice(9,11))*60+parseInt(base.slice(11,13)):0;
      const rm=real?parseInt(real.slice(9,11))*60+parseInt(real.slice(11,13)):bm;
      const diff=rm-bm;
      const info=a.display_informations||{};
      const tn=info.headsign||info.trip_short_name||ref;
      const ts=base?p2(Math.floor(bm/60))+":"+p2(bm%60):"—";
      const cls=diff<=1?"s-ok":"s-late";
      const st=diff<=1?"À l'heure":"+"+diff+" min";
      return`<div class="sncf-row"><div class="sncf-train">${esc(tn)}</div><div class="sncf-t">${ts}</div><span class="sncf-b ${cls}">${st}</span></div>`;
    }).join("");
  }catch(e){el.textContent="Erreur: "+e.message;}
}

// ═══════════════════════════════════════════════════════
// PMF
// ═══════════════════════════════════════════════════════
function rdPMF(m){
  if(isDone(m)) return`<div class="sec"><div class="sec-body" style="padding:10px 0;text-align:center">
    <div style="font-size:12px;color:var(--green);font-weight:600;margin-bottom:10px">✓ Mission clôturée</div>
    <button class="decomp-link" onclick="goPause()">🌿 Décompresser</button>
  </div></div>`;
  if(!pmf||pmf.mid!==m.mid) return`<div class="sec"><div class="sec-body" style="padding:8px 0">
    <button class="pbtn" onclick="sPMF('${m.mid}')">✅ Clôturer la mission</button>
  </div></div>`;
  return`<div class="sec"><div class="sec-body"><div class="pmf">${pmfHTML(m)}</div></div></div>`;
}

function sPMF(mid){
  const m=missions.find(x=>x.mid===mid)||{};
  let end=nowt();
  if(m.debut&&m.heures){
    const ph=parseFloat(m.heures);
    if(ph>0){const[h,mn]=m.debut.split(":").map(Number);const em=h*60+mn+Math.round(ph*60);if(Math.floor(em/60)<24)end=p2(Math.floor(em/60))+":"+p2(em%60);}
  }
  pmf={mid,start:m.debut||"",end,tpl:"RAS",rpt:"",rptLoading:false,dMood:0,dEnergy:0,dNote:""};
  pmfStep=1;render();
}
function pmfHTML(m){return pmfStep===1?pmfH1(m):pmfStep===2?pmfH2(m):pmfStep===3?pmfH3(m):pmfStep===4?pmfH4():"";}
function pmfH1(m){
  const du=pmf.start&&pmf.end?durS(pmf.start,pmf.end):"";
  return`<div class="pmf-hdr"><div class="pmf-num">1</div><div class="pmf-title">Heures réelles</div></div>
  <div class="time-row">
    <div class="time-b"><div class="time-lbl">Début</div><input class="time-inp" type="time" id="ps" value="${pmf.start||""}" onchange="pmf.start=this.value;uDur()"/></div>
    <div class="time-arr">→</div>
    <div class="time-b"><div class="time-lbl">Fin</div><input class="time-inp" type="time" id="pe" value="${pmf.end||""}" onchange="pmf.end=this.value;uDur()"/></div>
  </div>
  <div class="dur" id="pd">${du?"⏱ "+du:""}</div>
  <button class="pbtn" onclick="pmfGo(2)">Suivant → Rapport</button>
  <span class="pback" onclick="pmf=null;pmfStep=0;render()">Annuler</span>`;
}
function pmfH2(m){
  const acts=pmf.rpt?`<div class="rpt-acts">
    <button class="rpt-act" onclick="genRpt('${m.mid}')">↻ Régénérer</button>
    <button class="rpt-act" style="color:var(--green)" onclick="schedRpt('${m.mid}')">📅 Planifier 9h</button>
  </div>
  <textarea class="rpt-ed" id="rpt-ed-${m.mid}">${esc(pmf.rpt)}</textarea>
  <button class="pbtn" onclick="pmfGo(3)">Continuer →</button>`
  :`<button class="pbtn" onclick="genRpt('${m.mid}')">✨ Générer le rapport</button>`;
  return`<div class="pmf-hdr"><div class="pmf-num">2</div><div class="pmf-title">Rapport</div></div>
  <div class="tpl-row">
    <button class="tpl-btn${pmf.tpl==="RAS"?" on":""}" onclick="pmf.tpl='RAS';pmf.rpt='';render()">📝 RAS</button>
    <button class="tpl-btn${pmf.tpl==="INCIDENT"?" on":""}" onclick="pmf.tpl='INCIDENT';pmf.rpt='';render()">⚠️ Incident</button>
    <button class="tpl-btn${pmf.tpl==="ANNULATION"?" on":""}" onclick="pmf.tpl='ANNULATION';pmf.rpt='';render()">🚫 Annulation</button>
  </div>
  ${pmf.rptLoading?'<div style="text-align:center;padding:14px;color:var(--txt2)"><span class="spin">↻</span> Rédaction…</div>':pmf.rpt?`<div class="rpt-out">${esc(pmf.rpt)}</div>`+acts:acts}
  <span class="pback" onclick="pmfStep=1;render()">← Retour</span>`;
}
function pmfH3(m){
  const mv=[1,2,3,4,5];
  return`<div class="pmf-hdr"><div class="pmf-num">3</div><div class="pmf-title">État de fin</div></div>
  <div style="font-size:9px;color:var(--txt3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px">Humeur</div>
  <div class="mood-row">${mv.map(v=>`<button class="mood-btn${pmf.dMood===v?" on":""}" onclick="pmf.dMood=${v};render()">${ME[v-1]}</button>`).join("")}</div>
  <div style="font-size:9px;color:var(--txt3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px">Énergie</div>
  <div class="mood-row">${mv.map(v=>`<button class="mood-btn${pmf.dEnergy===v?" on":""}" onclick="pmf.dEnergy=${v};render()">${EE[v-1]}</button>`).join("")}</div>
  <textarea class="notes-ta" id="pmf-db" rows="3" placeholder="Note privée…">${esc(pmf.dNote||"")}</textarea>
  <button class="pbtn" style="margin-top:9px" onclick="pmfFin('${m.mid}')">Clôturer</button>
  <span class="pback" onclick="pmfStep=2;render()">← Retour</span>`;
}
function pmfH4(){
  return`<div class="done-wrap">
    <div class="done-ico">✅</div>
    <div class="done-title">Mission clôturée</div>
    <div class="done-sub">Heures et journal enregistrés.</div>
    <button class="decomp-link" onclick="goPause()">🌿 Décompresser</button>
    <div style="margin-top:10px"><span class="pback" onclick="closeD()">← Retour</span></div>
  </div>`;
}
function pmfGo(step){
  if(step===2){const s=document.getElementById("ps"),e=document.getElementById("pe");if(s)pmf.start=s.value;if(e)pmf.end=e.value;}
  pmfStep=step;render();
}
function uDur(){
  const s=document.getElementById("ps"),e=document.getElementById("pe"),d=document.getElementById("pd");
  if(s&&e&&d){const du=durS(s.value,e.value);d.textContent=du?"⏱ "+du:"";}
}
async function genRpt(mid){
  const m=missions.find(x=>x.mid===mid);if(!m)return;
  pmf.rptLoading=true;render();
  if(pmf.tpl==="RAS"){
    pmf.rpt="Bonjour,\n\nVoici le récap du service "+(m.desc||m.mid)+". Rien à signaler, tout s'est bien déroulé.\n\nMerci et bonne journée,\nJoseph";
    pmf.rptLoading=false;render();return;
  }
  try{
    const r=await fetch(GAS+"?action=genRapport&id="+encodeURIComponent(mid)+"&template="+encodeURIComponent(pmf.tpl)+"&start="+encodeURIComponent(pmf.start)+"&end="+encodeURIComponent(pmf.end));
    const d=await r.json();
    pmf.rpt=d?.text||"Erreur génération.";
  }catch(e){pmf.rpt="Erreur: "+e.message;}
  pmf.rptLoading=false;render();
}
async function schedRpt(mid){
  const ed=document.getElementById("rpt-ed-"+mid);
  const rpt=ed?ed.value:pmf.rpt;
  const ok=await apiCall("action=scheduleRapport&id="+encodeURIComponent(mid)+"&rapport="+encodeURIComponent(rpt)+"&template="+encodeURIComponent(pmf.tpl));
  if(ok) toast("📅 Rapport planifié 9h","ok");
}
async function pmfFin(mid){
  const db=document.getElementById("pmf-db");
  if(db)pmf.dNote=db.value;
  const s=pmf.start,e=pmf.end;
  const he=s&&e?(()=>{const[sh,sm]=s.split(":").map(Number),[eh,em]=e.split(":").map(Number);const d=(eh*60+em)-(sh*60+sm);return d>0?(d/60).toFixed(2):""})():"";
  if(he) await apiCall("action=update&id="+encodeURIComponent(mid)+"&field=heures&value="+encodeURIComponent(he));
  await apiCall("action=update&id="+encodeURIComponent(mid)+"&field=statut&value=Termin%C3%A9");
  const m=missions.find(x=>x.mid===mid)||{};
  // Save journal — no localStorage, direct to API
  try{
    const flag=pmf.dMood<=2||pmf.dEnergy<=2?"🔴":pmf.dMood<=3||pmf.dEnergy<=3?"🟡":"🟢";
    await fetch(GAS+"?action=saveJournal"
      +"&date="+encodeURIComponent(m.date||tday())
      +"&mid="+encodeURIComponent(mid)
      +"&mood="+pmf.dMood+"&energy="+pmf.dEnergy
      +"&client="+encodeURIComponent(m.client||"")
      +"&context=Apr%C3%A8s%20mission&kind=Note"
      +"&note="+encodeURIComponent((pmf.dNote||"").slice(0,500))
      +"&include="+(flag==="🟢"?"true":"false"),
      {signal:AbortSignal.timeout(8000)});
  }catch(e){}
  const i=missions.findIndex(x=>x.mid===mid);
  if(i>-1){missions[i].heures=he;missions[i].statut="Terminé";}
  if(detail?.mid===mid){detail.heures=he;detail.statut="Terminé";}
  toast("✅ Clôturée","ok");pmfStep=4;render();
}

// ═══════════════════════════════════════════════════════
// DECOMPRESSION
// ═══════════════════════════════════════════════════════
function goPause(){
  document.getElementById("content").innerHTML=`<div class="dc">
    <div class="dc-ey">Décompression</div>
    <div class="dc-title">Pause rapide</div>
    <div class="dc-sub">Un espace simple pour relâcher ce qui reste.</div>
    <textarea class="dc-ta" id="dc-t" rows="6" placeholder="Écrire ici pour toi seulement…"></textarea>
    <div class="dc-row">
      <button class="dc-save" onclick="saveDC()">Enregistrer</button>
      <button class="dc-back" onclick="render()">Retour</button>
    </div>
  </div>`;
}
async function saveDC(){
  const ta=document.getElementById("dc-t");
  const txt=ta?.value.trim();
  if(txt){
    try{
      await fetch(GAS+"?action=saveJournal"
        +"&date="+encodeURIComponent(tday())
        +"&mid="+encodeURIComponent(detail?.mid||"")
        +"&context=D%C3%A9compression&kind=Note&mood=0&energy=0"
        +"&client="+encodeURIComponent(detail?.client||"")
        +"&note="+encodeURIComponent(txt.slice(0,500))+"&include=false",
        {signal:AbortSignal.timeout(8000)});
    }catch(e){}
  }
  toast("✅ Enregistrée","ok");render();
}

// ═══════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════
let _tt=null;
function toast(msg,type){
  const el=document.getElementById("toast");
  el.textContent=msg;
  el.className="show"+(type?" "+type:"");
  if(_tt)clearTimeout(_tt);
  _tt=setTimeout(()=>{el.classList.remove("show");},3200);
}

// ═══════════════════════════════════════════════════════
// WEATHER
// ═══════════════════════════════════════════════════════
async function loadWx(){
  try{
    const r=await fetch("https://api.open-meteo.com/v1/forecast?latitude=45.695&longitude=4.944&current_weather=true&forecast_days=1",{signal:AbortSignal.timeout(6000)});
    const d=await r.json();
    const cw=d.current_weather;if(!cw)return;
    const code=cw.weathercode;
    const ico=code<=1?"☀️":code<=3?"⛅️":code<=50?"🌦":code<=70?"🌧":"❄️";
    document.getElementById("hdr-wx").innerHTML=`${ico} ${Math.round(cw.temperature)}°`;
  }catch(e){}
}
