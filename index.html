<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Mission Control V3.1</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   MISSION CONTROL V3.1
   Calm / complete / onsite-friendly dashboard
   ============================================================ */
:root {
  --bg: #090a0d;
  --surface: #121419;
  --surface-2: #191d24;
  --surface-3: #222733;
  --border: rgba(255,255,255,.09);
  --border-strong: rgba(255,255,255,.16);
  --text: #f5f1e8;
  --text-soft: #c7c0b5;
  --text-muted: #8b857d;
  --text-faint: #5d5852;
  --gold: #e8c97a;
  --blue: #6ea7ff;
  --green: #60c08b;
  --amber: #e7a25c;
  --red: #ee6b6b;
  --purple: #b49cff;
  --radius: 16px;
  --radius-sm: 10px;
  --tap: 48px;
  --shadow: 0 14px 44px rgba(0,0,0,.28);
  --font: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --mono: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
}
body.light {
  --bg: #f4f0e8;
  --surface: #fffaf2;
  --surface-2: #eee7dc;
  --surface-3: #e2d9ca;
  --border: rgba(30,24,16,.11);
  --border-strong: rgba(30,24,16,.2);
  --text: #181713;
  --text-soft: #484238;
  --text-muted: #766f64;
  --text-faint: #aaa197;
  --gold: #8a6200;
  --blue: #175fd6;
  --green: #27764f;
  --amber: #a95f1f;
  --red: #b23535;
  --purple: #6b4bd3;
  --shadow: 0 12px 28px rgba(70,55,35,.13);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { min-height: 100%; overscroll-behavior: none; }
body {
  background: radial-gradient(circle at 50% -12%, rgba(232,201,122,.10), transparent 30%), var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  line-height: 1.48;
  letter-spacing: -.01em;
}
button, input, select, textarea { font: inherit; }
button { border: 0; background: none; color: inherit; cursor: pointer; }
a { color: inherit; text-decoration: none; }
input, textarea, select { color: var(--text); }

/* Header */
.app-header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: color-mix(in srgb, var(--bg) 92%, transparent);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px 10px;
}
.header-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; max-width: 760px; margin: 0 auto; }
.brand { min-width: 0; }
.brand-title { font-size: 18px; font-weight: 800; letter-spacing: -.02em; color: var(--gold); }
.brand-sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 52vw; }
.header-actions { display: flex; align-items: center; gap: 8px; }
.clock { font-family: var(--mono); font-size: 19px; font-weight: 600; letter-spacing: .03em; }
.icon-btn {
  width: 40px; height: 40px; border-radius: 999px;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--surface-2); border: 1px solid var(--border);
  color: var(--text-soft); font-size: 17px;
}
.icon-btn:active { transform: scale(.97); background: var(--surface-3); }

/* Top nav */
.top-nav-wrap {
  position: sticky;
  top: 64px;
  z-index: 45;
  background: color-mix(in srgb, var(--bg) 94%, transparent);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
  padding: 9px 12px;
}
.top-nav {
  max-width: 760px; margin: 0 auto;
  display: grid; grid-template-columns: repeat(4, minmax(0,1fr));
  gap: 7px;
}
.nav-btn {
  min-height: 42px;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  border-radius: 999px;
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: .02em;
  text-transform: uppercase;
}
.nav-btn.active { background: rgba(232,201,122,.12); border-color: color-mix(in srgb, var(--gold) 48%, transparent); color: var(--gold); }

/* Layout */
.main { max-width: 760px; margin: 0 auto; padding: 14px 14px 92px; }
.section-title {
  margin: 18px 2px 8px;
  font-size: 12px;
  font-weight: 800;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: .08em;
}
.section-title:first-child { margin-top: 4px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 8px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 8px; }
@media (max-width: 430px) { .grid-4 { grid-template-columns: repeat(2, minmax(0,1fr)); } .brand-sub { max-width: 48vw; } }
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 11px;
  min-height: 70px;
}
.stat-label { font-size: 11px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
.stat-value { margin-top: 3px; font-size: 22px; font-weight: 800; color: var(--text); letter-spacing: -.04em; }
.stat-note { margin-top: 1px; font-size: 11px; color: var(--text-faint); }

/* Cards */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.mission-card {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 14px 13px 16px;
  margin-bottom: 9px;
  overflow: hidden;
}
.mission-card::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--client-color, var(--gold)); }
.mission-card.done { opacity: .55; }
.mission-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
.mission-meta { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; margin-bottom: 4px; }
.client-tag { color: var(--client-color, var(--gold)); font-weight: 900; font-size: 12px; letter-spacing: .03em; }
.time-tag { font-family: var(--mono); font-weight: 700; font-size: 14px; color: var(--text-soft); }
.date-tag { font-size: 12px; color: var(--text-faint); }
.mission-title { font-size: 18px; font-weight: 850; line-height: 1.16; letter-spacing: -.03em; }
.mission-sub { margin-top: 4px; font-size: 13px; color: var(--text-muted); }
.pill-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
.pill { display: inline-flex; align-items: center; gap: 4px; border-radius: 999px; padding: 4px 8px; font-size: 12px; font-weight: 700; background: var(--surface-2); color: var(--text-soft); border: 1px solid var(--border); }
.pill.green { color: var(--green); background: rgba(96,192,139,.1); }
.pill.blue { color: var(--blue); background: rgba(110,167,255,.1); }
.pill.amber { color: var(--amber); background: rgba(231,162,92,.1); }
.pill.red { color: var(--red); background: rgba(238,107,107,.1); }
.status-stack { display: flex; align-items: flex-end; flex-direction: column; gap: 6px; min-width: 76px; }
.status-badge { border-radius: 999px; padding: 4px 8px; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: .04em; background: var(--surface-2); color: var(--text-muted); }
.status-badge.green { color: var(--green); background: rgba(96,192,139,.12); }
.status-badge.blue { color: var(--blue); background: rgba(110,167,255,.12); }
.status-badge.amber { color: var(--amber); background: rgba(231,162,92,.12); }
.status-badge.red { color: var(--red); background: rgba(238,107,107,.12); }
.completeness { height: 7px; width: 54px; border-radius: 999px; background: var(--surface-3); overflow: hidden; }
.completeness > span { display: block; height: 100%; width: 0%; background: var(--green); transition: width .2s; }

/* Detail */
.back-btn { min-height: var(--tap); display: inline-flex; align-items: center; gap: 8px; color: var(--gold); font-weight: 850; font-size: 14px; margin-bottom: 8px; }
.detail-hero { padding: 18px 17px 16px; border-bottom: 1px solid var(--border); position: relative; }
.detail-hero::before { content: ""; position: absolute; left: 0; top: 0; right: 0; height: 4px; background: var(--client-color, var(--gold)); }
.detail-client { color: var(--client-color, var(--gold)); font-size: 12px; font-weight: 900; letter-spacing: .07em; text-transform: uppercase; }
.detail-title { margin-top: 4px; font-size: 25px; font-weight: 900; line-height: 1.08; letter-spacing: -.05em; }
.detail-sub { margin-top: 6px; color: var(--text-muted); font-size: 14px; }
.detail-section { padding: 15px 16px; border-top: 1px solid var(--border); }
.detail-section:first-of-type { border-top: 0; }
.detail-section-title { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted); }
.info-row { display: grid; grid-template-columns: 116px minmax(0,1fr); gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.info-row:last-child { border-bottom: 0; }
.info-label { color: var(--text-muted); font-size: 13px; }
.info-value { color: var(--text); font-size: 15px; font-weight: 550; word-break: break-word; }
.info-value.mono { font-family: var(--mono); }

/* Actions */
.action-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; }
.action-btn {
  min-height: 48px; border-radius: var(--radius-sm); padding: 10px 11px;
  background: var(--surface-2); border: 1px solid var(--border);
  color: var(--text-soft); font-weight: 800; font-size: 14px;
  display: flex; align-items: center; justify-content: center; gap: 7px; text-align: center;
}
.action-btn.primary { background: var(--gold); color: #12100b; border-color: var(--gold); }
.action-btn.green { color: var(--green); border-color: rgba(96,192,139,.35); }
.action-btn.amber { color: var(--amber); border-color: rgba(231,162,92,.35); }
.action-btn.red { color: var(--red); border-color: rgba(238,107,107,.35); }
.action-btn.blue { color: var(--blue); border-color: rgba(110,167,255,.35); }
.action-btn:active { transform: scale(.985); }

/* Preparation checklist */
.checklist { display: grid; gap: 7px; }
.check-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 9px 10px; border-radius: var(--radius-sm); background: var(--surface-2); border: 1px solid var(--border); }
.check-left { display: flex; align-items: center; gap: 9px; min-width: 0; }
.check-icon { width: 23px; height: 23px; border-radius: 999px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; background: var(--surface-3); color: var(--text-muted); flex: 0 0 auto; }
.check-icon.ok { background: rgba(96,192,139,.14); color: var(--green); }
.check-icon.warn { background: rgba(231,162,92,.14); color: var(--amber); }
.check-icon.bad { background: rgba(238,107,107,.14); color: var(--red); }
.check-main { font-weight: 750; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.check-sub { color: var(--text-muted); font-size: 12px; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.check-status { font-family: var(--mono); font-size: 12px; color: var(--text-muted); flex: 0 0 auto; }

/* Forms */
.form-grid { display: grid; gap: 9px; }
.field { display: grid; gap: 5px; }
.field label { color: var(--text-muted); font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; }
.input, .select, .textarea {
  width: 100%; border-radius: var(--radius-sm); border: 1px solid var(--border-strong);
  background: var(--surface-2); color: var(--text); padding: 11px 12px;
  outline: 0; font-size: 16px;
}
.textarea { min-height: 96px; resize: vertical; line-height: 1.55; }
.input:focus, .select:focus, .textarea:focus { border-color: var(--gold); }
.inline-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }

/* Collapsible */
.collapsible { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; background: var(--surface); margin-top: 9px; }
.coll-head { min-height: 50px; display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 12px 13px; background: var(--surface-2); }
.coll-title { font-weight: 850; font-size: 14px; }
.coll-sub { color: var(--text-muted); font-size: 12px; margin-top: 1px; }
.coll-body { display: none; padding: 13px; border-top: 1px solid var(--border); }
.coll-body.open { display: block; }
.chev { color: var(--text-muted); transition: transform .2s; }
.chev.open { transform: rotate(180deg); }

/* Passenger list */
.pax-list { max-height: 320px; overflow: auto; display: grid; gap: 6px; }
.pax-item { display: flex; gap: 9px; align-items: flex-start; padding: 9px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface-2); }
.pax-box { width: 23px; height: 23px; border-radius: 7px; border: 1.5px solid var(--border-strong); display: flex; align-items: center; justify-content: center; flex: 0 0 auto; font-weight: 900; color: #fff; }
.pax-box.checked { background: var(--green); border-color: var(--green); }
.pax-name { font-size: 14px; color: var(--text-soft); line-height: 1.35; }
.pax-name.checked { text-decoration: line-through; color: var(--text-faint); }
.progress { height: 8px; border-radius: 999px; background: var(--surface-3); overflow: hidden; margin-bottom: 10px; }
.progress span { display: block; height: 100%; background: var(--green); width: 0%; }

/* Timeline */
.timeline { display: grid; gap: 0; }
.timeline-row { display: grid; grid-template-columns: 64px minmax(0,1fr); gap: 12px; padding: 9px 0; border-bottom: 1px solid var(--border); }
.timeline-row:last-child { border-bottom: 0; }
.timeline-time { font-family: var(--mono); color: var(--gold); font-weight: 700; font-size: 13px; }
.timeline-main { font-size: 14px; font-weight: 760; }
.timeline-sub { color: var(--text-muted); font-size: 12px; margin-top: 1px; }

/* Toast / empty / loader */
.loader, .empty { padding: 40px 20px; text-align: center; color: var(--text-muted); }
.loader .spin { display: inline-block; animation: spin .8s linear infinite; margin-right: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty-icon { font-size: 34px; opacity: .55; margin-bottom: 8px; }
.empty-title { font-size: 18px; font-weight: 850; color: var(--text-soft); }
.empty-sub { font-size: 14px; color: var(--text-muted); margin-top: 4px; }
.toast {
  position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%) translateY(12px);
  max-width: calc(100vw - 28px); opacity: 0; pointer-events: none; z-index: 100;
  background: var(--surface-3); color: var(--text); border: 1px solid var(--border-strong);
  border-radius: 999px; padding: 11px 17px; font-size: 14px; font-weight: 800; box-shadow: var(--shadow);
  transition: opacity .2s, transform .2s;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.ok { color: var(--green); border-color: rgba(96,192,139,.45); }
.toast.err { color: var(--red); border-color: rgba(238,107,107,.45); }

/* Debug/system */
.kv { display: grid; grid-template-columns: 140px 1fr; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.kv:last-child { border-bottom: 0; }
.kv-key { color: var(--text-muted); }
.kv-val { color: var(--text-soft); font-family: var(--mono); word-break: break-word; }

@media (min-width: 720px) {
  .detail-grid { display: grid; grid-template-columns: 1.1fr .9fr; gap: 10px; align-items: start; }
}
</style>
</head>
<body>
<header class="app-header">
  <div class="header-row">
    <div class="brand">
      <div class="brand-title">Mission Control</div>
      <div class="brand-sub" id="headerSub">Chargement des missions…</div>
    </div>
    <div class="header-actions">
      <div class="clock" id="clock">--:--</div>
      <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Thème">☀</button>
      <button class="icon-btn" onclick="refreshData()" title="Actualiser">↻</button>
    </div>
  </div>
</header>

<div class="top-nav-wrap">
  <nav class="top-nav" aria-label="Navigation principale">
    <button class="nav-btn active" id="nav-day" onclick="go('day')">Jour</button>
    <button class="nav-btn" id="nav-month" onclick="go('month')">Mois</button>
    <button class="nav-btn" id="nav-validation" onclick="go('validation')">Validation</button>
    <button class="nav-btn" id="nav-admin" onclick="go('admin')">Admin</button>
  </nav>
</div>

<main class="main" id="app">
  <div class="loader"><span class="spin">↻</span>Chargement…</div>
</main>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   CONFIG
   ============================================================ */
const GAS_URL = "https://script.google.com/macros/s/AKfycbwACs6qIEu24xMe3KtSjLMbcs3A6iXqCaZEodXBuTx2au1ol5UXeUqZKM6W_NJO9qSErg/exec";
const SNCF_WORKER = "https://fragrant-hall-c33b.t5q7m95hfj.workers.dev/";
const TAX_RATE = 0.212;
const NET_MULT = 1 - TAX_RATE;
const CACHE_KEY = "mc_v31_cache";
const PAX_KEY = "mc_v31_pax_checks";
const THEME_KEY = "mc_v31_light";
const DAYS = ["dim", "lun", "mar", "mer", "jeu", "ven", "sam"];
const MONTHS = ["janvier", "février", "mars", "avril", "mai", "juin", "juillet", "août", "septembre", "octobre", "novembre", "décembre"];
const MONTHS_SHORT = ["jan", "fév", "mar", "avr", "mai", "jun", "jul", "aoû", "sep", "oct", "nov", "déc"];
const CLIENTS = {
  "philibert": { tag: "PHIL", color: "#60c08b" },
  "go côte saône": { tag: "GCS", color: "#6ea7ff" },
  "go cote saone": { tag: "GCS", color: "#6ea7ff" },
  "feel the french way": { tag: "FTFW", color: "#b49cff" },
  "un monde bleu": { tag: "UMB", color: "#e7a25c" }
};
const TRAVEL = {
  "PERRACHE":45, "PART-DIEU":45, "PART DIEU":45, "BELLECOUR":45,
  "LYS":52, "AEROPORT":52, "AÉROPORT":52, "SAINT-EXUPERY":52, "SAINT EXUPERY":52,
  "QUAI CLAUDE BERNARD":45, "QUAI RAMBAUD":60, "CONFLUENCE":60,
  "VIENNE":105, "STE-COLOMBE":105, "CHALON":120, "ST JEAN DE LOSNE":150,
  "GENEVE":180, "GENÈVE":180, "BASEL":300, "BALE":300, "BÂLE":300
};

/* ============================================================
   STATE
   ============================================================ */
let state = {
  tab: "day",
  missions: [],
  staging: [],
  journal: [],
  detailId: null,
  lastSync: null,
  online: true,
  systemError: "",
  sncf: {},
  pmf: null,
  pmfStep: 0
};
let paxChecks = readJSON(PAX_KEY, {});

/* ============================================================
   INIT
   ============================================================ */
window.addEventListener("load", () => {
  if (localStorage.getItem(THEME_KEY) === "1") document.body.classList.add("light");
  updateThemeIcon();
  tick(); setInterval(tick, 30000);
  loadData();
});
function tick() {
  const d = new Date();
  $("clock").textContent = pad2(d.getHours()) + ":" + pad2(d.getMinutes());
}
function toggleTheme() {
  const light = !document.body.classList.contains("light");
  document.body.classList.toggle("light", light);
  localStorage.setItem(THEME_KEY, light ? "1" : "0");
  updateThemeIcon();
}
function updateThemeIcon() { $("themeBtn").textContent = document.body.classList.contains("light") ? "🌙" : "☀"; }

/* ============================================================
   DATA
   ============================================================ */
async function loadData() {
  const cached = readJSON(CACHE_KEY, null);
  if (cached && cached.missions) {
    state.missions = cached.missions.map(normMission);
    state.staging = (cached.staging || []).map(normMission);
    state.journal = cached.journal || [];
    state.lastSync = cached.lastSync || null;
    state.online = false;
    updateHeader(); render();
  }
  try {
    const res = await fetch(GAS_URL + "?action=all", { signal: AbortSignal.timeout(25000) });
    const data = await res.json();
    if (!data || !Array.isArray(data.missions)) throw new Error(data && data.error ? data.error : "Réponse API invalide");
    state.missions = data.missions.map(normMission);
    state.staging = (data.staging || []).map(normMission);
    state.journal = data.journal || [];
    state.lastSync = new Date().toISOString();
    state.online = true;
    state.systemError = "";
    localStorage.setItem(CACHE_KEY, JSON.stringify({ missions: data.missions, staging: data.staging || [], journal: data.journal || [], lastSync: state.lastSync }));
  } catch (e) {
    state.online = false;
    state.systemError = e.message || String(e);
  }
  updateHeader(); render();
}
async function refreshData() {
  state.detailId = null;
  localStorage.removeItem(CACHE_KEY);
  $("app").innerHTML = '<div class="loader"><span class="spin">↻</span>Actualisation…</div>';
  await loadData();
}
function updateHeader() {
  const today = isoToday();
  const todays = state.missions.filter(m => m.date === today && !isCancelled(m));
  const stale = state.online ? "" : " · hors ligne";
  const sync = state.lastSync ? " · sync " + timeFromISO(state.lastSync) : "";
  $("headerSub").textContent = todays.length ? `${todays.length} mission${todays.length>1?"s":""} aujourd’hui${sync}${stale}` : `Aucune mission aujourd’hui${sync}${stale}`;
}
function normMission(raw) {
  if (raw._v31) return raw;
  const m = { ...raw, _v31: true };
  m.mid = pick(raw, ["Mission ID", "mission_id", "id"]);
  m.date = normalizeDate(pick(raw, ["Date mission", "Date", "date"]));
  m.client = pick(raw, ["Client", "client"]);
  m.type = pick(raw, ["Type", "type"]);
  m.sens = pick(raw, ["Sens", "sens"]);
  m.desc = pick(raw, ["Description", "Référence", "Reference", "description"]);
  m.heures = cleanNumber(pick(raw, ["Heures", "heures"]));
  m.base = money(pick(raw, ["Base (HT)", "Base HT", "Base", "base"]));
  m.hs = money(pick(raw, ["HS", "Heures supp", "Heures supplémentaires"]));
  m.supp = money(pick(raw, ["Supp", "Suppléments", "Supp."]));
  m.sousTotal = money(pick(raw, ["Sous-total", "Sous total", "Subtotal"]));
  m.debours = money(pick(raw, ["Débours", "Debours", "Expenses"]));
  m.totalBrut = money(pick(raw, ["Total brut", "Brut"]));
  m.totalNet = money(pick(raw, ["Total net", "Net", "net"]));
  m.facture = pick(raw, ["Facture #", "Facture#", "Facture", "facture"]);
  m.ndb = pick(raw, ["NDB #", "NDB#", "NDB", "ndb"]);
  m.dateEnvoi = normalizeDate(pick(raw, ["Date envoi", "Date d’envoi"]));
  m.datePaiement = normalizeDate(pick(raw, ["Date paiement", "Date de paiement"]));
  m.montantRecu = money(pick(raw, ["Montant reçu", "Montant recu", "Reçu", "Recu"]));
  m.statut = pick(raw, ["Statut", "Status", "statut"]);
  m.notes = pick(raw, ["Notes", "notes"]);
  m.deboursType = pick(raw, ["Débours type", "Debours type"]);
  m.debut = normalizeTime(pick(raw, ["Début", "Debut", "Start", "start"]));
  m.endroit = pick(raw, ["Endroit", "Lieu", "Location"]);
  m.voyage = cleanNumber(pick(raw, ["Voyage (min)", "Voyage", "Travel"]));
  m.calEvent = pick(raw, ["Cal event", "Calendar event"]);
  m.importLink = pick(raw, ["Import link", "Source link"]);
  m.importKey = pick(raw, ["Import key", "Source message id", "Source Email Message"]);
  m.docs = pick(raw, ["Docs", "Documents", "Drive"]);
  m.ops = raw.ops || {};
  m.opsSummary = pick(m.ops, ["Ops Summary", "Résumé opérationnel"]) || pick(raw, ["Ops Summary"]);
  m.paxRaw = pick(m.ops, ["Passenger Raw", "Passenger Checklist"]) || pick(raw, ["Passenger Raw", "Passenger Checklist"]);
  m.paxCount = pick(m.ops, ["Pax Count"]) || pick(raw, ["Pax Count", "Pax", "Passagers"]);
  m.shipName = pick(m.ops, ["Ship Name"]) || pick(raw, ["Ship Name", "Navire"]);
  m.dock = pick(m.ops, ["Dock / Terminal"]) || pick(raw, ["Dock / Terminal", "Quai", "Terminal"]);
  m.meetingPoint = pick(m.ops, ["Meeting Point"]) || pick(raw, ["Meeting Point", "RDV"]);
  m.transportRef = pick(m.ops, ["Transport Ref", "External Ref"]) || pick(raw, ["Transport Ref", "External Ref"]);
  m.sourcePDF = pick(m.ops, ["Source PDF"]) || pick(raw, ["Source PDF"]);
  m.sourceEmail = pick(m.ops, ["Source Email", "Source Email Msg", "Source Email Message"]) || pick(raw, ["Source Email", "Source Email Message"]);
  m.lastUpdated = pick(m.ops, ["Last Updated"]) || pick(raw, ["Last Updated", "Imported at"]);
  m.clientMeta = getClientMeta(m.client);
  m.modules = detectModules(m);
  m.completeness = computeCompleteness(m);
  return m;
}

/* ============================================================
   RENDER ROOT
   ============================================================ */
function go(tab) {
  state.tab = tab;
  state.detailId = null;
  state.pmf = null; state.pmfStep = 0;
  ["day","month","validation","admin"].forEach(t => $("nav-"+t).classList.toggle("active", t === tab));
  render(); window.scrollTo(0,0);
}
function render() {
  const m = state.detailId ? findMission(state.detailId) : null;
  if (m) return renderDetail(m);
  if (state.tab === "day") return renderDay();
  if (state.tab === "month") return renderMonth();
  if (state.tab === "validation") return renderValidation();
  return renderAdmin();
}
function openMission(mid) { state.detailId = mid; state.pmf = null; state.pmfStep = 0; render(); window.scrollTo(0,0); }
function closeDetail() { state.detailId = null; render(); }

/* ============================================================
   DAY
   ============================================================ */
function renderDay() {
  const today = isoToday();
  const tomorrow = isoOffset(1);
  const todays = sortByTime(state.missions.filter(m => m.date === today && !isCancelled(m)));
  const tomorrows = sortByTime(state.missions.filter(m => m.date === tomorrow && !isCancelled(m)));
  const week = state.missions.filter(m => m.date >= today && m.date <= isoOffset(7) && !isCancelled(m));
  const done = todays.filter(isDone).length;
  const estimatedNet = sum(todays, m => estimatedNetFor(m));
  let html = "";
  html += `<div class="grid-4">
    ${stat("Aujourd’hui", todays.length)}
    ${stat("Terminées", done, "", "green")}
    ${stat("À faire", Math.max(0, todays.length - done), "", "amber")}
    ${stat("Net estimé", euro(estimatedNet), "", "gold")}
  </div>`;
  if (!state.online && state.systemError) html += warningCard("Données hors ligne", `Dernière version en cache. Erreur API: ${esc(state.systemError)}`);
  html += `<div class="section-title">Aujourd’hui · ${longDate(today)}</div>`;
  html += todays.length ? todays.map(missionCard).join("") : empty("☀️", "Pas de mission aujourd’hui", tomorrows.length ? `${tomorrows.length} mission${tomorrows.length>1?"s":""} demain` : "Respiration administrative.");
  if (tomorrows.length) {
    html += `<div class="section-title">Demain · ${longDate(tomorrow)}</div>` + tomorrows.map(missionCard).join("");
  }
  const upcoming = week.filter(m => m.date > tomorrow).slice(0, 8);
  if (upcoming.length) html += `<div class="section-title">7 jours</div>` + upcoming.map(missionCard).join("");
  $("app").innerHTML = html;
}

/* ============================================================
   MONTH
   ============================================================ */
function renderMonth() {
  const now = new Date();
  const y = now.getFullYear();
  const month = pad2(now.getMonth()+1);
  const all = state.missions.filter(m => m.date && m.date.slice(0,7) === `${y}-${month}`);
  const active = all.filter(m => !isCancelled(m));
  const done = active.filter(isDone);
  const st = financeStats(active);
  const groups = groupBy(active.sort((a,b) => a.date.localeCompare(b.date) || (a.debut||"99").localeCompare(b.debut||"99")), m => m.date);
  let html = `<div class="section-title">${MONTHS[now.getMonth()]} ${y}</div>
  <div class="grid-4">
    ${stat("Missions", active.length)}
    ${stat("Terminées", done.length, "", "green")}
    ${stat("Sous-total", euro(st.sousTotal), "", "gold")}
    ${stat("Net", euro(st.net), "", "green")}
  </div>`;
  html += `<div class="section-title">Calendrier</div>`;
  if (!active.length) html += empty("📅", "Aucune mission ce mois", "");
  Object.entries(groups).forEach(([date, ms]) => {
    html += `<div class="section-title">${longDate(date)}</div>` + ms.map(missionCard).join("");
  });
  const cancelled = all.filter(isCancelled);
  if (cancelled.length) html += collapsible("cxl", `Annulées (${cancelled.length})`, "Référence / suivi client", cancelled.map(missionCard).join(""));
  $("app").innerHTML = html;
}

/* ============================================================
   VALIDATION
   ============================================================ */
function renderValidation() {
  const needsReview = state.staging.length ? state.staging : state.missions.filter(m => /brouillon|proposition|à confirmer|a confirmer/i.test(m.statut || ""));
  let html = `<div class="section-title">Validation</div>
  <div class="grid-3">
    ${stat("À valider", needsReview.length, "", "amber")}
    ${stat("Docs manquants", state.missions.filter(m => !m.docs && !m.sourcePDF).length)}
    ${stat("Infos incomplètes", state.missions.filter(m => m.completeness.score < 75 && !isCancelled(m)).length)}
  </div>`;
  html += `<div class="section-title">Missions à vérifier</div>`;
  html += needsReview.length ? needsReview.map(missionCard).join("") : empty("✅", "Rien à valider", "La file est propre.");
  html += `<div class="section-title">Incomplètes</div>`;
  const incomplete = state.missions.filter(m => m.completeness.score < 75 && !isCancelled(m)).slice(0, 12);
  html += incomplete.length ? incomplete.map(missionCard).join("") : empty("🧼", "Pas d’anomalie visible", "Les données essentielles semblent présentes.");
  $("app").innerHTML = html;
}

/* ============================================================
   ADMIN
   ============================================================ */
function renderAdmin() {
  const now = new Date();
  const month = `${now.getFullYear()}-${pad2(now.getMonth()+1)}`;
  const mms = state.missions.filter(m => m.date && m.date.slice(0,7) === month && !isCancelled(m));
  const st = financeStats(mms);
  const toInvoice = mms.filter(m => isDone(m) && !m.facture);
  const generated = mms.filter(m => m.facture && !/envoy|pay|payé/i.test(m.statut || ""));
  const sent = mms.filter(m => m.facture && /envoy/i.test(m.statut || ""));
  const unpaid = mms.filter(m => m.totalNet > 0 && m.montantRecu <= 0 && (m.facture || isDone(m)));
  let html = `<div class="section-title">Admin · ${MONTHS[now.getMonth()]}</div>
  <div class="grid-4">
    ${stat("Sous-total", euro(st.sousTotal), "", "gold")}
    ${stat("Débours", euro(st.debours), "", "blue")}
    ${stat("Net", euro(st.net), "", "green")}
    ${stat("Reçu", euro(st.recu), "", "purple")}
  </div>
  <div class="section-title">Actions</div>
  <div class="grid-4">
    ${stat("À facturer", toInvoice.length, "", "amber")}
    ${stat("Générées", generated.length)}
    ${stat("Envoyées", sent.length, "", "blue")}
    ${stat("Non reçu", euro(Math.max(0, st.net - st.recu)), "", "red")}
  </div>`;
  html += `<div class="section-title">À facturer</div>` + (toInvoice.length ? toInvoice.map(missionCard).join("") : empty("🧾", "Aucune facture en attente", ""));
  html += `<div class="section-title">Paiements / suivi</div>` + (unpaid.length ? unpaid.map(missionCard).join("") : empty("💶", "Rien d’urgent côté paiement", ""));
  html += collapsible("system", "Santé système", "Cache / API / données", systemHealthHTML());
  $("app").innerHTML = html;
}

/* ============================================================
   MISSION CARD
   ============================================================ */
function missionCard(m) {
  const mt = m.clientMeta || getClientMeta(m.client);
  const status = statusBadge(m);
  const done = isDone(m) || isCancelled(m);
  const score = m.completeness ? m.completeness.score : 0;
  const loc = m.shipName || m.endroit || m.meetingPoint || "";
  const pills = [];
  if (m.shipName) pills.push(`<span class="pill blue">🚢 ${esc(m.shipName)}</span>`);
  if (m.paxCount) pills.push(`<span class="pill blue">👥 ${esc(m.paxCount)}</span>`);
  if (m.modules.includes("basel")) pills.push(`<span class="pill amber">🚌 Basel</span>`);
  if (m.modules.includes("train")) pills.push(`<span class="pill green">🚉 Train</span>`);
  if (m.modules.includes("airport")) pills.push(`<span class="pill blue">✈️ Aéroport</span>`);
  if (m.completeness && m.completeness.missing.length) pills.push(`<span class="pill amber">⚠ ${m.completeness.missing.length} manque</span>`);
  return `<article class="mission-card ${done ? "done" : ""}" style="--client-color:${mt.color}" onclick="openMission('${js(m.mid)}')">
    <div class="mission-top">
      <div style="min-width:0;flex:1">
        <div class="mission-meta"><span class="client-tag">${mt.tag}</span>${m.debut ? `<span class="time-tag">${esc(m.debut)}</span>` : `<span class="time-tag">TBD</span>`}<span class="date-tag">${shortDate(m.date)}</span></div>
        <div class="mission-title">${esc(m.type || "Mission")}${m.sens && m.sens !== "—" ? " · " + esc(m.sens) : ""}</div>
        ${loc ? `<div class="mission-sub">${esc(String(loc).split("\n")[0])}</div>` : ""}
        ${pills.length ? `<div class="pill-row">${pills.join("")}</div>` : ""}
      </div>
      <div class="status-stack">
        ${status}
        <div class="completeness" title="${score}%"><span style="width:${score}%"></span></div>
      </div>
    </div>
  </article>`;
}
function statusBadge(m) {
  const s = (m.statut || "").toLowerCase();
  if (isCancelled(m)) return `<span class="status-badge red">Annulé</span>`;
  if (/pay|payé/.test(s)) return `<span class="status-badge green">Payé</span>`;
  if (/envoy/.test(s)) return `<span class="status-badge blue">Envoyée</span>`;
  if (/générée|generee|facture/.test(s)) return `<span class="status-badge amber">Fac.</span>`;
  if (/rapport en attente/.test(s)) return `<span class="status-badge amber">Rapport 9h</span>`;
  if (isDone(m)) return `<span class="status-badge green">Terminé</span>`;
  if (/confirm/.test(s)) return `<span class="status-badge green">Confirmé</span>`;
  if (/plan/.test(s)) return `<span class="status-badge blue">Planifié</span>`;
  return `<span class="status-badge">${esc(m.statut || "Brouillon")}</span>`;
}

async function saveTiming(mid) {

async function saveField(mid, field, value, reload = true) {
  try {
    const url = GAS_URL + "?action=update&id=" + encodeURIComponent(mid) + "&field=" + encodeURIComponent(field) + "&value=" + encodeURIComponent(value);
    const r = await fetch(url, { signal: AbortSignal.timeout(15000) });
    const d = await r.json();
    if (!d || d.ok === false) throw new Error(d && d.msg ? d.msg : "Update échoué");
    const m = findMission(mid);
    if (m) applyLocalField(m, field, value);
    toast("Enregistré", "ok");
    if (reload) await loadData(); else render();
    return true;
  } catch(e) { toast("Erreur: " + e.message.slice(0,60), "err"); return false; }
}
async function apiAction(action, params, successMsg) {
  try {
    const qs = Object.entries(params).map(([k,v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`).join("&");
    const r = await fetch(GAS_URL + `?action=${encodeURIComponent(action)}&${qs}`, { signal: AbortSignal.timeout(25000) });
    const d = await r.json();
    if (!d || d.ok === false) throw new Error(d && (d.msg || d.error) ? (d.msg || d.error) : "Action échouée");
    toast(successMsg || "OK", "ok");
    await loadData();
  } catch(e) { toast("Erreur: " + e.message.slice(0,60), "err"); }
}
function applyLocalField(m, field, value) {
  if (field === "statut") m.statut = value;
  if (field === "notes") m.notes = value;
  if (field === "heures") m.heures = value;
  if (field === "debut") m.debut = value;
  if (field === "montant_recu") m.montantRecu = money(value);
}

async function fetchTrain(mid) {
  const m = findMission(mid);
  const el = $("train-" + safeId(mid));
  if (!el) return;
  el.textContent = "Chargement SNCF…";
  try {
    const r = await fetch(SNCF_WORKER, { signal: AbortSignal.timeout(12000) });
    const d = await r.json();
    const ref = (m.transportRef || m.desc || "").trim();
    const arrivals = d.arrivals || [];
    const match = ref ? arrivals.filter(a => {
      const info = a.display_informations || {};
      const h = String(info.headsign || "");
      const t = String(info.trip_short_name || "");
      return h.includes(ref) || t.includes(ref) || ref.includes(h) || ref.includes(t);
    }) : [];
    if (!match.length) { el.textContent = ref ? `Aucun résultat pour ${ref}. ${arrivals.length} trains chargés.` : "Aucune référence train."; return; }
    el.innerHTML = `<div class="timeline">${match.slice(0,4).map(a => {
      const info = a.display_informations || {};
      const sdt = a.stop_date_time || {};
      const base = sdt.base_arrival_date_time || sdt.base_departure_date_time || "";
      const real = sdt.arrival_date_time || sdt.departure_date_time || base;
      const diff = sncfDelay(base, real);
      return timelineRow(sncfTime(base), info.headsign || info.trip_short_name || ref, diff > 1 ? `Retard +${diff} min` : "À l’heure / non signalé");
    }).join("")}</div>`;
  } catch(e) { el.textContent = "Erreur SNCF: " + e.message; }
}

function computeCompleteness(m) {
  const items = [
    { label:"Date", ok:!!m.date, detail:m.date || "manquante" },
    { label:"Heure", ok:!!m.debut, detail:m.debut || "TBD", warn:!m.debut },
    { label:"Lieu", ok:!!(m.endroit || m.meetingPoint || m.dock), detail:m.endroit || m.meetingPoint || m.dock || "à compléter" },
    { label:"Contact", ok:getContacts(m).length>0, detail:getContacts(m).length ? `${getContacts(m).length} contact(s)` : "aucun contact" },
    { label:"Pax / ref", ok:!!(m.paxRaw || m.paxCount || m.transportRef || m.desc), detail:m.paxCount || m.transportRef || m.desc || "à vérifier", warn:!!m.desc },
    { label:"Source", ok:!!(m.docs || m.sourcePDF || m.importKey), detail:m.docs || m.sourcePDF ? "document lié" : m.importKey ? "email lié" : "source absente" },
    { label:"Tarif", ok:valueSousTotal(m)>0 || m.base>0, detail:valueSousTotal(m)>0 ? euro(valueSousTotal(m)) : "à calculer" }
  ];
  const ok = items.filter(i => i.ok).length;
  return { score: Math.round(ok / items.length * 100), missing: items.filter(i => !i.ok).map(i => i.label), items };
}
function detectModules(m) {
  const text = `${m.client} ${m.type} ${m.desc} ${m.endroit} ${m.transportRef}`.toLowerCase();
  const mods = ["prep", "contacts", "finance", "rapport"];
  if (/basel|bale|bâle|viking|lyon - bale|lyon - bâle/.test(text)) mods.push("basel");
  if (/gare|sncf|tgv|ter|train|part-dieu|perrache/.test(text)) mods.push("train");
  if (/aeroport|aéroport|airport|lys|vol|flight|terminal/.test(text)) mods.push("airport");
  return mods;
}
function getContacts(m) {
  const o = m.ops || {};
  const contacts = [];
  if (pick(o,["Contact Client"])) contacts.push({ role:"Contact client", name:pick(o,["Contact Client"]), phone:pick(o,["Client Phone"]) });
  if (pick(o,["Cruise Manager"])) contacts.push({ role:"Cruise manager", name:pick(o,["Cruise Manager"]), phone:pick(o,["Cruise Phone"]) });
  if (pick(o,["Chauffeur"])) contacts.push({ role:"Chauffeur", name:pick(o,["Chauffeur"]), phone:pick(o,["Tél Chauffeur", "Tel Chauffeur"]) });
  if (pick(o,["Colleague"])) contacts.push({ role:pick(o,["Colleague Role"]) || "Collègue", name:pick(o,["Colleague"]), phone:pick(o,["Colleague Phone"]) });
  if (pick(o,["Emergency Contact"])) contacts.push({ role:"Urgence", name:pick(o,["Emergency Contact"]), phone:"" });
  return contacts.filter(c => c.name);
}
function parsePax(raw) { return String(raw || "").split(/\n+/).map(s => s.trim()).filter(Boolean); }
function togglePax(mid, idx) {
  if (!paxChecks[mid]) paxChecks[mid] = {};

function extractFlights(m) {
  const text = [m.transportRef, m.paxRaw, m.opsSummary, m.notes].filter(Boolean).join("\n");
  const lines = text.split(/\n+/).map(s => s.trim()).filter(Boolean);
  return lines.map(line => {
    const flight = line.match(/\b[A-Z]{2}\d{2,4}(?:\/[A-Z]{2}\d{2,4})?/);
    const time = line.match(/\b(\d{1,2})h(\d{2})\b|\b(\d{1,2}:\d{2})\b/);
    if (!flight) return null;
    return { ref: flight[0], time: time ? (time[3] || `${pad2(time[1])}:${time[2]}`) : "", detail: line.slice(0,120) };
  }).filter(Boolean).slice(0,12);
}

function valueSousTotal(m) { return m.sousTotal || (m.base + m.hs + m.supp) || 0; }

function departureTime(m) { const mins = travelMinutes(m); if (!m.debut || !mins) return ""; return addMinutes(m.debut, -(mins + 10)); }

function addMinutes(hhmm, mins) { const [h,m]=hhmm.split(":").map(Number); let total = h*60+m+mins; while(total<0) total += 1440; total %= 1440; return `${pad2(total/60)}:${pad2(total%60)}`; }

function groupBy(arr, fn) { return arr.reduce((o,x) => { const k=fn(x); (o[k]=o[k]||[]).push(x); return o; }, {}); }
function findMission(mid) { return state.missions.find(m => m.mid === mid) || state.staging.find(m => m.mid === mid) || null; }
function getClientMeta(client) { const c = String(client || "").toLowerCase(); for (const [k,v] of Object.entries(CLIENTS)) if (c.includes(k)) return v; return { tag: (client || "?").slice(0,4).toUpperCase(), color: "#8b857d" }; }
function esc(s) { return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function escAttr(s) { return esc(s).replace(/'/g,"&#39;"); }
function js(s) { return String(s ?? "").replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/\n/g," "); }
function safeId(s) { return String(s).replace(/[^a-zA-Z0-9_-]/g,"_"); }
function toast(msg, type="") { const el = $("toast"); el.textContent = msg; el.className = "toast show" + (type ? " " + type : ""); clearTimeout(window.__toast); window.__toast = setTimeout(() => el.className = "toast" + (type ? " " + type : ""), 3200); }
function sncfTime(s) { if (!s) return "—"; const m = String(s).match(/T?(\d{2})(\d{2})(\d{2})$/) || String(s).match(/(\d{2}):(\d{2})/); return m ? `${m[1]}:${m[2]}` : "—"; }
function sncfDelay(base, real) { const b = sncfTime(base), r = sncfTime(real); if (b === "—" || r === "—") return 0; const [bh,bm]=b.split(":").map(Number), [rh,rm]=r.split(":").map(Number); return (rh*60+rm)-(bh*60+bm); }
