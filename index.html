<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Mission Control V3.1</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
/* =========================================================
   MISSION CONTROL V3.1 — CALM FIELD COCKPIT
   Goals:
   - Dashboard-first, Telegram optional
   - Mobile/onsite legibility
   - Calm top nav: Jour · Mois · Validation · Admin
   - Mission-specific dynamic modules, not global clutter
   - Rapport can be generated, scheduled, sent, or explicitly skipped
   - Invoices/NDB/payment controls from dashboard
   ========================================================= */

:root {
  color-scheme: dark;
  --bg: #0d0e11;
  --panel: #17191f;
  --panel-2: #20232b;
  --panel-3: #282c35;
  --line: rgba(255,255,255,.10);
  --line-2: rgba(255,255,255,.17);
  --text: #f4f1ea;
  --muted: #b8b2a8;
  --soft: #827b70;
  --ghost: #565148;
  --gold: #e7c977;
  --blue: #7bb2ff;
  --green: #65c997;
  --amber: #f0a35d;
  --red: #f06f6f;
  --purple: #b499ff;
  --radius: 16px;
  --radius-sm: 11px;
  --tap: 48px;
  --shadow: 0 18px 60px rgba(0,0,0,.30);
  --font: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
}

body.light {
  color-scheme: light;
  --bg: #f4f0e7;
  --panel: #fffdf8;
  --panel-2: #ebe5d9;
  --panel-3: #ded6c9;
  --line: rgba(0,0,0,.10);
  --line-2: rgba(0,0,0,.17);
  --text: #17140f;
  --muted: #514b43;
  --soft: #7a7166;
  --ghost: #a59c90;
  --gold: #8b650e;
  --blue: #145ec9;
  --green: #26724f;
  --amber: #a85a16;
  --red: #ad3030;
  --purple: #6747bd;
  --shadow: 0 18px 44px rgba(45,34,15,.11);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { min-height: 100%; overscroll-behavior: none; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 16px;
  line-height: 1.48;
  letter-spacing: -0.01em;
}
button, input, textarea, select { font: inherit; color: inherit; }
button { border: 0; background: none; cursor: pointer; }
a { color: inherit; text-decoration: none; }

/* =========================================================
   APP FRAME
   ========================================================= */
.app-shell { min-height: 100vh; padding-bottom: 92px; }
.header {
  position: sticky;
  top: 0;
  z-index: 30;
  background: color-mix(in srgb, var(--bg) 92%, transparent);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--line);
}
.header-inner {
  max-width: 760px;
  margin: 0 auto;
  padding: 13px 16px 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
}
.brand-kicker {
  font-size: 11px;
  color: var(--soft);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .12em;
}
.brand-title {
  font-size: 22px;
  line-height: 1;
  font-weight: 800;
  letter-spacing: -.045em;
  color: var(--text);
}
.header-meta { text-align: right; min-width: 106px; }
.clock { font-family: var(--mono); font-size: 21px; font-weight: 600; color: var(--gold); letter-spacing: -.02em; }
.header-sub { font-size: 12px; color: var(--soft); margin-top: 1px; }
.header-actions { display: flex; align-items: center; gap: 8px; }
.icon-btn {
  width: 42px;
  height: 42px;
  border-radius: 999px;
  background: var(--panel-2);
  border: 1px solid var(--line);
  display: grid;
  place-items: center;
  font-size: 17px;
}
.icon-btn:active { transform: scale(.98); background: var(--panel-3); }

.top-nav {
  max-width: 760px;
  margin: 0 auto;
  padding: 0 12px 10px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 7px;
}
.nav-btn {
  min-height: 44px;
  border-radius: 999px;
  background: transparent;
  color: var(--soft);
  font-size: 13px;
  font-weight: 750;
  border: 1px solid transparent;
}
.nav-btn.on {
  background: color-mix(in srgb, var(--gold) 14%, transparent);
  color: var(--gold);
  border-color: color-mix(in srgb, var(--gold) 32%, transparent);
}

.content {
  max-width: 760px;
  margin: 0 auto;
  padding: 16px 14px 0;
}

/* =========================================================
   COMMON UI
   ========================================================= */
.section-label {
  margin: 24px 2px 10px;
  font-size: 12px;
  font-weight: 800;
  color: var(--soft);
  text-transform: uppercase;
  letter-spacing: .13em;
}
.section-label:first-child { margin-top: 4px; }
.card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.soft-card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
}
.muted { color: var(--soft); }
.small { font-size: 13px; }
.mono { font-family: var(--mono); }
.row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.stack { display: grid; gap: 10px; }
.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.kpi {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 10px 10px;
}
.kpi-label { font-size: 11px; color: var(--soft); font-weight: 700; text-transform: uppercase; letter-spacing: .08em; }
.kpi-value { margin-top: 3px; font-size: 22px; font-weight: 800; line-height: 1; letter-spacing: -.04em; }
.kpi-value.gold { color: var(--gold); }
.kpi-value.green { color: var(--green); }
.kpi-value.amber { color: var(--amber); }
.kpi-value.red { color: var(--red); }

.pill {
  display: inline-flex;
  align-items: center;
  min-height: 28px;
  border-radius: 999px;
  padding: 4px 10px;
  font-size: 12px;
  font-weight: 750;
  border: 1px solid var(--line);
  background: var(--panel-2);
  color: var(--muted);
  white-space: nowrap;
}
.pill.gold { color: var(--gold); background: color-mix(in srgb, var(--gold) 12%, transparent); border-color: color-mix(in srgb, var(--gold) 28%, transparent); }
.pill.green { color: var(--green); background: color-mix(in srgb, var(--green) 13%, transparent); border-color: color-mix(in srgb, var(--green) 25%, transparent); }
.pill.blue { color: var(--blue); background: color-mix(in srgb, var(--blue) 12%, transparent); border-color: color-mix(in srgb, var(--blue) 25%, transparent); }
.pill.amber { color: var(--amber); background: color-mix(in srgb, var(--amber) 13%, transparent); border-color: color-mix(in srgb, var(--amber) 27%, transparent); }
.pill.red { color: var(--red); background: color-mix(in srgb, var(--red) 13%, transparent); border-color: color-mix(in srgb, var(--red) 27%, transparent); }
.pill.purple { color: var(--purple); background: color-mix(in srgb, var(--purple) 13%, transparent); border-color: color-mix(in srgb, var(--purple) 27%, transparent); }

.action-btn {
  width: 100%;
  min-height: 52px;
  border-radius: 14px;
  padding: 12px 14px;
  font-weight: 800;
  letter-spacing: -.01em;
  background: var(--gold);
  color: #111;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.action-btn.secondary { background: var(--panel-2); color: var(--text); border: 1px solid var(--line); }
.action-btn.green { background: var(--green); color: #08120d; }
.action-btn.red { background: color-mix(in srgb, var(--red) 20%, var(--panel)); color: var(--red); border: 1px solid color-mix(in srgb, var(--red) 32%, transparent); }
.action-btn.blue { background: color-mix(in srgb, var(--blue) 20%, var(--panel)); color: var(--blue); border: 1px solid color-mix(in srgb, var(--blue) 32%, transparent); }
.action-btn:active { transform: scale(.99); }

.input, .textarea, .select {
  width: 100%;
  background: var(--panel-2);
  border: 1px solid var(--line-2);
  border-radius: 13px;
  padding: 12px 13px;
  min-height: 48px;
  outline: none;
  font-size: 16px;
}
.textarea { resize: vertical; min-height: 110px; line-height: 1.55; }
.input:focus, .textarea:focus, .select:focus { border-color: var(--gold); }

/* =========================================================
   MISSION CARDS
   ========================================================= */
.mission-card {
  position: relative;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 15px 15px 14px 18px;
  box-shadow: var(--shadow);
  overflow: hidden;
}
.mission-card:before {
  content: "";
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 5px;
  background: var(--client-color, var(--gold));
}
.mission-card:active { transform: scale(.993); }
.mission-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
.client-tag { font-size: 12px; font-weight: 900; color: var(--client-color, var(--gold)); letter-spacing: .06em; }
.mission-time { font-family: var(--mono); font-size: 18px; font-weight: 700; color: var(--text); }
.mission-title { margin-top: 7px; font-size: 20px; line-height: 1.12; font-weight: 850; letter-spacing: -.045em; }
.mission-place { margin-top: 5px; color: var(--muted); font-size: 15px; line-height: 1.25; }
.mission-pills { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 6px; }
.mission-right { display: grid; justify-items: end; gap: 6px; flex-shrink: 0; }
.completeness-ring {
  width: 38px;
  height: 38px;
  border-radius: 999px;
  display: grid;
  place-items: center;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 800;
  background: conic-gradient(var(--green) calc(var(--pct, 0) * 1%), var(--panel-3) 0);
  color: var(--text);
}
.completeness-ring:after {
  content: attr(data-pct);
  width: 28px;
  height: 28px;
  border-radius: 999px;
  background: var(--panel);
  display: grid;
  place-items: center;
}

/* =========================================================
   DETAIL VIEW
   ========================================================= */
.back-btn {
  min-height: 48px;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  color: var(--gold);
  font-weight: 800;
  margin-bottom: 8px;
}
.detail-hero { border-top: 5px solid var(--client-color, var(--gold)); }
.detail-head { padding: 18px; }
.detail-client { color: var(--client-color, var(--gold)); font-size: 13px; font-weight: 900; text-transform: uppercase; letter-spacing: .08em; }
.detail-title { margin-top: 5px; font-size: 29px; line-height: 1.03; font-weight: 900; letter-spacing: -.06em; }
.detail-sub { margin-top: 8px; color: var(--muted); font-size: 16px; }
.detail-pills { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 13px; }
.detail-section { border-top: 1px solid var(--line); padding: 16px; }
.detail-section-title { font-size: 12px; color: var(--soft); font-weight: 900; text-transform: uppercase; letter-spacing: .12em; margin-bottom: 11px; }
.info-list { display: grid; gap: 1px; }
.info-row { display: grid; grid-template-columns: 112px 1fr; gap: 12px; padding: 9px 0; border-bottom: 1px solid var(--line); }
.info-row:last-child { border-bottom: 0; }
.info-label { color: var(--soft); font-size: 13px; }
.info-value { color: var(--text); font-size: 15px; word-break: break-word; }

.module {
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  overflow: hidden;
  background: color-mix(in srgb, var(--panel-2) 70%, transparent);
  margin-top: 10px;
}
.module-head {
  min-height: 54px;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.module-title { font-weight: 850; letter-spacing: -.02em; }
.module-sub { color: var(--soft); font-size: 12px; margin-top: 1px; }
.chev { color: var(--soft); transition: transform .18s ease; }
.module.open .chev { transform: rotate(180deg); }
.module-body { display: none; border-top: 1px solid var(--line); padding: 14px; }
.module.open .module-body { display: block; }

.prep-grid { display: grid; gap: 9px; }
.prep-item {
  display: grid;
  grid-template-columns: 30px 1fr auto;
  gap: 10px;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--line);
}
.prep-item:last-child { border-bottom: 0; }
.prep-icon { font-size: 18px; }
.prep-main { font-weight: 700; }
.prep-sub { color: var(--soft); font-size: 13px; margin-top: 1px; }

.check-row {
  min-height: 48px;
  display: grid;
  grid-template-columns: 28px 1fr auto;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--line);
  padding: 8px 0;
}
.check-row:last-child { border-bottom: 0; }
.check-box {
  width: 24px; height: 24px;
  border-radius: 8px;
  border: 1.5px solid var(--line-2);
  background: var(--panel-3);
  display: grid;
  place-items: center;
  font-size: 13px;
  font-weight: 900;
}
.check-row.done .check-box { background: var(--green); color: #07120d; border-color: var(--green); }
.check-row.done .check-text { color: var(--soft); text-decoration: line-through; }
.check-meta { font-size: 12px; color: var(--soft); }

.timeline { position: relative; display: grid; gap: 0; }
.timeline-item { display: grid; grid-template-columns: 70px 20px 1fr; gap: 10px; min-height: 54px; }
.timeline-time { font-family: var(--mono); color: var(--gold); font-weight: 700; padding-top: 2px; }
.timeline-dot { position: relative; display: flex; justify-content: center; }
.timeline-dot:before { content: ""; width: 10px; height: 10px; border-radius: 999px; background: var(--gold); margin-top: 8px; z-index: 1; }
.timeline-dot:after { content: ""; position: absolute; top: 17px; bottom: -8px; width: 1px; background: var(--line-2); }
.timeline-item:last-child .timeline-dot:after { display: none; }
.timeline-title { font-weight: 800; }
.timeline-sub { font-size: 13px; color: var(--soft); }

.contact-card {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 11px 0;
  border-bottom: 1px solid var(--line);
}
.contact-card:last-child { border-bottom: 0; }
.contact-role { color: var(--soft); font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .08em; }
.contact-name { margin-top: 2px; font-weight: 800; font-size: 16px; }
.contact-phone { margin-top: 2px; color: var(--muted); font-family: var(--mono); font-size: 13px; }
.call-btn {
  min-width: 58px;
  min-height: 44px;
  border-radius: 12px;
  background: color-mix(in srgb, var(--green) 18%, var(--panel));
  color: var(--green);
  border: 1px solid color-mix(in srgb, var(--green) 30%, transparent);
  display: grid;
  place-items: center;
  font-size: 20px;
}

/* =========================================================
   PMF / RAPPORT / ADMIN
   ========================================================= */
.stepper { display: grid; gap: 14px; }
.step-head { display: flex; align-items: center; gap: 10px; }
.step-num {
  width: 30px; height: 30px; border-radius: 999px;
  background: var(--gold); color: #111;
  display: grid; place-items: center;
  font-weight: 900;
}
.step-title { font-size: 19px; font-weight: 900; letter-spacing: -.04em; }
.time-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.field-label { font-size: 12px; color: var(--soft); font-weight: 900; text-transform: uppercase; letter-spacing: .09em; margin-bottom: 6px; }
.report-choice-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.report-card {
  min-height: 58px;
  border-radius: 14px;
  border: 1px solid var(--line);
  background: var(--panel-2);
  padding: 11px;
  text-align: left;
}
.report-card.on { border-color: var(--gold); background: color-mix(in srgb, var(--gold) 12%, var(--panel)); }
.report-card-title { font-weight: 850; }
.report-card-sub { color: var(--soft); font-size: 12px; }
.report-output {
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 13px;
  font-size: 15px;
  line-height: 1.6;
  white-space: pre-wrap;
}

.admin-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  padding: 13px 0;
  border-bottom: 1px solid var(--line);
  align-items: center;
}
.admin-row:last-child { border-bottom: 0; }
.admin-title { font-weight: 850; }
.admin-sub { color: var(--soft); font-size: 13px; margin-top: 2px; }

/* =========================================================
   VALIDATION / EMPTY / TOAST
   ========================================================= */
.empty {
  text-align: center;
  padding: 48px 20px;
  color: var(--soft);
}
.empty-icon { font-size: 42px; margin-bottom: 10px; opacity: .75; }
.empty-title { color: var(--muted); font-weight: 850; font-size: 18px; }
.empty-sub { margin-top: 4px; font-size: 14px; }
.loader { padding: 38px 0; text-align: center; color: var(--soft); }
.spin { display: inline-block; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.toast {
  position: fixed;
  left: 50%; bottom: 24px;
  transform: translateX(-50%);
  z-index: 80;
  max-width: calc(100vw - 32px);
  background: var(--panel-3);
  border: 1px solid var(--line-2);
  color: var(--text);
  border-radius: 999px;
  padding: 11px 18px;
  font-weight: 800;
  box-shadow: var(--shadow);
  opacity: 0;
  pointer-events: none;
  transition: opacity .18s ease, transform .18s ease;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
.toast.ok { color: var(--green); border-color: color-mix(in srgb, var(--green) 35%, transparent); }
.toast.err { color: var(--red); border-color: color-mix(in srgb, var(--red) 35%, transparent); }

@media (max-width: 420px) {
  body { font-size: 16px; }
  .header-inner { padding-left: 14px; padding-right: 14px; }
  .brand-title { font-size: 20px; }
  .clock { font-size: 19px; }
  .top-nav { gap: 5px; padding-left: 10px; padding-right: 10px; }
  .nav-btn { font-size: 12px; min-height: 42px; }
  .content { padding-left: 10px; padding-right: 10px; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .grid-3 { grid-template-columns: 1fr; }
  .detail-title { font-size: 25px; }
  .mission-title { font-size: 19px; }
  .mission-time { font-size: 17px; }
  .info-row { grid-template-columns: 98px 1fr; }
}
</style>
</head>
<body>
<div class="app-shell">
  <header class="header">
    <div class="header-inner">
      <div>
        <div class="brand-kicker">Mission Control</div>
        <div class="brand-title">Jour de mission</div>
      </div>
      <div class="header-actions">
        <div class="header-meta">
          <div class="clock" id="clock">--:--</div>
          <div class="header-sub" id="headerSub">Chargement…</div>
        </div>
        <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Thème">☀️</button>
        <button class="icon-btn" onclick="refreshData()" title="Actualiser">↻</button>
      </div>
    </div>
    <nav class="top-nav">
      <button class="nav-btn on" id="nav-day" onclick="go('day')">Jour</button>
      <button class="nav-btn" id="nav-month" onclick="go('month')">Mois</button>
      <button class="nav-btn" id="nav-validation" onclick="go('validation')">Validation</button>
      <button class="nav-btn" id="nav-admin" onclick="go('admin')">Admin</button>
    </nav>
  </header>

  <main class="content" id="content">
    <div class="loader"><span class="spin">↻</span> Chargement…</div>
  </main>
</div>
<div class="toast" id="toast"></div>

<script>
/* =========================================================
   CONFIG
   ========================================================= */
const GAS_URL = "https://script.google.com/macros/s/AKfycbwACs6qIEu24xMe3KtSjLMbcs3A6iXqCaZEodXBuTx2au1ol5UXeUqZKM6W_NJO9qSErg/exec";
const SNCF_WORKER = "https://fragrant-hall-c33b.t5q7m95hfj.workers.dev/";
const TAX = 0.212;
const DAYS = ["dim", "lun", "mar", "mer", "jeu", "ven", "sam"];
const MONTHS = ["janvier", "février", "mars", "avril", "mai", "juin", "juillet", "août", "septembre", "octobre", "novembre", "décembre"];
const MONTHS_SHORT = ["jan", "fév", "mar", "avr", "mai", "jun", "jul", "aoû", "sep", "oct", "nov", "déc"];

const CLIENTS = {
  "Philibert Tourisme": { tag: "PHIL", color: "#65c997" },
  "Go Côte Saône": { tag: "GCS", color: "#7bb2ff" },
  "Go Cote Saone": { tag: "GCS", color: "#7bb2ff" },

function tick() {
  const d = new Date();
  el("clock").textContent = p2(d.getHours()) + ":" + p2(d.getMinutes());
}

function toggleTheme() {
  light = !light;

  updateThemeBtn();
}
function updateThemeBtn() { el("themeBtn").textContent = light ? "🌙" : "☀️"; }

async function loadData() {
  const cached = localStorage.getItem("mc31_cache");
  if (cached) {
    try {
      const c = JSON.parse(cached);
      missions = (c.missions || []).map(norm);
      staging = (c.staging || []).map(norm);
      journal = c.journal || [];
      render();
    } catch(e) {}
  }

  try {
    const r = await fetch(GAS_URL + "?action=all", { signal: AbortSignal.timeout(25000) });
    const d = await r.json();
    missions = (d.missions || []).map(norm);
    staging = (d.staging || d.pending || []).map(norm);
    journal = d.journal || [];
    localStorage.setItem("mc31_cache", JSON.stringify({ missions, staging, journal, cachedAt: Date.now() }));
    render();
  } catch(e) {
    toast("Mode hors ligne / cache", "err");
    render();
  }
}

async function refreshData() {
  localStorage.removeItem("mc31_cache");
  el("content").innerHTML = '<div class="loader"><span class="spin">↻</span> Actualisation…</div>';
  await loadData();
}

/* =========================================================
   NORMALIZATION
   ========================================================= */
function norm(m) {
  if (m._mc31) return m;
  const ops = m.ops || {};
  const o = { ...m, ops, _mc31: true };
  o.id = first(o, ["Mission ID", "mid", "id"]);
  o.date = first(o, ["Date mission", "Date", "date"]);
  o.client = first(o, ["Client", "client"]);
  o.type = first(o, ["Type", "type"]);
  o.sens = first(o, ["Sens", "sens"]);
  o.description = first(o, ["Description", "Référence", "Reference", "description"]);
  o.hours = number(first(o, ["Heures", "hours"]));
  o.base = number(first(o, ["Base (HT)", "Base HT", "base"]));
  o.hs = number(first(o, ["HS", "Heures supp", "heures supp"]));
  o.supp = number(first(o, ["Supp", "Suppléments"]));
  o.subtotal = number(first(o, ["Sous-total", "Sous total"]));
  o.debours = number(first(o, ["Débours", "Debours"]));
  o.totalBrut = number(first(o, ["Total brut", "Brut"]));
  o.totalNet = number(first(o, ["Total net", "Net"]));
  o.invoice = first(o, ["Facture #", "Facture#", "Facture", "facture"]);
  o.ndb = first(o, ["NDB #", "NDB#", "NDB", "ndb"]);
  o.sentDate = first(o, ["Date envoi", "date_envoi"]);
  o.payDate = first(o, ["Date paiement", "date_paiement"]);
  o.received = number(first(o, ["Montant reçu", "Montant recu", "montant_recu"]));
  o.status = first(o, ["Statut", "Status", "statut"]);
  o.notes = first(o, ["Notes", "notes"]);
  o.deboursType = first(o, ["Débours type", "Debours type"]);
  o.start = safeTime(first(o, ["Début", "Debut", "Start"]));
  o.place = first(o, ["Endroit", "Lieu", "place"]);
  o.travel = number(first(o, ["Voyage (min)", "Voyage", "travel"]));
  o.calEvent = first(o, ["Cal event", "Calendar"]);
  o.importLink = first(o, ["Import link", "Source Email", "Docs"]);
  o.importKey = first(o, ["Import key", "Source message id"]);

  // Ops details from mission_details tab/API
  o.opsSummary = firstObj(ops, ["Ops Summary", "Résumé", "Mission Summary"]);
  o.paxRaw = firstObj(ops, ["Passenger Raw", "Passenger Checklist", "Passengers"]);
  o.paxCount = firstObj(ops, ["Pax Count", "Pax", "Passenger Count"]);
  o.chauffeur = firstObj(ops, ["Chauffeur", "Driver"]);
  o.chauffeurPhone = firstObj(ops, ["Tél Chauffeur", "Tel Chauffeur", "Driver Phone"]);
  o.clientContact = firstObj(ops, ["Contact Client", "Client Contact"]);
  o.clientPhone = firstObj(ops, ["Client Phone", "Téléphone Client"]);
  o.cruiseManager = firstObj(ops, ["Cruise Manager"]);
  o.cruisePhone = firstObj(ops, ["Cruise Phone"]);
  o.ship = firstObj(ops, ["Ship Name", "Ship"]);
  o.dock = firstObj(ops, ["Dock / Terminal", "Dock", "Terminal"]);
  o.transportRef = firstObj(ops, ["Transport Ref", "Train", "Flight"]);
  o.meetingPoint = firstObj(ops, ["Meeting Point", "RDV"]);
  o.emergency = firstObj(ops, ["Emergency Contact", "Urgence"]);
  o.colleague = firstObj(ops, ["Colleague", "Collègue"]);
  o.colleaguePhone = firstObj(ops, ["Colleague Phone"]);
  o.vehicle = firstObj(ops, ["Vehicle Info", "Vehicle"]);
  o.sourcePdf = firstObj(ops, ["Source PDF"]);
  o.sourceEmailMsg = firstObj(ops, ["Source Email Message", "Source Email Msg"]);
  o.rawNotes = firstObj(ops, ["Raw Notes"]);

  o.modules = detectModules(o);
  o.completeness = calcCompleteness(o);
  return o;
}

function detectModules(m) {
  const t = (m.type + " " + m.description + " " + m.place + " " + m.transportRef).toUpperCase();
  const mods = ["prep", "contacts", "ops", "map", "finance", "rapport"];
  if (t.includes("AEROPORT") || t.includes("AIRPORT") || t.includes("LYS") || /\b[A-Z]{2}\d{2,4}\b/.test(t)) mods.splice(2, 0, "airport");
  if (t.includes("GARE") || t.includes("TRAIN") || t.includes("SNCF") || t.includes("PERRACHE") || t.includes("PART-DIEU")) mods.splice(2, 0, "train");
  if (t.includes("BALE") || t.includes("BÂLE") || t.includes("BASEL") || t.includes("VK09")) mods.splice(2, 0, "basel");
  if (m.paxRaw || m.paxCount) mods.splice(2, 0, "pax");
  return [...new Set(mods)];
}

function calcCompleteness(m) {
  const fields = [
    ["Date", !!m.date],
    ["Heure", !!m.start],
    ["Lieu", !!m.place],
    ["Client", !!m.client],
    ["Contact", !!(m.clientContact || m.cruiseManager || m.chauffeur)],
    ["Pax", !!(m.paxRaw || m.paxCount)],
    ["Source", !!(m.importKey || m.importLink || m.sourcePdf)],
    ["Tarif", !!(m.base || m.subtotal || m.totalNet)]
  ];
  const ok = fields.filter(x => x[1]).length;
  return { score: Math.round(ok / fields.length * 100), fields, missing: fields.filter(x => !x[1]).map(x => x[0]) };
}

function go(next) {

function updateHeader() {
  const today = isoToday();

/* =========================================================
   DAY / MONTH
   ========================================================= */
function renderDay() {
  const today = isoToday();
  const tomorrow = isoOffset(1);
  const todayM = missions.filter(m => m.date === today && !isCanceled(m)).sort(sortByStart);
  const tmrwM = missions.filter(m => m.date === tomorrow && !isCanceled(m)).sort(sortByStart);
  const done = todayM.filter(isDone).length;
  const needAction = todayM.filter(needsAction).length;
  const base = todayM.reduce((s,m)=>s + (m.subtotal || m.base || 0), 0);

  let h = `<div class="kpi-grid">
    <div class="kpi"><div class="kpi-label">Jour</div><div class="kpi-value">${todayM.length}</div></div>
    <div class="kpi"><div class="kpi-label">Faites</div><div class="kpi-value green">${done}</div></div>
    <div class="kpi"><div class="kpi-label">Actions</div><div class="kpi-value amber">${needAction}</div></div>
    <div class="kpi"><div class="kpi-label">HT</div><div class="kpi-value gold">${base ? euro0(base) : "—"}</div></div>
  </div>`;

  if (todayM.length) {
    h += `<div class="section-label">Aujourd’hui · ${dateLong(today)}</div><div class="stack">` + todayM.map(missionCard).join("") + `</div>`;
  } else {
    h += empty("☀️", "Pas de mission aujourd’hui", tmrwM.length ? `${tmrwM.length} demain` : "Rien à tenir pour l’instant.");
  }

  if (tmrwM.length) h += `<div class="section-label">Demain · ${dateLong(tomorrow)}</div><div class="stack">${tmrwM.map(missionCard).join("")}</div>`;

  const upcoming = missions.filter(m => m.date > tomorrow && !isCanceled(m)).sort((a,b)=>a.date.localeCompare(b.date)).slice(0, 7);
  if (upcoming.length) {
    h += `<div class="section-label">À venir</div><div class="soft-card">${upcoming.map(m => `
      <button class="admin-row" onclick="openMission('${escAttr(m.id)}')">
        <div><div class="admin-title">${esc(getMeta(m.client).tag)} · ${esc(m.type || "Mission")}</div><div class="admin-sub">${dateShort(m.date)} · ${esc(m.place || m.description || "")}</div></div>
        ${statusPill(m)}
      </button>`).join("")}</div>`;
  }
  return h;
}

function renderMonth() {
  const now = new Date();
  const prefix = now.toISOString().slice(0,7);
  const monthM = missions.filter(m => m.date && m.date.startsWith(prefix) && !isCanceled(m)).sort((a,b)=>a.date.localeCompare(b.date));
  const done = monthM.filter(isDone);
  const toInvoice = monthM.filter(m => isDone(m) && !m.invoice);
  const sentUnpaid = monthM.filter(m => m.invoice && !m.received && !isCanceled(m));
  const subtotal = monthM.reduce((s,m)=>s+(m.subtotal || m.base || 0),0);
  const net = monthM.reduce((s,m)=>s+(m.totalNet || 0),0);

  let h = `<div class="kpi-grid">
    <div class="kpi"><div class="kpi-label">Missions</div><div class="kpi-value">${monthM.length}</div></div>
    <div class="kpi"><div class="kpi-label">Faites</div><div class="kpi-value green">${done.length}</div></div>
    <div class="kpi"><div class="kpi-label">À facturer</div><div class="kpi-value amber">${toInvoice.length}</div></div>
    <div class="kpi"><div class="kpi-label">Net</div><div class="kpi-value gold">${net ? euro0(net) : euro0(subtotal * (1 - TAX))}</div></div>
  </div>`;

  const groups = groupBy(monthM, "date");
  Object.keys(groups).sort().forEach(date => {
    h += `<div class="section-label">${dateLong(date)}</div><div class="stack">${groups[date].sort(sortByStart).map(missionCard).join("")}</div>`;
  });

  if (sentUnpaid.length) {
    h += `<div class="section-label">À surveiller</div><div class="soft-card">${sentUnpaid.map(m => `
      <button class="admin-row" onclick="openMission('${escAttr(m.id)}')">
        <div><div class="admin-title">${esc(m.invoice)} · ${esc(getMeta(m.client).tag)}</div><div class="admin-sub">${dateShort(m.date)} · ${esc(m.type || "")}</div></div>
        <span class="pill amber">À recevoir</span>
      </button>`).join("")}</div>`;
  }

  if (!monthM.length) h += empty("📅", "Aucune mission ce mois", "Le calme plat. Pour l’instant.");
  return h;
}

/* =========================================================
   DETAIL VIEW
   ========================================================= */
function renderDetail() {
  const m = missions.find(x => x.id === detailId) || staging.find(x => x.id === detailId);
  if (!m) { detailId = null; render(); return; }
  const meta = getMeta(m.client);
  let h = `<button class="back-btn" onclick="closeMission()">← Retour</button>
  <article class="card detail-hero" style="--client-color:${meta.color}">
    <div class="detail-head">
      <div class="detail-client">${esc(m.client || meta.tag)}</div>
      <div class="detail-title">${esc(m.type || "Mission")}${m.sens && m.sens !== "—" ? " · " + esc(m.sens) : ""}</div>
      <div class="detail-sub">${dateLong(m.date)}${m.start ? " · " + esc(m.start) : ""}${m.place ? " · " + esc(m.place) : ""}</div>
      <div class="detail-pills">${statusPill(m)}<span class="pill ${m.completeness.score >= 85 ? "green" : m.completeness.score >= 60 ? "amber" : "red"}">${m.completeness.score}% complet</span>${m.id ? `<span class="pill">${esc(m.id)}</span>` : ""}</div>
    </div>
    ${renderPrimaryActions(m)}
    ${renderCoreInfo(m)}

function renderPrimaryActions(m) {
  if (isCanceled(m)) return `<div class="detail-section"><button class="action-btn secondary" onclick="saveStatus('${escAttr(m.id)}','Planifié')">Restaurer / réactiver</button></div>`;
  if (!isDone(m)) return `<div class="detail-section"><div class="grid-2"><button class="action-btn green" onclick="startCloseFlow('${escAttr(m.id)}')">Clôturer</button><button class="action-btn secondary" onclick="quickActionDrawer('${escAttr(m.id)}')">Actions</button></div></div>`;
  if (isDone(m) && !m.invoice) return `<div class="detail-section"><div class="grid-2"><button class="action-btn" onclick="genFacture('${escAttr(m.id)}')">Générer facture</button><button class="action-btn secondary" onclick="startCloseFlow('${escAttr(m.id)}')">Réouvrir clôture</button></div></div>`;
  return `<div class="detail-section"><div class="grid-2"><button class="action-btn secondary" onclick="startCloseFlow('${escAttr(m.id)}')">Rapport / heures</button><button class="action-btn secondary" onclick="markPaidPrompt('${escAttr(m.id)}')">Paiement</button></div></div>`;

function renderCoreInfo(m) {

function renderDynamicModules(m) {
  let h = "";
  if (m.modules.includes("prep")) h += module("prep", "Préparation", prepSubtitle(m), renderPrep(m), true);
  if (m.modules.includes("contacts")) h += module("contacts", "Contacts", contactSubtitle(m), renderContacts(m), true);

  if (m.modules.includes("pax")) h += module("pax", "Passagers", paxSubtitle(m), renderPax(m));

  const items = [
    ["🚶", "Départ maison", depart !== "—" ? `~${depart}` : "Heure à confirmer", !!m.start],
    ["📍", "Lieu / RDV", m.meetingPoint || m.place || "À confirmer", !!(m.meetingPoint || m.place)],
    ["📞", "Contacts", contactSubtitle(m), !!(m.chauffeur || m.clientContact || m.cruiseManager)],
    ["📄", "Documents", m.sourcePdf || m.importLink ? "Source disponible" : "Aucun document lié", !!(m.sourcePdf || m.importLink)],
    ["👥", "Passagers", m.paxCount || (m.paxRaw ? parsePax(m.paxRaw).length + " pax" : "À confirmer"), !!(m.paxRaw || m.paxCount)],

  return `<div class="prep-grid">${items.map(([icon, main, sub, ok]) => `<div class="prep-item"><div class="prep-icon">${icon}</div><div><div class="prep-main">${esc(main)}</div><div class="prep-sub">${esc(sub)}</div></div><span class="pill ${ok ? "green" : "amber"}">${ok ? "OK" : "À voir"}</span></div>`).join("")}</div>`;

function renderContacts(m) {
  const contacts = [];
  if (m.clientContact) contacts.push(["Contact client", m.clientContact, m.clientPhone]);
  if (m.cruiseManager) contacts.push(["Cruise manager", m.cruiseManager, m.cruisePhone]);
  if (m.chauffeur) contacts.push(["Chauffeur", m.chauffeur, m.chauffeurPhone]);
  if (m.colleague) contacts.push(["Collègue", m.colleague, m.colleaguePhone]);
  if (m.emergency) contacts.push(["Urgence", m.emergency, ""]);
  if (!contacts.length) return `<div class="muted">Aucun contact structuré pour l’instant.</div>`;
  return contacts.map(([role, name, phone]) => `<div class="contact-card"><div><div class="contact-role">${esc(role)}</div><div class="contact-name">${esc(name)}</div>${phone ? `<div class="contact-phone">${esc(phone)}</div>` : ""}</div>${phone ? `<a class="call-btn" href="tel:${phoneClean(phone)}">📞</a>` : ""}</div>`).join("");

function renderCompleteness(m) {
  return `<div class="stack">${m.completeness.fields.map(([name, ok]) => `<div class="check-row ${ok ? "done" : ""}"><div class="check-box">${ok ? "✓" : ""}</div><div class="check-text">${esc(name)}</div><span class="check-meta">${ok ? "présent" : "manque"}</span></div>`).join("")}</div>`;

function renderPax(m) {
  const pax = parsePax(m.paxRaw);

  const state = paxState[m.id] || {};

  return `<div class="small muted" style="margin-bottom:8px;">${checked}/${pax.length} cochés · local à ce téléphone</div>` + pax.map((p,i) => `<button class="check-row ${state[i] ? "done" : ""}" onclick="togglePax('${escAttr(m.id)}',${i})"><div class="check-box">${state[i] ? "✓" : ""}</div><div class="check-text">${esc(p)}</div><span class="check-meta">${i+1}</span></button>`).join("");

/* =========================================================

function startCloseFlow(id) {
  const m = missions.find(x => x.id === id);
  if (!m) return;
  const end = m.start && m.hours ? addHours(m.start, m.hours) : nowTime();
  pmf = { id, step: 1, start: m.start || "", end, template: "RAS", rapport: "", loading: false, note: "" };
  detailId = id;
  render();
}
function renderCloseFlow(m) {
  if (pmf.step === 1) return `<div class="stepper">
    <div class="step-head"><div class="step-num">1</div><div class="step-title">Heures réelles</div></div>
    <div class="time-grid"><div><div class="field-label">Début</div><input class="input" type="time" id="pmfStart" value="${escAttr(pmf.start)}"></div><div><div class="field-label">Fin</div><input class="input" type="time" id="pmfEnd" value="${escAttr(pmf.end)}"></div></div>
    <button class="action-btn" onclick="pmfNext(2)">Continuer</button>
    <button class="action-btn secondary" onclick="pmf=null;render()">Annuler</button>
  </div>`;
  if (pmf.step === 2) return `<div class="stepper">
    <div class="step-head"><div class="step-num">2</div><div class="step-title">Rapport</div></div>
    <div class="report-choice-grid">
      ${["RAS","INCIDENT","ANNULATION","ANOMALIE"].map(t => `<button class="report-card ${pmf.template === t ? "on" : ""}" onclick="pmf.template='${t}';pmf.rapport='';render()"><div class="report-card-title">${t}</div><div class="report-card-sub">${reportHint(t)}</div></button>`).join("")}
    </div>
    ${pmf.loading ? `<div class="loader"><span class="spin">↻</span> Rédaction…</div>` : pmf.rapport ? `<div class="report-output">${esc(pmf.rapport)}</div><textarea class="textarea" id="rapportEdit">${esc(pmf.rapport)}</textarea>` : ""}
    <div class="grid-2">
      <button class="action-btn blue" onclick="generateRapport('${escAttr(m.id)}')">${pmf.rapport ? "Régénérer" : "Générer"}</button>
      <button class="action-btn secondary" onclick="skipRapport('${escAttr(m.id)}')">Ignorer</button>
      <button class="action-btn secondary" onclick="scheduleRapport('${escAttr(m.id)}')">Planifier 9h</button>
      <button class="action-btn secondary" onclick="pmfNext(3)">Suite</button>
    </div>
    <button class="action-btn secondary" onclick="pmf.step=1;render()">Retour</button>
  </div>`;
  return `<div class="stepper">
    <div class="step-head"><div class="step-num">3</div><div class="step-title">Clôture</div></div>
    <textarea class="textarea" id="closeNote" placeholder="Note privée ou terrain…">${esc(pmf.note || "")}</textarea>
    <div class="grid-2"><button class="action-btn green" onclick="finishMission('${escAttr(m.id)}')">Clôturer</button><button class="action-btn secondary" onclick="pmf.step=2;render()">Retour</button></div>
  </div>`;
}
function pmfNext(step) {
  const s = el("pmfStart"), e = el("pmfEnd");
  if (s) pmf.start = s.value;
  if (e) pmf.end = e.value;
  pmf.step = step;
  render();
}
async function generateRapport(id) {
  const m = missions.find(x => x.id === id);
  if (!m) return;
  pmf.loading = true; render();
  if (pmf.template === "RAS") {
    pmf.rapport = `Bonjour,\n\nVoici le récap du service ${m.description || m.id}. Rien à signaler, tout s'est bien déroulé.\n\nMerci et bonne journée,\nJoseph`;
    pmf.loading = false; render(); return;
  }
  const prompt = buildRapportPrompt(m, pmf.template);
  try {
    const r = await fetch(GAS_URL + "?action=genRapport&prompt=" + encodeURIComponent(prompt), { signal: AbortSignal.timeout(20000) });
    const d = await r.json();
    pmf.rapport = d.text || d.error || "Erreur génération.";
  } catch(e) { pmf.rapport = "Erreur: " + e.message; }
  pmf.loading = false; render();
}
function buildRapportPrompt(m, template) {
  return `Rédige un email de rapport de mission en français. Ton court, factuel, chaleureux. Tutoiement si le contact est habituel. 2 à 5 phrases maximum.\n\nTemplate: ${template}\nMission: ${m.description || m.id}\nClient: ${m.client}\nDate: ${m.date}\nHeures: ${pmf.start} → ${pmf.end}\nNotes: ${m.notes || pmf.note || "RAS"}\n\nTermine par:\nMerci et bonne journée,\nJoseph\n\nRetourne uniquement le texte de l'email.`;
}
async function scheduleRapport(id) {
  const edit = el("rapportEdit");
  const rapport = edit ? edit.value : pmf.rapport;
  if (!rapport) return toast("Génère ou écris un rapport d’abord", "err");
  try {
    const r = await fetch(GAS_URL + "?action=scheduleRapport&id=" + encodeURIComponent(id) + "&rapport=" + encodeURIComponent(rapport) + "&template=" + encodeURIComponent(pmf.template));
    const d = await r.json();
    if (d.ok) toast("Rapport planifié / brouillon créé", "ok"); else toast(d.msg || "Erreur rapport", "err");
  } catch(e) { toast(e.message, "err"); }
}
async function skipRapport(id) {
  await appendNote(id, "Rapport ignoré depuis dashboard");
  await saveStatus(id, "Rapport ignoré");
  toast("Rapport ignoré", "ok");
}
async function finishMission(id) {
  const note = el("closeNote")?.value || "";
  const hours = calcHours(pmf.start, pmf.end);
  if (hours) await saveField(id, "heures", hours);
  if (pmf.start) await saveField(id, "debut", pmf.start);
  if (note) await appendNote(id, note);
  await saveStatus(id, "Terminé");
  toast("Mission clôturée", "ok");
  await refreshData();
  detailId = id; pmf = null; render();
}

/* =========================================================
   API ACTIONS
   ========================================================= */
async function saveField(id, field, value) {
  try {
    const r = await fetch(GAS_URL + "?action=update&id=" + encodeURIComponent(id) + "&field=" + encodeURIComponent(field) + "&value=" + encodeURIComponent(value));
    const d = await r.json();
    if (!d.ok && d.ok !== undefined) throw new Error(d.msg || "Update failed");
    const m = missions.find(x => x.id === id);
    if (m) applyLocalField(m, field, value);
    return true;
  } catch(e) { toast(e.message, "err"); return false; }
}
async function saveStatus(id, value) { const ok = await saveField(id, "statut", value); if (ok) toast("Statut mis à jour", "ok"); render(); }
async function appendNote(id, note) {
  const m = missions.find(x => x.id === id);
  const existing = m?.notes || "";
  const stamp = new Date().toLocaleString("fr-FR", { day:"2-digit", month:"2-digit", hour:"2-digit", minute:"2-digit" });
  return saveField(id, "notes", existing ? `${existing} | [${stamp}] ${note}` : `[${stamp}] ${note}`);
}
async function genFacture(id) {
  toast("Génération facture…", "ok");
  try {
    const r = await fetch(GAS_URL + "?action=genFacture&id=" + encodeURIComponent(id));
    const d = await r.json();
    if (d.ok) { toast(d.factureNum || "Facture générée", "ok"); await refreshData(); }
    else toast(d.msg || "Erreur facture", "err");
  } catch(e) { toast(e.message, "err"); }
}
async function genDebours(id) {
  toast("Génération NDB…", "ok");
  try {
    const r = await fetch(GAS_URL + "?action=genDebours&id=" + encodeURIComponent(id));
    const d = await r.json();
    if (d.ok) { toast(d.ndbNum || "NDB générée", "ok"); await refreshData(); }
    else toast(d.msg || "Erreur NDB", "err");
  } catch(e) { toast(e.message, "err"); }
}
async function confirmMission(id) { await fetch(GAS_URL + "?action=confirm&id=" + encodeURIComponent(id)); toast("Mission confirmée", "ok"); refreshData(); }
async function rejectMission(id) { await fetch(GAS_URL + "?action=reject&id=" + encodeURIComponent(id)); toast("Mission rejetée", "ok"); refreshData(); }
function markPaidPrompt(id) {
  const val = prompt("Montant reçu (€) ?");
  if (!val) return;
  saveField(id, "montant_recu", val).then(() => saveField(id, "date_paiement", isoToday())).then(() => saveStatus(id, "Payé"));
}
function quickActionDrawer(id) {
  const action = prompt("Action: confirme / cours / termine / annule / paye");
  if (!action) return;
  const a = action.toLowerCase();
  if (a.startsWith("conf")) return saveStatus(id, "Confirmé");
  if (a.includes("cours")) return saveStatus(id, "En cours");
  if (a.startsWith("term")) return saveStatus(id, "Terminé");
  if (a.startsWith("ann")) return saveStatus(id, "Annulé");
  if (a.startsWith("pay")) return saveStatus(id, "Payé");
}
function applyLocalField(m, field, value) {
  if (field === "statut") m.status = value;
  if (field === "notes") m.notes = value;
  if (field === "heures") m.hours = number(value);
  if (field === "debut") m.start = value;
  if (field === "montant_recu") m.received = number(value);
  m.completeness = calcCompleteness(m);
}

/* =========================================================
   SNCF / MAP
   ========================================================= */
async function fetchSNCF(id) {
  const m = missions.find(x => x.id === id);
  const box = el("sncf-" + id);
  if (!m || !box) return;
  box.textContent = "Chargement SNCF…";
  try {
    const r = await fetch(SNCF_WORKER, { signal: AbortSignal.timeout(12000) });
    const d = await r.json();
    const arr = d.arrivals || [];
    const ref = (m.transportRef || m.description || "").toUpperCase();
    const matches = arr.filter(a => JSON.stringify(a).toUpperCase().includes(ref));
    if (!matches.length) return box.textContent = `Pas encore annoncé / pas trouvé (${arr.length} trains chargés).`;
    box.innerHTML = matches.slice(0,5).map(a => `<div class="admin-row"><div><div class="admin-title">${esc(a.display_informations?.headsign || a.display_informations?.trip_short_name || "Train")}</div><div class="admin-sub">${esc(a.display_informations?.direction || "")}</div></div><span class="pill blue">Live</span></div>`).join("");
  } catch(e) { box.textContent = "Erreur SNCF: " + e.message; }
}
function openExternalMap(from, to) {
  const q = to ? `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(from)}&destination=${encodeURIComponent(to)}` : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(from)}`;
  window.open(q, "_blank");
}

/* =========================================================
   HELPERS
   ========================================================= */
function el(id) { return document.getElementById(id); }
function first(o, keys) { for (const k of keys) if (o[k] !== undefined && o[k] !== null && String(o[k]).trim() !== "") return String(o[k]).trim(); return ""; }
function firstObj(o, keys) { for (const k of keys) if (o[k] !== undefined && o[k] !== null && String(o[k]).trim() !== "") return String(o[k]).trim(); return ""; }
function number(v) { if (v === undefined || v === null || v === "") return 0; const n = parseFloat(String(v).replace(/\s/g,"").replace(",",".")); return isNaN(n) ? 0 : n; }
function p2(n) { return String(n).padStart(2,"0"); }
function esc(s) { return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function escAttr(s) { return String(s ?? "").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/'/g,"&#39;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function phoneClean(s) { return String(s).replace(/[^+0-9]/g, ""); }
function isoToday() { return new Date().toISOString().slice(0,10); }
function isoOffset(days) { const d = new Date(); d.setDate(d.getDate()+days); return d.toISOString().slice(0,10); }
function nowTime() { const d = new Date(); return p2(d.getHours()) + ":" + p2(d.getMinutes()); }
function dateShort(iso) { if (!iso) return ""; const d = new Date(iso + "T12:00:00"); return `${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS_SHORT[d.getMonth()]}`; }
function dateLong(iso) { if (!iso) return "Date à confirmer"; const d = new Date(iso + "T12:00:00"); return `${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}`; }
function euro0(n) { return Math.round(n) + "€"; }
function euro2(n) { return Number(n || 0).toFixed(2).replace(".", ",") + " €"; }
function safeTime(v) { const s = String(v || "").trim(); const m = s.match(/(\d{1,2})[:h](\d{2})/); return m ? p2(m[1]) + ":" + m[2] : ""; }
function isCanceled(m) { return (m.status || "").toLowerCase().includes("annul"); }
function isDone(m) { const s = (m.status || "").toLowerCase(); return s.includes("termin") || s.includes("rapport") || s.includes("fac") || s.includes("pay"); }
function needsAction(m) { if (isCanceled(m)) return false; if (m.completeness.score < 70) return true; if (m.date < isoToday() && !isDone(m)) return true; if (isDone(m) && !m.invoice) return true; return false; }
function sortByStart(a,b) { return (a.start || "99:99").localeCompare(b.start || "99:99"); }
function getMeta(client) { const c = String(client || "").toLowerCase(); for (const [name, v] of Object.entries(CLIENTS)) if (c.includes(name.toLowerCase().split(" ")[0]) || c.includes(v.tag.toLowerCase())) return v; return { tag: client ? client.slice(0,4).toUpperCase() : "?", color: "#8f8f8f" }; }
function statusPill(m) { const s = m.status || "Brouillon"; const l = s.toLowerCase(); let cls = ""; if (l.includes("pay")) cls="purple"; else if (l.includes("envoy")) cls="amber"; else if (l.includes("fac")) cls="gold"; else if (l.includes("termin") || l.includes("confirm")) cls="green"; else if (l.includes("annul")) cls="red"; else if (l.includes("rapport")) cls="blue"; return `<span class="pill ${cls}">${esc(s)}</span>`; }
function infoRow(label, value) { if (!value) return ""; return `<div class="info-row"><div class="info-label">${esc(label)}</div><div class="info-value">${String(value).includes("&") ? value : esc(value)}</div></div>`; }
function empty(icon, title, sub) { return `<div class="empty"><div class="empty-icon">${icon}</div><div class="empty-title">${esc(title)}</div><div class="empty-sub">${esc(sub || "")}</div></div>`; }
function groupBy(arr, key) { return arr.reduce((a,x)=>((a[x[key]] ||= []).push(x), a), {}); }
function inferTravel(place) { const up = String(place || "").toUpperCase(); for (const [k,v] of Object.entries(TRAVEL_HINTS)) if (up.includes(k)) return v; return 45; }
function subtractMinutes(time, mins) { const [h,m]=time.split(":").map(Number); let t=h*60+m-mins; while(t<0)t+=1440; return p2(Math.floor(t/60)%24)+":"+p2(t%60); }
function addHours(time, hours) { const [h,m]=time.split(":").map(Number); const t = h*60+m+Math.round(Number(hours||0)*60); return p2(Math.floor(t/60)%24)+":"+p2(t%60); }
function calcHours(start,end) { if (!start || !end) return ""; const [sh,sm]=start.split(":").map(Number), [eh,em]=end.split(":").map(Number); let d=(eh*60+em)-(sh*60+sm); if (d<=0) d += 1440; return (d/60).toFixed(2); }
function parsePax(raw) { return String(raw || "").split(/\n|;/).map(x=>x.trim()).filter(Boolean); }
function togglePax(id, i) { paxState[id] ||= {}; paxState[id][i] = !paxState[id][i]; localStorage.setItem("mc31_pax", JSON.stringify(paxState)); render(); }
function extractFlights(raw) { const text = String(raw || ""); const re = /\b([A-Z]{2}\d{2,4}(?:\/[A-Z]{2}\d{2,4})?)\b(?:\s*-\s*([A-Z]{3}\/[A-Z]{3}))?[^\n]*?(\d{1,2}[h:]\d{2})?[^\n]*?(?:T(\d))?/g; const out=[]; let m; while((m=re.exec(text)) && out.length < 12) out.push({ code:m[1], route:m[2]||"", time:safeTime(m[3]||""), terminal:m[4]||"" }); return out; }
function prepSubtitle(m) { const travel = m.travel || inferTravel(m.place); return m.start ? `Départ maison ~${subtractMinutes(m.start, travel + 15)}` : "À préparer"; }
function contactSubtitle(m) { const n = [m.clientContact, m.cruiseManager, m.chauffeur, m.colleague, m.emergency].filter(Boolean).length; return n ? `${n} contact${n>1?"s":""}` : "Aucun contact"; }
function paxSubtitle(m) { return m.paxCount ? `${m.paxCount} pax` : (m.paxRaw ? `${parsePax(m.paxRaw).length} noms` : "Non renseigné"); }
function financeSubtitle(m) { if (m.invoice && m.received) return "Payé"; if (m.invoice) return "Facture générée"; if (isDone(m)) return "Prêt à facturer"; return "Prévisionnel"; }
function rapportSubtitle(m) { const s=(m.status||"").toLowerCase(); if (s.includes("ignoré")) return "Ignoré"; if (s.includes("rapport")) return m.status; return "Optionnel"; }
function sourceSubtitle(m) { return [m.importLink, m.importKey, m.sourcePdf, m.rawNotes].filter(Boolean).length ? "Sources présentes" : "Aucune source liée"; }
function reportHint(t) { return { RAS:"rien à signaler", INCIDENT:"fait notable", ANNULATION:"no-show / annulé", ANOMALIE:"chauffeur / pax / imprévu" }[t] || ""; }
let toastTimer = null;
function toast(msg, type="") { const t=el("toast"); t.textContent=msg; t.className="toast show " + type; clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.className="toast", 3200); }
</script>
