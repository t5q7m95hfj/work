<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Mission Control V2</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg0:#111418;--bg1:#1c2128;--bg2:#161b22;--bg3:#1c2128;
  --border:#2d333b;--border2:#444c56;
  --txt0:#f0ece4;--txt1:#d8d3ca;--txt2:#adb5bd;--txt3:#768390;--txt4:#545d68;
  --accent:#58a6ff;--green:#3fb950;--amber:#e3b341;--red:#f85149;--purple:#bc8cff;
  --tap:48px;
}
.light{
  --bg0:#f0ebe0;--bg1:#ffffff;--bg2:#e8e2d6;--bg3:#ddd8cc;
  --border:#ccc5b8;--border2:#b8b0a2;
  --txt0:#0d0c08;--txt1:#211e18;--txt2:#3e3a32;--txt3:#65604f;--txt4:#8a8070;
  --accent:#0969da;--green:#1a7f37;--amber:#9a6700;--red:#cf222e;--purple:#7c3aed;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg0);color:var(--txt1);-webkit-font-smoothing:antialiased;}

/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:50;background:var(--bg3);border-bottom:1px solid var(--border);padding:11px 15px 10px;}
.hdr-inner{display:flex;justify-content:space-between;align-items:center;}
.hdr-eyebrow{font-size:9px;letter-spacing:2.5px;color:var(--txt4);text-transform:uppercase;font-weight:700;margin-bottom:2px;}
.hdr-date{font-size:22px;font-weight:700;color:var(--txt0);letter-spacing:-0.5px;line-height:1.1;}
.hdr-sub{font-size:11px;color:var(--txt3);margin-top:3px;}
.hdr-right{display:flex;align-items:center;gap:10px;}
.hdr-wx{display:flex;flex-direction:column;align-items:center;}
.wx-icon{font-size:22px;line-height:1;}
.wx-temp{font-size:12px;font-weight:600;color:var(--txt1);font-family:'DM Mono',monospace;margin-top:1px;}
.wx-rain{font-size:9px;color:var(--accent);min-height:12px;}
.hdr-btns{display:flex;flex-direction:column;gap:5px;}
.icon-btn{width:30px;height:30px;border-radius:6px;border:1px solid var(--border2);background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--txt2);}
.icon-btn:active{opacity:.6;}

/* ── NAV ── */
.nav{position:sticky;top:68px;z-index:40;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;}
.nav-btn{flex:1;height:46px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--txt4);font-size:9px;font-weight:700;letter-spacing:.5px;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;font-family:'DM Sans',sans-serif;}
.nav-btn.on{color:var(--txt0);border-bottom-color:var(--accent);}
.nav-icon{font-size:14px;}

/* ── CONTENT ── */
.content{padding:12px 13px 90px;}
.slabel{font-size:9px;color:var(--txt3);font-weight:700;letter-spacing:1.8px;text-transform:uppercase;margin:4px 0 8px;}
.slabel.mt{margin-top:18px;}

/* ── MISSION CARDS ── */
.mcard{background:var(--bg1);border-radius:10px;padding:12px 14px;margin-bottom:7px;border-left:3px solid;cursor:pointer;transition:transform .1s;user-select:none;}
.mcard:active{transform:scale(0.982);}
.mcard.dim{opacity:.35;}
.mc-top{display:flex;justify-content:space-between;align-items:flex-start;}
.mc-left{flex:1;min-width:0;}
.mc-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px;}
.mc-tag{font-size:12px;font-weight:700;}
.mc-time{font-size:12px;color:var(--txt2);font-family:'DM Mono',monospace;}
.mc-date-s{font-size:10px;color:var(--txt4);}
.mc-type{font-size:13px;color:var(--txt0);font-weight:600;}
.mc-sens{font-size:11px;color:var(--txt3);font-weight:500;}
.mc-pills{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;}
.mpill{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;}
.mp-pax{background:rgba(88,166,255,.12);color:var(--accent);}
.mp-loc{background:rgba(63,185,80,.1);color:var(--green);}
.mp-ok{background:rgba(63,185,80,.1);color:var(--green);}
.mc-right{text-align:right;flex-shrink:0;margin-left:8px;}
.mc-ref{font-family:'DM Mono',monospace;font-size:9px;color:var(--txt4);margin-bottom:3px;}
.bdg{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600;}
.bdg-plan{background:rgba(88,166,255,.12);color:var(--accent);}
.bdg-conf{background:rgba(63,185,80,.12);color:var(--green);}
.bdg-done{background:rgba(63,185,80,.12);color:var(--green);}
.bdg-fac{background:rgba(227,179,65,.12);color:var(--amber);}
.bdg-pay{background:rgba(188,140,255,.12);color:var(--purple);}
.bdg-cancel{background:rgba(248,81,73,.12);color:var(--red);}

/* ── DETAIL VIEW ── */
.back-btn{background:none;border:none;color:var(--accent);font-size:13px;cursor:pointer;padding:0 0 10px;display:flex;align-items:center;gap:4px;min-height:44px;font-family:'DM Sans',sans-serif;font-weight:500;}
.dcard{background:var(--bg1);border-radius:12px;overflow:hidden;border-top:3px solid;}
.dhdr{padding:14px 15px 12px;}
.d-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px;}
.d-client{font-size:10px;font-weight:700;letter-spacing:1.5px;margin-bottom:3px;text-transform:uppercase;}
.d-title{font-size:16px;font-weight:700;color:var(--txt0);line-height:1.2;}
.d-sens{font-size:13px;color:var(--txt3);font-weight:500;margin-top:2px;}
.shift-box{padding:10px 12px;border-radius:8px;background:rgba(88,166,255,.05);border:1px solid rgba(88,166,255,.14);margin:10px 0 12px;}
.shift-time{font-size:21px;font-weight:700;color:var(--accent);font-family:'DM Mono',monospace;}
.shift-sub{font-size:11px;color:rgba(88,166,255,.55);margin-top:2px;}
.key-pills{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0 3px;}
.kpill{font-size:11px;padding:4px 10px;border-radius:6px;font-weight:500;background:var(--bg2);color:var(--txt2);border:1px solid var(--border);}
.kpill.hi{color:var(--accent);border-color:rgba(88,166,255,.22);background:rgba(88,166,255,.06);}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:11px;}
.ifield label{font-size:9px;color:var(--txt4);display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.8px;}
.ifield span{font-size:12px;color:var(--txt1);font-weight:500;}
.ifield span.mono{font-family:'DM Mono',monospace;font-size:11px;}

/* ── SECTIONS ── */
.sdiv{border-top:1px solid var(--border);}
.sin{padding:11px 15px;}
.stitle{font-size:9px;font-weight:700;letter-spacing:1.8px;margin-bottom:8px;text-transform:uppercase;}
.blue{color:var(--accent);} .green{color:var(--green);} .amber{color:var(--amber);} .purple{color:var(--purple);} .muted{color:var(--txt4);}

/* ── OPS ROWS ── */
.orow{display:flex;align-items:flex-start;gap:7px;margin-bottom:6px;}
.o-icon{font-size:13px;flex-shrink:0;line-height:1.4;}
.o-lbl{font-size:9px;color:var(--txt4);min-width:54px;padding-top:2px;text-transform:uppercase;letter-spacing:.5px;}
.o-val{font-size:12px;color:var(--txt1);flex:1;line-height:1.5;}
.o-ph{color:var(--accent);text-decoration:none;}

/* ── FINANCE CARDS ── */
.fin-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px;}
.fin-card{background:var(--bg1);border-radius:9px;padding:11px 13px;border:1px solid var(--border);}
.fin-lbl{font-size:9px;color:var(--txt4);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;font-weight:700;}
.fin-val{font-size:18px;font-weight:700;}
.frow{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;}
.flbl{color:var(--txt3);} .fval{color:var(--txt1);font-weight:500;}
.fnet{font-size:16px;font-weight:700;color:var(--amber);margin-top:5px;}

/* ── COLLAPSIBLES ── */
.coll{background:var(--bg1);border-radius:10px;margin-bottom:6px;overflow:hidden;border:1px solid var(--border);}
.coll-hdr{padding:11px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;}
.coll-title{font-size:12px;font-weight:700;color:var(--txt0);}
.coll-sub{font-size:10px;color:var(--txt3);margin-top:1px;}
.coll-right{display:flex;align-items:center;gap:8px;}
.coll-net{font-size:14px;font-weight:700;color:var(--amber);}
.chev{font-size:10px;color:var(--txt4);transition:transform .2s;}
.chev.open{transform:rotate(180deg);}
.coll-body{padding:0 14px 10px;display:none;border-top:1px solid var(--border);}
.coll-body.open{display:block;}

/* ── MONTH BAR ── */
.mo-bar{background:var(--bg1);border-radius:10px;padding:11px 14px;margin-bottom:10px;border:1px solid var(--border);display:grid;grid-template-columns:repeat(4,1fr);gap:4px;text-align:center;}
.mob-lbl{font-size:9px;color:var(--txt4);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px;font-weight:600;}
.mob-val{font-size:16px;font-weight:700;}

/* ── JOURNAL SECTION ── */
.log-entries{margin-bottom:10px;}
.lentry{display:flex;gap:8px;margin-bottom:7px;}
.lts{font-size:10px;color:var(--txt4);font-family:'DM Mono',monospace;min-width:34px;padding-top:2px;}
.lbubble{flex:1;background:var(--bg2);border-radius:7px;padding:6px 10px;}
.ltag{font-size:9px;color:var(--txt4);margin-bottom:2px;}
.ltext{font-size:11px;color:var(--txt2);line-height:1.5;}
.log-empty{font-size:11px;color:var(--txt4);font-style:italic;margin-bottom:10px;}

/* ── INPUTS ── */
.ta{width:100%;padding:9px 11px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;color:var(--txt0);font-size:12px;font-family:'DM Sans',sans-serif;resize:none;line-height:1.5;}
.ta:focus{outline:none;border-color:rgba(88,166,255,.3);}
.submit-btn{width:100%;margin-top:6px;padding:11px;background:rgba(88,166,255,.06);border:1px solid rgba(88,166,255,.2);border-radius:9px;color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;min-height:var(--tap);font-family:'DM Sans',sans-serif;}
.editrow{display:flex;gap:7px;align-items:center;margin-bottom:6px;}
.einput{flex:1;padding:9px 11px;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;color:var(--txt0);font-size:12px;font-family:'DM Sans',sans-serif;min-height:var(--tap);}
.einput:focus{outline:none;border-color:rgba(88,166,255,.3);}
.esave{padding:9px 11px;background:rgba(88,166,255,.06);border:1px solid rgba(88,166,255,.2);border-radius:8px;color:var(--accent);font-size:11px;font-weight:700;cursor:pointer;min-height:var(--tap);font-family:'DM Sans',sans-serif;}

/* ── PMF ── */
.pmf-trigger{width:100%;padding:13px;background:rgba(63,185,80,.06);border:1px solid rgba(63,185,80,.2);border-radius:10px;color:var(--green);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;min-height:var(--tap);font-family:'DM Sans',sans-serif;}
.pmf-step-hdr{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.pmf-num{width:26px;height:26px;border-radius:50%;background:var(--green);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.pmf-step-title{font-size:14px;font-weight:700;color:var(--txt0);}
.pmf-time-row{display:flex;gap:10px;align-items:center;margin-bottom:9px;}
.pmf-time-block{flex:1;text-align:center;}
.pmf-time-lbl{font-size:9px;color:var(--txt4);margin-bottom:4px;text-transform:uppercase;letter-spacing:.8px;}
.pmf-tinput{width:100%;padding:11px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;color:var(--txt0);font-size:16px;text-align:center;font-family:'DM Mono',monospace;min-height:var(--tap);}
.pmf-tinput:focus{outline:none;border-color:rgba(63,185,80,.4);}
.pmf-dur{font-size:13px;color:var(--green);text-align:center;margin-bottom:12px;font-weight:600;min-height:18px;}
.pbtn{width:100%;padding:12px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;min-height:var(--tap);font-family:'DM Sans',sans-serif;}
.pbtn-next{background:rgba(88,166,255,.06);border:1px solid rgba(88,166,255,.2);color:var(--accent);}
.pbtn-confirm{background:rgba(63,185,80,.07);border:1px solid rgba(63,185,80,.25);color:var(--green);}
.pback{font-size:11px;color:var(--txt4);cursor:pointer;text-align:center;margin-top:10px;display:flex;align-items:center;justify-content:center;min-height:var(--tap);}

/* ── RAPPORT ── */
.rpt-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.rtbtn{padding:10px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;color:var(--txt2);font-size:11px;font-weight:600;cursor:pointer;text-align:center;min-height:var(--tap);font-family:'DM Sans',sans-serif;}
.rtbtn.on{border-color:rgba(188,140,255,.35);background:rgba(188,140,255,.07);color:var(--purple);}
.rpt-output{background:var(--bg2);border-radius:9px;padding:12px;font-size:11px;color:var(--txt2);line-height:1.8;margin-bottom:10px;white-space:pre-wrap;max-height:260px;overflow-y:auto;}
.rpt-loading{text-align:center;padding:22px;color:var(--txt4);font-size:12px;}
.rpt-actions{display:flex;gap:7px;}
.rabtn{flex:1;padding:11px;border-radius:9px;font-size:11px;font-weight:600;cursor:pointer;min-height:var(--tap);font-family:'DM Sans',sans-serif;}

/* ── DEBRIEF ── */
.debrief-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
.dbtn{padding:12px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;color:var(--txt1);font-size:12px;cursor:pointer;text-align:left;min-height:var(--tap);font-family:'DM Sans',sans-serif;}
.dbtn.on{border-color:rgba(188,140,255,.35);background:rgba(188,140,255,.07);color:var(--purple);}

/* ── WEATHER ALERT ── */
.wx-alert{display:flex;align-items:flex-start;gap:8px;padding:9px 11px;background:rgba(227,179,65,.07);border:1px solid rgba(227,179,65,.2);border-radius:8px;font-size:11px;color:var(--amber);line-height:1.5;margin-bottom:8px;}
.wx-alert-icon{font-size:16px;flex-shrink:0;}

/* ── DOC BUTTON ── */
.doc-btn{display:flex;align-items:center;gap:7px;padding:10px 13px;background:rgba(88,166,255,.05);border:1px solid rgba(88,166,255,.18);border-radius:8px;color:var(--accent);font-size:12px;font-weight:500;text-decoration:none;min-height:var(--tap);margin-top:8px;transition:background .15s;}
.doc-btn:active{background:rgba(88,166,255,.12);}

/* ── DECOMPRESS LINK ── */
.decomp-link{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px;border:1px solid rgba(63,185,80,.18);border-radius:10px;color:var(--green);font-size:12px;font-weight:500;min-height:var(--tap);cursor:pointer;background:rgba(63,185,80,.04);font-family:'DM Sans',sans-serif;}

/* ── MOOD ── */
.mood-stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px;}
.mood-stat{background:var(--bg2);border-radius:8px;padding:9px 10px;text-align:center;border:1px solid var(--border);}
.mood-stat-val{font-size:16px;font-weight:700;color:var(--txt0);}
.mood-stat-lbl{font-size:9px;color:var(--txt4);margin-top:2px;text-transform:uppercase;letter-spacing:.6px;}
.mood-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:11px;}
.mood-row:last-child{border-bottom:none;}
.mood-date{font-size:10px;color:var(--txt4);font-family:'DM Mono',monospace;min-width:66px;}
.mood-mid{font-size:10px;color:var(--txt3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mood-state{font-size:11px;font-weight:600;min-width:54px;text-align:right;}

/* ── PAUSE ── */
.pause-wrap{display:flex;flex-direction:column;align-items:center;padding:10px 0 24px;}
.psc{display:none;flex-direction:column;align-items:center;width:100%;max-width:380px;padding:0 4px;}
.psc.active{display:flex;}
.p-eyebrow{font-size:9px;letter-spacing:2px;color:var(--txt4);text-transform:uppercase;font-weight:700;margin-bottom:16px;text-align:center;}
.p-h1{font-size:26px;font-weight:300;color:var(--txt0);line-height:1.2;margin-bottom:10px;text-align:center;letter-spacing:-0.3px;}
.p-sub{font-size:13px;color:var(--txt3);margin-bottom:26px;text-align:center;line-height:1.6;font-weight:400;}
.p-clock{font-family:'DM Mono',monospace;font-size:13px;color:var(--txt4);margin-bottom:32px;letter-spacing:.15em;}
.p-btn-g{padding:12px 28px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:rgba(63,185,80,.07);border:1px solid rgba(63,185,80,.22);color:var(--green);font-family:'DM Sans',sans-serif;min-height:var(--tap);}
.p-btn-s{padding:11px 22px;border-radius:8px;font-size:12px;cursor:pointer;background:none;border:1px solid var(--border);color:var(--txt3);font-family:'DM Sans',sans-serif;min-height:var(--tap);}
.p-btn-ghost{background:none;border:none;font-size:11px;color:var(--txt4);cursor:pointer;font-family:'DM Mono',monospace;letter-spacing:.12em;text-transform:uppercase;min-height:var(--tap);padding:8px;}
.p-row{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;justify-content:center;}
.p-bwrap{position:relative;width:154px;height:154px;margin-bottom:32px;}
.p-br{position:absolute;inset:0;border-radius:50%;border:1px solid rgba(88,166,255,.14);}
.p-br.inner{inset:24px;border-color:rgba(88,166,255,.28);background:radial-gradient(circle,rgba(88,166,255,.04),transparent 70%);}
.p-br.pulse{inset:0;border:none;background:radial-gradient(circle,rgba(88,166,255,.03),transparent 60%);}
.p-btxt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--accent);font-style:italic;}
@keyframes bIN{0%{transform:scale(1);opacity:.3}100%{transform:scale(1.35);opacity:.9}}
@keyframes bHD{0%,100%{transform:scale(1.35);opacity:.9}}
@keyframes bOT{0%{transform:scale(1.35);opacity:.9}100%{transform:scale(1);opacity:.3}}
.p-bin .p-br.inner,.p-bin .p-br.pulse{animation:bIN 4s ease-in-out forwards;}
.p-bhold .p-br.inner,.p-bhold .p-br.pulse{animation:bHD 4s ease-in-out forwards;}
.p-bout .p-br.inner,.p-bout .p-br.pulse{animation:bOT 4s ease-in-out forwards;}
.p-bctr{font-family:'DM Mono',monospace;font-size:10px;color:var(--txt4);letter-spacing:.15em;margin-bottom:26px;}
.p-textarea{width:100%;max-width:370px;min-height:105px;background:var(--bg1);border:1px solid var(--border);color:var(--txt0);font-family:'DM Sans',sans-serif;font-size:13px;line-height:1.65;padding:12px;resize:none;outline:none;border-radius:9px;caret-color:var(--accent);}
.p-textarea:focus{border-color:rgba(63,185,80,.28);}
.p-textarea::placeholder{color:var(--txt4);}
.p-canvas{border-radius:7px;cursor:crosshair;touch-action:none;display:block;}
.p-toolbar{display:flex;align-items:center;gap:7px;margin-bottom:10px;flex-wrap:wrap;justify-content:center;}
.p-swatch{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s;}
.p-swatch:hover{transform:scale(1.15);}
.p-swatch.on{border-color:var(--txt0);}
.p-bsize{display:flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:9px;color:var(--txt4);}
#p-bslider{appearance:none;-webkit-appearance:none;width:55px;height:2px;background:var(--border);outline:none;border-radius:2px;cursor:pointer;}
#p-bslider::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--green);cursor:pointer;}
.p-dact{display:flex;gap:8px;margin-top:10px;align-items:center;}
#p-rzone{width:min(220px,68vw);height:min(220px,68vw);border-radius:50%;background:radial-gradient(circle,rgba(63,185,80,.04),transparent 70%);border:1px solid rgba(63,185,80,.1);position:relative;cursor:pointer;overflow:hidden;}
.p-ripple{position:absolute;border-radius:50%;border:1px solid rgba(63,185,80,.45);transform:translate(-50%,-50%) scale(0);animation:ripOUT 2.5s ease-out forwards;pointer-events:none;}
@keyframes ripOUT{0%{transform:translate(-50%,-50%) scale(0);opacity:.8}100%{transform:translate(-50%,-50%) scale(4);opacity:0}}
.p-rdot{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:5px;height:5px;border-radius:50%;background:var(--green);opacity:.2;}

/* ── REFERENCE BOX ── */
.ref-box{background:var(--bg1);border-radius:9px;padding:13px 14px;font-size:12px;color:var(--txt2);line-height:2.1;border:1px solid var(--border);font-family:'DM Mono',monospace;}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:40px 0 16px;}
.empty-icon{font-size:36px;margin-bottom:8px;}
.empty-title{font-size:15px;color:var(--txt2);font-weight:500;}
.empty-sub{font-size:12px;color:var(--txt4);margin-top:3px;}

/* ── UPCOMING BOX ── */
.ubox{background:var(--bg1);border-radius:10px;padding:12px 14px;margin-top:7px;border:1px solid var(--border);}
.ulbl{font-size:9px;color:var(--green);font-weight:700;letter-spacing:1.5px;margin-bottom:7px;text-transform:uppercase;}
.uitem{display:flex;gap:8px;align-items:baseline;margin-bottom:4px;font-size:11px;}

/* ── TOAST ── */
.mc-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg1);border:1px solid var(--border2);color:var(--txt1);font-size:12px;font-weight:500;padding:10px 18px;border-radius:10px;z-index:9999;opacity:0;transition:transform .25s,opacity .25s;max-width:88vw;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.25);}
.mc-toast-show{opacity:1;transform:translateX(-50%) translateY(0);}
.mc-toast-green{border-color:rgba(63,185,80,.35);color:var(--green);}
.mc-toast-red{border-color:rgba(248,81,73,.35);color:var(--red);}
.mc-toast-blue{border-color:rgba(88,166,255,.35);color:var(--accent);}

/* ── MISSION DATE HDR ── */
.m-date-hdr{font-size:10px;font-weight:700;letter-spacing:.8px;margin:14px 0 5px;text-transform:uppercase;display:flex;align-items:center;gap:6px;}
.m-date-pill{font-size:9px;padding:1px 6px;border-radius:3px;font-weight:600;}

/* ── FINANCE MISSION ROW ── */
.fmr{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:11px;}
.fmr:last-child{border-bottom:none;}

/* ── SPIN ── */
.spin{display:inline-block;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
a{color:var(--accent);text-decoration:none;}

/* ── WEEK SUB-NAV ── */
.sub-nav{display:flex;gap:4px;margin-bottom:10px;}
.sub-btn{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);color:var(--txt3);font-size:10px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.sub-btn.on{border-color:rgba(88,166,255,.3);background:rgba(88,166,255,.06);color:var(--accent);}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-inner">
    <div>
      <div class="hdr-eyebrow">Mission Control · V2</div>
      <div class="hdr-date" id="hdr-date">—</div>
      <div class="hdr-sub" id="hdr-sub">—</div>
    </div>
    <div class="hdr-right">
      <div class="hdr-wx">
        <div class="wx-icon" id="wx-icon">—</div>
        <div class="wx-temp" id="wx-temp">—</div>
        <div class="wx-rain" id="wx-rain"></div>
      </div>
      <div class="hdr-btns">
        <button class="icon-btn" onclick="toggleMode()" id="mode-btn">☀️</button>
        <button class="icon-btn" onclick="refreshData()" title="Refresh" id="refresh-btn">↻</button>
      </div>
    </div>
  </div>
</div>

<nav class="nav">
  <button class="nav-btn on" onclick="go('today')" id="nb-today"><span class="nav-icon">☀️</span>AUJOURD'HUI</button>
  <button class="nav-btn" onclick="go('month')" id="nb-month"><span class="nav-icon">📅</span><span id="month-lbl">MOIS</span></button>
  <button class="nav-btn" onclick="go('finance')" id="nb-finance"><span class="nav-icon">💶</span>FINANCES</button>
  <button class="nav-btn" onclick="go('pause')" id="nb-pause"><span class="nav-icon">🌿</span>PAUSE</button>
</nav>

<div class="content" id="content"></div>

<script>
// ════════════════════════════════════════════════════════════════
// V2 DASHBOARD — Mission Control
// Consumes doGet API which maps V2→dashboard-compat column names
// ════════════════════════════════════════════════════════════════

const GAS_URL="https://script.google.com/macros/s/AKfycbwACs6qIEu24xMe3KtSjLMbcs3A6iXqCaZEodXBuTx2au1ol5UXeUqZKM6W_NJO9qSErg/exec";
const TAX=0.212;
const NET_MULT=1-TAX; // 0.788
const DAYS=["dim","lun","mar","mer","jeu","ven","sam"];
const MOL=["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
const MOS=["jan","fév","mar","avr","mai","jun","jul","aoû","sep","oct","nov","déc"];

const META={
  "Philibert Tourisme":{tag:"PHIL",hex:"#3fb950",contact:"Mélissa Hassaïm",phone:"+33 4 78 98 56 49",email:"rhone-ops@philibert.fr"},
  "Go Côte Saône":{tag:"GCS",hex:"#58a6ff",contact:"Marion",phone:"06.20.08.10.92",email:"gcs@gocotesaone.com"},
  "Feel the French Way":{tag:"FTFW",hex:"#bc8cff",contact:"Laura Brionne",email:"contact@feelthefrenchway.fr"},
  "Un Monde Bleu":{tag:"UMB",hex:"#ff7b54",contact:"Variable",email:"reply to thread",notes:"Pas de contact fixe — répondre au thread email"}
};

const TRAVEL={"PERRACHE":45,"PART-DIEU":45,"LYS":52,"AEROPORT":52,"QUAI CLAUDE BERNARD":45,"QUAI RAMBAUD":60,"BELLECOUR":45,"VIENNE":105,"GENEVE":180,"CHALON":120};
const PRENOM={"Philibert Tourisme":"Mélissa","Go Côte Saône":"Marion","Feel the French Way":"Laura","Un Monde Bleu":""}; // UMB: no fixed contact
const MOOD_LABELS=["","😫","😐","🙂","😊","🤩"];
const ENERGY_LABELS=["","🪫","🔋","⚡","💪","🚀"];

let missions=[],flogs={},tab="today",subView="today",detail=null,pmf=null,pmfStep=0;
let wxData=null,light=localStorage.getItem("mc_light")==="1";
let pScr="s1",pBOn=false,pBTimer=null,pBPhase=0,pBCycle=0;
let pDCtx=null,pDing=false,pClr="#3fb950",pBrush=8,pLX=0,pLY=0,pTaps=0;

window.addEventListener("load",()=>{if(light)document.body.classList.add("light");updateModeBtn();renderHeader();loadWeather();loadMissions();});

function toggleMode(){light=!light;document.body.classList.toggle("light",light);localStorage.setItem("mc_light",light?"1":"0");updateModeBtn();}
function updateModeBtn(){document.getElementById("mode-btn").textContent=light?"🌙":"☀️";}
const p2=n=>String(n).padStart(2,"0");
const tday=()=>new Date().toISOString().slice(0,10);
const tmrw=()=>{const d=new Date();d.setDate(d.getDate()+1);return d.toISOString().slice(0,10);};
const nowt=()=>{const n=new Date();return p2(n.getHours())+":"+p2(n.getMinutes());};

function renderHeader(){
  const n=new Date(),cm=p2(n.getMonth()+1);
  document.getElementById("hdr-date").textContent=DAYS[n.getDay()]+" "+n.getDate()+" "+MOL[n.getMonth()];
  const mms=missions.filter(m=>m.date&&m.date.slice(5,7)===cm);
  document.getElementById("hdr-sub").textContent=MOL[n.getMonth()]+" · "+mms.length+" missions · "+mms.filter(isDone).length+" terminées";
  document.getElementById("month-lbl").textContent=MOS[n.getMonth()].toUpperCase();
}

// ── WEATHER ──
async function loadWeather(){
  try{
    const r=await fetch("https://api.open-meteo.com/v1/forecast?latitude=45.764&longitude=4.836&current=temperature_2m,weathercode,precipitation_probability&hourly=precipitation_probability,weathercode,temperature_2m&timezone=Europe/Paris&forecast_days=3");
    const d=await r.json();wxData=d;
    const c=d.current,wc=c.weathercode||0;
    const ic=wc===0?"☀️":wc<=2?"⛅":wc===3?"☁️":wc<=48?"🌫":wc<=55?"🌦":wc<=67?"🌧":wc<=77?"❄️":wc<=82?"🌦":"⛈️";
    document.getElementById("wx-icon").textContent=ic;
    document.getElementById("wx-temp").textContent=Math.round(c.temperature_2m)+"°C";
    document.getElementById("wx-rain").textContent=c.precipitation_probability>20?c.precipitation_probability+"%":"";
  }catch(e){document.getElementById("wx-icon").textContent="";document.getElementById("wx-temp").textContent="Lyon";}
}

function getWxAlert(date,startH,endH){
  if(!wxData||!wxData.hourly)return null;
  const times=wxData.hourly.time||[],probs=wxData.hourly.precipitation_probability||[],temps=wxData.hourly.temperature_2m||[];
  let maxRain=0,minTemp=99;
  times.forEach((t,i)=>{if(!t.startsWith(date))return;const hr=parseInt(t.slice(11,13));if(hr<startH||hr>endH)return;if(probs[i]>maxRain)maxRain=probs[i];if(temps[i]<minTemp)minTemp=temps[i];});
  const parts=[];
  if(maxRain>=50)parts.push("Pluie probable "+maxRain+"%");
  else if(maxRain>=30)parts.push("Risque pluie "+maxRain+"%");
  if(minTemp<8)parts.push("~"+Math.round(minTemp)+"°C");
  return parts.length?parts.join(" · "):null;
}

// ── DATA ──
async function loadMissions(){
  const stored=localStorage.getItem("mc_missions");
  if(stored){try{missions=JSON.parse(stored).map(norm);renderHeader();render();}catch(e){}}
  try{
    const r=await fetch(GAS_URL+"?action=all",{signal:AbortSignal.timeout(20000)});
    const d=await r.json();
    if(d&&d.missions&&d.missions.length){
      missions=d.missions.map(norm);
      localStorage.setItem("mc_missions",JSON.stringify(missions));
    }
  }catch(e){
    if(!missions.length)missions=[];
  }
  renderHeader();render();
}

async function refreshData(){document.getElementById("refresh-btn").style.opacity=".4";missions=[];localStorage.removeItem("mc_missions");await loadMissions();document.getElementById("refresh-btn").style.opacity="1";}

// ── NORMALIZE — accepts both V2 and backward-compat names ──
function norm(m){
  const o={...m};if(o._n)return o;o._n=1;
  o.mid=o["Mission ID"]||"";
  o.date=o["Date mission"]||o["Date"]||"";
  o.client=o["Client"]||"";
  o.type=o["Type"]||"";
  o.sens=o["Sens"]||"";
  o.desc=o["Description"]||"";
  o.heures=o["Heures"]||"";
  o.base=o["Base (HT)"]||o["Base HT"]||"";
  o.debours=o["Débours"]||o["Debours"]||"";
  let rb=o["Début"]||o["Debut"]||"";if(rb&&rb.length>5)rb=rb.slice(0,5);o.debut=rb;
  o.endroit=o["Endroit"]||"";
  o.statut=o["Statut"]||"";
  o.notes=o["Notes"]||"";
  o.voyage=o["Voyage (min)"]||o["Voyage"]||"";
  o.facture=o["Facture#"]||o["Facture #"]||"";
  o.rapport=o["Rapport"]||o["Rapport ✓"]||"";
  o.docs=o["Docs"]||"";
  o.importKey=o["Import key"]||o["Import Key"]||"";
  return o;
}

// ── STATUS HELPERS ──
const isDone=m=>{const s=(m.statut||"").toLowerCase();return s==="terminé"||s.includes("envoy")||s==="payé";};
const isCxl=m=>(m.statut||"").toLowerCase().includes("annul");
const isConf=m=>(m.statut||"").toLowerCase()==="confirmé";
function getMeta(c){if(!c)return{tag:"?",hex:"#666"};for(const[k,v]of Object.entries(META))if(c.toLowerCase().includes(k.split(" ")[0].toLowerCase()))return v;return{tag:"?",hex:"#666"};}
function trvl(e){if(!e)return 45;const u=e.toUpperCase();for(const[k,v]of Object.entries(TRAVEL))if(u.includes(k))return v;return 45;}
function depT(sh,tr){if(!sh||!tr)return null;const[h,m]=sh.split(":").map(Number);const d=h*60+m-tr-15;if(d<0)return null;return p2(Math.floor(d/60))+":"+p2(d%60);}
function durS(s,e){if(!s||!e)return"";const[sh,sm]=s.split(":").map(Number),[eh,em]=e.split(":").map(Number);let d=(eh*60+em)-(sh*60+sm);if(d<=0)return"";d=Math.round(d/15)*15;return Math.floor(d/60)+"h"+(d%60>0?p2(d%60):"");}
function durD(s,e){if(!s||!e)return"";const[sh,sm]=s.split(":").map(Number),[eh,em]=e.split(":").map(Number);let d=(eh*60+em)-(sh*60+sm);if(d<=0)return"";return(d/60).toFixed(2).replace(/\.?0+$/,"");}
function fds(iso){if(!iso)return"";const d=new Date(iso+"T12:00:00");return DAYS[d.getDay()]+" "+d.getDate()+" "+MOS[d.getMonth()];}
function fdl(iso){if(!iso)return"";const d=new Date(iso+"T12:00:00");return DAYS[d.getDay()]+" "+d.getDate()+" "+MOL[d.getMonth()];}
const cnet=(b,d)=>Math.round((parseFloat(b)||0)*NET_MULT+(parseFloat(d)||0));
const ctax=b=>Math.round((parseFloat(b)||0)*TAX);

function badge(m){
  const s=(m.statut||"").toLowerCase();
  if(isCxl(m))return'<span class="bdg bdg-cancel">Annulé</span>';
  if(s==="payé")return'<span class="bdg bdg-pay">Payé</span>';
  if(s.includes("envoy"))return'<span class="bdg bdg-fac">Facturé</span>';
  if(s==="terminé")return'<span class="bdg bdg-done">✓ Terminé</span>';
  if(s==="confirmé")return'<span class="bdg bdg-conf">Confirmé</span>';
  return'<span class="bdg bdg-plan">'+(m.statut||"Planifié")+'</span>';
}

// ── SAVE FIELD ──
async function saveField(mid,f,v){
  try{
    const r=await fetch(GAS_URL+"?action=update&id="+encodeURIComponent(mid)+"&field="+encodeURIComponent(f)+"&value="+encodeURIComponent(v));
    const d=await r.json();
    return d&&d.ok!==false;
  }catch(e){toast('❌ '+e.message.slice(0,50),'red');return false;}
}

// ── NAVIGATION ──
function go(t){tab=t;if(t==="today")subView="today";detail=null;["today","month","finance","pause"].forEach(id=>document.getElementById("nb-"+id).classList.toggle("on",id===t));render();}
function render(){const el=document.getElementById("content");if(!el)return;if(detail&&(tab==="today"||tab==="month")){el.innerHTML=rdDetail(detail);return;}if(tab==="today")el.innerHTML=rdToday();else if(tab==="month")el.innerHTML=rdMonth();else if(tab==="finance")el.innerHTML=rdFinance();else if(tab==="pause"){el.innerHTML="";rdPause();}}

// ════════════════════════════════════════════════════════════════
// TODAY VIEW
// ════════════════════════════════════════════════════════════════

function rdToday(){
  let h='<div class="sub-nav"><button class="sub-btn'+(subView==="today"?" on":"")+'" onclick="subView=\'today\';render()">Aujourd\'hui</button><button class="sub-btn'+(subView==="week"?" on":"")+'" onclick="subView=\'week\';render()">7 jours</button></div>';
  if(subView==="week")return h+rdWeek();

  const t=tday(),tm=tmrw();
  const t1=missions.filter(m=>m.date===t).sort((a,b)=>(a.debut||"z").localeCompare(b.debut||"z"));
  const t2=missions.filter(m=>m.date===tm).sort((a,b)=>(a.debut||"z").localeCompare(b.debut||"z"));
  const up=missions.filter(m=>m.date>tm&&!isCxl(m)).sort((a,b)=>a.date.localeCompare(b.date));

  if(t1.length){h+='<div class="slabel">AUJOURD\'HUI</div>'+t1.map(m=>mcard(m,false)).join("");}
  else h+='<div class="empty"><div class="empty-icon">☀️</div><div class="empty-title">Pas de mission aujourd\'hui</div>'+(t2.length?'<div class="empty-sub">'+t2.length+" demain</div>":"")+"</div>";
  if(t2.length)h+='<div class="slabel'+(t1.length?" mt":"")+'">DEMAIN · '+fds(tm).toUpperCase()+"</div>"+t2.map(m=>mcard(m,true)).join("");
  if(up.length)h+=avenir(up.slice(0,5));
  return h;
}

function rdWeek(){
  const now=new Date();let h="",total=0;
  for(let d=0;d<7;d++){
    const dt=new Date(now.getTime()+d*86400000);
    const ds=dt.toISOString().slice(0,10);
    const dn=DAYS[dt.getDay()];
    const dm=missions.filter(m=>m.date===ds).sort((a,b)=>(a.debut||"z").localeCompare(b.debut||"z"));
    if(!dm.length)continue;
    const isT=ds===tday(),isTm=ds===tmrw();
    h+='<div class="m-date-hdr" style="color:'+(isT?"var(--accent)":isTm?"var(--green)":"var(--txt2)")+'">'
      +fdl(ds).toUpperCase()
      +(isT?' <span class="m-date-pill" style="background:rgba(88,166,255,.12);color:var(--accent)">aujourd\'hui</span>':"")
      +(isTm?' <span class="m-date-pill" style="background:rgba(63,185,80,.1);color:var(--green)">demain</span>':"")
      +'</div>';
    dm.forEach(m=>{h+=mcard(m,true);total++;});
  }
  if(!total)h+='<div class="empty"><div class="empty-icon">🌿</div><div class="empty-title">Aucune mission cette semaine</div></div>';
  else h+='<div style="font-size:10px;color:var(--txt4);text-align:center;margin-top:8px">'+total+' mission'+(total>1?"s":"")+'</div>';
  return h;
}

function avenir(ms){return'<div class="ubox"><div class="ulbl">À VENIR</div>'+ms.map(m=>{const mt=getMeta(m.client);return'<div class="uitem"><span style="color:'+mt.hex+';font-weight:700;font-size:10px;min-width:36px">'+mt.tag+'</span><span style="color:var(--txt3);min-width:74px">'+fds(m.date)+'</span><span style="color:var(--txt4)">'+(m.type||"?")+(m.sens&&m.sens!=="—"?" "+m.sens:"")+(m.debut?" · "+m.debut:"")+"</span></div>";}).join("")+"</div>";}

function mcard(m,compact){
  const mt=getMeta(m.client),done=isDone(m),cxl=isCxl(m);
  const pills=[];
  if(m.endroit&&!compact)pills.push('<span class="mpill mp-loc">'+m.endroit.split(",")[0].split("→")[0].trim()+'</span>');
  if(done&&!compact)pills.push('<span class="mpill mp-ok">✓</span>');
  if(m.rapport==="TRUE"||m.rapport===true)pills.push('<span class="mpill" style="background:rgba(188,140,255,.1);color:var(--purple)">📄 rapport</span>');
  if(m.docs&&!compact)pills.push('<span class="mpill" style="background:rgba(88,166,255,.1);color:var(--accent)">📎</span>');

  return'<div class="mcard'+(done||cxl?" dim":"")+'" style="border-left-color:'+mt.hex+'" onclick="openD(\''+m.mid+'\')">'
    +'<div class="mc-top"><div class="mc-left"><div class="mc-meta"><span class="mc-tag" style="color:'+mt.hex+'">'+mt.tag+'</span>'
    +(m.debut?'<span class="mc-time">'+m.debut+'</span>':"")
    +(!compact?'<span class="mc-date-s">'+fds(m.date)+'</span>':"")
    +'</div><div class="mc-type">'+(m.type||"?")+'</div>'
    +(m.sens&&m.sens!=="—"?'<div class="mc-sens">'+m.sens+'</div>':"")
    +(pills.length?'<div class="mc-pills">'+pills.join("")+'</div>':"")
    +'</div><div class="mc-right">'+(m.desc?'<div class="mc-ref">'+m.desc+'</div>':"")+badge(m)+'</div></div></div>';
}

function openD(mid){detail=missions.find(m=>m.mid===mid)||null;pmf=null;pmfStep=0;render();window.scrollTo(0,0);}
function closeD(){detail=null;render();}

// ════════════════════════════════════════════════════════════════
// DETAIL VIEW
// ════════════════════════════════════════════════════════════════

function rdDetail(m){
  const mt=getMeta(m.client),b=parseFloat(m.base)||0,d=parseFloat(m.debours)||0;
  const tr=m.voyage?+m.voyage:trvl(m.endroit),dp=m.debut?depT(m.debut,tr):null;
  const lg=flogs[m.mid]||[];

  let wxAlert="";
  if(m.date&&m.debut&&wxData){const sh=parseInt(m.debut.slice(0,2))||8;const a=getWxAlert(m.date,sh,Math.min(sh+5,22));if(a)wxAlert='<div class="wx-alert"><div class="wx-alert-icon">⛈️</div><div>'+a+'</div></div>';}

  let h='<button class="back-btn" onclick="closeD()">← Retour</button>'
    +'<div class="dcard" style="border-top-color:'+mt.hex+'">'
    +'<div class="dhdr"><div class="d-top"><div><div class="d-client" style="color:'+mt.hex+'">'+mt.tag+" · "+m.client+'</div>'
    +'<div class="d-title">'+(m.type||"Mission")+'</div>'
    +(m.sens&&m.sens!=="—"?'<div class="d-sens">'+m.sens+'</div>':"")
    +'</div>'+badge(m)+'</div>';

  if(wxAlert)h+=wxAlert;

  if(m.debut)h+='<div class="shift-box"><div class="shift-time">⏰ '+m.debut+'</div>'+(dp?'<div class="shift-sub">Départ maison ~'+dp+" · trajet ~"+tr+" min</div>":"")+'</div>';

  const kp=[];
  if(m.endroit)kp.push('<span class="kpill">📍 '+m.endroit+'</span>');
  if(m.heures)kp.push('<span class="kpill">⏱ '+m.heures+'h</span>');
  if(m.rapport==="TRUE"||m.rapport===true)kp.push('<span class="kpill hi">📄 Rapport envoyé</span>');
  if(kp.length)h+='<div class="key-pills">'+kp.join("")+'</div>';

  h+='<div class="igrid"><div class="ifield"><label>Date</label><span>'+fdl(m.date)+'</span></div>'
    +'<div class="ifield"><label>Réf</label><span class="mono">'+(m.desc||"—")+'</span></div>'
    +'<div class="ifield"><label>Statut</label><span>'+(m.statut||"Planifié")+'</span></div>'
    +'<div class="ifield"><label>Trajet</label><span>~'+tr+' min</span></div></div>'
    +(m.notes?'<div style="margin-top:9px;background:var(--bg2);padding:8px 11px;border-radius:7px;font-size:11px;color:var(--txt2);line-height:1.55">📝 '+m.notes+'</div>':"")
    +'</div>';

  // Docs
  if(m.docs)h+='<div class="sdiv"><div class="sin"><div class="stitle green">DOCUMENTS</div><a href="'+m.docs+'" target="_blank" class="doc-btn"><span style="font-size:15px">📁</span><span style="flex:1">Dossier Drive</span><span style="font-size:10px;color:var(--txt4)">↗</span></a></div></div>';

  // Journal de terrain
  h+='<div class="sdiv"><div class="sin"><div class="stitle purple">JOURNAL DE TERRAIN</div>'
    +(lg.length?'<div class="log-entries">'+lg.map(e=>'<div class="lentry"><div class="lts">'+e.time+'</div><div class="lbubble"><div class="ltag">'+(e.type==="incident"?"⚠️ Incident":"📝 Note")+'</div><div class="ltext">'+e.text+'</div></div></div>').join("")+'</div>':'<div class="log-empty">Aucune entrée.</div>')
    +'<textarea class="ta" id="lta-'+m.mid+'" rows="2" placeholder="Écrire…"></textarea>'
    +'<button class="submit-btn" onclick="addLog(\''+m.mid+'\')">Enregistrer</button></div></div>';

  // PMF or closed
  h+=rdPMF(m);

  // Finance
  if(b>0||d>0)h+='<div class="sdiv"><div class="sin"><div class="stitle amber">FINANCES</div>'
    +'<div class="frow"><span class="flbl">Base HT</span><span class="fval">'+(b?b+"€":"TBD")+'</span></div>'
    +'<div class="frow"><span class="flbl">Charges (21.2%)</span><span class="fval">'+(b?ctax(b)+"€":"—")+'</span></div>'
    +'<div class="frow"><span class="flbl">Débours</span><span class="fval">'+(d?d+"€":"—")+'</span></div>'
    +'<div class="frow" style="padding-top:6px;border-top:1px solid var(--border)"><span class="flbl">Net</span><span class="fnet">'+(b||d?cnet(b,d)+"€":"TBD")+'</span></div>'
    +(m.facture?'<div class="frow" style="margin-top:3px"><span class="flbl">Facture</span><span style="font-family:\'DM Mono\',monospace;font-size:10px;color:var(--green)">'+m.facture+'</span></div>':"")
    +'</div></div>';

  // Contact
  const cm=getMeta(m.client);
  h+='<div class="sdiv"><div class="sin"><div class="stitle muted">CONTACT</div>'
    +'<div style="font-size:12px;color:var(--txt1);line-height:2.1">'+cm.contact
    +(cm.phone?' · <a href="tel:'+cm.phone+'">'+cm.phone+'</a>':"")
    +(cm.email&&cm.email!=="reply to thread"?' · <a href="mailto:'+cm.email+'">'+cm.email+'</a>':"")
    +(cm.notes?'<br/><span style="color:var(--amber);font-size:10px">⚠️ '+cm.notes+'</span>':"")
    +'</div></div></div></div>';
  return h;
}

function addLog(mid){const ta=document.getElementById("lta-"+mid);if(!ta||!ta.value.trim())return;if(!flogs[mid])flogs[mid]=[];flogs[mid].push({time:nowt(),type:"note",text:ta.value.trim()});ta.value="";render();}

function rdPMF(m){
  if(isDone(m))return'<div class="sdiv"><div class="sin" style="text-align:center"><div style="font-size:13px;color:var(--green);font-weight:600;margin-bottom:9px">✓ Mission clôturée</div><button class="decomp-link" onclick="go(\'pause\')">🌿 Décompresser</button></div></div>';
  if(!pmf||pmf.mid!==m.mid)return'<div class="sdiv"><div class="sin"><div class="stitle green">FIN DE MISSION</div><button class="pmf-trigger" onclick="sPMF(\''+m.mid+'\')">✅ Clôturer</button></div></div>';
  return'<div class="sdiv"><div class="sin"><div class="stitle green">FIN DE MISSION</div>'+pmfHTML(m)+'</div></div>';
}

function sPMF(mid){
  const m=missions.find(x=>x.mid===mid)||{};
  const defStart=m.debut||"";
  let defEnd=nowt();
  if(m.debut&&m.heures){const ph=parseFloat(m.heures);if(ph>0){const[h,mn]=m.debut.split(":").map(Number);const em=h*60+mn+Math.round(ph*60);if(Math.floor(em/60)<24)defEnd=p2(Math.floor(em/60))+":"+p2(em%60);}}
  pmf={mid,start:defStart,end:defEnd,tpl:"RAS",rpt:"",rptLoading:false,debriefMood:0,debriefEnergy:0,debriefNote:""};pmfStep=1;render();
}

function pmfHTML(m){return pmfStep===1?pmfH1(m):pmfStep===2?pmfH2(m):pmfStep===3?pmfH3(m):pmfStep===4?pmfH4():""}

function pmfH1(m){
  const du=pmf.start&&pmf.end?durS(pmf.start,pmf.end):"";
  return'<div class="pmf-step-hdr"><div class="pmf-num">1</div><div class="pmf-step-title">Heures réelles</div></div>'
    +'<div class="pmf-time-row"><div class="pmf-time-block"><div class="pmf-time-lbl">DÉBUT</div><input class="pmf-tinput" type="time" id="ps" value="'+(pmf.start||"")+'" onchange="pmf.start=this.value;uDur()"/></div><div style="font-size:20px;color:var(--txt4)">→</div><div class="pmf-time-block"><div class="pmf-time-lbl">FIN</div><input class="pmf-tinput" type="time" id="pe" value="'+(pmf.end||"")+'" onchange="pmf.end=this.value;uDur()"/></div></div>'
    +'<div class="pmf-dur" id="pd">'+(du?"⏱ "+du:"")+'</div>'
    +'<button class="pbtn pbtn-next" onclick="pmfGo(2)">Suivant → Rapport</button>'
    +'<span class="pback" onclick="pmf=null;pmfStep=0;render()">Annuler</span>';
}

function pmfH2(m){
  const actions=pmf.rpt
    ?'<div class="rpt-actions"><button class="rabtn" style="background:rgba(88,166,255,.06);border:1px solid rgba(88,166,255,.2);color:var(--accent)" onclick="genRpt(\''+m.mid+'\')">↻ Régénérer</button><button class="rabtn" style="background:rgba(63,185,80,.07);border:1px solid rgba(63,185,80,.22);color:var(--green)" onclick="scheduleRapport(\''+m.mid+'\')">📅 Planifier 9h</button></div><textarea id="rpt-edit-'+m.mid+'" class="ta" rows="4" style="margin-top:8px;font-size:11px">'+pmf.rpt+'</textarea><button class="pbtn pbtn-confirm" style="margin-top:6px" onclick="pmfGo(3)">Continuer →</button>'
    :'<button class="pbtn pbtn-next" onclick="genRpt(\''+m.mid+'\')">✨ Générer le rapport</button>';
  return'<div class="pmf-step-hdr"><div class="pmf-num">2</div><div class="pmf-step-title">Rapport</div></div>'
    +'<div class="rpt-grid"><button class="rtbtn'+(pmf.tpl==="RAS"?" on":"")+'" onclick="pmf.tpl=\'RAS\';pmf.rpt=\'\';render()">📝 RAS</button><button class="rtbtn'+(pmf.tpl==="INCIDENT"?" on":"")+'" onclick="pmf.tpl=\'INCIDENT\';pmf.rpt=\'\';render()">⚠️ Incident</button></div>'
    +(pmf.rptLoading?'<div class="rpt-loading"><span class="spin">↻</span> Rédaction…</div>':pmf.rpt?'<div class="rpt-output">'+pmf.rpt+'</div>'+actions:actions)
    +'<span class="pback" onclick="pmfStep=1;render()">← Retour</span>';
}

function pmfH3(m){
  // V2: 1-5 mood + energy scale (matches Journal tab)
  const moods=[1,2,3,4,5];
  return'<div class="pmf-step-hdr"><div class="pmf-num">3</div><div class="pmf-step-title">Comment tu te sens ?</div></div>'
    +'<div style="margin-bottom:12px"><div style="font-size:10px;color:var(--txt4);margin-bottom:6px">HUMEUR</div><div style="display:flex;gap:6px">'+moods.map(v=>'<button class="dbtn'+(pmf.debriefMood===v?" on":"")+'" style="flex:1;text-align:center;font-size:18px" onclick="pmf.debriefMood='+v+';render()">'+MOOD_LABELS[v]+'</button>').join("")+'</div></div>'
    +'<div style="margin-bottom:12px"><div style="font-size:10px;color:var(--txt4);margin-bottom:6px">ÉNERGIE</div><div style="display:flex;gap:6px">'+moods.map(v=>'<button class="dbtn'+(pmf.debriefEnergy===v?" on":"")+'" style="flex:1;text-align:center;font-size:18px" onclick="pmf.debriefEnergy='+v+';render()">'+ENERGY_LABELS[v]+'</button>').join("")+'</div></div>'
    +'<textarea class="ta" id="pmf-db" rows="2" placeholder="Note (optionnel)…">'+(pmf.debriefNote||"")+'</textarea>'
    +'<button class="pbtn pbtn-confirm" style="margin-top:9px" onclick="pmfFin(\''+m.mid+'\')">Clôturer</button>'
    +'<span class="pback" onclick="pmfStep=2;render()">← Retour</span>';
}

function pmfH4(){
  return'<div style="text-align:center;padding:7px 0"><div style="font-size:26px;margin-bottom:7px">✅</div><div style="font-size:15px;font-weight:700;color:var(--txt0);margin-bottom:3px">Mission clôturée</div><div style="font-size:12px;color:var(--txt3);margin-bottom:14px">Heures et journal enregistrés.</div><button class="decomp-link" onclick="go(\'pause\')">🌿 Prendre un moment</button><span class="pback" onclick="closeD()">← Retour</span></div>';
}

function pmfGo(step){if(step===2){const s=document.getElementById("ps"),e=document.getElementById("pe");if(s)pmf.start=s.value;if(e)pmf.end=e.value;}pmfStep=step;render();}
function uDur(){const s=document.getElementById("ps"),e=document.getElementById("pe"),d=document.getElementById("pd");if(s&&e&&d){const du=durS(s.value,e.value);d.textContent=du?"⏱ "+du:"";}}

async function genRpt(mid){
  const m=missions.find(x=>x.mid===mid);if(!m)return;
  pmf.rptLoading=true;render();
  const pr=PRENOM[m.client]||"",du=durS(pmf.start,pmf.end);
  const ref=m.desc||m.mid||"";
  const dateFmt=iso=>{if(!iso||iso.length<10)return iso||"";const[y,mo,d]=iso.split("-");return d+"/"+mo+"/"+y.slice(2);};
  const lg=flogs[m.mid]||[];
  const jt=lg.length?"\nJournal:\n"+lg.map(e=>"- "+e.text).join("\n"):"";
  const prompt="RÈGLES: Tutoiement. 2-3 phrases max. Sign-off: Merci et bonne journée,\\nJoseph\n"
    +(pmf.tpl==="RAS"?"Rapport RAS.":"Rapport incident.")+"\nRef: "+ref+" | "+dateFmt(m.date)+" | "+pmf.start+"→"+pmf.end+" ("+du+")"+jt+"\nCommence: Bonjour "+(pr||"")+(pr?",":"")+"\\nTermine: Merci et bonne journée,\\nJoseph";
  try{
    const r=await fetch(GAS_URL+"?action=genRapport&prompt="+encodeURIComponent(prompt),{signal:AbortSignal.timeout(28000)});
    const d=await r.json();
    pmf.rpt=d.ok&&d.text?d.text:"Erreur: "+(d.error||"");
  }catch(e){pmf.rpt="Erreur: "+e.message;}
  pmf.rptLoading=false;render();
}

async function scheduleRapport(mid){
  const ta=document.getElementById("rpt-edit-"+mid);if(ta)pmf.rpt=ta.value;
  toast('📅 Planification…','blue');
  const m=missions.find(x=>x.mid===mid);
  const he=pmf.start&&pmf.end?durD(pmf.start,pmf.end):(m&&m.heures||'');
  try{
    const r=await fetch(GAS_URL+'?action=scheduleRapport&id='+encodeURIComponent(mid)+'&rapport='+encodeURIComponent(pmf.rpt)+'&template='+encodeURIComponent(pmf.tpl||'RAS')+'&heures='+encodeURIComponent(he),{signal:AbortSignal.timeout(25000)});
    const d=await r.json();
    if(d.ok){toast('📅 Planifié — '+(d.scheduledFor||'09:00'),'green');pmfStep=3;render();}
    else toast('❌ '+(d.msg||'Erreur'),'red');
  }catch(e){toast('❌ '+e.message.slice(0,50),'red');}
}

async function pmfFin(mid){
  const ta=document.getElementById("pmf-db");if(ta)pmf.debriefNote=ta.value;
  const m=missions.find(x=>x.mid===mid);
  const he=durD(pmf.start,pmf.end)||m&&m.heures||"";
  toast('💾 Sauvegarde…','blue');
  await saveField(mid,"heures",he);
  await saveField(mid,"statut","Terminé");
  // Save journal entry to localStorage
  if(pmf.debriefMood>0||pmf.debriefEnergy>0){
    const log=JSON.parse(localStorage.getItem('mc_journal')||'[]');
    log.push({date:m.date||tday(),mid,client:m.client||"",mood:pmf.debriefMood,energy:pmf.debriefEnergy,note:pmf.debriefNote||""});
    if(log.length>500)log.splice(0,log.length-500);
    localStorage.setItem('mc_journal',JSON.stringify(log));
  }
  const i=missions.findIndex(x=>x.mid===mid);
  if(i>-1){missions[i].heures=he;missions[i].statut="Terminé";}
  if(detail&&detail.mid===mid){detail.heures=he;detail.statut="Terminé";}
  toast('✅ Clôturée','green');pmfStep=4;render();
}

function rdMonth(){
  const now=new Date(),cm=p2(now.getMonth()+1),t=tday(),tm=tmrw();
  const mms=missions.filter(m=>m.date&&m.date.slice(5,7)===cm).sort((a,b)=>a.date.localeCompare(b.date));
  const tB=mms.reduce((s,m)=>s+(parseFloat(m.base)||0),0);
  const dn=mms.filter(isDone).length;
  let h='<div class="slabel">'+MOL[now.getMonth()].toUpperCase()+'</div>'
    +'<div class="mo-bar"><div><div class="mob-lbl">Missions</div><div class="mob-val" style="color:var(--txt0)">'+mms.length+'</div></div>'
    +'<div><div class="mob-lbl">Base HT</div><div class="mob-val" style="color:var(--accent)">'+(tB?tB+"€":"—")+'</div></div>'
    +'<div><div class="mob-lbl">Net est.</div><div class="mob-val" style="color:var(--amber)">'+(tB?cnet(tB,0)+"€":"—")+'</div></div>'
    +'<div><div class="mob-lbl">Terminées</div><div class="mob-val" style="color:var(--green)">'+dn+'</div></div></div>';

  const gr={};mms.forEach(m=>{(gr[m.date]=gr[m.date]||[]).push(m);});
  Object.entries(gr).sort(([a],[b])=>a.localeCompare(b)).forEach(([date,ms])=>{
    const isT=date===t,isTm=date===tm,isPast=date<t;
    h+='<div class="m-date-hdr" style="color:'+(isT?"var(--accent)":isTm?"var(--green)":isPast?"var(--txt4)":"var(--txt2)")+'">'
      +fdl(date).toUpperCase()
      +(isT?' <span class="m-date-pill" style="background:rgba(88,166,255,.12);color:var(--accent)">aujourd\'hui</span>':"")
      +(isTm?' <span class="m-date-pill" style="background:rgba(63,185,80,.1);color:var(--green)">demain</span>':"")
      +'</div>';
    ms.forEach(m=>h+=mcard(m,false));
  });
  if(!Object.keys(gr).length)h+='<div class="empty"><div class="empty-icon">📅</div><div class="empty-title">Pas de mission ce mois</div></div>';
  return h;
}

function rdFinance(){
  const now=new Date(),cy=now.getFullYear(),cm=p2(now.getMonth()+1),mth=now.getMonth();
  function sums(arr){const b=arr.reduce((s,m)=>s+(parseFloat(m.base)||0),0),d=arr.reduce((s,m)=>s+(parseFloat(m.debours)||0),0);return{b,d,tax:ctax(b),net:cnet(b,d),done:arr.filter(isDone).length,tot:arr.length};}
  const mms=missions.filter(m=>m.date&&m.date.slice(5,7)===cm);
  const allY=missions.filter(m=>m.date&&m.date.startsWith(String(cy)));
  const ms=sums(mms),ys=sums(allY);

  function grid(s,label){return'<div class="slabel">'+label+'</div><div class="fin-grid"><div class="fin-card"><div class="fin-lbl">Base HT</div><div class="fin-val" style="color:var(--accent)">'+(s.b?s.b.toLocaleString("fr-FR")+"€":"—")+'</div></div><div class="fin-card"><div class="fin-lbl">Charges (21.2%)</div><div class="fin-val" style="color:var(--red)">'+(s.tax?s.tax.toLocaleString("fr-FR")+"€":"—")+'</div></div><div class="fin-card"><div class="fin-lbl">Débours</div><div class="fin-val" style="color:var(--green)">'+(s.d?s.d.toLocaleString("fr-FR")+"€":"—")+'</div></div><div class="fin-card"><div class="fin-lbl">Net</div><div class="fin-val" style="color:var(--amber)">'+(s.net?s.net.toLocaleString("fr-FR")+"€":"—")+'</div></div></div>';}

  let h=grid(ms,MOS[mth].toUpperCase()+" · MOIS");
  h+=grid(ys,cy+" · ANNÉE");

  // Per client
  h+='<div class="slabel mt">PAR CLIENT</div>';
  Object.entries(META).forEach(([name,mt])=>{
    const cms=allY.filter(m=>(m.client||"").toLowerCase().includes(name.split(" ")[0].toLowerCase()));if(!cms.length)return;
    const s=sums(cms),id="cl-"+mt.tag;
    h+='<div class="coll"><div class="coll-hdr" style="border-left:3px solid '+mt.hex+'" onclick="tColl(\''+id+'\')">'
      +'<div><div class="coll-title" style="color:'+mt.hex+'">'+mt.tag+'</div><div class="coll-sub">'+s.tot+" · "+s.done+' terminées</div></div>'
      +'<div class="coll-right"><div class="coll-net">'+(s.b?s.b+"€":"—")+'</div><div class="chev" id="chev-'+id+'">▼</div></div></div>'
      +'<div class="coll-body" id="'+id+'">'+cms.sort((a,b)=>a.date.localeCompare(b.date)).map(m=>{const b2=parseFloat(m.base)||0;return'<div class="fmr"><div><div style="font-size:10px;color:var(--txt4)">'+fds(m.date)+'</div><div style="font-size:11px;color:var(--txt1)">'+(m.type||"?")+(m.sens&&m.sens!=="—"?" "+m.sens:"")+'</div></div><div style="text-align:right"><div style="font-size:12px;font-weight:600;color:var(--txt1)">'+(b2?b2+"€":"TBD")+'</div><div style="font-size:9px;color:'+(isDone(m)?"var(--green)":isCxl(m)?"var(--red)":"var(--txt4)")+'">'+(isDone(m)?"✓":isCxl(m)?"✗":"·")+'</div></div></div>';}).join("")+'</div></div>';
  });

  // Journal
  h+=rdJournal();

  // Reference
  h+='<div class="slabel mt">RÉFÉRENCE</div><div class="ref-box">SIRET · 92815905200010<br/>IBAN · FR76 2823 3000 0177 6267 3414 414<br/>BIC · REVOFRP2 (Revolut)</div>';
  return h;
}

function rdJournal(){
  const log=JSON.parse(localStorage.getItem('mc_journal')||'[]');
  if(!log.length)return'<div class="slabel mt">BIEN-ÊTRE</div><div style="font-size:11px;color:var(--txt4);padding:10px 0">Complétez le débrief après chaque mission pour voir vos tendances.</div>';
  const cy=new Date().getFullYear();
  const yearLog=log.filter(e=>e.date&&e.date.startsWith(String(cy)));
  if(!yearLog.length)return'';
  const avgMood=yearLog.filter(e=>e.mood>0).reduce((s,e,_,a)=>s+e.mood/a.length,0);
  const avgEnergy=yearLog.filter(e=>e.energy>0).reduce((s,e,_,a)=>s+e.energy/a.length,0);
  let h='<div class="slabel mt">BIEN-ÊTRE · '+cy+'</div>'
    +'<div class="mood-stat-row"><div class="mood-stat"><div class="mood-stat-val">'+yearLog.length+'</div><div class="mood-stat-lbl">Entrées</div></div>'
    +'<div class="mood-stat"><div class="mood-stat-val">'+MOOD_LABELS[Math.round(avgMood)]+" "+avgMood.toFixed(1)+'</div><div class="mood-stat-lbl">Humeur moy.</div></div>'
    +'<div class="mood-stat"><div class="mood-stat-val">'+ENERGY_LABELS[Math.round(avgEnergy)]+" "+avgEnergy.toFixed(1)+'</div><div class="mood-stat-lbl">Énergie moy.</div></div></div>';
  const recent=[...yearLog].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);
  h+='<div class="coll"><div class="coll-hdr" onclick="tColl(\'journal-log\')"><div><div class="coll-title">Journal</div><div class="coll-sub">'+yearLog.length+' entrées</div></div><div class="coll-right"><div class="chev" id="chev-journal-log">▼</div></div></div>'
    +'<div class="coll-body" id="journal-log">'+recent.map(e=>{const cl=getMeta(e.client);return'<div class="mood-row"><span class="mood-date">'+fds(e.date)+'</span><span class="mood-mid" style="color:'+cl.hex+'">'+cl.tag+'</span><span class="mood-state">'+MOOD_LABELS[e.mood||0]+" "+ENERGY_LABELS[e.energy||0]+'</span></div>'+(e.note?'<div style="font-size:10px;color:var(--txt4);padding:0 0 5px;font-style:italic">'+e.note+'</div>':"");}).join("")+'</div></div>';
  return h;
}

function tColl(id){const b=document.getElementById(id),c=document.getElementById("chev-"+id);if(!b)return;b.classList.toggle("open");if(c)c.classList.toggle("open");}

// ════════════════════════════════════════════════════════════════

function rdPause(){const el=document.getElementById("content");el.innerHTML='<div class="pause-wrap" id="pw"></div>';rPS();}
function rPS(){const w=document.getElementById("pw");if(!w)return;const sc={s1:ps1(),s2:ps2(),s3:ps3(),s4:ps4(),s5:ps5(),s6:ps6()};w.innerHTML=Object.entries(sc).map(([id,h])=>'<div class="psc'+(id===pScr?" active":"")+'" id="psc-'+id+'">'+h+'</div>').join("");if(pScr==="s1")pTick();if(pScr==="s2")pSB();if(pScr==="s4")setTimeout(pIDraw,50);if(pScr==="s6")pSC();}
function pGo(s){pSBStop();pScr=s;rPS();}
function ps1(){return'<div class="p-clock" id="p-clock">—</div><div class="p-h1">The day<br>is done.</div><div class="p-sub">You can put it down now.</div><button class="p-btn-g" onclick="pGo(\'s2\')">Begin</button>';}
function ps2(){return'<div class="p-eyebrow">Breathe · 4–4–4–4</div><div class="p-bwrap" id="p-bwrap"><div class="p-br pulse"></div><div class="p-br"></div><div class="p-br inner"></div><div class="p-btxt" id="p-btxt">breathe in</div></div><div class="p-bctr" id="p-bctr">round 1 of 4</div><button class="p-btn-ghost" onclick="pSBStop();pGo(\'s3\')">skip →</button>';}
function ps3(){return'<div class="p-eyebrow">Release</div><div class="p-h1" style="font-size:22px">What\'s still spinning?</div><div class="p-sub">Write it. It goes nowhere.</div><textarea id="p-dump" class="p-textarea" placeholder="the late group… the dock… the weather…"></textarea><div class="p-row"><button class="p-btn-g" onclick="pDump()">Let it go</button><button class="p-btn-s" onclick="pGo(\'s4\')">Nothing tonight</button></div>';}
function ps4(){return'<div class="p-eyebrow">Draw</div><div class="p-h1" style="font-size:20px">Make something.</div><div class="p-sub" style="margin-bottom:10px">No rules.</div><div class="p-toolbar"><div class="p-swatch on" style="background:#3fb950" data-c="#3fb950" onclick="pSC2(this)"></div><div class="p-swatch" style="background:#e3b341" data-c="#e3b341" onclick="pSC2(this)"></div><div class="p-swatch" style="background:#bc8cff" data-c="#bc8cff" onclick="pSC2(this)"></div><div class="p-swatch" style="background:#58a6ff" data-c="#58a6ff" onclick="pSC2(this)"></div><div class="p-swatch" style="background:#f0ece4" data-c="#f0ece4" onclick="pSC2(this)"></div><div class="p-swatch" style="background:#f85149" data-c="#f85149" onclick="pSC2(this)"></div><div class="p-bsize">size <input type="range" id="p-bslider" min="2" max="24" value="8" oninput="pBrush=+this.value"></div></div><canvas id="p-canvas" class="p-canvas"></canvas><div class="p-dact"><button class="p-btn-ghost" onclick="pClear()">Clear</button><button class="p-btn-g" onclick="pGo(\'s5\')">Continue →</button></div>';}
function ps5(){return'<div class="p-eyebrow">Release</div><div class="p-h1" style="font-size:20px">Tap to let go</div><div class="p-sub">One tap, one thing released.</div><div id="p-rzone" onclick="pRipE(event)" ontouchstart="pRipT(event)"><div class="p-rdot"></div></div><div id="p-tctr">···</div><button id="p-dbtn" class="p-btn-ghost" style="opacity:0;transition:opacity .5s" onclick="pGo(\'s6\')">I\'m good →</button>';}
function ps6(){return'<div class="p-h1">Good night,<br>Joseph.</div><div class="p-sub">You did what needed doing.<br>The rest can wait.</div><button class="p-btn-ghost" onclick="pReset()">start over</button>';}
function pTick(){const e=document.getElementById("p-clock");if(!e)return;const n=new Date();e.textContent=p2(n.getHours())+":"+p2(n.getMinutes());setTimeout(pTick,30000);}
const PPH=[{l:"breathe in…",c:"p-bin"},{l:"hold…",c:"p-bhold"},{l:"breathe out…",c:"p-bout"},{l:"hold…",c:"p-bhold"}];
function pSB(){pBOn=true;pBPhase=0;pBCycle=0;pRB();}
function pSBStop(){pBOn=false;if(pBTimer)clearTimeout(pBTimer);}
function pRB(){if(!pBOn)return;const w=document.getElementById("p-bwrap"),t=document.getElementById("p-btxt"),r=document.getElementById("p-bctr");if(!w){pBOn=false;return;}const ph=PPH[pBPhase];w.className="p-bwrap "+ph.c;if(t)t.textContent=ph.l;if(r)r.textContent="round "+(pBCycle+1)+" of 4";const np=(pBPhase+1)%4,nc=np===0?pBCycle+1:pBCycle;if(nc>=4){pBOn=false;setTimeout(()=>pGo("s3"),600);return;}pBTimer=setTimeout(()=>{pBPhase=np;pBCycle=nc;pRB();},4000);}
function pDump(){const v=document.getElementById("p-dump");if(v&&v.value.trim()){try{const s=JSON.parse(localStorage.getItem("jmc_notes")||"{}");const k=new Date().toLocaleDateString("fr-FR");s[k]=(s[k]?s[k]+"\n---\n":"")+v.value.trim();localStorage.setItem("jmc_notes",JSON.stringify(s));}catch(e){}}pGo("s4");}
function pIDraw(){const c=document.getElementById("p-canvas");if(!c)return;const mw=Math.min(window.innerWidth-44,380),mh=Math.min(window.innerHeight-300,210);c.width=mw;c.height=mh;pDCtx=c.getContext("2d");pDCtx.fillStyle=light?"#e8e2d6":"#1c2128";pDCtx.fillRect(0,0,mw,mh);c.onmousedown=e=>{pDing=true;pLX=e.offsetX;pLY=e.offsetY;};c.onmousemove=e=>{if(!pDing)return;pLine(e.offsetX,e.offsetY);};c.onmouseup=c.onmouseleave=()=>pDing=false;c.addEventListener("touchstart",e=>{e.preventDefault();const t=e.touches[0],r=c.getBoundingClientRect();pDing=true;pLX=t.clientX-r.left;pLY=t.clientY-r.top;},{passive:false});c.addEventListener("touchmove",e=>{e.preventDefault();const t=e.touches[0],r=c.getBoundingClientRect();pLine(t.clientX-r.left,t.clientY-r.top);},{passive:false});c.addEventListener("touchend",()=>pDing=false,{passive:false});}
function pLine(x,y){if(!pDCtx)return;pDCtx.globalAlpha=.75;pDCtx.strokeStyle=pClr;pDCtx.lineWidth=pBrush;pDCtx.lineCap="round";pDCtx.beginPath();pDCtx.moveTo(pLX,pLY);pDCtx.lineTo(x,y);pDCtx.stroke();pDCtx.globalAlpha=1;pLX=x;pLY=y;}
function pSC2(el){document.querySelectorAll(".p-swatch").forEach(s=>s.classList.remove("on"));el.classList.add("on");pClr=el.dataset.c;}
function pClear(){const c=document.getElementById("p-canvas");if(!c||!pDCtx)return;pDCtx.fillStyle=light?"#e8e2d6":"#1c2128";pDCtx.fillRect(0,0,c.width,c.height);}
function pRipE(e){_rip(e.offsetX,e.offsetY);}
function pRipT(e){e.preventDefault();const t=e.touches[0],r=document.getElementById("p-rzone").getBoundingClientRect();_rip(t.clientX-r.left,t.clientY-r.top);}
function _rip(x,y){pTaps++;const z=document.getElementById("p-rzone");if(!z)return;const sz=Math.max(z.offsetWidth,z.offsetHeight)*.6;const el=document.createElement("div");el.className="p-ripple";el.style.cssText="left:"+x+"px;top:"+y+"px;width:"+sz+"px;height:"+sz+"px";z.appendChild(el);el.addEventListener("animationend",()=>el.remove());const msgs=["···","···","keep going…","good…","yes…","almost…","there…"];const ct=document.getElementById("p-tctr");if(ct)ct.textContent=pTaps<msgs.length?msgs[pTaps]:pTaps+" released";if(pTaps>=5){const db=document.getElementById("p-dbtn");if(db)db.style.opacity="1";}}
function pSC(){} // placeholder for intention display
function pReset(){pScr="s1";pTaps=0;pSBStop();pBPhase=0;pBCycle=0;pDCtx=null;rPS();}

// ── TOAST ──
let _tt=null;
function toast(msg,type){
  let el=document.getElementById('mc-toast');
  if(!el){el=document.createElement('div');el.id='mc-toast';document.body.appendChild(el);}
  el.textContent=msg;el.className='mc-toast mc-toast-'+(type||'green')+' mc-toast-show';
  if(_tt)clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('mc-toast-show'),3800);
}
</script>
</body>
</html>
