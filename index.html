<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Mission Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════════════ */
:root{
  --bg:     #0a0a0f;
  --s1:     #111118;
  --s2:     #18181f;
  --s3:     #22222c;
  --bdr:    rgba(255,255,255,.07);
  --bdr2:   rgba(255,255,255,.12);
  --txt0:   #f0ede8;
  --txt1:   #b8b4ae;
  --txt2:   #7a7670;
  --txt3:   #4a4643;
  --acc:    #e8c97a;    /* warm gold — primary accent */
  --acc2:   #5b9cf6;   /* cool blue — secondary */
  --grn:    #4caf7d;
  --amb:    #e0914a;
  --red:    #e05a5a;
  --pur:    #a07cf5;
  --r:      10px;
  --r-sm:   6px;
  --tap:    44px;
  --font-display: 'Syne', sans-serif;
  --font-mono:    'DM Mono', monospace;
}
.light{
  --bg:   #f2efe8;
  --s1:   #ffffff;
  --s2:   #ebe7df;
  --s3:   #ddd8cf;
  --bdr:  rgba(0,0,0,.08);
  --bdr2: rgba(0,0,0,.14);
  --txt0: #1a1814;
  --txt1: #4a4640;
  --txt2: #7a7670;
  --txt3: #aaa59e;
  --acc:  #8a6200;
  --acc2: #1a5fd6;
  --grn:  #2e7a52;
  --amb:  #b06020;
  --red:  #b03030;
  --pur:  #6040c0;
}

/* ═══════════════════════════════════════════════════
   RESET
═══════════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{
  font-family:var(--font-mono);
  background:var(--bg);
  color:var(--txt0);
  font-size:13px;
  line-height:1.5;
  transition:background .2s,color .2s;
}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}

/* ═══════════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════════ */
.hdr{
  position:sticky;top:0;z-index:200;
  background:var(--bg);
  border-bottom:1px solid var(--bdr);
  padding:10px 16px;
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;
}
.hdr-brand{display:flex;flex-direction:column;}
.hdr-title{
  font-family:var(--font-display);
  font-weight:800;font-size:16px;
  letter-spacing:.5px;
  color:var(--acc);
  text-transform:uppercase;
}
.hdr-sub{font-size:9px;color:var(--txt2);letter-spacing:.4px;margin-top:1px;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.hdr-clock{
  font-family:var(--font-mono);
  font-size:18px;font-weight:500;
  color:var(--txt0);letter-spacing:.08em;
}
.hdr-wx{
  display:flex;align-items:center;gap:4px;
  font-size:11px;color:var(--txt1);
}
.hdr-btn{
  width:32px;height:32px;border-radius:50%;
  background:var(--s2);border:1px solid var(--bdr);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--txt1);
  transition:background .15s;
}
.hdr-btn:active{background:var(--s3);}

/* ═══════════════════════════════════════════════════
   NAV
═══════════════════════════════════════════════════ */
.nav{
  position:sticky;top:53px;z-index:199;
  background:var(--bg);
  display:flex;gap:0;
  border-bottom:1px solid var(--bdr);
  padding:0 16px;
  overflow-x:auto;
}
.nav::-webkit-scrollbar{display:none;}
.nb{
  font-family:var(--font-display);
  font-size:10px;font-weight:700;
  letter-spacing:.8px;
  text-transform:uppercase;
  color:var(--txt2);
  padding:10px 14px;
  border-bottom:2px solid transparent;
  white-space:nowrap;
  transition:color .15s,border-color .15s;
  min-height:var(--tap);
  display:flex;align-items:center;gap:5px;
}
.nb.on{color:var(--acc);border-bottom-color:var(--acc);}

/* ═══════════════════════════════════════════════════
   CONTENT
═══════════════════════════════════════════════════ */
.content{padding:12px 14px 80px;max-width:540px;margin:0 auto;}

/* ═══════════════════════════════════════════════════
   SECTION LABELS
═══════════════════════════════════════════════════ */
.slbl{
  font-family:var(--font-display);
  font-size:9px;font-weight:700;
  letter-spacing:1.2px;
  text-transform:uppercase;
  color:var(--txt3);
  padding:14px 0 6px;
}
.slbl:first-child{padding-top:4px;}

/* ═══════════════════════════════════════════════════
   SUMMARY BAR
═══════════════════════════════════════════════════ */
.sum-bar{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:8px;margin-bottom:4px;
}
.sum-cell{
  background:var(--s1);
  border:1px solid var(--bdr);
  border-radius:var(--r);
  padding:9px 10px;
}
.sum-lbl{font-size:8px;color:var(--txt3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px;}
.sum-val{font-family:var(--font-display);font-size:18px;font-weight:700;color:var(--txt0);}

/* ═══════════════════════════════════════════════════
   DATE HEADER
═══════════════════════════════════════════════════ */
.date-hdr{
  font-family:var(--font-display);
  font-size:10px;font-weight:700;
  letter-spacing:.6px;
  text-transform:uppercase;
  color:var(--txt2);
  padding:10px 0 5px;
  display:flex;align-items:center;gap:6px;
}
.date-hdr.today{color:var(--acc);}
.date-hdr.tmrw{color:var(--grn);}
.date-pill{
  font-size:8px;padding:2px 6px;
  border-radius:3px;
  background:rgba(232,201,122,.1);
  color:var(--acc);
  font-weight:700;letter-spacing:.4px;
}

/* ═══════════════════════════════════════════════════
   MISSION CARD
═══════════════════════════════════════════════════ */
.mcard{
  background:var(--s1);
  border:1px solid var(--bdr);
  border-radius:var(--r);
  padding:11px 13px;
  margin-bottom:6px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:transform .08s,opacity .12s;
  user-select:none;
}
.mcard::before{
  content:'';
  position:absolute;left:0;top:0;bottom:0;
  width:3px;
  background:var(--card-color, var(--acc));
  border-radius:var(--r) 0 0 var(--r);
}
.mcard:active{transform:scale(.985);}
.mcard.dim{opacity:.35;}
.mc-row{display:flex;justify-content:space-between;align-items:flex-start;}
.mc-left{flex:1;min-width:0;padding-right:10px;}
.mc-meta{
  display:flex;align-items:center;gap:5px;
  flex-wrap:wrap;margin-bottom:3px;
}
.mc-tag{
  font-family:var(--font-display);
  font-size:9px;font-weight:700;
  letter-spacing:.8px;text-transform:uppercase;
}
.mc-time{
  font-family:var(--font-mono);
  font-size:11px;color:var(--txt1);font-weight:500;
}
.mc-date-s{font-size:9px;color:var(--txt3);}
.mc-desc{
  font-family:var(--font-display);
  font-size:14px;font-weight:700;
  color:var(--txt0);line-height:1.2;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.mc-sub{font-size:11px;color:var(--txt2);margin-top:2px;}
.mc-pills{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap;}
.mpill{
  font-size:9px;padding:2px 7px;
  border-radius:3px;font-weight:600;
  letter-spacing:.2px;
}
.mp-loc{background:rgba(76,175,125,.1);color:var(--grn);}
.mp-pax{background:rgba(91,156,246,.08);color:var(--acc2);}
.mp-ship{background:rgba(160,124,245,.08);color:var(--pur);}
.mp-note{background:rgba(224,145,74,.08);color:var(--amb);}
.mp-ok{background:rgba(76,175,125,.1);color:var(--grn);}
/* Completeness dot */
.mc-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.mc-bdg{
  font-size:8px;padding:2px 8px;
  border-radius:3px;font-weight:700;
  letter-spacing:.3px;text-transform:uppercase;
}
.bdg-draft{background:rgba(122,118,112,.1);color:var(--txt2);}
.bdg-plan{background:rgba(91,156,246,.1);color:var(--acc2);}
.bdg-conf{background:rgba(76,175,125,.1);color:var(--grn);}
.bdg-done{background:rgba(76,175,125,.1);color:var(--grn);}
.bdg-fac{background:rgba(232,201,122,.1);color:var(--acc);}
.bdg-env{background:rgba(224,145,74,.1);color:var(--amb);}
.bdg-pay{background:rgba(160,124,245,.1);color:var(--pur);}
.bdg-cxl{background:rgba(224,90,90,.1);color:var(--red);}
.cmp-dot{
  width:7px;height:7px;border-radius:50%;flex-shrink:0;
}
.cmp-grn{background:var(--grn);}
.cmp-amb{background:var(--amb);}
.cmp-red{background:var(--red);}

/* ═══════════════════════════════════════════════════
   DETAIL VIEW
═══════════════════════════════════════════════════ */
.back-btn{
  display:flex;align-items:center;gap:6px;
  font-family:var(--font-display);
  font-size:11px;font-weight:600;
  letter-spacing:.5px;text-transform:uppercase;
  color:var(--acc);padding:8px 0 12px;
  min-height:var(--tap);
}
.dcard{
  background:var(--s1);
  border:1px solid var(--bdr);
  border-radius:var(--r);
  overflow:hidden;
}
.dcard-accent{
  height:3px;
  background:var(--card-color,var(--acc));
}
.dcard-hdr{padding:13px 14px 11px;}
.d-client{
  font-family:var(--font-display);
  font-size:9px;font-weight:700;
  letter-spacing:1.2px;text-transform:uppercase;
  margin-bottom:3px;
}
.d-title{
  font-family:var(--font-display);
  font-size:20px;font-weight:800;
  color:var(--txt0);line-height:1.1;
  letter-spacing:-.3px;
}
.d-sub{font-size:12px;color:var(--txt2);margin-top:3px;}
.d-pills{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;}
/* Sections */
.dsec{border-top:1px solid var(--bdr);padding:11px 14px;}
.dsec-title{
  font-family:var(--font-display);
  font-size:9px;font-weight:700;
  letter-spacing:.8px;text-transform:uppercase;
  color:var(--txt3);margin-bottom:8px;
}
/* Info rows */
.irow{display:flex;gap:8px;padding:4px 0;border-bottom:1px solid var(--bdr);}
.irow:last-child{border-bottom:none;}
.i-lbl{font-size:10px;color:var(--txt2);width:90px;flex-shrink:0;padding-top:1px;}
.i-val{font-size:12px;color:var(--txt0);flex:1;word-break:break-word;}
.i-val a{color:var(--acc2);}
/* Contact blocks */
.cblock{
  display:flex;justify-content:space-between;align-items:center;
  padding:7px 0;border-bottom:1px solid var(--bdr);
}
.cblock:last-child{border-bottom:none;}
.cb-left{}
.cb-role{font-size:9px;color:var(--txt3);margin-bottom:1px;letter-spacing:.3px;}
.cb-name{font-size:13px;color:var(--txt0);font-weight:500;}
.cb-phone{font-size:11px;color:var(--txt2);margin-top:1px;}
.cb-call{
  background:var(--s2);border:1px solid var(--bdr);
  border-radius:var(--r-sm);
  padding:6px 12px;
  font-size:11px;font-weight:600;
  color:var(--grn);
  min-height:36px;
  display:flex;align-items:center;
}
/* Pax checklist */
.pax-wrap{max-height:260px;overflow-y:auto;margin-top:4px;}
.pax-item{
  display:flex;align-items:flex-start;gap:8px;
  padding:6px 0;border-bottom:1px solid var(--bdr);
}
.pax-item:last-child{border-bottom:none;}
.pax-cb{
  width:18px;height:18px;border-radius:4px;
  border:1.5px solid var(--bdr2);
  background:var(--s2);flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:10px;transition:background .12s,border-color .12s;
}
.pax-cb.checked{background:var(--grn);border-color:var(--grn);color:#fff;}
.pax-name{font-size:12px;color:var(--txt0);flex:1;line-height:1.4;}
.pax-name.checked{color:var(--txt2);text-decoration:line-through;}
.pax-progress{
  height:3px;background:var(--s3);border-radius:2px;
  margin-bottom:8px;overflow:hidden;
}
.pax-prog-fill{height:100%;background:var(--grn);transition:width .3s;}
/* Edit controls */
.edit-row{
  display:flex;align-items:center;gap:8px;
  padding:6px 0;
}
.edit-lbl{font-size:10px;color:var(--txt2);width:80px;flex-shrink:0;}
.edit-inp{
  flex:1;background:var(--s2);border:1px solid var(--bdr2);
  border-radius:var(--r-sm);padding:6px 9px;
  font-family:var(--font-mono);font-size:12px;color:var(--txt0);
  outline:none;transition:border-color .15s;
}
.edit-inp:focus{border-color:var(--acc);}
.edit-save{
  background:var(--acc);color:#000;
  padding:5px 12px;border-radius:var(--r-sm);
  font-size:11px;font-weight:700;
  min-height:32px;
}
.edit-sel{
  flex:1;background:var(--s2);border:1px solid var(--bdr2);
  border-radius:var(--r-sm);padding:6px 9px;
  font-family:var(--font-mono);font-size:12px;color:var(--txt0);
  outline:none;-webkit-appearance:none;
}
/* Notes textarea */
.notes-area{
  width:100%;background:var(--s2);border:1px solid var(--bdr);
  border-radius:var(--r-sm);padding:8px 10px;
  font-family:var(--font-mono);font-size:12px;color:var(--txt0);
  resize:vertical;min-height:70px;outline:none;
  transition:border-color .15s;line-height:1.6;
}
.notes-area:focus{border-color:var(--acc);}
/* Invoice button */
.inv-btn{
  display:flex;align-items:center;gap:7px;
  background:var(--s2);border:1px solid var(--bdr2);
  border-radius:var(--r);padding:10px 13px;
  width:100%;font-size:12px;color:var(--txt0);
  transition:background .15s;
}
.inv-btn:active{background:var(--s3);}
.inv-btn-icon{font-size:16px;}
.inv-link{
  display:inline-flex;align-items:center;gap:5px;
  color:var(--acc2);font-size:11px;
  background:rgba(91,156,246,.08);
  border-radius:var(--r-sm);padding:4px 9px;margin-top:6px;
}

/* ═══════════════════════════════════════════════════
   COLLAPSIBLE
═══════════════════════════════════════════════════ */
.coll{border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-top:8px;}
.coll-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 13px;cursor:pointer;
  background:var(--s2);
  transition:background .12s;
}
.coll-hdr:active{background:var(--s3);}
.coll-title{
  font-family:var(--font-display);
  font-size:11px;font-weight:700;
  letter-spacing:.3px;color:var(--txt1);
}
.coll-sub{font-size:10px;color:var(--txt3);margin-top:1px;}
.coll-chev{
  font-size:12px;color:var(--txt3);
  transition:transform .2s;
  flex-shrink:0;
}
/* BUG FIX: body starts display:none, open class shows it */
.coll-body{display:none;padding:10px 13px;border-top:1px solid var(--bdr);}
.coll-body.open{display:block;}
.coll-chev.open{transform:rotate(180deg);}

/* ═══════════════════════════════════════════════════
   GARE / SNCF PANEL
═══════════════════════════════════════════════════ */
.sncf-panel{padding:10px 13px;}
.sncf-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 0;border-bottom:1px solid var(--bdr);
}
.sncf-row:last-child{border-bottom:none;}
.sncf-train{font-size:11px;font-weight:500;color:var(--txt0);}
.sncf-time{font-family:var(--font-mono);font-size:11px;color:var(--txt1);}
.sncf-badge{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:700;}
.sncf-ok{background:rgba(76,175,125,.1);color:var(--grn);}
.sncf-late{background:rgba(224,90,90,.1);color:var(--red);}
.sncf-mut{background:rgba(122,118,112,.1);color:var(--txt2);}

/* ═══════════════════════════════════════════════════
   MONTH SUMMARY BAR
═══════════════════════════════════════════════════ */
.mo-bar{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:6px;margin-bottom:12px;
}
.mo-cell{
  background:var(--s1);border:1px solid var(--bdr);
  border-radius:var(--r-sm);padding:8px 10px;
}
.mo-lbl{font-size:8px;color:var(--txt3);letter-spacing:.4px;text-transform:uppercase;margin-bottom:2px;}
.mo-val{
  font-family:var(--font-display);
  font-size:17px;font-weight:700;color:var(--txt0);
}

/* ═══════════════════════════════════════════════════
   FINANCE TAB
═══════════════════════════════════════════════════ */
.fin-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid var(--bdr);
}
.fin-row:last-child{border-bottom:none;}
.fin-lbl{font-size:11px;color:var(--txt1);}
.fin-lbl.sub{font-size:10px;color:var(--txt2);}
.fin-val{
  font-family:var(--font-display);
  font-size:13px;font-weight:700;color:var(--txt0);
}
.fin-val.grn{color:var(--grn);}
.fin-val.amb{color:var(--amb);}
.fin-val.red{color:var(--red);}
.fin-card{
  background:var(--s1);border:1px solid var(--bdr);
  border-radius:var(--r);padding:12px 14px;margin-bottom:8px;
}
.fin-card-title{
  font-family:var(--font-display);
  font-size:10px;font-weight:700;
  letter-spacing:.6px;text-transform:uppercase;
  color:var(--txt3);margin-bottom:10px;
}
.fin-mission-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:5px 0;border-bottom:1px solid var(--bdr);
}
.fin-mission-row:last-child{border-bottom:none;}
.fmr-left{flex:1;}
.fmr-desc{font-size:11px;color:var(--txt0);}
.fmr-meta{font-size:9px;color:var(--txt3);margin-top:1px;}
.fmr-right{text-align:right;}
.fmr-base{font-family:var(--font-display);font-size:12px;font-weight:700;color:var(--txt0);}
.fmr-net{font-size:9px;color:var(--txt2);}
.owed-badge{
  font-size:8px;padding:2px 6px;border-radius:3px;
  font-weight:700;letter-spacing:.3px;
  background:rgba(224,90,90,.1);color:var(--red);
  margin-left:6px;
}

/* ═══════════════════════════════════════════════════
   JOURNAL / WELLBEING
═══════════════════════════════════════════════════ */
.mood-stat-row{display:flex;gap:8px;margin-bottom:10px;}
.mood-stat{
  flex:1;background:var(--s1);border:1px solid var(--bdr);
  border-radius:var(--r-sm);padding:8px 10px;
}
.mood-stat-val{
  font-family:var(--font-display);
  font-size:16px;font-weight:700;color:var(--txt0);
}
.mood-stat-lbl{font-size:8px;color:var(--txt3);margin-top:2px;letter-spacing:.3px;}
.jrow{
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:6px 0;border-bottom:1px solid var(--bdr);
}
.jrow:last-child{border-bottom:none;}
.j-date{font-size:10px;color:var(--acc);font-weight:500;}
.j-ctx{font-size:9px;color:var(--txt3);}
.j-scores{display:flex;gap:5px;margin-top:2px;}
.j-score{font-size:9px;background:var(--s3);border-radius:3px;padding:1px 6px;color:var(--txt2);}
.j-note{font-size:10px;color:var(--txt2);margin-top:4px;font-style:italic;}

/* ═══════════════════════════════════════════════════
   POST-MISSION FLOW
═══════════════════════════════════════════════════ */
.pmf-wrap{padding:10px 0;}
.pmf-step-hdr{
  display:flex;align-items:center;gap:8px;margin-bottom:12px;
}
.pmf-num{
  width:22px;height:22px;border-radius:50%;
  background:var(--acc);color:#000;
  font-family:var(--font-display);font-size:11px;font-weight:800;

/* ═══════════════════════════════════════════════════

/* ═══════════════════════════════════════════════════

/* ═══════════════════════════════════════════════════
   AVENIR
═══════════════════════════════════════════════════ */

</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-brand">
    <div class="hdr-title">Mission Control</div>
    <div class="hdr-sub" id="hdr-sub">Chargement…</div>
  </div>
  <div class="hdr-right">
    <div class="hdr-wx" id="hdr-wx"></div>
    <div class="hdr-clock" id="clock">--:--</div>
    <button class="hdr-btn" onclick="toggleLight()" id="theme-btn" title="Thème">☀</button>
    <button class="hdr-btn" onclick="refreshData()" title="Actualiser">↻</button>
  </div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nb on" id="nb-today"  onclick="go('today')">☀ Aujourd'hui</button>
  <button class="nb"    id="nb-month"  onclick="go('month')">📅 <span id="month-lbl">Mois</span></button>
  <button class="nb"    id="nb-finance"onclick="go('finance')">💶 Admin</button>
</nav>

<!-- CONTENT -->
<div class="content" id="content">
  <div class="loader"><span class="spin">↻</span> Chargement…</div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════
const GAS_URL = "https://script.google.com/macros/s/AKfycbwACs6qIEu24xMe3KtSjLMbcs3A6iXqCaZEodXBuTx2au1ol5UXeUqZKM6W_NJO9qSErg/exec";
const SNCF_WORKER = "https://fragrant-hall-c33b.t5q7m95hfj.workers.dev/";
const TAX = 0.212;
const NET_MULT = 1 - TAX;

const DAYS = ["dim","lun","mar","mer","jeu","ven","sam"];
const MOL  = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
const MOS  = ["jan","fév","mar","avr","mai","jun","jul","aoû","sep","oct","nov","déc"];
const MOOD_E   = ["","😫","😔","😐","🙂","😊"];
const ENERGY_E = ["","🪫","😴","⚡","💪","🔥"];

const META = {
  "Philibert Tourisme":  { tag:"PHIL",  hex:"#4caf7d" },
  "Go Côte Saône":       { tag:"GCS",   hex:"#5b9cf6" },
  "Feel The French Way": { tag:"FTFW",  hex:"#a07cf5" },
  "Un Monde Bleu":       { tag:"UMB",   hex:"#e0914a" },
};
const TRAVEL = {
  "PERRACHE":45,"PART-DIEU":45,"PART DIEU":45,"LYS":52,"AEROPORT":52,
  "QUAI CLAUDE BERNARD":45,"QUAI RAMBAUD":60,"BELLECOUR":45,
  "VIENNE":105,"GENEVE":180,"CHALON":120,"ST JEAN DE LOSNE":150,
};

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let missions = [], journal = [], tab = "today", subView = "today";
let detail = null, pmf = null, pmfStep = 0;
let light = localStorage.getItem("mc_light") === "1";
let paxChecks = {};

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
window.addEventListener("load", () => {
  if (light) document.body.classList.add("light");
  updateThemeBtn();
  tick(); setInterval(tick, 30000);
  updateMonthLabel();
  loadData();
  loadWeather();
});

function tick() {
  const d = new Date();
  document.getElementById("clock").textContent =
    p2(d.getHours()) + ":" + p2(d.getMinutes());
}

function updateMonthLabel() {
  const m = MOL[new Date().getMonth()];
  document.getElementById("month-lbl").textContent = m.charAt(0).toUpperCase() + m.slice(1);
}

function toggleLight() {
  light = !light;
  document.body.classList.toggle("light", light);
  localStorage.setItem("mc_light", light ? "1" : "0");
  updateThemeBtn();
}
function updateThemeBtn() {
  document.getElementById("theme-btn").textContent = light ? "🌙" : "☀";
}

// ═══════════════════════════════════════════════════
// DATA LOADING
// ═══════════════════════════════════════════════════
async function loadData() {
  // Try cache first for instant render
  const cached = localStorage.getItem("mc_missions_v3");
  if (cached) {
    try {
      const d = JSON.parse(cached);
      missions = (d.missions || []).map(norm);
      journal  = d.journal || [];
      render();
    } catch(e) {}
  }

  try {
    const r = await fetch(GAS_URL + "?action=all", { signal: AbortSignal.timeout(25000) });
    const d = await r.json();
    if (d && d.missions) {
      missions = d.missions.map(norm);
      journal  = d.journal || [];
      localStorage.setItem("mc_missions_v3", JSON.stringify({ missions: d.missions, journal: d.journal }));
      updateHeader();
      render();
    }
  } catch(e) {
    if (!missions.length) render();
  }
}

async function refreshData() {
  missions = []; journal = [];
  localStorage.removeItem("mc_missions_v3");
  document.getElementById("content").innerHTML = '<div class="loader"><span class="spin">↻</span> Actualisation…</div>';
  await loadData();
}

function updateHeader() {
  const t = tday();
  const tm = missions.filter(m => m.date === t && !isCxl(m));
  const sub = tm.length
    ? tm.length + " mission" + (tm.length > 1 ? "s" : "") + " aujourd'hui"
    : "Aucune mission aujourd'hui";
  document.getElementById("hdr-sub").textContent = sub;
}

// ═══════════════════════════════════════════════════
// NORMALISE
// ═══════════════════════════════════════════════════
function norm(m) {
  if (m._n) return m;
  const o = { ...m }; o._n = 1;
  o.mid    = o["Mission ID"]   || "";
  o.date   = o["Date mission"] || o["Date"] || "";
  o.client = o["Client"]       || "";
  o.type   = o["Type"]         || "";
  o.sens   = o["Sens"]         || "";
  o.desc   = o["Description"]  || "";
  o.heures = o["Heures"]       || "";
  // V3: use formula result values directly — no JS recomputation
  o.base    = parseFloat(o["Base HT"])    || 0;
  o.hs      = parseFloat(o["HS"])         || 0;
  o.sousTotal = parseFloat(o["Sous-total"]) || 0;
  o.debours   = parseFloat(o["Débours"])  || 0;
  o.totalNet  = parseFloat(o["Total net"]) || 0;
  let rb = o["Début"] || o["Debut"] || "";
  if (rb && rb.length > 5) rb = rb.slice(0, 5);
  o.debut  = rb;
  o.endroit  = o["Endroit"]    || "";
  o.statut   = o["Statut"]     || "";
  o.notes    = o["Notes"]      || "";
  o.voyage   = o["Voyage (min)"] || "";
  o.facture  = o["Facture#"]   || "";
  o.ndb      = o["NDB#"]       || "";
  o.rapport  = o["Rapport"]    || o["Rapport ✓"] || "";
  o.docs     = o["Docs"]       || "";
  o.montant  = parseFloat(o["Montant reçu"]) || 0;
  o.ops      = o.ops || {};
  // Completeness from API
  o.cmp = o.completeness || null;
  // Ops shortcuts
  o.paxRaw   = o.ops["Passenger Raw"]    || "";
  o.paxCount = o.ops["Pax Count"]        || "";
  o.shipName = o.ops["Ship Name"]        || "";
  o.extRef   = o.ops["External Ref"]     || o.desc.split("·")[0].trim();
  o.meetPt   = o.ops["Meeting Point"]    || "";
  o.dock     = o.ops["Dock / Terminal"]  || "";
  o.transRef = o.ops["Transport Ref"]    || "";
  o.opsSum   = o.ops["Ops Summary"]      || "";
  return o;
}

const isDone = m => {
  const s = (m.statut || "").toLowerCase();
  return s === "terminé" || s.includes("envoy") || s === "payé" || s.includes("générée");
};
const isCxl = m => (m.statut || "").toLowerCase().includes("annul");

function getMeta(c) {
  if (!c) return { tag:"?", hex:"#666" };
  for (const [k, v] of Object.entries(META)) {
    if (c.toLowerCase().includes(k.split(" ")[0].toLowerCase())) return v;
  }
  return { tag: c.slice(0, 4).toUpperCase(), hex: "#666" };
}

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
function p2(n) { return String(n).padStart(2, "0"); }
function tday() { return new Date().toISOString().slice(0, 10); }
function tmrw() { const d = new Date(); d.setDate(d.getDate()+1); return d.toISOString().slice(0,10); }
function fds(iso) {
  if (!iso) return "";
  const d = new Date(iso + "T12:00:00");
  return DAYS[d.getDay()] + " " + d.getDate() + " " + MOS[d.getMonth()];
}
function fdl(iso) {
  if (!iso) return "";
  const d = new Date(iso + "T12:00:00");
  return DAYS[d.getDay()] + " " + d.getDate() + " " + MOL[d.getMonth()];
}
function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function cnet(b, d) { return Math.round(b * NET_MULT + d); }
function nowt() {
  const d = new Date();
  return p2(d.getHours()) + ":" + p2(d.getMinutes());
}
function durS(s, e) {
  if (!s || !e) return "";
  const [sh,sm] = s.split(":").map(Number), [eh,em] = e.split(":").map(Number);
  let d = (eh*60+em) - (sh*60+sm);
  if (d <= 0) return "";
  d = Math.round(d/15)*15;
  return Math.floor(d/60) + "h" + (d%60 > 0 ? p2(d%60) : "");
}

// ═══════════════════════════════════════════════════
// BADGE + COMPLETENESS
// ═══════════════════════════════════════════════════
function badge(m) {
  const s = (m.statut || "").toLowerCase();
  if (isCxl(m))                    return '<span class="mc-bdg bdg-cxl">Annulé</span>';
  if (s === "payé")                 return '<span class="mc-bdg bdg-pay">Payé</span>';
  if (s.includes("fac. envoyée"))  return '<span class="mc-bdg bdg-env">Fac. envoyée</span>';
  if (s.includes("fac. générée"))  return '<span class="mc-bdg bdg-fac">Fac. générée</span>';
  if (s === "terminé")             return '<span class="mc-bdg bdg-done">✓ Terminé</span>';
  if (s === "confirmé")            return '<span class="mc-bdg bdg-conf">Confirmé</span>';
  if (s === "planifié")            return '<span class="mc-bdg bdg-plan">Planifié</span>';
  return '<span class="mc-bdg bdg-draft">' + esc(m.statut || "Brouillon") + '</span>';
}

function cmpDot(m) {
  const c = m.cmp;
  if (!c || typeof c !== "object") return "";
  const score = c.score || 0;
  const cls = score >= 100 ? "cmp-grn" : score >= 70 ? "cmp-amb" : "cmp-red";
  const tip = c.missing && c.missing.length
    ? "Manque: " + c.missing.slice(0,3).join(", ")
    : "Complet";
  return `<div class="cmp-dot ${cls}" title="${tip}"></div>`;
}

// ═══════════════════════════════════════════════════
// MISSION CARD
// ═══════════════════════════════════════════════════
function mcard(m, compact) {
  const mt = getMeta(m.client);
  const done = isDone(m), cxl = isCxl(m);
  const pills = [];
  if (!compact) {
    const loc = m.endroit ? m.endroit.split(",")[0].split("→")[0].trim() : "";
    if (m.shipName) pills.push(`<span class="mpill mp-ship">🚢 ${esc(m.shipName)}</span>`);
    else if (loc)   pills.push(`<span class="mpill mp-loc">${esc(loc)}</span>`);
    if (m.paxCount) pills.push(`<span class="mpill mp-pax">👥 ${esc(m.paxCount)}</span>`);
  }
  return `
<div class="mcard${done || cxl ? " dim" : ""}"
     style="--card-color:${mt.hex}"
     onclick="openD('${m.mid}')">
  <div class="mc-row">
    <div class="mc-left">
      <div class="mc-meta">
        <span class="mc-tag" style="color:${mt.hex}">${mt.tag}</span>
        ${m.debut ? `<span class="mc-time">${esc(m.debut)}</span>` : ""}
        ${!compact ? `<span class="mc-date-s">${fds(m.date)}</span>` : ""}
      </div>
      <div class="mc-desc">${esc(m.type || "—")}${m.sens && m.sens !== "—" ? " · " + esc(m.sens) : ""}</div>
      ${m.endroit && !m.shipName ? `<div class="mc-sub">${esc(m.endroit.split(",")[0])}</div>` : ""}
      ${pills.length ? `<div class="mc-pills">${pills.join("")}</div>` : ""}
    </div>
    <div class="mc-right">
      ${cmpDot(m)}
      ${badge(m)}
      ${m.extRef && m.extRef !== m.desc ? `<div style="font-size:8px;color:var(--txt3);margin-top:3px;letter-spacing:.2px">${esc(m.extRef)}</div>` : ""}
    </div>
  </div>
</div>`;
}

// ═══════════════════════════════════════════════════
// NAV + RENDER
// ═══════════════════════════════════════════════════
function go(t) {
  tab = t; if (t === "today") subView = "today";
  detail = null; pmf = null; pmfStep = 0;
  ["today","month","finance"].forEach(id => {
    document.getElementById("nb-" + id).classList.toggle("on", id === t);
  });
  render();
}
function render() {
  const el = document.getElementById("content");
  if (!el) return;
  if (detail && (tab === "today" || tab === "month")) { el.innerHTML = rdDetail(detail); return; }
  if (tab === "today")   el.innerHTML = rdToday();
  else if (tab === "month")   el.innerHTML = rdMonth();
  else if (tab === "finance") el.innerHTML = rdFinance();
}
function openD(mid) {
  detail = missions.find(m => m.mid === mid) || null;
  pmf = null; pmfStep = 0;
  render(); window.scrollTo(0, 0);
}
function closeD() { detail = null; render(); }

// ═══════════════════════════════════════════════════
// TODAY
// ═══════════════════════════════════════════════════
function rdToday() {
  let h = `<div class="sub-nav">
    <button class="sub-btn${subView==="today"?" on":""}" onclick="subView='today';render()">Aujourd'hui</button>
    <button class="sub-btn${subView==="week"?" on":""}" onclick="subView='week';render()">7 jours</button>
  </div>`;
  if (subView === "week") return h + rdWeek();

  const t = tday(), tm = tmrw();
  const t1 = missions.filter(m => m.date === t && !isCxl(m))
    .sort((a,b) => (a.debut||"z").localeCompare(b.debut||"z"));
  const t2 = missions.filter(m => m.date === tm && !isCxl(m))
    .sort((a,b) => (a.debut||"z").localeCompare(b.debut||"z"));
  const up = missions.filter(m => m.date > tm && !isCxl(m))
    .sort((a,b) => a.date.localeCompare(b.date));

  // Summary
  const allToday = missions.filter(m => m.date === t);
  if (allToday.length) {
    const done = allToday.filter(isDone).length;
    const baseSum = allToday.reduce((s,m) => s + m.base, 0);
    h += `<div class="sum-bar">
      <div class="sum-cell"><div class="sum-lbl">Missions</div><div class="sum-val">${allToday.length}</div></div>
      <div class="sum-cell"><div class="sum-lbl">Faites</div><div class="sum-val" style="color:var(--grn)">${done}</div></div>
      <div class="sum-cell"><div class="sum-lbl">Base HT</div><div class="sum-val" style="color:var(--acc)">${baseSum ? baseSum + "€" : "—"}</div></div>
      <div class="sum-cell"><div class="sum-lbl">Net</div><div class="sum-val" style="color:var(--amb)">${baseSum ? cnet(baseSum, allToday.reduce((s,m)=>s+m.debours,0)) + "€" : "—"}</div></div>
    </div>`;
  }

  if (t1.length) {
    h += `<div class="slbl">Aujourd'hui</div>` + t1.map(m => mcard(m, false)).join("");
  } else {
    h += `<div class="empty">
      <div class="empty-icon">☀️</div>
      <div class="empty-title">Pas de mission aujourd'hui</div>
      ${t2.length ? `<div class="empty-sub">${t2.length} demain</div>` : ""}
    </div>`;
  }

  if (t2.length) {
    h += `<div class="slbl">Demain · ${fds(tm).toUpperCase()}</div>` + t2.map(m => mcard(m, true)).join("");
  }
  if (up.length) {
    h += `<div class="slbl">À venir</div><div class="fin-card" style="padding:8px 12px">`;
    up.slice(0, 6).forEach(m => {
      const mt = getMeta(m.client);
      h += `<div class="avenir-row" onclick="openD('${m.mid}')">
        <div class="av-date">${fds(m.date)}</div>
        <div class="av-desc">${esc(m.type || "—")} ${m.sens && m.sens !== "—" ? "· " + esc(m.sens) : ""}</div>
        <div class="av-tag" style="color:${mt.hex}">${mt.tag}</div>
      </div>`;
    });
    h += "</div>";
  }
  return h;
}

function rdWeek() {
  const now = new Date(); let h = "", total = 0;
  for (let d = 0; d < 7; d++) {
    const dt = new Date(now.getTime() + d*86400000);
    const ds = dt.toISOString().slice(0, 10);
    const dm = missions.filter(m => m.date === ds && !isCxl(m))
      .sort((a,b) => (a.debut||"z").localeCompare(b.debut||"z"));
    if (!dm.length) continue;
    const isT = ds === tday(), isTm = ds === tmrw();
    h += `<div class="date-hdr${isT?" today":isTm?" tmrw":""}">
      ${fdl(ds).toUpperCase()}
      ${isT ? '<span class="date-pill">Aujourd\'hui</span>' : ""}
    </div>` + dm.map(m => mcard(m, false)).join("");
    total++;
  }
  if (!total) h = `<div class="empty"><div class="empty-icon">📅</div><div class="empty-title">Semaine libre</div></div>`;
  return h;
}

// ═══════════════════════════════════════════════════
// MONTH
// ═══════════════════════════════════════════════════
function rdMonth() {
  const now = new Date(), cm = p2(now.getMonth() + 1);
  const t = tday(), tm = tmrw();
  const mms = missions.filter(m => m.date && m.date.slice(5,7) === cm)
    .sort((a,b) => a.date.localeCompare(b.date));
  const active = mms.filter(m => !isCxl(m));
  const done   = active.filter(isDone);
  // V3: use formula results from API
  const tBase = done.reduce((s,m) => s + m.sousTotal, 0);
  const tNet  = done.reduce((s,m) => s + m.totalNet, 0);

  let h = `<div class="slbl">${MOL[now.getMonth()].toUpperCase()}</div>
  <div class="mo-bar">
    <div class="mo-cell"><div class="mo-lbl">Total</div><div class="mo-val">${active.length}</div></div>
    <div class="mo-cell"><div class="mo-lbl">Faites</div><div class="mo-val" style="color:var(--grn)">${done.length}</div></div>
    <div class="mo-cell"><div class="mo-lbl">Sous-total</div><div class="mo-val" style="color:var(--acc)">${tBase ? tBase.toFixed(0) + "€" : "—"}</div></div>
    <div class="mo-cell"><div class="mo-lbl">Net</div><div class="mo-val" style="color:var(--amb)">${tNet ? tNet.toFixed(0) + "€" : "—"}</div></div>
  </div>`;

  const gr = {};
  active.forEach(m => { (gr[m.date] = gr[m.date] || []).push(m); });
  Object.entries(gr).sort(([a],[b]) => a.localeCompare(b)).forEach(([date, ms]) => {
    const isT = date === t, isTm = date === tm;
    h += `<div class="date-hdr${isT?" today":isTm?" tmrw":""}">
      ${fdl(date).toUpperCase()}
      ${isT ? '<span class="date-pill">Aujourd\'hui</span>' : ""}
    </div>` + ms.map(m => mcard(m, false)).join("");
  });

  // Cancelled missions — greyed, collapsed at bottom
  const cxls = mms.filter(isCxl);
  if (cxls.length) {
    h += `<div class="cxl-section">
      <div class="coll">
        <div class="coll-hdr" onclick="tColl('cxl-month')">
          <div>
            <div class="coll-title">Annulées (${cxls.length})</div>
            <div class="coll-sub">Référence · fiabilité clients</div>
          </div>
          <div class="coll-chev" id="chev-cxl-month">▼</div>
        </div>
        <div class="coll-body" id="cxl-month">
          ${cxls.map(m => `
            <div class="cxl-card">
              <div class="cxl-row">
                <div>
                  <div class="cxl-name">${getMeta(m.client).tag} · ${esc(m.type || "—")}</div>
                  <div class="cxl-date">${fds(m.date)} ${m.notes ? "· " + esc(m.notes.slice(0,40)) : ""}</div>
                </div>
                <span class="cxl-badge">Annulé</span>
              </div>
            </div>`).join("")}
        </div>
      </div>
    </div>`;
  }

  if (!active.length) {
    h += `<div class="empty"><div class="empty-icon">📅</div><div class="empty-title">Aucune mission ce mois</div></div>`;
  }

  h += rdJournal();
  h += `<div class="slbl">Références</div>
  <div class="ref-box">
    SIRET · 92815905200010<br>
    IBAN · FR76 2823 3000 0177 6267 3414 414<br>
    BIC · REVOFRP2 (Revolut)
  </div>`;
  return h;
}

// ═══════════════════════════════════════════════════
// FINANCE
// ═══════════════════════════════════════════════════
function rdFinance() {
  const now = new Date(), cm = p2(now.getMonth() + 1);
  const mms = missions.filter(m => m.date && m.date.slice(5,7) === cm && !isCxl(m))
    .sort((a,b) => a.date.localeCompare(b.date));
  const done = mms.filter(isDone);

  // V3: all values from API formula results
  const tBase  = mms.reduce((s,m) => s + m.sousTotal, 0);
  const tDeb   = mms.reduce((s,m) => s + m.debours,   0);
  const tNet   = mms.reduce((s,m) => s + m.totalNet,   0);
  const tRecu  = mms.reduce((s,m) => s + m.montant,    0);
  const tOwed  = tNet - tRecu;

  let h = `<div class="slbl">${MOL[now.getMonth()].toUpperCase()} — Vue financière</div>
  <div class="fin-card">
    <div class="fin-card-title">Récapitulatif</div>
    <div class="fin-row"><span class="fin-lbl">Missions</span><span class="fin-val">${mms.length}</span></div>
    <div class="fin-row"><span class="fin-lbl">Sous-total HT</span><span class="fin-val">${tBase.toFixed(2)} €</span></div>
    <div class="fin-row"><span class="fin-lbl sub">dont Débours</span><span class="fin-val" style="font-size:11px;color:var(--txt2)">${tDeb.toFixed(2)} €</span></div>
    <div class="fin-row"><span class="fin-lbl">Charges (21.2%)</span><span class="fin-val" style="color:var(--red)">−${(tBase*TAX).toFixed(2)} €</span></div>
    <div class="fin-row"><span class="fin-lbl" style="font-weight:700;color:var(--txt0)">Net estimé</span><span class="fin-val grn">${tNet.toFixed(2)} €</span></div>
    <div class="fin-row"><span class="fin-lbl">Reçu</span><span class="fin-val grn">${tRecu.toFixed(2)} €</span></div>
    ${tOwed > 0 ? `<div class="fin-row"><span class="fin-lbl">À recevoir</span><span class="fin-val amb">${tOwed.toFixed(2)} €</span></div>` : ""}
  </div>`;

  // Mission list — all (not just done)
  h += `<div class="fin-card">
    <div class="fin-card-title">Détail missions</div>`;
  mms.forEach(m => {
    const owed = m.totalNet > 0 && m.montant === 0 && isDone(m);
    h += `<div class="fin-mission-row" onclick="openD('${m.mid}')">
      <div class="fmr-left">
        <div class="fmr-desc">${getMeta(m.client).tag} · ${esc(m.type || "—")}${m.extRef ? " · " + esc(m.extRef) : ""}</div>
        <div class="fmr-meta">${fds(m.date)} · ${badge(m)}${owed ? '<span class="owed-badge">En attente</span>' : ""}</div>
      </div>
      <div class="fmr-right">
        <div class="fmr-base">${m.sousTotal ? m.sousTotal.toFixed(0) + " €" : "—"}</div>
        ${m.totalNet ? `<div class="fmr-net">Net ${m.totalNet.toFixed(0)} €</div>` : ""}
      </div>
    </div>`;
  });
  h += "</div>";

  if (!mms.length) {
    h += `<div class="empty"><div class="empty-icon">💶</div><div class="empty-title">Aucune mission ce mois</div></div>`;
  }
  return h;
}

// ═══════════════════════════════════════════════════
// JOURNAL — reads from API response (no localStorage)
// ═══════════════════════════════════════════════════
function rdJournal() {
  if (!journal.length) {
    return `<div class="slbl mt">Bien-être</div>
    <div style="font-size:11px;color:var(--txt3);padding:8px 0">Aucune entrée pour le moment.</div>`;
  }
  const cy = String(new Date().getFullYear());
  const yl = journal.filter(e => e.date && e.date.startsWith(cy));
  const avgMood   = yl.filter(e => e.mood > 0).reduce((s,e,_,a) => s + e.mood/a.length, 0) || 0;
  const avgEnergy = yl.filter(e => e.energy > 0).reduce((s,e,_,a) => s + e.energy/a.length, 0) || 0;

  let h = `<div class="slbl mt">Bien-être · ${cy}</div>
  <div class="mood-stat-row">
    <div class="mood-stat"><div class="mood-stat-val">${yl.length}</div><div class="mood-stat-lbl">Entrées</div></div>
    <div class="mood-stat"><div class="mood-stat-val">${avgMood ? MOOD_E[Math.round(avgMood)] + " " + avgMood.toFixed(1) : "—"}</div><div class="mood-stat-lbl">Humeur</div></div>
    <div class="mood-stat"><div class="mood-stat-val">${avgEnergy ? ENERGY_E[Math.round(avgEnergy)] + " " + avgEnergy.toFixed(1) : "—"}</div><div class="mood-stat-lbl">Énergie</div></div>
  </div>`;

  const recent = [...yl].sort((a,b) => b.date.localeCompare(a.date)).slice(0, 10);
  h += `<div class="coll">
    <div class="coll-hdr" onclick="tColl('journal-log')">
      <div>
        <div class="coll-title">Journal privé</div>
        <div class="coll-sub">${yl.length} entrées · appuie pour voir</div>
      </div>
      <div class="coll-chev" id="chev-journal-log">▼</div>
    </div>
    <div class="coll-body" id="journal-log">`;
  recent.forEach(e => {
    h += `<div class="jrow">
      <div>
        <div class="j-date">${fds(e.date)}</div>
        <div class="j-ctx">${esc(e.context || "—")} · ${esc(e.client || "")}</div>
        <div class="j-scores">
          ${e.mood   ? `<span class="j-score">${MOOD_E[e.mood]} ${e.mood}</span>` : ""}
          ${e.energy ? `<span class="j-score">${ENERGY_E[e.energy]} ${e.energy}</span>` : ""}
        </div>
        ${e.text ? `<div class="j-note">${esc(e.text.slice(0, 80))}${e.text.length > 80 ? "…" : ""}</div>` : ""}
      </div>
    </div>`;
  });
  h += `</div></div>`;
  return h;
}

// ═══════════════════════════════════════════════════
// COLLAPSIBLE — BUG FIXED
// body starts display:none, open class toggles it
// chevron derives from body state, not stored separately
// ═══════════════════════════════════════════════════
function tColl(id) {
  const body = document.getElementById(id);
  const chev = document.getElementById("chev-" + id);
  if (!body) return;
  const isOpen = body.classList.toggle("open");
  if (chev) chev.classList.toggle("open", isOpen);
}

// ═══════════════════════════════════════════════════
// DETAIL VIEW
// ═══════════════════════════════════════════════════
function rdDetail(m) {
  const mt = getMeta(m.client);
  let h = `<button class="back-btn" onclick="closeD()">← Retour</button>
  <div class="dcard" style="--card-color:${mt.hex}">
    <div class="dcard-accent"></div>
    <div class="dcard-hdr">
      <div class="d-client" style="color:${mt.hex}">${esc(m.client || "—")}</div>
      <div class="d-title">${esc(m.type || "—")}${m.sens && m.sens !== "—" ? " · " + esc(m.sens) : ""}</div>
      <div class="d-sub">${fds(m.date)} ${m.debut ? "· " + esc(m.debut) : ""}${m.endroit ? " · " + esc(m.endroit) : ""}</div>
      <div class="d-pills">
        ${badge(m)}
        ${cmpDot(m)}
        ${m.cmp && m.cmp.missing && m.cmp.missing.length ? `<span style="font-size:9px;color:var(--amb)">Manque: ${m.cmp.missing.slice(0,3).map(esc).join(", ")}</span>` : ""}
      </div>
    </div>`;

  // ── Timing + logistics ──────────────────────────
  h += `<div class="dsec">
    <div class="dsec-title">Mission</div>`;
  if (m.extRef) h += irow("Réf", esc(m.extRef));
  if (m.debut)  h += irow("Départ", esc(m.debut));
  if (m.ops["Mission Start Time"]) h += irow("Début mission", esc(m.ops["Mission Start Time"]));
  if (m.ops["Mission Duration (h)"]) h += irow("Durée", esc(m.ops["Mission Duration (h)"]) + "h");
  else if (m.heures) h += irow("Durée", esc(m.heures) + "h");
  if (m.endroit)  h += irow("Endroit", esc(m.endroit));
  if (m.meetPt)   h += irow("RDV", esc(m.meetPt));
  if (m.transRef) h += irow("Ref transport", esc(m.transRef));
  if (m.shipName) h += irow("Navire", esc(m.shipName));
  if (m.dock)     h += irow("Quai", esc(m.dock));
  if (m.ops["Vehicle Info"]) h += irow("Véhicule", esc(m.ops["Vehicle Info"]));
  h += "</div>";

  // ── Contacts ────────────────────────────────────
  const contacts = [];
  if (m.ops["Contact Client"])  contacts.push({ role:"Contact client",  name:m.ops["Contact Client"],  phone:m.ops["Client Phone"]   || "" });
  if (m.ops["Cruise Manager"])  contacts.push({ role:"Cruise Manager",  name:m.ops["Cruise Manager"],  phone:m.ops["Cruise Phone"]    || "" });
  if (m.ops["Chauffeur"])       contacts.push({ role:"Chauffeur",       name:m.ops["Chauffeur"],        phone:m.ops["Tél Chauffeur"]  || "" });
  if (m.ops["Colleague"]) {
    const r = m.ops["Colleague Role"] ? "Collègue · " + m.ops["Colleague Role"] : "Collègue";
    contacts.push({ role: r, name: m.ops["Colleague"], phone: m.ops["Colleague Phone"] || "" });
  }
  if (m.ops["Emergency Contact"]) contacts.push({ role:"Urgence", name:m.ops["Emergency Contact"], phone:"" });

  if (contacts.length) {
    h += `<div class="dsec"><div class="dsec-title">Contacts</div>`;
    contacts.forEach(c => {
      h += `<div class="cblock">
        <div class="cb-left">
          <div class="cb-role">${esc(c.role)}</div>
          <div class="cb-name">${esc(c.name)}</div>
          ${c.phone ? `<div class="cb-phone">${esc(c.phone)}</div>` : ""}
        </div>
        ${c.phone ? `<a href="tel:${esc(c.phone)}" class="cb-call" onclick="event.stopPropagation()">📞</a>` : ""}
      </div>`;
    });
    h += "</div>";
  }

  // ── Pax checklist ───────────────────────────────
  if (m.paxRaw || m.paxCount) {
    h += `<div class="dsec"><div class="dsec-title">Passagers${m.paxCount ? " (" + esc(m.paxCount) + ")" : ""}</div>`;
    if (m.paxRaw) {
      const paxList = parsePax(m.paxRaw);
      const state = paxChecks[m.mid] || {};
      const checked = Object.values(state).filter(Boolean).length;
      const pct = paxList.length ? Math.round(checked / paxList.length * 100) : 0;
      h += `<div class="pax-progress"><div class="pax-prog-fill" id="paxprog-${m.mid}" style="width:${pct}%"></div></div>
      <div class="pax-wrap">`;
      paxList.forEach((p, i) => {
        const isChk = !!state[i];
        h += `<div class="pax-item">
          <div class="pax-cb${isChk?" checked":""}" onclick="togglePax('${m.mid}',${i},${!isChk})">${isChk?"✓":""}</div>
          <div class="pax-name${isChk?" checked":""}">${esc(p)}</div>
        </div>`;
      });
      h += "</div>";
    }
    h += "</div>";
  }

  // ── Ops summary ─────────────────────────────────
  if (m.opsSum) {
    h += `<div class="dsec">
      <div class="dsec-title">Résumé opérationnel</div>
      <div style="font-size:12px;color:var(--txt1);line-height:1.6">${esc(m.opsSum)}</div>
    </div>`;
  }

  // ── SNCF panel for Gare missions ─────────────────
  if ((m.type || "").toLowerCase() === "gare" && m.transRef) {
    h += rdSNCF(m);
  }

  // ── Edit controls ───────────────────────────────
  h += `<div class="dsec">
    <div class="dsec-title">Modifier</div>
    ${editRow("statut", "Statut", "sel", m)}
    ${editRow("notes",  "Notes",  "notes", m)}
    ${editRow("heures", "Heures", "num", m)}
    ${editRow("base",   "Base HT","num", m)}
    ${editRow("debut",  "Début",  "time", m)}
  </div>`;

  // ── Invoice ─────────────────────────────────────
  h += rdInvoice(m);

  // ── Documents ───────────────────────────────────
  if (m.docs || m.ops["Source PDF"]) {
    h += `<div class="dsec"><div class="dsec-title">Documents</div>`;
    if (m.docs)            h += `<a href="${esc(m.docs)}" target="_blank" class="inv-btn" onclick="event.stopPropagation()"><span class="inv-btn-icon">📁</span> Drive — dossier mission</a>`;
    if (m.ops["Source PDF"]) h += `<a href="${esc(m.ops["Source PDF"])}" target="_blank" class="inv-btn" style="margin-top:6px" onclick="event.stopPropagation()"><span class="inv-btn-icon">📄</span> Manifeste PDF</a>`;
    h += "</div>";
  }

  // ── Notes ───────────────────────────────────────
  if (m.notes || m.ops["Raw Notes"]) {
    h += `<div class="dsec">`;
    if (m.ops["Raw Notes"]) {
      h += collapsible("ops-notes-" + m.mid, "Notes opérationnelles",
        `<div style="font-size:11px;color:var(--txt2);white-space:pre-wrap;line-height:1.6">${esc(m.ops["Raw Notes"])}</div>`);
    }
    h += "</div>";
  }

  // ── Email source ────────────────────────────────
  if (m.ops["Source Email Msg"]) {
    h += `<div class="dsec">` +
      collapsible("email-src-" + m.mid, "Email source",
        `<div style="font-size:10px;color:var(--txt3);white-space:pre-wrap;line-height:1.6">${esc(m.ops["Source Email Msg"].slice(0,1200))}</div>`) +
      "</div>";
  }

  // ── PMF / close mission ─────────────────────────
  h += rdPMF(m);
  h += "</div>";
  return h;
}

function irow(lbl, val) {
  return `<div class="irow"><div class="i-lbl">${lbl}</div><div class="i-val">${val}</div></div>`;
}

function collapsible(id, title, body, sub) {
  return `<div class="coll">
    <div class="coll-hdr" onclick="tColl('${id}')">
      <div>
        <div class="coll-title">${title}</div>
        ${sub ? `<div class="coll-sub">${sub}</div>` : ""}
      </div>
      <div class="coll-chev" id="chev-${id}">▼</div>
    </div>
    <div class="coll-body" id="${id}">${body}</div>

}

function editRow(field, lbl, type, m) {
  const id = `ef-${field}-${m.mid}`;
  if (type === "sel") {
    const opts = ["Brouillon","Planifié","Confirmé","Terminé","Fac. générée","Fac. envoyée","Payé","Annulé"];
    return `<div class="edit-row">
      <div class="edit-lbl">${lbl}</div>
      <select class="edit-sel" id="${id}" onchange="saveF('${m.mid}','${field}',this.value)">
        ${opts.map(o => `<option value="${o}"${m.statut===o?" selected":""}>${o}</option>`).join("")}
      </select>
    </div>`;
  }
  if (type === "notes") {
    return `<div style="padding:4px 0">
      <textarea class="notes-area" id="${id}" placeholder="Ajouter une note…">${esc(m.notes || "")}</textarea>
      <div style="text-align:right;margin-top:4px">
        <button class="edit-save" onclick="saveF('${m.mid}','notes',document.getElementById('${id}').value)">Enregistrer</button>
      </div>
    </div>`;
  }
  const val = type === "time" ? m.debut : (field === "heures" ? m.heures : m.base || "");
  const itype = type === "time" ? "time" : "number";
  return `<div class="edit-row">
    <div class="edit-lbl">${lbl}</div>
    <input class="edit-inp" type="${itype}" id="${id}" value="${esc(String(val || ""))}" placeholder="—"/>
    <button class="edit-save" onclick="saveF('${m.mid}','${field}',document.getElementById('${id}').value)">✓</button>
  </div>`;
}

async function saveF(mid, field, value) {
  const ok = await saveField(mid, field, value);
  if (ok) {
    // Update local state
    const m = missions.find(x => x.mid === mid);
    if (m) {
      if (field === "statut")    m.statut = value;
      else if (field === "notes") m.notes  = value;
      else if (field === "heures") m.heures = value;
      else if (field === "base")  m.base   = parseFloat(value) || 0;
      else if (field === "debut") m.debut  = value;
    }
    if (detail && detail.mid === mid) detail = m;
    toast("✅ " + field + " mis à jour", "ok");
  }
}

async function saveField(mid, field, value) {
  try {
    const r = await fetch(
      GAS_URL + "?action=update&id=" + encodeURIComponent(mid) +
      "&field=" + encodeURIComponent(field) +
      "&value=" + encodeURIComponent(value)
    );
    const d = await r.json();
    return d && d.ok !== false;
  } catch(e) {
    toast("❌ " + e.message.slice(0, 40), "err");
    return false;
  }
}

function rdInvoice(m) {

            onclick="saveF('${m.mid}','statut','Fac. envoyée')">

        </div>
        <div id="sncf-data-${m.mid}" style="margin-top:8px;font-size:11px;color:var(--txt2)">Appuie sur Actualiser pour charger.</div>
      </div>`,
      "Cloudflare Worker · SNCF live") +
    "</div>";

async function fetchSNCF(mid, trainRef) {
  const el = document.getElementById("sncf-data-" + mid);
  if (!el) return;
  el.textContent = "Chargement…";
  try {
    const r = await fetch(SNCF_WORKER, { signal: AbortSignal.timeout(12000) });
    const d = await r.json();
    const arrivals = d.arrivals || [];
    const match = arrivals.filter(a => {
      const info = a.display_informations || {};
      const h = String(info.headsign || "").trim();
      const t = String(info.trip_short_name || "").trim();
      return h === trainRef || t === trainRef || h.endsWith(trainRef) || t.endsWith(trainRef);
    });
    if (!match.length) {
      el.textContent = "Train " + trainRef + " pas encore annoncé (" + arrivals.length + " trains chargés).";
      return;
    }
    el.innerHTML = match.map(a => {
      const sdt = a.stop_date_time || {};
      const base = sdt.base_arrival_date_time || "";
      const real = sdt.arrival_date_time || base;
      const bm = base ? parseInt(base.slice(9,11))*60 + parseInt(base.slice(11,13)) : 0;
      const rm = real ? parseInt(real.slice(9,11))*60 + parseInt(real.slice(11,13)) : bm;
      const diff = rm - bm;
      const info = a.display_informations || {};
      const trainNum = info.headsign || info.trip_short_name || trainRef;
      const cls = diff <= 1 ? "sncf-ok" : "sncf-late";
      const status = diff <= 1 ? "À l'heure" : "+" + diff + " min";
      const timeStr = base ? (String(bm/60|0).padStart(2,"0") + ":" + String(bm%60).padStart(2,"0")) : "—";
      return `<div class="sncf-row">
        <div class="sncf-train">${esc(trainNum)}</div>
        <div class="sncf-time">${timeStr}</div>
        <span class="sncf-badge ${cls}">${status}</span>
      </div>`;
    }).join("");
  } catch(e) {
    el.textContent = "Erreur: " + e.message;
  }
}

// PAX CHECKLIST

function parsePax(raw) {
  if (!raw) return [];
  return raw.split("\n").map(s => s.trim()).filter(Boolean);
}

function togglePax(mid, idx, on) {
  if (!paxChecks[mid]) paxChecks[mid] = {};
  paxChecks[mid][idx] = !!on;
  // Update just the pax elements without full re-render
  const cb   = document.querySelector(`[onclick="togglePax('${mid}',${idx},${!on})"]`);
  const name = cb ? cb.nextElementSibling : null;
  if (cb) {
    cb.classList.toggle("checked", on);
    cb.textContent = on ? "✓" : "";
    cb.setAttribute("onclick", `togglePax('${mid}',${idx},${!on})`);
  }
  if (name) name.classList.toggle("checked", on);
  // Update progress bar
  const state = paxChecks[mid];
  const m = missions.find(x => x.mid === mid);
  const total = m ? parsePax(m.paxRaw).length : 0;
  const checked = Object.values(state).filter(Boolean).length;
  const pct = total ? Math.round(checked/total*100) : 0;
  const prog = document.getElementById("paxprog-" + mid);
  if (prog) prog.style.width = pct + "%";
}

function rdPMF(m) {
  if (isDone(m)) {
    return `<div class="dsec">
      <div style="text-align:center;padding:8px 0">
        <div style="font-size:12px;color:var(--grn);font-weight:600;margin-bottom:10px">✓ Mission clôturée</div>
        <button class="decomp-link" onclick="goPause()">🌿 Décompresser</button>
      </div>
    </div>`;
  }
  if (!pmf || pmf.mid !== m.mid) {
    return `<div class="dsec">
      <button class="pbtn" onclick="sPMF('${m.mid}')">✅ Clôturer la mission</button>
    </div>`;
  }
  return `<div class="dsec"><div class="pmf-wrap">${pmfHTML(m)}</div></div>`;
}

function sPMF(mid) {
  const m = missions.find(x => x.mid === mid) || {};
  let defEnd = nowt();
  if (m.debut && m.heures) {
    const ph = parseFloat(m.heures);
    if (ph > 0) {
      const [h,mn] = m.debut.split(":").map(Number);
      const em = h*60 + mn + Math.round(ph*60);
      if (Math.floor(em/60) < 24) defEnd = p2(Math.floor(em/60)) + ":" + p2(em%60);
    }
  }
  pmf = { mid, start:m.debut||"", end:defEnd, tpl:"RAS", rpt:"", rptLoading:false, debriefMood:0, debriefEnergy:0, debriefNote:"" };
  pmfStep = 1; render();
}

function pmfHTML(m) {
  return pmfStep === 1 ? pmfH1(m) : pmfStep === 2 ? pmfH2(m) : pmfStep === 3 ? pmfH3(m) : pmfStep === 4 ? pmfH4() : "";
}

function pmfH1(m) {
  const du = pmf.start && pmf.end ? durS(pmf.start, pmf.end) : "";
  return `<div class="pmf-step-hdr"><div class="pmf-num">1</div><div class="pmf-step-title">Heures réelles</div></div>
  <div class="time-row">
    <div class="time-block">
      <div class="time-lbl">Début</div>
      <input class="time-inp" type="time" id="ps" value="${pmf.start || ""}" onchange="pmf.start=this.value;uDur()"/>
    </div>
    <div class="time-arrow">→</div>
    <div class="time-block">
      <div class="time-lbl">Fin</div>
      <input class="time-inp" type="time" id="pe" value="${pmf.end || ""}" onchange="pmf.end=this.value;uDur()"/>
    </div>
  </div>
  <div class="dur-display" id="pd">${du ? "⏱ " + du : ""}</div>
  <button class="pbtn" onclick="pmfGo(2)">Suivant → Rapport</button>
  <span class="pback" onclick="pmf=null;pmfStep=0;render()">Annuler</span>`;
}

function pmfH2(m) {
  const actions = pmf.rpt
    ? `<div class="rpt-actions">
        <button class="rpt-act-btn" onclick="genRpt('${m.mid}')">↻ Régénérer</button>
        <button class="rpt-act-btn" style="color:var(--grn)" onclick="schedRpt('${m.mid}')">📅 Planifier 9h</button>
       </div>
       <textarea class="rpt-edit" id="rpt-edit-${m.mid}" rows="5">${esc(pmf.rpt)}</textarea>
       <button class="pbtn" onclick="pmfGo(3)">Continuer →</button>`
    : `<button class="pbtn" onclick="genRpt('${m.mid}')">✨ Générer le rapport</button>`;
  return `<div class="pmf-step-hdr"><div class="pmf-num">2</div><div class="pmf-step-title">Rapport</div></div>
  <div class="tpl-grid">
    <button class="tpl-btn${pmf.tpl==="RAS"?" on":""}" onclick="pmf.tpl='RAS';pmf.rpt='';render()">📝 RAS</button>
    <button class="tpl-btn${pmf.tpl==="INCIDENT"?" on":""}" onclick="pmf.tpl='INCIDENT';pmf.rpt='';render()">⚠️ Incident</button>
    <button class="tpl-btn${pmf.tpl==="ANNULATION"?" on":""}" onclick="pmf.tpl='ANNULATION';pmf.rpt='';render()">🚫 Annulation</button>
  </div>
  ${pmf.rptLoading ? '<div style="text-align:center;padding:12px 0;color:var(--txt2)"><span class="spin">↻</span> Rédaction…</div>' : (pmf.rpt ? `<div class="rpt-output">${esc(pmf.rpt)}</div>` + actions : actions)}
  <span class="pback" onclick="pmfStep=1;render()">← Retour</span>`;
}

function pmfH3(m) {
  const moods = [1,2,3,4,5];
  return `<div class="pmf-step-hdr"><div class="pmf-num">3</div><div class="pmf-step-title">État de fin</div></div>
  <div style="font-size:9px;color:var(--txt3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px">Humeur</div>
  <div class="mood-grid">${moods.map(v => `<button class="mood-btn${pmf.debriefMood===v?" on":""}" onclick="pmf.debriefMood=${v};render()">${MOOD_E[v]}</button>`).join("")}</div>
  <div style="font-size:9px;color:var(--txt3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px">Énergie</div>
  <div class="mood-grid">${moods.map(v => `<button class="mood-btn${pmf.debriefEnergy===v?" on":""}" onclick="pmf.debriefEnergy=${v};render()">${ENERGY_E[v]}</button>`).join("")}</div>
  <textarea class="notes-area" id="pmf-db" rows="3" placeholder="Note privée / décompression…">${esc(pmf.debriefNote||"")}</textarea>
  <button class="pbtn" style="margin-top:8px" onclick="pmfFin('${m.mid}')">Clôturer</button>
  <span class="pback" onclick="pmfStep=2;render()">← Retour</span>`;

function pmfH4() {
  return `<div class="done-wrap">
    <div class="done-icon">✅</div>
    <div class="done-title">Mission clôturée</div>
    <div class="done-sub">Heures et journal enregistrés.</div>
    <button class="decomp-link" onclick="goPause()">🌿 Décompresser</button>
    <span class="pback" onclick="closeD()">← Retour</span>
  </div>`;
}

function pmfGo(step) {
  if (step === 2) {
    const s = document.getElementById("ps"), e = document.getElementById("pe");
    if (s) pmf.start = s.value; if (e) pmf.end = e.value;
  }
  pmfStep = step; render();
}
function uDur() {
  const s = document.getElementById("ps"), e = document.getElementById("pe"), d = document.getElementById("pd");
  if (s && e && d) { const du = durS(s.value, e.value); d.textContent = du ? "⏱ " + du : ""; }
}

async function genRpt(mid) {
  const m = missions.find(x => x.mid === mid); if (!m) return;
  pmf.rptLoading = true; render();
  const ref = m.desc || m.mid || "service";
  if (pmf.tpl === "RAS") {
    pmf.rpt = "Bonjour,\n\nVoici le récap du service " + ref + ". Rien à signaler, tout s'est bien déroulé.\n\nMerci et bonne journée,\nJoseph";
    pmf.rptLoading = false; render(); return;
  }
  try {
    const r = await fetch(GAS_URL + "?action=genRapport&id=" + encodeURIComponent(mid) +
      "&template=" + encodeURIComponent(pmf.tpl) +
      "&start=" + encodeURIComponent(pmf.start) +
      "&end=" + encodeURIComponent(pmf.end));
    const d = await r.json();
    pmf.rpt = (d && d.text) ? d.text : "Erreur génération.";
  } catch(e) { pmf.rpt = "Erreur: " + e.message; }
  pmf.rptLoading = false; render();
}

async function schedRpt(mid) {
  const editEl = document.getElementById("rpt-edit-" + mid);
  const rpt = editEl ? editEl.value : pmf.rpt;
  try {
    const r = await fetch(GAS_URL + "?action=scheduleRapport&id=" + encodeURIComponent(mid) +
      "&rapport=" + encodeURIComponent(rpt) +
      "&template=" + encodeURIComponent(pmf.tpl));
    const d = await r.json();
    if (d && d.ok) { toast("📅 Rapport planifié 9h", "ok"); pmf.scheduled = true; }
    else toast("❌ " + (d.msg || "Erreur"), "err");
  } catch(e) { toast("❌ " + e.message.slice(0,40), "err"); }
}

async function pmfFin(mid) {
  const dbEl = document.getElementById("pmf-db");
  if (dbEl) pmf.debriefNote = dbEl.value;
  const s = pmf.start, e = pmf.end;
  const he = s && e ? (function(){
    const [sh,sm] = s.split(":").map(Number), [eh,em] = e.split(":").map(Number);
    const d = (eh*60+em)-(sh*60+sm); if(d<=0) return "";
    return (d/60).toFixed(2);
  })() : "";

  // Save hours + close
  const ok = await saveField(mid, "heures", he || pmf.heures || "");
  if (ok) await saveField(mid, "statut", "Terminé");

  // Save journal entry via API (no localStorage)
  const flag = (pmf.debriefMood <= 2 || pmf.debriefEnergy <= 2) ? "🔴"
             : (pmf.debriefMood <= 3 || pmf.debriefEnergy <= 3) ? "🟡" : "🟢";
  const m = missions.find(x => x.mid === mid) || {};
  try {
    await fetch(GAS_URL + "?action=saveJournal" +
      "&date=" + encodeURIComponent(m.date || tday()) +
      "&mid=" + encodeURIComponent(mid) +
      "&mood=" + pmf.debriefMood +
      "&energy=" + pmf.debriefEnergy +
      "&client=" + encodeURIComponent(m.client || "") +
      "&context=" + encodeURIComponent("Après mission") +
      "&kind=Note" +
      "&note=" + encodeURIComponent((pmf.debriefNote || "").slice(0, 500)) +
      "&include=" + (flag === "🟢" ? "true" : "false"),
      { signal: AbortSignal.timeout(8000) }
    );
  } catch(e) {}

  const i = missions.findIndex(x => x.mid === mid);
  if (i > -1) { missions[i].heures = he; missions[i].statut = "Terminé"; }
  if (detail && detail.mid === mid) { detail.heures = he; detail.statut = "Terminé"; }
  toast("✅ Clôturée", "ok"); pmfStep = 4; render();
}

// TOAST

let _tt = null;
function toast(msg, type) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast-show" + (type ? " " + type : "");
  // Use inline show state
  el.style.opacity = "1";
  if (_tt) clearTimeout(_tt);
  _tt = setTimeout(() => { el.style.opacity = "0"; }, 3500);
}

// WEATHER
// ═══════════════════════════════════════════════════
async function loadWeather() {
  try {
    const r = await fetch(
      "https://api.open-meteo.com/v1/forecast?latitude=45.695&longitude=4.944&current_weather=true&hourly=precipitation_probability&forecast_days=1",
      { signal: AbortSignal.timeout(6000) }
    );
    const d = await r.json();
    const cw = d.current_weather;
    if (!cw) return;
    const code = cw.weathercode;
    const icon = code <= 1 ? "☀️" : code <= 3 ? "⛅️" : code <= 50 ? "🌦" : code <= 70 ? "🌧" : "❄️";
    const temp = Math.round(cw.temperature) + "°";
    document.getElementById("hdr-wx").innerHTML = `<span>${icon}</span><span>${temp}</span>`;
  } catch(e) {}
}
</script>
</body>
</html>
