<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scenic Sapphire - Lyon 16/04</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0f14;--surf:#131820;--surf2:#0f151c;--bdr:#1e2730;
  --acc:#00c9a7;--a2:#ffd166;--warn:#ef4444;--ok:#22c55e;
  --mut:#4a5568;--txt:#e2e8f0;--dim:#718096;
  --tgv:#003189;--ter:#e05206;--frec:#ce1126;
}
[data-theme="light"]{
  --bg:#f4f5f7;--surf:#ffffff;--surf2:#eaecef;--bdr:#d1d5db;
  --acc:#00957a;--a2:#b08800;--warn:#dc2626;--ok:#16a34a;
  --mut:#9ca3af;--txt:#111827;--dim:#6b7280;
}
.theme-btn{background:transparent;border:1px solid var(--bdr);color:var(--dim);font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.06em;padding:3px 8px;cursor:pointer;transition:all .18s;border-radius:2px}
.theme-btn:hover{border-color:var(--acc);color:var(--acc)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'DM Mono',monospace;min-height:100vh}
.hdr{padding:18px 16px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.hdr h1{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;letter-spacing:.13em;text-transform:uppercase}
.sub{font-size:.72rem;color:var(--dim);margin-top:4px;letter-spacing:.06em}
.hdr-r{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
#clock{font-size:1.2rem;font-weight:500;color:var(--acc);font-variant-numeric:tabular-nums}
.rbtn{background:transparent;border:1px solid var(--acc);color:var(--acc);font-family:'DM Mono',monospace;font-size:.59rem;letter-spacing:.08em;padding:5px 10px;cursor:pointer;text-transform:uppercase;transition:all .18s}
.rbtn:hover:not(:disabled){background:var(--acc);color:var(--bg)}
.rbtn:disabled{opacity:.35;cursor:not-allowed}
.sbar{display:flex;border-bottom:1px solid var(--bdr);overflow-x:auto}
.sc{flex:1;min-width:64px;padding:9px 11px;border-right:1px solid var(--bdr);display:flex;flex-direction:column;gap:2px}
.sc:last-child{border-right:none}
.sl{font-size:.5rem;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}
.sv{font-size:1rem;font-weight:500;font-variant-numeric:tabular-nums}
.sv.ok{color:var(--ok)}.sv.warn{color:var(--warn)}.sv.ac{color:var(--acc)}.sv.sm{font-size:.65rem}
.src-bar{padding:6px 14px;border-bottom:1px solid var(--bdr);background:var(--surf2);font-size:.55rem;color:var(--dim);display:flex;align-items:center;gap:6px}
#src-status{margin-left:auto;font-size:.54rem}
#src-status.ok{color:var(--ok)} #src-status.warn{color:var(--warn)} #src-status.live{color:var(--acc)}
#tlist{padding:11px;display:flex;flex-direction:column;gap:7px}
.foot{padding:8px 13px;border-top:1px solid var(--bdr);font-size:.53rem;color:var(--mut);display:flex;justify-content:space-between;gap:8px}
.ldot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--ok);margin-right:4px;vertical-align:middle;animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.lp{animation:pulse 1.05s ease-in-out infinite}
.card{background:var(--surf);border:1px solid var(--bdr);border-left:3px solid var(--mut);transition:border-left-color .3s,opacity .3s}
.card.on-time{border-left-color:var(--ok)}
.card.delayed{border-left-color:var(--warn)}
.card.not-announced{border-left-color:#3d5a80}
.card.loading{border-left-color:var(--mut)}
.card.disrupted{border-left-color:var(--warn)}
.card.check{border-left-color:#a855f7}
.card.all-done{opacity:.55}
.chdr{display:flex;align-items:center;gap:7px;padding:12px 14px 11px;cursor:pointer;user-select:none}
.chdr:hover{background:rgba(255,255,255,.013)}
.tbadge{font-size:.54rem;font-weight:500;letter-spacing:.07em;padding:3px 6px;border-radius:2px;flex-shrink:0;text-transform:uppercase}
.b-tgv{background:var(--tgv);color:#fff}.b-ter{background:var(--ter);color:#fff}.b-frec{background:var(--frec);color:#fff}
.tnum{font-size:.64rem;color:var(--dim);flex-shrink:0;min-width:52px}
.troute{flex:1;font-size:.68rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ttimes{display:flex;align-items:center;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.tarr{font-size:1rem;font-weight:500;font-variant-numeric:tabular-nums;white-space:nowrap}
.tarr .orig{text-decoration:line-through;color:var(--mut);font-size:.68rem;margin-right:3px}
.tarr .real{color:var(--warn)}
.vpill{font-size:.54rem;background:rgba(0,201,167,.11);color:var(--acc);border:1px solid rgba(0,201,167,.24);padding:2px 7px;border-radius:10px;font-weight:500;white-space:nowrap}
.db{font-size:.57rem;font-weight:500;padding:2px 6px;border-radius:2px;white-space:nowrap;flex-shrink:0}
.d-ok{background:rgba(34,197,94,.12);color:var(--ok)}
.d-warn{background:rgba(239,68,68,.12);color:var(--warn)}
.d-amber{background:rgba(255,209,102,.1);color:var(--a2)}
.d-purple{background:rgba(168,85,247,.1);color:#a855f7}
.d-mut{background:rgba(74,85,104,.17);color:var(--mut);font-style:italic}
.chev{color:var(--mut);font-size:.54rem;margin-left:2px;transition:transform .2s;flex-shrink:0}
.card.expanded .chev{transform:rotate(180deg)}
.cbody{display:none;border-top:1px solid var(--bdr);background:rgba(0,0,0,.13)}
.card.expanded .cbody{display:block}
.bsec{padding:12px 14px;border-bottom:1px solid var(--bdr)}
.bsec:last-child{border-bottom:none}
.slbl{font-size:.5rem;color:var(--dim);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.plist{display:flex;flex-direction:column;gap:5px}
.pitem{display:flex;align-items:center;gap:8px;padding:5px 0;cursor:pointer;user-select:none}
.pcb{appearance:none;-webkit-appearance:none;width:15px;height:15px;border:1px solid var(--mut);border-radius:2px;flex-shrink:0;cursor:pointer;position:relative;transition:background .14s,border-color .14s;background:transparent}
.pcb:checked{background:var(--ok);border-color:var(--ok)}
.pcb:checked::after{content:'';position:absolute;left:3px;top:1px;width:5px;height:8px;border:2px solid #000;border-top:none;border-left:none;transform:rotate(45deg)}
.plbl{font-size:.84rem;color:var(--txt);flex:1;transition:color .18s}
.pitem.done .plbl{color:var(--ok);text-decoration:line-through;text-decoration-color:rgba(34,197,94,.38)}
.ptag{font-size:.5rem;color:var(--ok);opacity:0;transition:opacity .18s}
.pitem.done .ptag{opacity:1}
.twocol{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fgrp{display:flex;flex-direction:column;gap:4px}
.fwrap{display:flex;align-items:center;gap:6px;background:var(--surf2);border:1px solid var(--bdr);padding:5px 8px;transition:border-color .17s}
.fwrap:focus-within{border-color:var(--acc)}
.finp{background:transparent;border:none;outline:none;font-family:'DM Mono',monospace;font-size:.8rem;color:var(--txt);width:100%;min-width:0}
.finp::placeholder{color:var(--mut)}
.finp.track{color:var(--acc);font-weight:500}
.finp.track::placeholder{color:var(--mut);font-weight:400}
.wlist{display:flex;flex-direction:column;gap:1px}
.wrow{display:flex;align-items:center;gap:8px;font-size:.76rem;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.023)}
.wrow:last-child{border-bottom:none}
.wt{color:var(--dim);font-variant-numeric:tabular-nums;min-width:34px;flex-shrink:0}
.ws{flex:1}
.ws.dest{color:var(--acc);font-weight:500}
.wd{font-size:.58rem;flex-shrink:0;width:13px;text-align:center}
.wd.passed{color:var(--ok)}.wd.next{color:var(--a2)}.wd.upcoming{color:var(--mut)}
.nota{width:100%;background:var(--surf2);border:1px solid var(--bdr);color:var(--txt);font-family:'DM Mono',monospace;font-size:.8rem;padding:7px 9px;resize:vertical;min-height:58px;outline:none;transition:border-color .17s;line-height:1.65}
.nota:focus{border-color:var(--acc)}
.nota::placeholder{color:var(--mut);font-style:italic}
.nfoot{display:flex;justify-content:space-between;margin-top:4px}
.nts{font-size:.52rem;color:var(--mut)}
.nok{font-size:.52rem;color:var(--ok);opacity:0;transition:opacity .22s}
.nok.vis{opacity:1}
.srow{font-size:.61rem;color:var(--dim);padding:7px 12px;border-top:1px solid var(--bdr);line-height:1.55;background:rgba(0,0,0,.1)}
.srow.warn{color:#f87171}
@media(max-width:460px){.twocol{grid-template-columns:1fr}.troute{max-width:65px}}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <h1>Scenic Sapphire</h1>
    <div class="sub">Lyon Part-Dieu &middot; Arrivees &middot; Jeu 16 Avril 2026</div>
  </div>
  <div class="hdr-r">
    <div id="clock">--:--:--</div>
    <div style="display:flex;gap:6px;align-items:center">
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">☀ Jour</button>
      <button class="rbtn" id="rbtn" onclick="fetchAll()">Verifier arrivees</button>
    </div>
  </div>
</div>

<div class="sbar">
  <div class="sc"><div class="sl">Trains</div><div class="sv ac">6</div></div>
  <div class="sc"><div class="sl">A l'heure</div><div class="sv ok" id="sumOk">--</div></div>
  <div class="sc"><div class="sl">Retardes</div><div class="sv warn" id="sumLate">--</div></div>
  <div class="sc"><div class="sl">Pax OK</div><div class="sv ok" id="sumPax">0/13</div></div>
  <div class="sc"><div class="sl">MaJ</div><div class="sv sm" id="sumTime">--</div></div>
</div>

<div class="src-bar">
  <span>Source: SNCF live board</span>
  <span id="src-status">--</span>
</div>

<div id="tlist"></div>

<div class="foot">
  <span><span class="ldot"></span>Auto-refresh 5min</span>
  <span id="fnote">Chargement...</span>
</div>

<script>
var TRAINS = [
  { id:"frec-6647",  type:"FRECCIAROSSA", badge:"b-frec", num:"6647",
    from:"Paris Gare de Lyon", to:"Lyon Part-Dieu", arr:"11:26",
    pax:["Kevin Sweeney","Sean Sweeney"], co:"Balhi", cars:"",
    wp:[["10:00","Paris Gare de Lyon","o"],["11:26","Lyon Part-Dieu","d"]] },
  { id:"ter-17769",  type:"TER", badge:"b-ter", num:"17769",
    from:"Dijon", to:"Lyon Part-Dieu", arr:"12:44",
    pax:["Kathryn Liebke","Patrick Liebke"], co:"Balhi / TSF", cars:"",
    wp:[["07:34","Paris Gare de Lyon","w"],["10:26","Dijon","o"],["11:08","Macon","w"],
        ["12:09","Villefranche-sur-Saone","w"],["12:20","St-Germain-au-Mont-d'Or","w"],["12:44","Lyon Part-Dieu","d"]] },
  { id:"tgv-6611",   type:"TGV", badge:"b-tgv", num:"6611",
    from:"Paris Gare de Lyon", to:"Lyon Part-Dieu", arr:"12:56",
    pax:["Debra Nash","Larry Nash"], co:"Balhi", cars:"",
    wp:[["11:00","Paris Gare de Lyon","o"],["12:56","Lyon Part-Dieu","d"]] },
  { id:"tgv-12179",  type:"TGV", badge:"b-tgv", num:"12179",
    from:"Mulhouse", to:"Lyon Part-Dieu", arr:"12:59",
    pax:["Chester Brothers","Patricia Brothers"], co:"Balhi", cars:"",
    wp:[["--","Mulhouse","o"],["12:59","Lyon Part-Dieu","d"]] },
  { id:"ter-96562",  type:"TER", badge:"b-ter", num:"96562",
    from:"Geneve Cornavin", to:"Lyon Part-Dieu", arr:"13:26",
    pax:["Brian Johnston"], co:"Balhi", cars:"",
    wp:[["11:28","Geneve Cornavin","o"],["12:01","Bellegarde","w"],["12:26","Culoz","w"],
        ["12:34","Virieu-le-Grand","w"],["13:01","Amberieu-en-Bugey","w"],["13:26","Lyon Part-Dieu","d"]] },
  { id:"tgv-6613",   type:"TGV", badge:"b-tgv", num:"6613",
    from:"Paris Gare de Lyon", to:"Lyon Part-Dieu", arr:"13:56",
    pax:["Nevia Schroder","Paul Schroder","Timothy Graham","Debra Peters"],
    co:"Balhi", cars:"2 cars / 2 berlines",
    wp:[["11:50","Paris Gare de Lyon","o"],["13:12","Le Creusot-Montceau TGV","w"],["13:56","Lyon Part-Dieu","d"]] }
];

var TOTAL_PAX = TRAINS.reduce(function(a,t){ return a+t.pax.length; }, 0);
var LS_KEY = "ss-v6-2026-04-16";
var APP = (function(){ try{ return JSON.parse(localStorage.getItem(LS_KEY))||{}; }catch(e){ return {}; } })();
var STATUS = {};

function persist(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(APP)); }catch(e){} }
function tstate(id){
  if(!APP[id]) APP[id]={pax:{},driver:"",track:"",notes:"",noteTs:""};
  return APP[id];
}

// ── THEME ──────────────────────────────────────
function toggleTheme(){
  var isLight = document.documentElement.getAttribute("data-theme") === "light";
  document.documentElement.setAttribute("data-theme", isLight ? "" : "light");
  document.getElementById("themeBtn").textContent = isLight ? "☀ Jour" : "◑ Nuit";
  try{ localStorage.setItem("ss-theme", isLight ? "dark" : "light"); }catch(e){}
}

function pad(n){ return String(n).padStart(2,"0"); }
function tick(){
  var n=new Date();
  document.getElementById("clock").textContent=pad(n.getHours())+":"+pad(n.getMinutes())+":"+pad(n.getSeconds());
}
setInterval(tick,1000); tick();

function updateSummary(){
  var ok=0,late=0,done=0;
  TRAINS.forEach(function(t){
    var s=STATUS[t.id]||{};
    if(s.state==="on-time") ok++;
    if(s.state==="delayed") late++;
    done+=t.pax.filter(function(n){ return tstate(t.id).pax[n]; }).length;
  });
  document.getElementById("sumOk").textContent=ok;
  document.getElementById("sumLate").textContent=late;
  document.getElementById("sumPax").textContent=done+"/"+TOTAL_PAX;
  var any=TRAINS.some(function(t){ return STATUS[t.id]&&STATUS[t.id].state!=="loading"; });
  if(any){ var n=new Date(); document.getElementById("sumTime").textContent=pad(n.getHours())+":"+pad(n.getMinutes()); }
}

function makeBadge(s){
  var span=document.createElement("span");
  span.className="db";
  if(!s||s.state==="loading"){ span.classList.add("d-mut","lp"); span.textContent="..."; return span; }
  if(s.state==="on-time"){        span.classList.add("d-ok");     span.textContent="A l'heure"; return span; }
  if(s.state==="delayed"){        span.classList.add("d-warn");   span.textContent="+"+(s.delayMinutes||"?")+" min"; return span; }
  if(s.state==="not-announced"){  span.classList.add("d-mut");    span.textContent="Non annonce"; return span; }
  if(s.state==="disrupted"){      span.classList.add("d-warn");   span.textContent="Perturbe"; return span; }
  if(s.state==="check"){          span.classList.add("d-purple"); span.textContent="Verifier"; return span; }
  span.classList.add("d-mut"); span.textContent="--"; return span;
}

function buildCard(train){
  var s=STATUS[train.id]||{state:"loading"};
  var st=tstate(train.id);
  var allDone=train.pax.every(function(n){ return st.pax[n]; });
  var nowM=(new Date()).getHours()*60+(new Date()).getMinutes();

  var card=document.createElement("div");
  card.className="card "+(s.state||"loading")+(allDone?" all-done":"");
  card.id="card-"+train.id;

  // HEADER
  var hdr=document.createElement("div");
  hdr.className="chdr";
  hdr.addEventListener("click",function(){ card.classList.toggle("expanded"); });

  var bdg=document.createElement("span"); bdg.className="tbadge "+train.badge; bdg.textContent=train.type;
  var num=document.createElement("span"); num.className="tnum"; num.textContent=train.num;
  var rte=document.createElement("span"); rte.className="troute"; rte.textContent=train.from+" > "+train.to;

  var times=document.createElement("div"); times.className="ttimes";
  if(st.track){ var pill=document.createElement("span"); pill.className="vpill"; pill.textContent="Voie "+st.track; times.appendChild(pill); }

  var arrEl=document.createElement("span"); arrEl.className="tarr";
  if(s.state==="delayed"&&s.realArrival){
    var orig=document.createElement("span"); orig.className="orig"; orig.textContent=train.arr;
    var real=document.createElement("span"); real.className="real"; real.textContent=s.realArrival;
    arrEl.appendChild(orig); arrEl.appendChild(real);
  } else { arrEl.textContent=train.arr; }
  times.appendChild(arrEl);
  times.appendChild(makeBadge(s));

  var chev=document.createElement("span"); chev.className="chev"; chev.textContent="v";
  hdr.appendChild(bdg); hdr.appendChild(num); hdr.appendChild(rte); hdr.appendChild(times); hdr.appendChild(chev);
  card.appendChild(hdr);

  // BODY
  var body=document.createElement("div"); body.className="cbody";

  // Pax
  var ps=document.createElement("div"); ps.className="bsec";
  var pl=document.createElement("div"); pl.className="slbl"; pl.textContent="Passagers";
  var plist=document.createElement("div"); plist.className="plist";
  train.pax.forEach(function(name){
    var item=document.createElement("label"); item.className="pitem"+(st.pax[name]?" done":"");
    var cb=document.createElement("input"); cb.type="checkbox"; cb.className="pcb"; cb.checked=!!st.pax[name];
    cb.addEventListener("change",function(e){
      e.stopPropagation();
      tstate(train.id).pax[name]=cb.checked; persist();
      item.className="pitem"+(cb.checked?" done":"");
      updateSummary();
      card.classList.toggle("all-done",train.pax.every(function(n){ return tstate(train.id).pax[n]; }));
    });
    var lbl=document.createElement("span"); lbl.className="plbl"; lbl.textContent=name;
    var tag=document.createElement("span"); tag.className="ptag"; tag.textContent="collecte";
    item.appendChild(cb); item.appendChild(lbl); item.appendChild(tag); plist.appendChild(item);
  });
  ps.appendChild(pl); ps.appendChild(plist); body.appendChild(ps);

  // Driver + track
  var ds=document.createElement("div"); ds.className="bsec";
  var tc=document.createElement("div"); tc.className="twocol";

  var dg=document.createElement("div"); dg.className="fgrp";
  var dl=document.createElement("div"); dl.className="slbl"; dl.textContent="Chauffeur (soc: "+train.co+")";
  var dw=document.createElement("div"); dw.className="fwrap";
  var di=document.createElement("input"); di.className="finp"; di.type="text"; di.placeholder=train.co; di.value=st.driver||"";
  di.addEventListener("click",function(e){ e.stopPropagation(); });
  di.addEventListener("input",function(){ tstate(train.id).driver=di.value; persist(); });
  dw.appendChild(di); dg.appendChild(dl); dg.appendChild(dw);

  var tg=document.createElement("div"); tg.className="fgrp";
  var tl=document.createElement("div"); tl.className="slbl"; tl.textContent="Voie / Quai";
  var tw=document.createElement("div"); tw.className="fwrap";
  var ti=document.createElement("input"); ti.className="finp track"; ti.type="text"; ti.placeholder="--"; ti.value=st.track||"";
  ti.addEventListener("click",function(e){ e.stopPropagation(); });
  ti.addEventListener("input",function(){
    var v=ti.value.trim(); tstate(train.id).track=v; persist();
    var ep=times.querySelector(".vpill");
    if(v){ if(ep){ ep.textContent="Voie "+v; } else { var np=document.createElement("span"); np.className="vpill"; np.textContent="Voie "+v; times.insertBefore(np,times.firstChild); } }
    else if(ep){ ep.remove(); }
  });
  tw.appendChild(ti); tg.appendChild(tl); tg.appendChild(tw);
  tc.appendChild(dg); tc.appendChild(tg); ds.appendChild(tc);
  if(train.cars){ var ce=document.createElement("div"); ce.style.cssText="margin-top:6px;font-size:.62rem;color:var(--a2)"; ce.textContent=train.cars; ds.appendChild(ce); }
  body.appendChild(ds);

  // Watchpoints
  var ws=document.createElement("div"); ws.className="bsec";
  var wl=document.createElement("div"); wl.className="slbl"; wl.textContent="Points de suivi";
  var wlist=document.createElement("div"); wlist.className="wlist";
  train.wp.forEach(function(wp){
    var time=wp[0],stn=wp[1],type=wp[2];
    var row=document.createElement("div"); row.className="wrow";
    var wt=document.createElement("span"); wt.className="wt"; wt.textContent=time;
    var wst=document.createElement("span"); wst.className="ws"+(type==="d"?" dest":""); wst.textContent=stn;
    var wd=document.createElement("span");
    var dc="upcoming",dch="o";
    if(time!=="--"){ var p=time.split(":"); var wm=parseInt(p[0])*60+parseInt(p[1]); if(wm<nowM){dc="passed";dch="v";}else if(type!=="d"&&wm-nowM<25){dc="next";dch=">";} }
    if(type==="d"){dch=">";dc="upcoming";}
    wd.className="wd "+dc; wd.textContent=dch;
    row.appendChild(wt); row.appendChild(wst); row.appendChild(wd); wlist.appendChild(row);
  });
  ws.appendChild(wl); ws.appendChild(wlist); body.appendChild(ws);

  // Notes
  var ns=document.createElement("div"); ns.className="bsec";
  var nl=document.createElement("div"); nl.className="slbl"; nl.textContent="Notes terrain";
  var ta=document.createElement("textarea"); ta.className="nota"; ta.placeholder="Infos temps reel, chauffeur, incident..."; ta.value=st.notes||"";
  ta.addEventListener("click",function(e){ e.stopPropagation(); });
  var nf=document.createElement("div"); nf.className="nfoot";
  var nts=document.createElement("span"); nts.className="nts"; nts.textContent=st.noteTs?"Modif: "+st.noteTs:"";
  var nok=document.createElement("span"); nok.className="nok"; nok.textContent="enregistre";
  var ntimer=null;
  ta.addEventListener("input",function(){
    var s2=tstate(train.id); s2.notes=ta.value;
    var n=new Date(); s2.noteTs=pad(n.getHours())+":"+pad(n.getMinutes()); persist();
    nts.textContent="Modif: "+s2.noteTs; nok.classList.add("vis");
    clearTimeout(ntimer); ntimer=setTimeout(function(){ nok.classList.remove("vis"); },1800);
  });
  nf.appendChild(nts); nf.appendChild(nok);
  ns.appendChild(nl); ns.appendChild(ta); ns.appendChild(nf); body.appendChild(ns);

  // Status message
  if(s.message){ var sr=document.createElement("div"); sr.className="srow"+(s.warn?" warn":""); sr.textContent=s.message; body.appendChild(sr); }

  card.appendChild(body);
  return card;
}

function renderAll(){
  var list=document.getElementById("tlist");
  TRAINS.forEach(function(train){
    var ex=document.getElementById("card-"+train.id);
    var wasExp=ex&&ex.classList.contains("expanded");
    var nc=buildCard(train);
    if(wasExp) nc.classList.add("expanded");
    if(ex){ list.replaceChild(nc,ex); } else { list.appendChild(nc); }
  });
  updateSummary();
}

// ── CLAUDE FETCH ───────────────────────────────
// Cloudflare Worker proxies SNCF API with CORS headers
var WORKER = "https://fragrant-hall-c33b.t5q7m95hfj.workers.dev/";

async function fetchViaClaude(){
  var srcEl=document.getElementById("src-status");
  srcEl.textContent="Connexion SNCF..."; srcEl.className="";

  try{
    var r = await fetch(WORKER, { signal: AbortSignal.timeout(12000) });
    if(!r.ok) throw new Error("HTTP "+r.status);
    var d = await r.json();
    var arrivals = d.arrivals||[];

    function hm(m){ return String(Math.floor(m/60)%24).padStart(2,"0")+":"+String(m%60).padStart(2,"0"); }

    TRAINS.forEach(function(train){
      var match = arrivals.find(function(a){
        var info=a.display_informations||{};
        var h=String(info.headsign||"").trim();
        var t=String(info.trip_short_name||"").trim();
        return h===train.num||t===train.num||h.endsWith(train.num)||t.endsWith(train.num);
      });
      if(!match){
        STATUS[train.id]={state:"not-announced",
          message:"Pas encore annonce ("+arrivals.length+" arrivees chargees)."};
        return;
      }
      var sdt=match.stop_date_time||{};
      var base=sdt.base_arrival_date_time||"";
      var real=sdt.arrival_date_time||"";
      var fresh=sdt.data_freshness||"";
      if(!base){STATUS[train.id]={state:"board-only",message:"Present, horaire non confirme."};return;}
      var bm=parseInt(base.slice(9,11))*60+parseInt(base.slice(11,13));
      var rm=real?parseInt(real.slice(9,11))*60+parseInt(real.slice(11,13)):bm;
      var diff=rm-bm;
      if(diff<=1){STATUS[train.id]={state:"on-time",message:"A l'heure"+(fresh?" ["+fresh+"]":"")};}
      else{STATUS[train.id]={state:"delayed",delayMinutes:diff,realArrival:hm(rm),
        message:"Retard "+diff+"min - Prevue "+hm(rm)};}
    });

    srcEl.textContent="OK - SNCF live"; srcEl.className="ok";
    return true;

  }catch(e){
    TRAINS.forEach(function(t){
      STATUS[t.id]={state:"check",message:"Erreur: "+e.message,warn:true};
    });
    srcEl.textContent="Erreur: "+e.message; srcEl.className="warn";
    return false;
  }
}

var fetching=false;
var autoTimer=null;

async function fetchAll(){
  if(fetching) return;
  fetching=true;
  if(autoTimer) clearTimeout(autoTimer);

  var btn=document.getElementById("rbtn");
  btn.disabled=true; btn.textContent="...";

  TRAINS.forEach(function(t){ STATUS[t.id]={state:"loading"}; });
  renderAll();

  await fetchViaClaude();
  renderAll();

  btn.disabled=false; btn.textContent="Verifier arrivees";
  fetching=false;

  var n=new Date();
  document.getElementById("fnote").textContent="MaJ "+pad(n.getHours())+":"+pad(n.getMinutes())+" - refresh dans 5min";
  autoTimer=setTimeout(fetchAll,5*60*1000);
}

document.addEventListener("DOMContentLoaded",function(){
  try{ if(localStorage.getItem("ss-theme")==="light"){ document.documentElement.setAttribute("data-theme","light"); document.getElementById("themeBtn").textContent="◑ Nuit"; } }catch(e){}
  TRAINS.forEach(function(t){ STATUS[t.id]={state:"loading"}; });
  renderAll();
  var first=document.getElementById("card-"+TRAINS[0].id);
  if(first) first.classList.add("expanded");
  fetchAll();
});
