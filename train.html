<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scenic Sapphire - Lyon 16/04</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0f14;--surf:#131820;--surf2:#0f151c;--bdr:#1e2730;
  --acc:#00c9a7;--a2:#ffd166;--warn:#ef4444;--ok:#22c55e;
  --mut:#4a5568;--txt:#e2e8f0;--dim:#718096;
  --tgv:#003189;--ter:#e05206;--frec:#ce1126;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'DM Mono',monospace;min-height:100vh}
.hdr{padding:18px 16px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.hdr h1{font-family:'Syne',sans-serif;font-weight:800;font-size:.95rem;letter-spacing:.13em;text-transform:uppercase}
.sub{font-size:.61rem;color:var(--dim);margin-top:4px;letter-spacing:.06em}
.hdr-r{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
#clock{font-size:1.2rem;font-weight:500;color:var(--acc);font-variant-numeric:tabular-nums}
.rbtn{background:transparent;border:1px solid var(--acc);color:var(--acc);font-family:'DM Mono',monospace;font-size:.59rem;letter-spacing:.08em;padding:5px 10px;cursor:pointer;text-transform:uppercase;transition:all .18s}
.rbtn:hover:not(:disabled){background:var(--acc);color:var(--bg)}
.rbtn:disabled{opacity:.35;cursor:not-allowed}
.sbar{display:flex;border-bottom:1px solid var(--bdr);overflow-x:auto}
.sc{flex:1;min-width:64px;padding:9px 11px;border-right:1px solid var(--bdr);display:flex;flex-direction:column;gap:2px}
.sc:last-child{border-right:none}
.sl{font-size:.5rem;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}
.sv{font-size:.9rem;font-weight:500;font-variant-numeric:tabular-nums}
.sv.ok{color:var(--ok)}.sv.warn{color:var(--warn)}.sv.ac{color:var(--acc)}.sv.sm{font-size:.65rem}
.src-bar{padding:6px 14px;border-bottom:1px solid var(--bdr);background:var(--surf2);font-size:.55rem;color:var(--dim);display:flex;align-items:center;gap:6px}
#src-status{margin-left:auto;font-size:.54rem}
#src-status.ok{color:var(--ok)} #src-status.warn{color:var(--warn)}
#tlist{padding:11px;display:flex;flex-direction:column;gap:7px}
.card{background:var(--surf);border:1px solid var(--bdr);border-left:3px solid var(--mut);transition:all .3s}
.card.on-time{border-left-color:var(--ok)}
.card.delayed{border-left-color:var(--warn)}
.card.loading{border-left-color:var(--mut)}
.card.all-done{opacity:.55}
.chdr{display:flex;align-items:center;gap:7px;padding:10px 12px 9px;cursor:pointer}
.tbadge{font-size:.54rem;font-weight:500;padding:3px 6px;border-radius:2px;text-transform:uppercase}
.b-tgv{background:var(--tgv);color:#fff}.b-ter{background:var(--ter);color:#fff}.b-frec{background:var(--frec);color:#fff}
.tnum{font-size:.64rem;color:var(--dim);min-width:52px}
.troute{flex:1;font-size:.68rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ttimes{display:flex;align-items:center;gap:5px;justify-content:flex-end}
.tarr{font-size:.82rem;font-weight:500;font-variant-numeric:tabular-nums}
.tarr .orig{text-decoration:line-through;color:var(--mut);font-size:.68rem;margin-right:3px}
.tarr .real{color:var(--warn)}
.vpill{font-size:.54rem;background:rgba(0,201,167,.11);color:var(--acc);border:1px solid rgba(0,201,167,.24);padding:2px 7px;border-radius:10px}
.db{font-size:.57rem;font-weight:500;padding:2px 6px;border-radius:2px}
.d-ok{background:rgba(34,197,94,.12);color:var(--ok)}
.d-warn{background:rgba(239,68,68,.12);color:var(--warn)}
.d-mut{background:rgba(74,85,104,.17);color:var(--mut)}
.chev{color:var(--mut);font-size:.54rem;transition:transform .2s}
.card.expanded .chev{transform:rotate(180deg)}
.cbody{display:none;border-top:1px solid var(--bdr);background:rgba(0,0,0,.13)}
.card.expanded .cbody{display:block}
.bsec{padding:10px 12px;border-bottom:1px solid var(--bdr)}
.slbl{font-size:.5rem;color:var(--dim);text-transform:uppercase;margin-bottom:6px}
.plist{display:flex;flex-direction:column;gap:5px}
.pitem{display:flex;align-items:center;gap:8px;font-size:.7rem}
.pitem.done{color:var(--ok);text-decoration:line-through}
.pcb{width:16px;height:16px}
.twocol{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fwrap{background:var(--surf2);border:1px solid var(--bdr);padding:5px 8px}
.finp{background:transparent;border:none;color:var(--txt);font-family:inherit;font-size:.68rem;width:100%}
.nota{width:100%;background:var(--surf2);border:1px solid var(--bdr);color:var(--txt);font-family:inherit;font-size:.68rem;padding:7px;min-height:60px}
.foot{padding:8px 13px;border-top:1px solid var(--bdr);font-size:.53rem;color:var(--mut);display:flex;justify-content:space-between}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.lp{animation:pulse 1s infinite}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <h1>Scenic Sapphire</h1>
    <div class="sub">Lyon Part-Dieu &middot; Arrivees &middot; Jeu 16 Avril 2026</div>
  </div>
  <div class="hdr-r">
    <div id="clock">--:--:--</div>
    <button class="rbtn" id="rbtn" onclick="fetchAll()">Verifier</button>
  </div>
</div>

<div class="sbar">
  <div class="sc"><div class="sl">Trains</div><div class="sv ac">6</div></div>
  <div class="sc"><div class="sl">Status</div><div class="sv ok" id="sumStatus">--</div></div>
  <div class="sc"><div class="sl">Pax</div><div class="sv ok" id="sumPax">0/13</div></div>
  <div class="sc"><div class="sl">MaJ</div><div class="sv sm" id="sumTime">--</div></div>
</div>

<div class="src-bar">
  <span>Source: SNCF Real-Time</span>
  <span id="src-status">Prêt</span>
</div>

<div id="tlist"></div>

<div class="foot">
  <span>Auto-refresh 5min</span>
  <span id="fnote">--</span>
</div>

<script>
// --- CONFIG ---
var STATION_UIC = "stop_area:SNCF:87722025"; // Lyon Part-Dieu
var TARGET_DATE = "20260416";
var API_URL = "https://api.sncf.com/v1/coverage/sncf/stop_areas/"+STATION_UIC+"/arrivals?datetime="+TARGET_DATE+"T080000&count=100";
var LS_KEY = "ss-data-2026-04-16";

var PROXIES = [
  url => "https://corsproxy.io/?" + encodeURIComponent(url),
  url => "https://api.allorigins.win/raw?url=" + encodeURIComponent(url),
  url => "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(url)
];

var TRAINS = [
  { id:"6647",  type:"FRECCIA", badge:"b-frec", num:"6647", from:"Paris GDL", arr:"11:26", pax:["Kevin Sweeney","Sean Sweeney"], co:"Balhi" },
  { id:"17769", type:"TER", badge:"b-ter", num:"17769", from:"Dijon", arr:"12:44", pax:["Kathryn Liebke","Patrick Liebke"], co:"Balhi/TSF" },
  { id:"6611",  type:"TGV", badge:"b-tgv", num:"6611", from:"Paris GDL", arr:"12:56", pax:["Debra Nash","Larry Nash"], co:"Balhi" },
  { id:"12179", type:"TGV", badge:"b-tgv", num:"12179", from:"Mulhouse", arr:"12:59", pax:["Chester Brothers","Patricia Brothers"], co:"Balhi" },
  { id:"96562", type:"TER", badge:"b-ter", num:"96562", from:"Geneve", arr:"13:26", pax:["Brian Johnston"], co:"Balhi" },
  { id:"6613",  type:"TGV", badge:"b-tgv", num:"6613", from:"Paris GDL", arr:"13:56", pax:["Nevia Schroder","Paul Schroder","Timothy Graham","Debra Peters"], co:"Balhi" }
];

// --- APP STATE ---
var APP = JSON.parse(localStorage.getItem(LS_KEY)) || {};
var STATUS_MAP = {}; 

function save(){ localStorage.setItem(LS_KEY, JSON.stringify(APP)); }
function getT(id){ if(!APP[id]) APP[id]={pax:{},track:"",notes:""}; return APP[id]; }

// --- LOGIC ---
function tick(){
  var n=new Date();
  document.getElementById("clock").textContent=n.toTimeString().split(' ')[0];
}
setInterval(tick,1000); tick();

function buildUI(){
  var list = document.getElementById("tlist");
  list.innerHTML = "";
  var okCount = 0;
  var totalPaxDone = 0;
  var totalPax = 0;

  TRAINS.forEach(t => {
    var state = STATUS_MAP[t.id] || { state: "loading", msg: "En attente..." };
    var local = getT(t.id);
    totalPax += t.pax.length;
    
    var card = document.createElement("div");
    card.className = "card " + state.state;
    if(t.pax.every(p => local.pax[p])) card.classList.add("all-done");

    var paxHtml = t.pax.map(p => {
      if(local.pax[p]) totalPaxDone++;
      return `<label class="pitem ${local.pax[p]?'done':''}">
        <input type="checkbox" class="pcb" ${local.pax[p]?'checked':''} onchange="togglePax('${t.id}','${p}')"> ${p}
      </label>`;
    }).join("");

    card.innerHTML = `
      <div class="chdr" onclick="this.parentElement.classList.toggle('expanded')">
        <span class="tbadge ${t.badge}">${t.type}</span>
        <span class="tnum">${t.num}</span>
        <span class="troute">${t.from}</span>
        <div class="ttimes">
          ${local.track ? `<span class="vpill">Voie ${local.track}</span>`:''}
          <span class="tarr">${state.realArr ? `<span class="orig">${t.arr}</span><span class="real">${state.realArr}</span>` : t.arr}</span>
          <span class="db ${state.state=='on-time'?'d-ok':(state.state=='delayed'?'d-warn':'d-mut')}">${state.msg}</span>
        </div>
        <span class="chev">v</span>
      </div>
      <div class="cbody">
        <div class="bsec"><div class="slbl">Passagers</div><div class="plist">${paxHtml}</div></div>
        <div class="bsec">
          <div class="twocol">
            <div><div class="slbl">Co: ${t.co}</div><div class="fwrap"><input class="finp" placeholder="Chauffeur" value="${local.driver||''}" oninput="updateField('${t.id}','driver',this.value)"></div></div>
            <div><div class="slbl">Voie</div><div class="fwrap"><input class="finp" placeholder="--" value="${local.track||''}" oninput="updateField('${t.id}','track',this.value)"></div></div>
          </div>
        </div>
        <div class="bsec"><div class="slbl">Notes</div><textarea class="nota" oninput="updateField('${t.id}','notes',this.value)">${local.notes||''}</textarea></div>
      </div>
    `;
    list.appendChild(card);
    if(state.state === "on-time") okCount++;
  });

  document.getElementById("sumStatus").textContent = okCount + "/6";
  document.getElementById("sumPax").textContent = totalPaxDone + "/" + totalPax;
}

function togglePax(tid, name){
  var t = getT(tid);
  t.pax[name] = !t.pax[name];
  save(); buildUI();
}

function updateField(tid, field, val){
  getT(tid)[field] = val;
  save();
  if(field === 'track') buildUI(); // Refresh to show pill
}

async function fetchAll(){
  var key = localStorage.getItem("sncf_api_key");
  if(!key || key.length < 10){
    key = prompt("Entrez votre clé API SNCF:");
    if(key) localStorage.setItem("sncf_api_key", key);
    else return;
  }

  var btn = document.getElementById("rbtn");
  var status = document.getElementById("src-status");
  btn.disabled = true; status.textContent = "Sync...";

  for(let proxyFn of PROXIES){
    try {
      let resp = await fetch(proxyFn(API_URL), { 
        headers: { "Authorization": "Basic " + btoa(key + ":") },
        signal: AbortSignal.timeout(15000)
      });
      if(!resp.ok) continue;
      let data = await resp.json();
      
      data.arrivals.forEach(arrival => {
        let trainNum = arrival.display_informations.headsign;
        let tMatch = TRAINS.find(x => x.num == trainNum);
        if(tMatch){
          let sched = arrival.stop_date_time.arrival_date_time;
          let real = arrival.stop_date_time.base_arrival_date_time;
          let delay = 0;
          
          // Basic delay calc
          let isDelayed = sched !== real;
          let realClock = sched.substring(9,11) + ":" + sched.substring(11,13);

          STATUS_MAP[tMatch.id] = {
            state: isDelayed ? "delayed" : "on-time",
            msg: isDelayed ? "Retardé" : "A l'heure",
            realArr: isDelayed ? realClock : null
          };
        }
      });
      
      status.textContent = "OK"; status.className = "ok";
      break; 
    } catch(e) {
      status.textContent = "Erreur Proxy..."; status.className = "warn";
    }
  }

  btn.disabled = false;
  document.getElementById("sumTime").textContent = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  buildUI();
}

document.addEventListener("DOMContentLoaded", () => {
  buildUI();
  fetchAll();
  setInterval(fetchAll, 300000); // Auto 5min
});
</script>
</body>
</html>
